<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Widget</title>
    <style>
      :root {
        --ox-bg: #f8fafc;
        --ox-text: #111827;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-text: #f2f7ff;
        }
      }
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-text: #f2f7ff;
      }
      body {
        font-family: var(--ox-mono);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 24px;
      }
      pre { white-space: pre-wrap; font-size: 12px; }
      .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; border: 1px solid currentColor; margin-bottom: 16px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>OrgX Test Widget</h1>
      <div class="status">
        <div class="status-label">Render Status</div>
        <div class="status-value" id="renderStatus">Widget Loaded</div>
      </div>
      <div class="status">
        <div class="status-label">Data Status</div>
        <div class="status-value" id="dataStatus">
          Waiting for tool result...
        </div>
      </div>
      <div class="status">
        <div class="status-label">Protocol</div>
        <div class="status-value" id="protocolValue">Detecting...</div>
      </div>
      <div class="message" id="messageBox">
        <span class="waiting">No message received yet</span>
      </div>
      <div class="debug" id="debugInfo">
        Initialized at: <span id="initTime"></span>
      </div>
    </div>

    <!--
      Self-contained widget bridge — NO external scripts.
      Handles ChatGPT (window.openai), MCP Apps (postMessage JSON-RPC), and demo mode.
      Per MCP Apps spec: all JS/CSS must be inlined to avoid sandbox CSP issues.
    -->
    <script>
      (function () {
        'use strict';

        // ── Utility: HTML escape ──
        function escapeHtml(str) {
          if (str == null) return '';
          var div = document.createElement('div');
          div.textContent = String(str);
          return div.innerHTML;
        }

        // ── DOM refs ──
        var initTimeEl = document.getElementById('initTime');
        var renderStatusEl = document.getElementById('renderStatus');
        var dataStatusEl = document.getElementById('dataStatus');
        var protocolEl = document.getElementById('protocolValue');
        var messageBoxEl = document.getElementById('messageBox');
        var debugInfoEl = document.getElementById('debugInfo');

        initTimeEl.textContent = new Date().toISOString();

        // ── Protocol detection ──
        function detectProtocol() {
          if (typeof window.openai !== 'undefined') return 'chatgpt';
          if (window.parent && window.parent !== window) return 'mcp-apps';
          return 'standalone';
        }

        // ── Extract structured data from various result formats ──
        function extractData(out) {
          if (out == null) return null;

          // ChatGPT: structuredContent field
          if (typeof out === 'object' && out.structuredContent) {
            return out.structuredContent;
          }

          // MCP Apps: content array with JSON text items
          if (typeof out === 'object' && Array.isArray(out.content)) {
            for (var i = 0; i < out.content.length; i++) {
              var item = out.content[i];
              if (item && item.type === 'text' && item.text) {
                try {
                  return JSON.parse(item.text);
                } catch (e) {
                  continue;
                }
              }
            }
          }

          // Raw string
          if (typeof out === 'string') {
            try {
              return JSON.parse(out);
            } catch (e) {
              return { text: out };
            }
          }

          return out;
        }

        // ── Render data to UI ──
        function updateUI(data) {
          dataStatusEl.textContent = 'Data Received!';
          dataStatusEl.style.color = 'rgb(20, 184, 166)';
          renderStatusEl.textContent = 'Tool Result Rendered';

          if (data && typeof data.message === 'string' && data.message.length) {
            messageBoxEl.innerHTML =
              '<strong>Message:</strong> ' + escapeHtml(data.message);
          } else if (data) {
            messageBoxEl.innerHTML =
              '<pre style="font-size:11px;overflow:auto;max-height:240px;">' +
              escapeHtml(JSON.stringify(data, null, 2)) +
              '</pre>';
          } else {
            messageBoxEl.innerHTML =
              '<span class="waiting">No message received yet</span>';
          }

          debugInfoEl.innerHTML +=
            '<br>Data received at: ' + new Date().toISOString();
        }

        // ── Size reporting (MCP Apps spec) ──
        var _lastW = 0, _lastH = 0;
        function sendSize() {
          var w = Math.ceil(
            document.documentElement.getBoundingClientRect().width +
            (window.innerWidth - document.documentElement.clientWidth)
          );
          var h = Math.ceil(document.documentElement.getBoundingClientRect().height);
          if (w === _lastW && h === _lastH) return;
          _lastW = w; _lastH = h;
          try {
            window.parent.postMessage({
              jsonrpc: '2.0',
              method: 'ui/notifications/size-changed',
              params: { width: w, height: h }
            }, '*');
          } catch (e) {}
        }
        function observeSize() {
          sendSize();
          if (typeof ResizeObserver !== 'undefined') {
            var raf = 0;
            var ro = new ResizeObserver(function () {
              if (raf) cancelAnimationFrame(raf);
              raf = requestAnimationFrame(sendSize);
            });
            ro.observe(document.documentElement);
            ro.observe(document.body);
          }
        }

        // ── Detect mode ──
        var url = new URL(window.location.href);
        var isDemo = url.searchParams.get('demo') === 'true';
        var protocol = detectProtocol();
        protocolEl.textContent = protocol + (isDemo ? ' (demo)' : '');

        // ── Demo Mode ──
        if (isDemo) {
          var demoMessage =
            url.searchParams.get('message') || 'Hello from demo mode!';
          updateUI({
            success: true,
            message: demoMessage,
            timestamp: new Date().toISOString(),
            test_info: {
              widget: 'test-minimal.html',
              description: 'Minimal widget demo payload (no host required).',
            },
          });
          return;
        }

        // ── ChatGPT Protocol ──
        if (protocol === 'chatgpt') {
          // Read initial data
          var initial = extractData(
            window.openai && window.openai.toolOutput
          );
          if (initial) updateUI(initial);

          // Listen for updates
          window.addEventListener(
            'openai:set_globals',
            function (event) {
              var globals = event.detail && event.detail.globals;
              if (globals && globals.toolOutput) {
                var d = extractData(globals.toolOutput);
                if (d) updateUI(d);
              }
            },
            { passive: true }
          );
          return;
        }

        // ── MCP Apps Protocol (Claude, VS Code, Goose, etc.) ──
        if (protocol === 'mcp-apps') {
          var initRequestId = 1;

          // Step 1: Send ui/initialize handshake request
          window.parent.postMessage(
            {
              jsonrpc: '2.0',
              id: initRequestId,
              method: 'ui/initialize',
              params: {
                appInfo: { name: 'OrgX Widget', version: '1.0.0' },
                appCapabilities: { tools: { listChanged: false } },
                protocolVersion: '2026-01-26',
              },
            },
            '*'
          );

          debugInfoEl.innerHTML +=
            '<br>Sent ui/initialize at: ' + new Date().toISOString();

          window.addEventListener('message', function (event) {
            var msg = event.data;
            if (!msg || typeof msg !== 'object') return;

            // Step 2: Response to our initialize request
            if (msg.id === initRequestId && msg.result) {
              // Step 3: Send initialized notification
              window.parent.postMessage(
                {
                  jsonrpc: '2.0',
                  method: 'ui/notifications/initialized',
                },
                '*'
              );
              debugInfoEl.innerHTML +=
                '<br>Handshake complete at: ' + new Date().toISOString();
              protocolEl.textContent = 'mcp-apps (connected)';
              observeSize();
              return;
            }

            // Tool result notification (MCP Apps spec)
            if (
              msg.method === 'ui/notifications/tool-result' &&
              msg.params
            ) {
              var data = extractData(msg.params);
              if (data) updateUI(data);
              return;
            }

            // Legacy notification format
            if (msg.method === 'notifications/message' && msg.params) {
              var legacyData = extractData(msg.params);
              if (legacyData) updateUI(legacyData);
              return;
            }

            // Tool input notification (streaming partial args)
            if (
              msg.method === 'ui/notifications/tool-input' &&
              msg.params
            ) {
              debugInfoEl.innerHTML +=
                '<br>Tool input at: ' + new Date().toISOString();
              return;
            }
          });

          // Also send legacy notifications/initialized for older hosts
          window.parent.postMessage(
            {
              jsonrpc: '2.0',
              method: 'notifications/initialized',
            },
            '*'
          );
          return;
        }

        // ── Standalone: check for ?data= param ──
        var urlData = url.searchParams.get('data');
        if (urlData) {
          updateUI(extractData(urlData));
        }
      })();
    </script>
  </body>
</html>
