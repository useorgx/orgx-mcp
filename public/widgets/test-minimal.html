<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Widget</title>
    <style>
      :root {
        /* ChatGPT SDK fallback (light mode) */
        --app-color-bg: #ffffff;
        --app-color-surface: #ffffff;
        --app-color-surface-elevated: #f7f7f8;
        --app-color-text: #0d0d0d;
        --app-color-text-secondary: #6e6e80;
        --app-color-border: #e5e5e5;
        --app-color-primary: #10a37f;

        /* OrgX brand colors (RGB triplets for rgba() use) */
        --ox-lime: 191, 255, 0;
        --ox-teal: 20, 184, 166;
        --ox-iris: 99, 102, 241;
        --ox-cyan: 10, 212, 196;

        /* OrgX semantic status */
        --ox-success: #25da8e;   --ox-success-bg: rgba(37,218,142,0.12);  --ox-success-border: rgba(37,218,142,0.3);
        --ox-warning: #f9c770;   --ox-warning-bg: rgba(249,199,112,0.12); --ox-warning-border: rgba(249,199,112,0.3);
        --ox-danger: #ff7688;    --ox-danger-bg: rgba(255,118,136,0.12);  --ox-danger-border: rgba(255,118,136,0.3);
        --ox-info: #60bdff;      --ox-info-bg: rgba(96,189,255,0.12);     --ox-info-border: rgba(96,189,255,0.3);

        /* Typography */
        --ox-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --ox-mono: ui-monospace, SFMono-Regular, 'SF Mono', monospace;
        --ox-tracking-tight: -0.01em;
        --ox-tracking-heading: -0.02em;
        --ox-tracking-eyebrow: 0.08em;

        /* Radii */
        --ox-radius-sm: 6px;  --ox-radius-md: 10px;  --ox-radius-lg: 14px;

        /* Motion */
        --ox-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --ox-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ox-duration: 220ms;
        --ox-stagger: 60ms;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --app-color-bg: #02040a;
          --app-color-surface: rgba(255,255,255,0.02);
          --app-color-surface-elevated: rgba(255,255,255,0.04);
          --app-color-text: #f2f7ff;
          --app-color-text-secondary: #b4bed2;
          --app-color-border: rgba(255,255,255,0.06);
          --app-color-primary: rgba(var(--ox-teal), 1);

          /* Glass surface system */
          --ox-glass-bg: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
          --ox-glass-border: rgba(255,255,255,0.06);
          --ox-glass-border-hover: rgba(255,255,255,0.1);
          --ox-glass-blur: blur(12px) saturate(140%);

          /* Shadows with inset highlight */
          --ox-shadow-card: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
          --ox-shadow-card-hover: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(var(--ox-teal),0.08);

          /* Glows */
          --ox-glow-teal: 0 0 20px rgba(var(--ox-teal), 0.15);
          --ox-glow-lime: 0 0 20px rgba(var(--ox-lime), 0.12);
        }
      }

      /* Shared animations */
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes breathe { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.85); } }
      @keyframes cardEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

      @media (prefers-color-scheme: dark) {
        .skeleton-line {
          background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(var(--ox-teal),0.06) 40%, rgba(var(--ox-lime),0.04) 50%, rgba(var(--ox-teal),0.06) 60%, rgba(255,255,255,0.03) 100%);
          background-size: 200% 100%;
          animation: shimmer 2.5s infinite ease-in-out;
        }
      }

      .stagger-item { animation: cardEnter 400ms var(--ox-ease) both; }
      .stagger-item:nth-child(1) { animation-delay: 0ms; }
      .stagger-item:nth-child(2) { animation-delay: 60ms; }
      .stagger-item:nth-child(3) { animation-delay: 120ms; }
      .stagger-item:nth-child(4) { animation-delay: 180ms; }
      .stagger-item:nth-child(5) { animation-delay: 240ms; }

      @media (prefers-reduced-motion: reduce) {
        .skeleton-line, .breathe-dot, .stagger-item { animation: none; }
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ox-font);
        letter-spacing: var(--ox-tracking-tight);
        -webkit-font-smoothing: antialiased;
        background: var(--app-color-bg);
        color: var(--app-color-text);
        padding: 16px;
        min-height: 200px;
      }

      @media (prefers-color-scheme: dark) {
        body { background: #02040a; }
      }

      .container {
        background: var(--app-color-surface);
        border-radius: var(--ox-radius-md);
        padding: 20px;
        border: 1px solid var(--app-color-border);
      }

      @media (prefers-color-scheme: dark) {
        .container {
          background: var(--ox-glass-bg);
          backdrop-filter: var(--ox-glass-blur);
          -webkit-backdrop-filter: var(--ox-glass-blur);
          border: 1px solid var(--ox-glass-border);
          box-shadow: var(--ox-shadow-card);
          border-radius: var(--ox-radius-md);
        }
      }

      h1 {
        font-size: 18px;
        margin-bottom: 12px;
        color: rgba(var(--ox-iris), 1);
        letter-spacing: var(--ox-tracking-heading);
      }

      .status {
        background: var(--app-color-surface-elevated);
        padding: 12px;
        border-radius: var(--ox-radius-sm);
        margin-bottom: 12px;
      }

      .status-label {
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: var(--ox-tracking-eyebrow);
        color: var(--app-color-text-secondary);
        margin-bottom: 4px;
      }

      .status-value {
        font-size: 14px;
        color: rgba(var(--ox-teal), 1);
      }

      .message {
        background: var(--app-color-surface-elevated);
        padding: 16px;
        border-radius: var(--ox-radius-sm);
        border-left: 4px solid rgba(var(--ox-iris), 1);
        margin-top: 12px;
      }

      .waiting {
        color: var(--app-color-text-secondary);
        font-style: italic;
      }

      .debug {
        margin-top: 16px;
        font-size: 11px;
        color: var(--app-color-text-secondary);
        font-family: var(--ox-mono);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>OrgX Test Widget</h1>
      <div class="status">
        <div class="status-label">Render Status</div>
        <div class="status-value" id="renderStatus">Widget Loaded</div>
      </div>
      <div class="status">
        <div class="status-label">Data Status</div>
        <div class="status-value" id="dataStatus">
          Waiting for tool result...
        </div>
      </div>
      <div class="status">
        <div class="status-label">Protocol</div>
        <div class="status-value" id="protocolValue">Detecting...</div>
      </div>
      <div class="message" id="messageBox">
        <span class="waiting">No message received yet</span>
      </div>
      <div class="debug" id="debugInfo">
        Initialized at: <span id="initTime"></span>
      </div>
    </div>

    <!--
      Self-contained widget bridge — NO external scripts.
      Handles ChatGPT (window.openai), MCP Apps (postMessage JSON-RPC), and demo mode.
      Per MCP Apps spec: all JS/CSS must be inlined to avoid sandbox CSP issues.
    -->
    <script>
      (function () {
        'use strict';

        // ── Utility: HTML escape ──
        function escapeHtml(str) {
          if (str == null) return '';
          var div = document.createElement('div');
          div.textContent = String(str);
          return div.innerHTML;
        }

        // ── DOM refs ──
        var initTimeEl = document.getElementById('initTime');
        var renderStatusEl = document.getElementById('renderStatus');
        var dataStatusEl = document.getElementById('dataStatus');
        var protocolEl = document.getElementById('protocolValue');
        var messageBoxEl = document.getElementById('messageBox');
        var debugInfoEl = document.getElementById('debugInfo');

        initTimeEl.textContent = new Date().toISOString();

        // ── Protocol detection ──
        function detectProtocol() {
          if (typeof window.openai !== 'undefined') return 'chatgpt';
          if (window.parent && window.parent !== window) return 'mcp-apps';
          return 'standalone';
        }

        // ── Extract structured data from various result formats ──
        function extractData(out) {
          if (out == null) return null;

          // ChatGPT: structuredContent field
          if (typeof out === 'object' && out.structuredContent) {
            return out.structuredContent;
          }

          // MCP Apps: content array with JSON text items
          if (typeof out === 'object' && Array.isArray(out.content)) {
            for (var i = 0; i < out.content.length; i++) {
              var item = out.content[i];
              if (item && item.type === 'text' && item.text) {
                try {
                  return JSON.parse(item.text);
                } catch (e) {
                  continue;
                }
              }
            }
          }

          // Raw string
          if (typeof out === 'string') {
            try {
              return JSON.parse(out);
            } catch (e) {
              return { text: out };
            }
          }

          return out;
        }

        // ── Render data to UI ──
        function updateUI(data) {
          dataStatusEl.textContent = 'Data Received!';
          dataStatusEl.style.color = 'rgb(20, 184, 166)';
          renderStatusEl.textContent = 'Tool Result Rendered';

          if (data && typeof data.message === 'string' && data.message.length) {
            messageBoxEl.innerHTML =
              '<strong>Message:</strong> ' + escapeHtml(data.message);
          } else if (data) {
            messageBoxEl.innerHTML =
              '<pre style="font-size:11px;overflow:auto;max-height:240px;">' +
              escapeHtml(JSON.stringify(data, null, 2)) +
              '</pre>';
          } else {
            messageBoxEl.innerHTML =
              '<span class="waiting">No message received yet</span>';
          }

          debugInfoEl.innerHTML +=
            '<br>Data received at: ' + new Date().toISOString();
        }

        // ── Size reporting (MCP Apps spec) ──
        var _lastW = 0, _lastH = 0;
        function sendSize() {
          var w = Math.ceil(
            document.documentElement.getBoundingClientRect().width +
            (window.innerWidth - document.documentElement.clientWidth)
          );
          var h = Math.ceil(document.documentElement.getBoundingClientRect().height);
          if (w === _lastW && h === _lastH) return;
          _lastW = w; _lastH = h;
          try {
            window.parent.postMessage({
              jsonrpc: '2.0',
              method: 'ui/notifications/size-changed',
              params: { width: w, height: h }
            }, '*');
          } catch (e) {}
        }
        function observeSize() {
          sendSize();
          if (typeof ResizeObserver !== 'undefined') {
            var raf = 0;
            var ro = new ResizeObserver(function () {
              if (raf) cancelAnimationFrame(raf);
              raf = requestAnimationFrame(sendSize);
            });
            ro.observe(document.documentElement);
            ro.observe(document.body);
          }
        }

        // ── Detect mode ──
        var url = new URL(window.location.href);
        var isDemo = url.searchParams.get('demo') === 'true';
        var protocol = detectProtocol();
        protocolEl.textContent = protocol + (isDemo ? ' (demo)' : '');

        // ── Demo Mode ──
        if (isDemo) {
          var demoMessage =
            url.searchParams.get('message') || 'Hello from demo mode!';
          updateUI({
            success: true,
            message: demoMessage,
            timestamp: new Date().toISOString(),
            test_info: {
              widget: 'test-minimal.html',
              description: 'Minimal widget demo payload (no host required).',
            },
          });
          return;
        }

        // ── ChatGPT Protocol ──
        if (protocol === 'chatgpt') {
          // Read initial data
          var initial = extractData(
            window.openai && window.openai.toolOutput
          );
          if (initial) updateUI(initial);

          // Listen for updates
          window.addEventListener(
            'openai:set_globals',
            function (event) {
              var globals = event.detail && event.detail.globals;
              if (globals && globals.toolOutput) {
                var d = extractData(globals.toolOutput);
                if (d) updateUI(d);
              }
            },
            { passive: true }
          );
          return;
        }

        // ── MCP Apps Protocol (Claude, VS Code, Goose, etc.) ──
        if (protocol === 'mcp-apps') {
          var initRequestId = 1;

          // Step 1: Send ui/initialize handshake request
          window.parent.postMessage(
            {
              jsonrpc: '2.0',
              id: initRequestId,
              method: 'ui/initialize',
              params: {
                appInfo: { name: 'OrgX Widget', version: '1.0.0' },
                appCapabilities: { tools: { listChanged: false } },
                protocolVersion: '2026-01-26',
              },
            },
            '*'
          );

          debugInfoEl.innerHTML +=
            '<br>Sent ui/initialize at: ' + new Date().toISOString();

          window.addEventListener('message', function (event) {
            var msg = event.data;
            if (!msg || typeof msg !== 'object') return;

            // Step 2: Response to our initialize request
            if (msg.id === initRequestId && msg.result) {
              // Step 3: Send initialized notification
              window.parent.postMessage(
                {
                  jsonrpc: '2.0',
                  method: 'ui/notifications/initialized',
                },
                '*'
              );
              debugInfoEl.innerHTML +=
                '<br>Handshake complete at: ' + new Date().toISOString();
              protocolEl.textContent = 'mcp-apps (connected)';
              observeSize();
              return;
            }

            // Tool result notification (MCP Apps spec)
            if (
              msg.method === 'ui/notifications/tool-result' &&
              msg.params
            ) {
              var data = extractData(msg.params);
              if (data) updateUI(data);
              return;
            }

            // Legacy notification format
            if (msg.method === 'notifications/message' && msg.params) {
              var legacyData = extractData(msg.params);
              if (legacyData) updateUI(legacyData);
              return;
            }

            // Tool input notification (streaming partial args)
            if (
              msg.method === 'ui/notifications/tool-input' &&
              msg.params
            ) {
              debugInfoEl.innerHTML +=
                '<br>Tool input at: ' + new Date().toISOString();
              return;
            }
          });

          // Also send legacy notifications/initialized for older hosts
          window.parent.postMessage(
            {
              jsonrpc: '2.0',
              method: 'notifications/initialized',
            },
            '*'
          );
          return;
        }

        // ── Standalone: check for ?data= param ──
        var urlData = url.searchParams.get('data');
        if (urlData) {
          updateUI(extractData(urlData));
        }
      })();
    </script>
  </body>
</html>
