<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Status - OrgX</title>
  <style>
    @import url('./shared/tokens.css');

    :root {
      --agent-surface-max: 560px;
      --agent-running: #10a37f;
      --agent-blocked: var(--app-color-attention);
      --agent-review: var(--app-color-review);
      --agent-idle: var(--app-color-text-tertiary);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: var(--app-space-5) var(--app-space-3) var(--app-space-6);
      background:
        radial-gradient(circle at top right, rgba(16, 163, 127, 0.08), transparent 40%),
        var(--app-color-bg);
      color: var(--app-color-text);
    }

    .agent-board {
      width: 100%;
      max-width: var(--agent-surface-max);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: var(--app-space-3);
    }

    .surface-label {
      display: flex;
      align-items: center;
      gap: var(--app-space-3);
      color: var(--app-color-text-tertiary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .surface-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--app-color-divider);
    }

    .agent-card {
      position: relative;
      overflow: hidden;
      transition:
        transform var(--app-transition-fast),
        border-color var(--app-transition-fast),
        box-shadow var(--app-transition-fast);
    }

    .agent-card::before {
      content: '';
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(16, 163, 127, 0.4), transparent);
      opacity: 0;
      transition: opacity var(--app-transition-fast);
    }

    .agent-card[data-priority='blocked']::before,
    .agent-card[data-priority='review']::before,
    .agent-card:hover::before {
      opacity: 1;
    }

    .agent-card[data-priority='blocked'] {
      border-color: rgba(220, 38, 38, 0.26);
    }

    .agent-card[data-priority='review'] {
      border-color: rgba(217, 119, 6, 0.24);
    }

    .agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--app-space-3);
      padding: var(--app-space-4) var(--app-space-4) var(--app-space-3);
    }

    .agent-identity {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: var(--app-space-3);
    }

    .agent-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--app-color-border);
      background: var(--app-color-surface-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-semibold);
    }

    .agent-mark img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .agent-mark-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .agent-title-group {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .agent-name-row {
      display: flex;
      align-items: baseline;
      gap: var(--app-space-2);
      min-width: 0;
      flex-wrap: wrap;
    }

    .agent-name {
      font-size: var(--app-font-size-md);
      font-weight: var(--app-font-weight-semibold);
      line-height: 1.2;
      color: var(--app-color-text);
      min-width: 0;
    }

    .agent-role {
      color: var(--app-color-text-tertiary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .agent-subline {
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      line-height: 1.35;
      min-width: 0;
    }

    .agent-subline strong {
      color: var(--app-color-text);
      font-weight: var(--app-font-weight-medium);
    }

    .agent-chip {
      flex-shrink: 0;
    }

    .chip-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: currentColor;
      box-shadow: 0 0 10px currentColor;
      flex-shrink: 0;
    }

    .agent-attention {
      margin: 0 var(--app-space-3) var(--app-space-3);
    }

    .attention-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .attention-title {
      color: currentColor;
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-semibold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .attention-body {
      color: var(--app-color-text);
      font-size: var(--app-font-size-sm);
      line-height: 1.4;
    }

    .attention-action {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid currentColor;
      background: transparent;
      color: inherit;
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-semibold);
      text-decoration: none;
      white-space: nowrap;
    }

    .focus-strip {
      padding: 0 var(--app-space-4) var(--app-space-4);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .focus-task {
      color: var(--app-color-text);
      font-size: 0.95rem;
      font-weight: var(--app-font-weight-medium);
      line-height: 1.45;
    }

    .focus-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      line-height: 1.35;
    }

    .focus-meta span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .focus-meta span + span::before {
      content: '';
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: var(--app-color-text-tertiary);
      margin-right: 8px;
    }

    .metric-row {
      border-top: 1px solid var(--app-color-divider);
      border-bottom: 1px solid var(--app-color-divider);
    }

    .metric-button {
      min-height: 72px;
      padding: var(--app-space-3) var(--app-space-2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .metric-button[data-tone='blocked'] .metric-value {
      color: var(--agent-blocked);
    }

    .metric-button[data-tone='review'] .metric-value {
      color: var(--agent-review);
    }

    .metric-value {
      font-size: 1.05rem;
      font-weight: var(--app-font-weight-semibold);
      line-height: 1;
      color: var(--app-color-text);
    }

    .metric-label {
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--app-color-text-tertiary);
    }

    .agent-section {
      display: none;
      padding: 0 var(--app-space-4) var(--app-space-4);
    }

    .agent-section.is-open {
      display: block;
    }

    .agent-section-trigger {
      border-top: 1px solid var(--app-color-divider);
    }

    .disclosure-title {
      display: inline-flex;
      align-items: center;
      gap: var(--app-space-2);
      min-width: 0;
    }

    .disclosure-count {
      color: var(--app-color-text-tertiary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chevron {
      width: 14px;
      height: 14px;
      color: var(--app-color-text-tertiary);
      transition: transform var(--app-transition-fast);
      flex-shrink: 0;
    }

    .agent-section.is-open .chevron {
      transform: rotate(180deg);
    }

    .section-list {
      display: flex;
      flex-direction: column;
    }

    .section-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: var(--app-space-3);
      align-items: start;
      padding: var(--app-space-3) 0;
    }

    .section-row + .section-row {
      border-top: 1px solid var(--app-color-divider);
    }

    .section-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .section-heading {
      color: var(--app-color-text);
      font-size: var(--app-font-size-sm);
      font-weight: var(--app-font-weight-medium);
      line-height: 1.4;
    }

    .section-detail {
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      line-height: 1.45;
    }

    .section-inline-meta {
      color: var(--app-color-text-tertiary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-status {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--app-color-surface-soft);
      color: var(--app-color-text-secondary);
      border: 1px solid var(--app-color-border);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-semibold);
      white-space: nowrap;
    }

    .section-status[data-tone='running'],
    .section-status[data-tone='done'],
    .section-status[data-tone='approved'] {
      color: var(--agent-running);
      background: var(--app-color-accent-soft);
      border-color: rgba(16, 163, 127, 0.2);
    }

    .section-status[data-tone='blocked'] {
      color: var(--agent-blocked);
      background: var(--app-color-attention-bg);
      border-color: rgba(220, 38, 38, 0.2);
    }

    .section-status[data-tone='review'] {
      color: var(--agent-review);
      background: var(--app-color-review-bg);
      border-color: rgba(217, 119, 6, 0.2);
    }

    .section-status[data-tone='queued'],
    .section-status[data-tone='idle'] {
      color: var(--app-color-text-secondary);
    }

    .progress-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: var(--app-space-3);
      padding-top: var(--app-space-3);
    }

    .progress-value {
      color: var(--app-color-text);
      font-size: 1.5rem;
      font-weight: var(--app-font-weight-semibold);
      line-height: 1;
    }

    .progress-context {
      color: var(--app-color-text-tertiary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: right;
    }

    .progress-bar {
      margin-top: var(--app-space-3);
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: var(--app-color-surface-soft);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--agent-running), #34d399);
    }

    .progress-note {
      margin-top: var(--app-space-3);
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      line-height: 1.45;
    }

    .empty-slot {
      padding-top: var(--app-space-3);
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--app-space-3);
      padding: var(--app-space-3) var(--app-space-4) var(--app-space-4);
      border-top: 1px solid var(--app-color-divider);
    }

    .sync-copy {
      color: var(--app-color-text-tertiary);
      font-size: var(--app-font-size-xs);
      font-weight: var(--app-font-weight-medium);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      font-weight: var(--app-font-weight-medium);
      text-decoration: none;
    }

    .footer-link svg {
      width: 14px;
      height: 14px;
    }

    .empty-state {
      padding: var(--app-space-6);
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: var(--app-space-2);
      align-items: center;
    }

    .empty-state strong {
      color: var(--app-color-text);
      font-size: var(--app-font-size-md);
      font-weight: var(--app-font-weight-semibold);
    }

    .empty-state p {
      color: var(--app-color-text-secondary);
      font-size: var(--app-font-size-sm);
      line-height: 1.5;
      max-width: 28ch;
    }

    .skeleton-wrapper {
      display: flex;
      flex-direction: column;
      gap: var(--app-space-3);
    }

    .skeleton-card {
      border-radius: var(--app-radius-card);
      border: 1px solid var(--app-color-border);
      background: var(--app-color-surface);
      padding: var(--app-space-4);
      display: flex;
      flex-direction: column;
      gap: var(--app-space-3);
    }

    .skeleton-line {
      border-radius: var(--app-radius-sm);
      background:
        linear-gradient(
          90deg,
          var(--app-color-surface-soft) 0%,
          rgba(16, 163, 127, 0.12) 50%,
          var(--app-color-surface-soft) 100%
        );
      background-size: 200% 100%;
      animation: shimmer 1.8s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to { background-position: -200% 0; }
    }

    @media (max-width: 420px) {
      body {
        padding: var(--app-space-4) var(--app-space-2) var(--app-space-5);
      }

      .agent-head {
        align-items: flex-start;
      }

      .metric-button {
        min-height: 66px;
        padding-inline: 6px;
      }

      .metric-value {
        font-size: 0.95rem;
      }

      .metric-label {
        letter-spacing: 0.05em;
      }
    }
  </style>
</head>
<body>
  <main class="agent-board" id="content" aria-live="polite">
    <div class="surface-label">Agent Status</div>
    <div class="skeleton-wrapper">
      <div class="skeleton-card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <div style="display:flex;align-items:center;gap:12px;flex:1;min-width:0;">
            <div class="skeleton-line" style="width:32px;height:32px;border-radius:10px;"></div>
            <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:8px;">
              <div class="skeleton-line" style="width:42%;height:16px;"></div>
              <div class="skeleton-line" style="width:68%;height:12px;"></div>
            </div>
          </div>
          <div class="skeleton-line" style="width:88px;height:28px;border-radius:999px;"></div>
        </div>
        <div class="skeleton-line" style="width:100%;height:52px;border-radius:12px;"></div>
        <div class="skeleton-line" style="width:100%;height:40px;border-radius:10px;"></div>
      </div>
    </div>
  </main>

  <script>
    (function syncThemeFromUrl() {
      var theme = new URLSearchParams(window.location.search).get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();

    function injectHtml(html) {
      var content = document.getElementById('content');
      content.innerHTML = html;
      requestAnimationFrame(_sendSize);
    }

    function _detectProtocol() {
      if (typeof window.openai !== 'undefined') return 'chatgpt';
      if (window.parent && window.parent !== window) return 'mcp-apps';
      return 'standalone';
    }

    function _extractData(out) {
      if (out == null) return null;
      if (typeof out === 'object' && out.structuredContent) return out.structuredContent;
      if (typeof out === 'object' && Array.isArray(out.content)) {
        for (var i = 0; i < out.content.length; i += 1) {
          var item = out.content[i];
          if (item && item.type === 'text' && item.text) {
            try {
              return JSON.parse(item.text);
            } catch (error) {
              continue;
            }
          }
        }
      }
      if (typeof out === 'string') {
        try {
          return JSON.parse(out);
        } catch (error) {
          return { text: out };
        }
      }
      return out;
    }

    var _lastW = 0;
    var _lastH = 0;
    function _sendSize() {
      var width = Math.ceil(
        document.documentElement.getBoundingClientRect().width +
          (window.innerWidth - document.documentElement.clientWidth)
      );
      var height = Math.ceil(document.documentElement.getBoundingClientRect().height);
      if (width === _lastW && height === _lastH) return;
      _lastW = width;
      _lastH = height;
      try {
        window.parent.postMessage(
          {
            jsonrpc: '2.0',
            method: 'ui/notifications/size-changed',
            params: { width: width, height: height },
          },
          '*'
        );
      } catch (error) {}
    }

    function _observeSize() {
      _sendSize();
      if (typeof ResizeObserver !== 'undefined') {
        var frame = 0;
        var observer = new ResizeObserver(function () {
          if (frame) cancelAnimationFrame(frame);
          frame = requestAnimationFrame(_sendSize);
        });
        observer.observe(document.documentElement);
        observer.observe(document.body);
      }
    }

    var _mcpPending = {};
    var _mcpNextId = 100;

    function initWidget(opts) {
      var render = opts.render;
      var getData = opts.getData || _extractData;
      var protocol = _detectProtocol();

      if (protocol === 'chatgpt') {
        render(getData(window.openai && window.openai.toolOutput));
        window.addEventListener(
          'openai:set_globals',
          function (event) {
            var globals = event.detail && event.detail.globals;
            if (globals && globals.toolOutput) render(getData(globals.toolOutput));
          },
          { passive: true }
        );
        return;
      }

      if (protocol === 'mcp-apps') {
        render(null);
        var initId = 1;
        window.parent.postMessage(
          {
            jsonrpc: '2.0',
            id: initId,
            method: 'ui/initialize',
            params: {
              appInfo: { name: 'Agent Status Widget', version: '1.0' },
              appCapabilities: { tools: { listChanged: false } },
              protocolVersion: '2026-01-26',
            },
          },
          '*'
        );
        window.parent.postMessage({ jsonrpc: '2.0', method: 'notifications/initialized' }, '*');
        window.addEventListener('message', function (event) {
          var msg = event.data;
          if (!msg || typeof msg !== 'object') return;
          if (msg.id === initId && msg.result) {
            window.parent.postMessage(
              { jsonrpc: '2.0', method: 'ui/notifications/initialized' },
              '*'
            );
            _observeSize();
            return;
          }
          if (msg.id != null && _mcpPending[msg.id]) {
            var pending = _mcpPending[msg.id];
            delete _mcpPending[msg.id];
            if (msg.error) pending.reject(new Error(msg.error.message || 'Tool call failed'));
            else pending.resolve(msg.result);
            return;
          }
          if (
            (msg.method === 'ui/notifications/tool-result' || msg.method === 'notifications/message') &&
            msg.params
          ) {
            var next = getData(msg.params);
            if (next) render(next);
          }
        });
        return;
      }

      render(null);
    }

    function escapeHtml(value) {
      if (value == null) return '';
      var div = document.createElement('div');
      div.textContent = String(value);
      return div.innerHTML;
    }

    function firstString(values) {
      for (var i = 0; i < values.length; i += 1) {
        var value = values[i];
        if (typeof value === 'string' && value.trim()) return value.trim();
      }
      return '';
    }

    function asNumber(value) {
      if (typeof value === 'number' && !Number.isNaN(value)) return value;
      if (typeof value === 'string' && value.trim() !== '' && !Number.isNaN(Number(value))) {
        return Number(value);
      }
      return null;
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function titleCase(value) {
      return String(value || '')
        .replace(/[-_]+/g, ' ')
        .replace(/\b\w/g, function (char) { return char.toUpperCase(); })
        .trim();
    }

    function normalizeStatus(value) {
      var normalized = String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
      if (!normalized) return 'idle';
      if (['running', 'active', 'executing', 'in_progress', 'working'].indexOf(normalized) !== -1) return 'running';
      if (['blocked', 'paused', 'waiting', 'at_risk'].indexOf(normalized) !== -1) return 'blocked';
      if (['needs_review', 'review', 'in_review'].indexOf(normalized) !== -1) return 'review';
      if (['queued', 'pending', 'not_started', 'todo', 'draft', 'backlog'].indexOf(normalized) !== -1) return 'queued';
      if (['done', 'complete', 'completed', 'approved', 'shipped'].indexOf(normalized) !== -1) return 'done';
      return normalized;
    }

    function getStatusTone(status) {
      if (status === 'blocked') return 'blocked';
      if (status === 'review') return 'review';
      if (status === 'queued' || status === 'idle') return 'idle';
      return 'running';
    }

    function getStatusLabel(status) {
      if (status === 'blocked') return 'Needs you';
      if (status === 'review') return 'Needs review';
      if (status === 'approved') return 'Approved';
      if (status === 'done') return 'Done';
      if (status === 'queued') return 'Queued';
      if (status === 'idle') return 'Idle';
      return 'Running';
    }

    function collectionKey(item) {
      if (typeof item === 'string') return item.trim();
      if (!item || typeof item !== 'object') return '';
      return firstString([
        item.id,
        item.task_id,
        item.taskId,
        item.entity_id,
        item.entityId,
        item.title,
        item.summary,
        item.name,
        item.description
      ]) || JSON.stringify(item);
    }

    function mergeUniqueItems(left, right) {
      var seen = {};
      return ([]).concat(asArray(left), asArray(right)).filter(function (item) {
        var key = collectionKey(item);
        if (!key || seen[key]) return false;
        seen[key] = true;
        return true;
      });
    }

    var REMOTE_WIDGET_ASSET_BASE = 'https://mcp.useorgx.com/widgets/shared/';
    function resolveWidgetAsset(path){
      return REMOTE_WIDGET_ASSET_BASE + path;
    }

    var ORGX_BASE_URL = 'https://useorgx.com';
    var AGENT_DIRECTORY = {
      pace: { name: 'Pace', role: 'Product', avatarPath: 'product_orchestrator.png' },
      product: { name: 'Pace', role: 'Product', avatarPath: 'product_orchestrator.png' },
      eli: { name: 'Eli', role: 'Engineering', avatarPath: 'engineering_autopilot.png' },
      engineering: { name: 'Eli', role: 'Engineering', avatarPath: 'engineering_autopilot.png' },
      mark: { name: 'Mark', role: 'Marketing', avatarPath: 'launch_captain.png' },
      marketing: { name: 'Mark', role: 'Marketing', avatarPath: 'launch_captain.png' },
      sage: { name: 'Sage', role: 'Sales', avatarPath: 'pipeline_intelligence.png' },
      sales: { name: 'Sage', role: 'Sales', avatarPath: 'pipeline_intelligence.png' },
      orion: { name: 'Orion', role: 'Operations', avatarPath: 'control_tower.png' },
      operations: { name: 'Orion', role: 'Operations', avatarPath: 'control_tower.png' },
      dana: { name: 'Dana', role: 'Design', avatarPath: 'design_codex.png' },
      design: { name: 'Dana', role: 'Design', avatarPath: 'design_codex.png' },
      xandy: { name: 'Xandy', role: 'Orchestrator', avatarPath: 'xandy_orchestrator.png' },
      orchestrator: { name: 'Xandy', role: 'Orchestrator', avatarPath: 'xandy_orchestrator.png' }
    };

    function resolveAgentProfile(agent) {
      var directName = firstString([agent.agent_name, agent.name, agent.title]);
      var directRole = firstString([agent.role, agent.persona, agent.domain, agent.agent_domain]);
      var agentType = firstString([agent.agent_type, agent.type, agent.domain, agent.agent_domain]).toLowerCase();
      var nameKey = directName.toLowerCase();
      var roleKey = directRole.toLowerCase();
      var profile = AGENT_DIRECTORY[nameKey] || AGENT_DIRECTORY[agentType] || AGENT_DIRECTORY[roleKey] || null;
      return {
        name: directName || (profile && profile.name) || 'OrgX Agent',
        role: directRole || (profile && profile.role) || titleCase(agentType) || 'Agent',
        avatarPath: (profile && profile.avatarPath) || null
      };
    }

    function renderAvatar(agent) {
      var profile = resolveAgentProfile(agent);
      var fallback = escapeHtml(profile.name.charAt(0).toUpperCase() || '?');
      if (!profile.avatarPath) {
        return '<span class="agent-mark-fallback">' + fallback + '</span>';
      }
      return (
        '<img src="' +
        escapeHtml(resolveWidgetAsset(profile.avatarPath)) +
        '" alt="" loading="eager" decoding="sync" onerror="this.remove(); this.parentNode.innerHTML = \'<span class=&quot;agent-mark-fallback&quot;>' +
        fallback +
        '</span>\';" />'
      );
    }

    function buildAgentUrl(agentId) {
      return agentId
        ? ORGX_BASE_URL + '/settings/agents?agent=' + encodeURIComponent(agentId)
        : ORGX_BASE_URL + '/settings/agents';
    }

    function normalizeTask(task, index) {
      if (!task) return null;
      if (typeof task === 'string') {
        return { id: 'task-' + index, title: task, detail: '', status: 'queued' };
      }
      if (typeof task !== 'object') return null;
      return {
        id: firstString([task.id, task.task_id, task.taskId, task.entity_id, task.entityId]) || 'task-' + index,
        title: firstString([task.title, task.summary, task.name, task.description]) || 'Task ' + (index + 1),
        detail: firstString([task.detail, task.description]),
        status: normalizeStatus(firstString([task.status, task.state, task.phase]))
      };
    }

    function normalizeArtifact(artifact, index) {
      if (!artifact || typeof artifact !== 'object') return null;
      return {
        id: firstString([artifact.id, artifact.ref]) || 'artifact-' + index,
        title: firstString([artifact.title, artifact.name, artifact.summary]) || 'Artifact ' + (index + 1),
        type: firstString([artifact.type, artifact.kind, artifact.artifact_type]) || 'artifact',
        status: normalizeStatus(firstString([artifact.status, artifact.review_status, artifact.state])) || 'approved',
        detail: firstString([artifact.detail, artifact.description, artifact.summary]),
        url: firstString([artifact.url, artifact.review_url]) || null
      };
    }

    function normalizeStream(stream, index) {
      if (!stream || typeof stream !== 'object') return null;
      return {
        id: firstString([stream.id, stream.ref]) || 'stream-' + index,
        name: firstString([stream.name, stream.title]) || 'Stream ' + (index + 1),
        progress: Math.max(0, Math.min(100, asNumber(stream.progress || stream.progress_pct || stream.percent) || 0))
      };
    }

    function normalizeAgent(raw, index) {
      if (!raw || typeof raw !== 'object') return null;
      var tasks = mergeUniqueItems(
        asArray(raw.current_tasks),
        mergeUniqueItems(asArray(raw.active_tasks), asArray(raw.tasks))
      ).map(normalizeTask).filter(Boolean);
      var artifacts = mergeUniqueItems(asArray(raw.artifacts), asArray(raw.outputs || raw.session_output))
        .map(normalizeArtifact)
        .filter(Boolean);
      var blockers = asArray(raw.blockers).filter(Boolean);
      var streams = mergeUniqueItems(asArray(raw.streams), asArray(raw.workstreams))
        .map(normalizeStream)
        .filter(Boolean);
      var currentTask = firstString([
        raw.current_task,
        raw.current_focus,
        raw.currentTask,
        tasks[0] && tasks[0].title
      ]);
      var status = normalizeStatus(raw.status);
      if (blockers.length > 0) status = 'blocked';
      else if (artifacts.some(function (artifact) { return artifact.status === 'review'; })) status = 'review';

      var progress = asNumber(raw.progress || raw.progress_pct || raw.percent_complete);
      if (progress == null && tasks.length > 0) {
        var doneTasks = tasks.filter(function (task) { return task.status === 'done'; }).length;
        progress = Math.round((doneTasks / tasks.length) * 100);
      }

      return {
        id: firstString([raw.agent_id, raw.id, raw.agent_name]) || 'agent-' + index,
        name: resolveAgentProfile(raw).name,
        role: firstString([raw.role, resolveAgentProfile(raw).role]) || 'Agent',
        status: status,
        tone: getStatusTone(status),
        statusLabel: getStatusLabel(status),
        currentTask: currentTask || (status === 'idle' ? 'No active task right now' : 'Tracking background execution'),
        currentMeta: firstString([raw.eta, raw.time_remaining]) || '',
        progress: progress,
        blockers: blockers,
        tasks: tasks,
        artifacts: artifacts,
        streams: streams,
        taskCount: tasks.length || (currentTask ? 1 : 0),
        blockedCount: blockers.length || tasks.filter(function (task) { return task.status === 'blocked'; }).length,
        reviewCount: artifacts.filter(function (artifact) { return artifact.status === 'review'; }).length,
        openUrl: firstString([raw.url, raw.agent_url]) || buildAgentUrl(firstString([raw.agent_id, raw.id])),
      };
    }

    function mergeAgentAliases(agents) {
      var statusWeight = { idle: 1, queued: 2, running: 3, review: 4, blocked: 5 };
      var merged = {};
      agents.forEach(function (agent) {
        var key = (agent.name + '|' + agent.role).toLowerCase();
        var existing = merged[key];
        if (!existing) {
          merged[key] = agent;
          return;
        }
        var keepIncoming = (statusWeight[agent.status] || 0) > (statusWeight[existing.status] || 0);
        merged[key] = {
          id: existing.id || agent.id,
          name: existing.name || agent.name,
          role: existing.role || agent.role,
          status: keepIncoming ? agent.status : existing.status,
          tone: keepIncoming ? agent.tone : existing.tone,
          statusLabel: keepIncoming ? agent.statusLabel : existing.statusLabel,
          currentTask: keepIncoming ? (agent.currentTask || existing.currentTask) : (existing.currentTask || agent.currentTask),
          currentMeta: existing.currentMeta || agent.currentMeta,
          progress: Math.max(existing.progress || 0, agent.progress || 0),
          blockers: mergeUniqueItems(existing.blockers, agent.blockers),
          tasks: mergeUniqueItems(existing.tasks, agent.tasks),
          artifacts: mergeUniqueItems(existing.artifacts, agent.artifacts),
          streams: mergeUniqueItems(existing.streams, agent.streams),
          taskCount: Math.max(existing.taskCount || 0, agent.taskCount || 0),
          blockedCount: Math.max(existing.blockedCount || 0, agent.blockedCount || 0),
          reviewCount: Math.max(existing.reviewCount || 0, agent.reviewCount || 0),
          openUrl: existing.openUrl || agent.openUrl
        };
      });
      return Object.keys(merged).map(function (key) { return merged[key]; });
    }

    function normalizePayload(payload) {
      if (!payload) return { agents: [] };
      var agents = Array.isArray(payload.agents) ? payload.agents : [payload];
      return { agents: mergeAgentAliases(agents.map(normalizeAgent).filter(Boolean)) };
    }

    function getPriority(agent) {
      if (agent.status === 'blocked') return 0;
      if (agent.status === 'review') return 1;
      if (agent.status === 'running') return 2;
      if (agent.status === 'queued') return 3;
      return 4;
    }

    function statusToneForRow(status) {
      if (status === 'blocked') return 'blocked';
      if (status === 'review') return 'review';
      if (status === 'done' || status === 'approved' || status === 'running') return 'running';
      if (status === 'queued') return 'queued';
      return 'idle';
    }

    function summarizeOverview(agent) {
      var parts = [];
      if (agent.blockedCount) parts.push(agent.blockedCount + ' blocked');
      if (agent.reviewCount) parts.push(agent.reviewCount + ' review');
      if (agent.taskCount) parts.push(agent.taskCount + ' tasks in flight');
      if (!parts.length) parts.push('No agents need you right now');
      return parts.join(' · ');
    }

    var widgetState = {};

    function setCardSection(cardId, section) {
      if (section === 'overview') {
        widgetState[cardId] = 'overview';
        render();
        return;
      }
      widgetState[cardId] = widgetState[cardId] === section ? 'overview' : section;
      render();
    }

    function renderAttention(agent) {
      if (agent.status !== 'blocked' && agent.status !== 'review') return '';
      var tone = agent.status === 'blocked' ? 'blocked' : 'review';
      var title = agent.status === 'blocked' ? 'Blocked' : 'Needs review';
      var body = agent.status === 'blocked'
        ? String(agent.blockers[0] || 'A founder-level decision is blocking progress.')
        : String((agent.artifacts.find(function (artifact) { return artifact.status === 'review'; }) || {}).title || 'An artifact is ready for review.');
      var action = agent.status === 'blocked' ? 'Resolve blocker' : 'Review now';
      return (
        '<div class="agent-attention app-attention-banner" data-tone="' + tone + '">' +
          '<div class="attention-copy">' +
            '<div class="attention-title">' + title + '</div>' +
            '<div class="attention-body">' + escapeHtml(body) + '</div>' +
          '</div>' +
          '<a class="attention-action" href="' + escapeHtml(agent.openUrl) + '" target="_blank" rel="noreferrer">' + action + '</a>' +
        '</div>'
      );
    }

    function renderOverviewSection(agent, isOpen) {
      if (!isOpen) return '';
      return (
        '<section class="agent-section is-open" data-section="overview">' +
          '<div class="section-list app-disclosure-body">' +
            '<div class="section-row">' +
              '<div class="section-copy">' +
                '<div class="section-heading">At a glance</div>' +
                '<div class="section-detail">' + escapeHtml(summarizeOverview(agent)) + '</div>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</section>'
      );
    }

    function renderRows(rows, emptyCopy) {
      if (!rows.length) {
        return '<div class="empty-slot">' + escapeHtml(emptyCopy) + '</div>';
      }
      return (
        '<div class="section-list app-disclosure-body">' +
          rows.join('') +
        '</div>'
      );
    }

    function renderTasksSection(agent, isOpen) {
      var rows = agent.tasks.map(function (task) {
        return (
          '<div class="section-row">' +
            '<div class="section-copy">' +
              '<div class="section-heading">' + escapeHtml(task.title) + '</div>' +
              (task.detail ? '<div class="section-detail">' + escapeHtml(task.detail) + '</div>' : '') +
            '</div>' +
            '<div class="section-status" data-tone="' + statusToneForRow(task.status) + '">' + escapeHtml(getStatusLabel(task.status)) + '</div>' +
          '</div>'
        );
      });
      return (
        '<section class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="tasks">' +
          '<div class="agent-section-trigger">' +
            '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="tasks" data-agent="' + escapeHtml(agent.id) + '">' +
              '<span class="disclosure-title"><span>Tasks</span><span class="disclosure-count">' + agent.taskCount + '</span></span>' +
              '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
            '</button>' +
          '</div>' +
          (isOpen ? renderRows(rows, 'No task detail to expand right now.') : '') +
        '</section>'
      );
    }

    function renderArtifactsSection(agent, isOpen) {
      var rows = agent.artifacts.map(function (artifact) {
        var status = artifact.status === 'review' ? 'Review' : getStatusLabel(artifact.status);
        return (
          '<div class="section-row">' +
            '<div class="section-copy">' +
              '<div class="section-heading">' + escapeHtml(artifact.title) + '</div>' +
              '<div class="section-inline-meta">' + escapeHtml(titleCase(artifact.type)) + '</div>' +
              (artifact.detail ? '<div class="section-detail">' + escapeHtml(artifact.detail) + '</div>' : '') +
            '</div>' +
            '<a class="section-status" data-tone="' + statusToneForRow(artifact.status) + '" href="' + escapeHtml(agent.openUrl) + '" target="_blank" rel="noreferrer">' + escapeHtml(status) + '</a>' +
          '</div>'
        );
      });
      return (
        '<section class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="artifacts">' +
          '<div class="agent-section-trigger">' +
            '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="artifacts" data-agent="' + escapeHtml(agent.id) + '">' +
              '<span class="disclosure-title"><span>Artifacts</span><span class="disclosure-count">' + agent.artifacts.length + '</span></span>' +
              '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
            '</button>' +
          '</div>' +
          (isOpen ? renderRows(rows, 'No artifacts are waiting on a founder decision.') : '') +
        '</section>'
      );
    }

    function renderProgressSection(agent, isOpen) {
      return (
        '<section class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="progress">' +
          '<div class="agent-section-trigger">' +
            '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="progress" data-agent="' + escapeHtml(agent.id) + '">' +
              '<span class="disclosure-title"><span>Progress</span><span class="disclosure-count">' + escapeHtml(String(agent.progress == null ? 'n/a' : agent.progress + '%')) + '</span></span>' +
              '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
            '</button>' +
          '</div>' +
          (isOpen
            ? '<div class="app-disclosure-body">' +
                '<div class="progress-header">' +
                  '<div class="progress-value">' + escapeHtml(String(agent.progress == null ? 'n/a' : agent.progress + '%')) + '</div>' +
                  '<div class="progress-context">' + escapeHtml(agent.currentMeta || 'Background execution') + '</div>' +
                '</div>' +
                '<div class="progress-bar"><div class="progress-fill" style="width:' + Math.max(0, Math.min(100, agent.progress || 0)) + '%;"></div></div>' +
                (agent.streams.length
                  ? '<div class="progress-note">' + escapeHtml(agent.streams.map(function (stream) { return stream.name + ' ' + stream.progress + '%'; }).join(' · ')) + '</div>'
                  : '<div class="progress-note">Parallel work is running in the background; expand tasks or artifacts when you need to act.</div>') +
              '</div>'
            : '') +
        '</section>'
      );
    }

    function renderCard(agent) {
      var openSection = widgetState[agent.id] || 'overview';
      var chipTone = agent.tone === 'running' ? '' : ' data-tone="' + agent.tone + '"';
      var reviewMetricTone = agent.reviewCount > 0 ? 'review' : '';
      var blockedMetricTone = agent.blockedCount > 0 ? 'blocked' : '';
      return (
        '<article class="agent-card app-flat-card" data-priority="' + escapeHtml(agent.status) + '">' +
          '<div class="agent-head">' +
            '<div class="agent-identity">' +
              '<div class="agent-mark">' + renderAvatar(agent) + '</div>' +
              '<div class="agent-title-group">' +
                '<div class="agent-name-row">' +
                  '<div class="agent-name">' + escapeHtml(agent.name) + '</div>' +
                  '<div class="agent-role">' + escapeHtml(agent.role) + '</div>' +
                '</div>' +
                '<div class="agent-subline"><strong>' + escapeHtml(agent.currentTask) + '</strong></div>' +
              '</div>' +
            '</div>' +
            '<div class="agent-chip app-status-chip"' + chipTone + '><span class="chip-dot"></span>' + escapeHtml(agent.statusLabel) + '</div>' +
          '</div>' +
          renderAttention(agent) +
          '<div class="focus-strip">' +
            '<div class="app-kicker">Current Focus</div>' +
            '<div class="focus-task">' + escapeHtml(agent.currentTask) + '</div>' +
            '<div class="focus-meta">' +
              '<span>' + escapeHtml(agent.currentMeta || 'Tracking background execution') + '</span>' +
              '<span>' + escapeHtml(summarizeOverview(agent)) + '</span>' +
            '</div>' +
          '</div>' +
          '<div class="metric-row app-metric-rail">' +
            '<button class="metric-button app-metric-button focusable" data-action="toggle-section" data-section="overview" data-agent="' + escapeHtml(agent.id) + '" aria-pressed="' + String(openSection === 'overview') + '">' +
              '<div class="metric-value">' + escapeHtml(String(agent.taskCount)) + '</div>' +
              '<div class="metric-label">Tasks</div>' +
            '</button>' +
            '<button class="metric-button app-metric-button focusable" data-action="toggle-section" data-section="tasks" data-agent="' + escapeHtml(agent.id) + '" data-tone="' + blockedMetricTone + '" aria-pressed="' + String(openSection === 'tasks') + '">' +
              '<div class="metric-value">' + escapeHtml(String(agent.blockedCount)) + '</div>' +
              '<div class="metric-label">Blocked</div>' +
            '</button>' +
            '<button class="metric-button app-metric-button focusable" data-action="toggle-section" data-section="artifacts" data-agent="' + escapeHtml(agent.id) + '" data-tone="' + reviewMetricTone + '" aria-pressed="' + String(openSection === 'artifacts') + '">' +
              '<div class="metric-value">' + escapeHtml(String(agent.artifacts.length)) + '</div>' +
              '<div class="metric-label">Artifacts</div>' +
            '</button>' +
            '<button class="metric-button app-metric-button focusable" data-action="toggle-section" data-section="progress" data-agent="' + escapeHtml(agent.id) + '" aria-pressed="' + String(openSection === 'progress') + '">' +
              '<div class="metric-value">' + escapeHtml(String(agent.progress == null ? 'n/a' : agent.progress + '%')) + '</div>' +
              '<div class="metric-label">Progress</div>' +
            '</button>' +
          '</div>' +
          renderOverviewSection(agent, openSection === 'overview') +
          renderTasksSection(agent, openSection === 'tasks') +
          renderArtifactsSection(agent, openSection === 'artifacts') +
          renderProgressSection(agent, openSection === 'progress') +
          '<div class="card-footer">' +
            '<div class="sync-copy">Synced just now</div>' +
            '<a class="footer-link" href="' + escapeHtml(agent.openUrl) + '" target="_blank" rel="noreferrer">Open live view<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"></path><path d="M8 7h9v9"></path></svg></a>' +
          '</div>' +
        '</article>'
      );
    }

    function renderBoard(payload) {
      var normalized = normalizePayload(payload);
      var agents = normalized.agents.sort(function (left, right) {
        return getPriority(left) - getPriority(right) || left.name.localeCompare(right.name);
      });

      if (!agents.length) {
        injectHtml(
          '<div class="surface-label">Agent Status</div>' +
          '<div class="empty-state app-flat-card">' +
            '<strong>No agents need you right now</strong>' +
            '<p>Everything is moving in the background. Expand a metric only when you need to act, then return to the quiet state.</p>' +
          '</div>'
        );
        return;
      }

      injectHtml(
        '<div class="surface-label">Agent Status</div>' +
        agents.map(renderCard).join('')
      );
    }

    document.addEventListener('click', function (event) {
      var trigger = event.target && event.target.closest('[data-action="toggle-section"]');
      if (!trigger) return;
      setCardSection(trigger.getAttribute('data-agent'), trigger.getAttribute('data-section'));
    });

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var demoPayload = isDemo
      ? {
          agents: [
            {
              agent_name: 'Pace',
              role: 'Product',
              status: 'blocked',
              current_task: 'Decide whether to ship self-serve usage pricing before founder onboarding opens',
              progress: 68,
              eta: '~2 days remaining',
              blockers: ['Waiting on pricing approval from founders before the activation test can launch.'],
              tasks: [
                { id: 'pace-1', title: 'Finalize velocity model for launch readiness scoring', status: 'done' },
                { id: 'pace-2', title: 'Audit founder activation loop for drop-off at pricing step', status: 'in_progress' },
                { id: 'pace-3', title: 'Package self-serve pricing recommendation for approval', status: 'blocked' }
              ],
              artifacts: [
                { id: 'pace-a', title: 'Velocity model draft', artifact_type: 'prod.analysis', status: 'approved', summary: 'Baseline launch scoring model accepted by the team.' },
                { id: 'pace-b', title: 'Activation loop audit', artifact_type: 'prod.report', status: 'in_review', summary: 'Recommendations ready for founder review.' }
              ],
              streams: [
                { id: 'pace-s1', name: 'Launch readiness', progress: 78 },
                { id: 'pace-s2', name: 'Founder onboarding', progress: 54 }
              ]
            },
            {
              agent_name: 'Eli',
              role: 'Engineering',
              status: 'running',
              current_task: 'Implement billing event pipeline and reconcile launch telemetry fields',
              progress: 74,
              eta: '~1 day remaining',
              tasks: [
                { id: 'eli-1', title: 'Backfill usage event normalization for Stripe and product analytics', status: 'in_progress' },
                { id: 'eli-2', title: 'Patch MCP launch event audit trail for founder review', status: 'done' }
              ],
              artifacts: [
                { id: 'eli-a', title: 'Billing event mapping', artifact_type: 'eng.spec', status: 'in_review', summary: 'Review needed before the instrumentation ships.' }
              ],
              streams: [
                { id: 'eli-s1', name: 'Billing instrumentation', progress: 82 },
                { id: 'eli-s2', name: 'Telemetry QA', progress: 61 }
              ]
            }
          ]
        }
      : null;

    initWidget({
      render: function (payload) {
        renderBoard(payload || demoPayload);
      }
    });
  </script>
</body>
</html>
