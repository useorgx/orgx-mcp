<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Status - OrgX</title>
  <style>
      :root, :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(0, 0, 0, 0.08);
        --ox-border-strong: rgba(0, 0, 0, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-well-bg: #f1f5f9;
        --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
      }
      
      :root {
        --ox-lime: #a3e635; /* Will be overwritten by specific widgets */
        --ox-teal: #0d9488;
        --ox-danger: #e11d48;
        --ox-warning: #d97706;
        --ox-iris: #4f46e5;
        --ox-grid: rgba(0, 0, 0, 0.03);
        --ox-shadow: 0 12px 32px -12px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
        --ox-font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 24px 16px;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% 0%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%),
                    linear-gradient(var(--ox-grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        z-index: -1; pointer-events: none;
      }

      .container { max-width: 540px; margin: 0 auto; position: relative; }

      .ox-card {
        background: var(--ox-panel); border: 1px solid var(--ox-border); border-radius: 16px; box-shadow: var(--ox-shadow); position: relative; overflow: hidden; margin-bottom: 16px;
      }
      .ox-card-inner { padding: 24px; }
      .ox-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent); opacity: 0.8; }
      .ox-well { background: var(--ox-well-bg); border: 1px solid var(--ox-border); border-radius: 10px; padding: 16px; box-shadow: var(--ox-well-shadow); }
      .ox-eyebrow { font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ox-text-muted); font-weight: 600; }
      .ox-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ox-text); line-height: 1.3; }
      .ox-text { font-size: 0.9rem; line-height: 1.5; color: var(--ox-text); }
      

    :root { --ox-primary: #BFFF00; --ox-primary-rgb: 191, 255, 0; }
    
    .agent-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom:24px; border-bottom:1px solid var(--ox-border); }
    
    .avatar-ring {
      position: relative; width: 56px; height: 56px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(var(--ox-primary-rgb), 0.08), rgba(var(--ox-primary-rgb), 0.03));
      border: 1px solid rgba(var(--ox-primary-rgb), 0.18);
      font-family: var(--ox-mono); font-size: 1.5rem; font-weight: bold; color: var(--ox-primary);
      box-shadow: 0 10px 24px -20px rgba(var(--ox-primary-rgb), 0.55);
    }
    .avatar-ring::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1px rgba(var(--ox-primary-rgb), 0.08);
      pointer-events: none;
    }

    .avatar-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .avatar-fallback {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ox-primary);
      background: linear-gradient(180deg, rgba(var(--ox-primary-rgb), 0.12), rgba(var(--ox-primary-rgb), 0.04));
    }

    .status-pill {
      display: inline-flex; align-items: center; gap: 8px; padding: 4px 10px; border-radius: 6px;
      background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary);
      font-family: var(--ox-mono); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em;
      border: 1px solid rgba(var(--ox-primary-rgb), 0.2);
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .summary-card {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--ox-border);
      background: var(--ox-well-bg);
      box-shadow: var(--ox-well-shadow);
    }

    .summary-value {
      font-family: var(--ox-mono);
      font-size: 1.3rem;
      line-height: 1;
      font-weight: 600;
      color: var(--ox-text);
      margin-top: 8px;
    }

    .agent-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .agent-row-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 14px;
      align-items: center;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--ox-border);
      background: var(--ox-well-bg);
      box-shadow: var(--ox-well-shadow);
    }

    .agent-row-main {
      min-width: 0;
    }

    .agent-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ox-text);
      line-height: 1.3;
    }

    .agent-role-line {
      margin-top: 2px;
      font-family: var(--ox-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ox-text-muted);
      font-weight: 600;
    }

    .agent-task {
      margin-top: 8px;
      font-size: 0.86rem;
      color: var(--ox-text-muted);
      line-height: 1.45;
    }

    .agent-task strong {
      color: var(--ox-text);
    }

    .agent-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 8px;
    }

    .agent-progress {
      font-family: var(--ox-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ox-text-muted);
      font-weight: 600;
    }

    .status-running { color: var(--ox-lime); background: rgba(212, 237, 49, 0.12); border-color: rgba(212, 237, 49, 0.22); }
    .status-queued { color: var(--ox-iris); background: rgba(99, 102, 241, 0.12); border-color: rgba(99, 102, 241, 0.22); }
    .status-blocked { color: var(--ox-danger); background: rgba(244, 63, 94, 0.12); border-color: rgba(244, 63, 94, 0.22); }
    .status-idle { color: var(--ox-text-muted); background: rgba(148, 163, 184, 0.12); border-color: rgba(148, 163, 184, 0.22); }

    @media (max-width: 560px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .agent-row-card {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .agent-meta {
        grid-column: 1 / -1;
        align-items: flex-start;
        padding-left: 72px;
      }
    }

    
    
    .timeline { position: relative; margin-left: 8px; padding-left: 24px; }
    .timeline::before { content: ''; position: absolute; left: 4px; top: 8px; bottom: 0; width: 2px; background: var(--ox-border); }
    
    .t-item { position: relative; padding-bottom: 24px; }
    .t-item:last-child { padding-bottom: 0; }
    .t-dot {
      position: absolute; left: -24.5px; top: 4px; width: 10px; height: 10px; border-radius: 50%;
      background: var(--ox-primary); border: 2px solid var(--ox-primary); box-shadow: 0 0 8px rgba(var(--ox-primary-rgb), 0.4); z-index:10;
    }


    .t-time { font-family: var(--ox-mono); font-size: 0.6rem; color: var(--ox-text-muted); margin-bottom: 4px; font-weight: 600; letter-spacing: 0.05em; }
    .t-content { font-size: 0.9rem; color: var(--ox-text); line-height: 1.5; }
  
    .widget-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ox-border); }
    .deep-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: var(--ox-primary); text-decoration: none; transition: opacity 0.2s; }
    .deep-link:hover { opacity: 0.8; }
    .deep-link svg { width: 14px; height: 14px; }

    .skeleton-line {
      background: linear-gradient(90deg, var(--ox-border) 25%, rgba(var(--ox-primary-rgb),0.1) 50%, var(--ox-border) 75%);
      background-size: 200% 100%; animation: shimmer 2s infinite linear; border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body>
  <div class="container" id="content">
    <!-- Skeleton shown during loading -->
    <div class="skeleton-wrapper" style="display:flex; flex-direction:column; gap:20px; padding:24px;">
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="skeleton-line" style="width:48px; height:48px; border-radius:50%;"></div>
        <div style="flex:1;">
          <div class="skeleton-line" style="width:40%; height:18px; margin-bottom:8px;"></div>
          <div class="skeleton-line" style="width:60%; height:14px;"></div>
        </div>
        <div class="skeleton-line" style="width:80px; height:28px; border-radius:14px;"></div>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="skeleton-line" style="width:48px; height:48px; border-radius:50%;"></div>
        <div style="flex:1;">
          <div class="skeleton-line" style="width:35%; height:18px; margin-bottom:8px;"></div>
          <div class="skeleton-line" style="width:55%; height:14px;"></div>
        </div>
        <div class="skeleton-line" style="width:80px; height:28px; border-radius:14px;"></div>
      </div>
      <div style="display:flex; align-items:center; gap:16px;">
        <div class="skeleton-line" style="width:48px; height:48px; border-radius:50%;"></div>
        <div style="flex:1;">
          <div class="skeleton-line" style="width:45%; height:18px; margin-bottom:8px;"></div>
          <div class="skeleton-line" style="width:50%; height:14px;"></div>
        </div>
        <div class="skeleton-line" style="width:80px; height:28px; border-radius:14px;"></div>
      </div>
    </div>
  </div>
  <script>

    // Sync theme from URL to override prefers-color-scheme
    (function() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();


    var injectHtml = (html) => {
      const content = document.getElementById('content');
      const skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton) {
        skeleton.style.opacity = '0';
        setTimeout(() => {
          content.innerHTML = html;
        }, 300);
      } else {
        content.innerHTML = html;
      }
    };

    
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      var _mcpPending = {};
      var _mcpNextId = 100;
      function initWidget(opts){var render=opts.render,getData=opts.getData||_extractData;var protocol=_detectProtocol();if(protocol==='chatgpt'){var d=getData(window.openai&&window.openai.toolOutput);render(d);window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});}else if(protocol==='mcp-apps'){render(null);var initId=1;window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'Widget',version:'1.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');window.addEventListener('message',function(event){var msg=event.data;if(!msg||typeof msg!=='object')return;if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}if(msg.id!=null&&_mcpPending[msg.id]){var p=_mcpPending[msg.id];delete _mcpPending[msg.id];if(msg.error)p.reject(new Error(msg.error.message||'Tool call failed'));else p.resolve(msg.result);return;}if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}});}else{render(null);}}
      function callTool(name, args){var protocol=_detectProtocol();if(protocol==='chatgpt')return window.openai&&window.openai.callTool?window.openai.callTool(name,args):Promise.resolve(null);if(protocol==='mcp-apps'){return new Promise(function(resolve,reject){var id=_mcpNextId++;_mcpPending[id]={resolve:resolve,reject:reject};window.parent.postMessage({jsonrpc:'2.0',id:id,method:'tools/call',params:{name:name,arguments:args}},'*');setTimeout(function(){if(_mcpPending[id]){delete _mcpPending[id];reject(new Error('Tool call '+name+' timed out'));}},30000);});}return Promise.resolve(null);}
      function openWidgetLink(url,event){if(!url)return false;var protocol=_detectProtocol();if(protocol==='mcp-apps'){if(event&&typeof event.preventDefault==='function')event.preventDefault();window.parent.postMessage({jsonrpc:'2.0',id:_mcpNextId++,method:'ui/open-link',params:{url:url}},'*');return false;}return true;}
      var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" aria-hidden="true">'+c+'</svg>';};
      var icons = {
        agent: function(s){return _svg('<rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line>',s);},
        search: function(s){return _svg('<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',s);},
        file: function(s){return _svg('<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline>',s);},
        external: function(s){return _svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>',s);},
        sun: function(s){return _svg('<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>',s);}
      };
      var escapeHtml = (str) => { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var data = isDemo ? {
      agent_name: 'Pace', role: 'Product', status: 'Executing Task',
      activity: [
        { timestamp: new Date().toISOString(), message: 'Generated pricing tier recommendations.' },
        { timestamp: new Date(Date.now() - 300000).toISOString(), message: 'Analyzed competitor pricing pages.' },
        { timestamp: new Date(Date.now() - 1800000).toISOString(), message: 'Task initialized: Market Research' }
      ]
    } : null;
    var isLoading = !isDemo;

    var isLoadingOverride = new URLSearchParams(window.location.search).get('loading') === 'true';
    if (isLoadingOverride) {
      isLoading = true;
      isDemo = false;
      // Overwrite initWidget to do nothing so it hangs on loading
      initWidget = () => { render(); };
    }


    
      function resolveWidgetAsset(path){
        try {
          return new URL('shared/' + path, window.location.href).toString();
        } catch (error) {
          return 'https://mcp.useorgx.com/widgets/shared/' + path;
        }
      }
      var getAvatarUrl = (name) => {
        const n = (name || '').toLowerCase();
        if (n.includes('pace') || n.includes('product')) return resolveWidgetAsset('product_orchestrator.png');
        if (n.includes('eli') || n.includes('engineer')) return resolveWidgetAsset('engineering_autopilot.png');
        if (n.includes('mark') || n.includes('market')) return resolveWidgetAsset('launch_captain.png');
        if (n.includes('sage') || n.includes('sale')) return resolveWidgetAsset('pipeline_intelligence.png');
        if (n.includes('orion') || n.includes('op')) return resolveWidgetAsset('control_tower.png');
        if (n.includes('dana') || n.includes('design')) return resolveWidgetAsset('design_codex.png');
        if (n.includes('xandy') || n.includes('orchestrator')) return resolveWidgetAsset('xandy_orchestrator.png');
        return null;
      };
      var ORGX_BASE_URL = 'https://useorgx.com';
      var buildAgentUrl = function(agentId) {
        return agentId
          ? ORGX_BASE_URL + '/settings/agents?agent=' + encodeURIComponent(agentId)
          : ORGX_BASE_URL + '/settings/agents';
      };
      var renderAvatar = (name, sizePx) => {
        const url = getAvatarUrl(name);
        const fallback = escapeHtml(name ? name[0].toUpperCase() : '?');
        if (url) {
          return `<img src="${url}" alt="" class="avatar-image" loading="eager" decoding="sync" draggable="false" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><span class="avatar-fallback" style="display:none;">${fallback}</span>`;
        }
        return `<span class="avatar-fallback" style="display:flex;">${fallback}</span>`;
      };

    var formatTime = d => { const dt = new Date(d); return `[${dt.getHours().toString().padStart(2,'0')}:${dt.getMinutes().toString().padStart(2,'0')}:${dt.getSeconds().toString().padStart(2,'0')}]`; };
    var titleCase = value => String(value || '').replace(/[_-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    var inferRole = agent => {
      const source = [agent.role, agent.agent_name, agent.agent_id].filter(Boolean).join(' ').toLowerCase();
      if (source.includes('product')) return 'Product';
      if (source.includes('engineer')) return 'Engineering';
      if (source.includes('market')) return 'Marketing';
      if (source.includes('sale')) return 'Sales';
      if (source.includes('design')) return 'Design';
      if (source.includes('oper')) return 'Operations';
      if (source.includes('orchestr')) return 'Orchestrator';
      if (source.includes('chatgpt')) return 'App';
      return 'Agent';
    };
    var isVisibleAgent = agent => {
      const source = [agent.agent_id, agent.agent_name].filter(Boolean).join(' ').toLowerCase();
      return !source.includes('chatgpt-app') && !source.includes('orgx chatgpt app');
    };
    var normalizeAgentPayload = payload => {
      if (!payload) return null;
      if (Array.isArray(payload.agents)) {
        var agents = payload.agents.filter(isVisibleAgent).map(agent => ({
          agent_id: agent.agent_id || null,
          agent_name: agent.agent_name || agent.agent_id || 'Unknown agent',
          role: inferRole(agent),
          status: agent.status || 'idle',
          current_task: agent.current_task || null,
          blockers: Array.isArray(agent.blockers) ? agent.blockers : [],
          progress: typeof agent.progress === 'number' ? agent.progress : null,
          started_at: agent.started_at || null,
          execution_target: agent.execution_target || null,
          run_id: agent.run_id || null
        }));
        var summary = payload.summary || {};
        var running = agents.filter(agent => agent.status === 'running').length;
        var queued = agents.filter(agent => agent.status === 'queued').length;
        var blocked = agents.filter(agent => agent.status === 'blocked').length;
        var idle = agents.filter(agent => agent.status === 'idle').length;
        return {
          mode: 'fleet',
          agents: agents,
          summary: {
            total: agents.length,
            running: running,
            queued: queued,
            blocked: blocked,
            idle: idle
          },
          message: payload.message || (running === 0 ? 'No agents currently running.' : 'Live orchestration state across specialist agents.'),
          next_steps: Array.isArray(payload.next_steps) ? payload.next_steps : []
        };
      }
      if (payload.agent_name || payload.agent_id) {
        return {
          mode: 'single',
          agents: [{
            agent_id: payload.agent_id || null,
            agent_name: payload.agent_name || payload.agent_id || 'Unknown agent',
            role: payload.role || inferRole(payload),
            status: payload.status || 'idle',
            current_task: null,
            blockers: [],
            progress: null,
            started_at: null,
            execution_target: null,
            run_id: null
          }],
          activity: Array.isArray(payload.activity) ? payload.activity : []
        };
      }
      return null;
    };

    var render = () => {
      if(isLoading) return;
      var payload = normalizeAgentPayload(data);
      if(!payload) { injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.agent(24)}</div><div class="empty-title">Agent on standby</div><div class="empty-desc">No agent telemetry is available yet.</div></div>`); return; }

      if (payload.mode === 'single') {
        const agent = payload.agents[0];
        const timelineHtml = (payload.activity || []).map(a => `
          <div class="t-item">
            <div class="t-dot"></div>
            <div class="t-time">${formatTime(a.timestamp)}</div>
            <div class="t-content">${escapeHtml(a.message)}</div>
          </div>
        `).join('');
        injectHtml(`
          <div class="ox-card animate-in">
            <div class="ox-card-inner">
              <div class="agent-header">
                <div class="avatar-ring">${renderAvatar(agent.agent_name, 56)}</div>
                <div style="flex:1;">
                  <div class="ox-eyebrow" style="margin-bottom:4px;">${escapeHtml(agent.role)}</div>
                  <h2 class="ox-title" style="font-size:1.3rem; margin-bottom:8px;">${escapeHtml(agent.agent_name)}</h2>
                  <div class="status-pill status-${escapeHtml(agent.status).toLowerCase()}">
                    <div class="status-dot"></div> ${escapeHtml(titleCase(agent.status))}
                  </div>
                </div>
              </div>
              <div class="timeline">${timelineHtml}</div>
              <div class="widget-footer">
                <span style="font-size:0.7rem; font-family:var(--ox-mono); color:var(--ox-text-muted); text-transform:uppercase; letter-spacing:0.05em;">Synced</span>
                <a href="${buildAgentUrl(agent.agent_id)}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(buildAgentUrl(agent.agent_id))}, event)' class="deep-link">
                  Open Agent View
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </a>
              </div>
            </div>
          </div>
        `);
        return;
      }

      const summaryHtml = [
        ['Running', payload.summary.running],
        ['Queued', payload.summary.queued],
        ['Blocked', payload.summary.blocked],
        ['Idle', payload.summary.idle]
      ].map(([label, value]) => `
        <div class="summary-card">
          <div class="ox-eyebrow">${escapeHtml(label)}</div>
          <div class="summary-value">${escapeHtml(String(value))}</div>
        </div>
      `).join('');

      const agentsHtml = payload.agents.map(agent => {
        var status = String(agent.status || 'idle').toLowerCase();
        var taskLine = agent.current_task
          ? `<div class="agent-task"><strong>Current:</strong> ${escapeHtml(agent.current_task)}</div>`
          : agent.blockers.length
          ? `<div class="agent-task"><strong>Blocked by:</strong> ${escapeHtml(agent.blockers.join(', '))}</div>`
          : `<div class="agent-task"><strong>Current:</strong> No active task</div>`;
        var progressLine = typeof agent.progress === 'number'
          ? `${Math.max(0, Math.min(100, Math.round(agent.progress)))}%`
          : agent.execution_target
          ? titleCase(agent.execution_target)
          : 'Standby';
        return `
          <div class="agent-row-card">
            <div class="avatar-ring" style="width:56px;height:56px;">${renderAvatar(agent.agent_name, 56)}</div>
            <div class="agent-row-main">
              <div class="agent-name">${escapeHtml(agent.agent_name)}</div>
              <div class="agent-role-line">${escapeHtml(agent.role)}</div>
              ${taskLine}
            </div>
            <div class="agent-meta">
              <div class="status-pill status-${escapeHtml(status)}"><div class="status-dot"></div>${escapeHtml(titleCase(status))}</div>
              <div class="agent-progress">${escapeHtml(progressLine)}</div>
            </div>
          </div>
        `;
      }).join('');

      injectHtml(`
        <div class="ox-card animate-in">
          <div class="ox-card-inner">
            <div class="agent-header">
              <div class="avatar-ring">${payload.summary.running > 0 ? payload.summary.running : payload.summary.total}</div>
              <div style="flex:1;">
                <div class="ox-eyebrow" style="margin-bottom:4px;">OrgX Fleet</div>
                <h2 class="ox-title" style="font-size:1.3rem; margin-bottom:8px;">Agent Status</h2>
                <div class="ox-text">${escapeHtml(payload.message || 'Live orchestration state across specialist agents.')}</div>
              </div>
            </div>
            <div class="summary-grid">${summaryHtml}</div>
            <div class="agent-list">${agentsHtml}</div>
            <div class="widget-footer">
              <span style="font-size:0.7rem; font-family:var(--ox-mono); color:var(--ox-text-muted); text-transform:uppercase; letter-spacing:0.05em;">${payload.summary.total} agents tracked</span>
              <a href="${buildAgentUrl(null)}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(buildAgentUrl(null))}, event)' class="deep-link">
                Open Agent View
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
              </a>
            </div>
          </div>
        </div>
      `);
    };

    if(isDemo) render();
    else initWidget({ render: d => { if(d) data = d; isLoading = false; render(); } });
  </script>
</body>
</html>
