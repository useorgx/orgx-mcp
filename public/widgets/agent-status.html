<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Status - OrgX</title>
    <style>
      :root {
        /* ChatGPT SDK fallback (light mode) */
        --app-color-bg: #ffffff;
        --app-color-surface: #ffffff;
        --app-color-text: #0d0d0d;
        --app-color-text-secondary: #6e6e80;
        --app-color-border: #e5e5e5;
        --app-color-primary: #10a37f;
        --app-color-info-bg: #dbeafe;
        --app-color-info-text: #1e40af;
        --app-color-warning-bg: #fef3c7;
        --app-color-warning-text: #92400e;
        --app-color-danger-bg: #fef2f2;
        --app-color-danger-text: #991b1b;
        --app-color-neutral-bg: #f7f7f8;
        --app-color-neutral-text: #6e6e80;
        --app-color-surface-elevated: #f7f7f8;
        --app-radius-md: 8px;
        --app-radius-full: 9999px;
        --app-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);

        /* OrgX brand colors (RGB triplets for rgba() use) */
        --ox-lime: 191, 255, 0;
        --ox-teal: 20, 184, 166;
        --ox-iris: 99, 102, 241;
        --ox-cyan: 10, 212, 196;

        /* OrgX semantic status */
        --ox-success: #25da8e;   --ox-success-bg: rgba(37,218,142,0.12);  --ox-success-border: rgba(37,218,142,0.3);
        --ox-warning: #f9c770;   --ox-warning-bg: rgba(249,199,112,0.12); --ox-warning-border: rgba(249,199,112,0.3);
        --ox-danger: #ff7688;    --ox-danger-bg: rgba(255,118,136,0.12);  --ox-danger-border: rgba(255,118,136,0.3);
        --ox-info: #60bdff;      --ox-info-bg: rgba(96,189,255,0.12);     --ox-info-border: rgba(96,189,255,0.3);

        /* Typography */
        --ox-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --ox-mono: ui-monospace, SFMono-Regular, 'SF Mono', monospace;
        --ox-tracking-tight: -0.01em;
        --ox-tracking-heading: -0.02em;
        --ox-tracking-eyebrow: 0.08em;

        /* Radii */
        --ox-radius-sm: 6px;  --ox-radius-md: 10px;  --ox-radius-lg: 14px;

        /* Motion */
        --ox-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --ox-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ox-duration: 220ms;
        --ox-stagger: 60ms;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --app-color-bg: #02040a;
          --app-color-surface: rgba(255,255,255,0.02);
          --app-color-surface-elevated: rgba(255,255,255,0.04);
          --app-color-text: #f2f7ff;
          --app-color-text-secondary: #b4bed2;
          --app-color-border: rgba(255,255,255,0.06);
          --app-color-primary: rgba(var(--ox-teal), 1);
          --app-color-info-bg: rgba(var(--ox-iris), 0.12);
          --app-color-info-text: rgba(var(--ox-iris), 1);
          --app-color-warning-bg: var(--ox-warning-bg);
          --app-color-warning-text: var(--ox-warning);
          --app-color-danger-bg: var(--ox-danger-bg);
          --app-color-danger-text: var(--ox-danger);
          --app-color-neutral-bg: rgba(255,255,255,0.04);
          --app-color-neutral-text: var(--app-color-text-secondary);
          --app-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);

          /* Glass surface system */
          --ox-glass-bg: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
          --ox-glass-border: rgba(255,255,255,0.06);
          --ox-glass-border-hover: rgba(255,255,255,0.1);
          --ox-glass-blur: blur(12px) saturate(140%);

          /* Shadows with inset highlight */
          --ox-shadow-card: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
          --ox-shadow-card-hover: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(var(--ox-teal),0.08);

          /* Glows */
          --ox-glow-teal: 0 0 20px rgba(var(--ox-teal), 0.15);
          --ox-glow-lime: 0 0 20px rgba(var(--ox-lime), 0.12);
        }
      }

      /* Shared animations */
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes breathe { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.85); } }
      @keyframes cardEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

      @media (prefers-color-scheme: dark) {
        .skeleton-line {
          background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(var(--ox-teal),0.06) 40%, rgba(var(--ox-lime),0.04) 50%, rgba(var(--ox-teal),0.06) 60%, rgba(255,255,255,0.03) 100%);
          background-size: 200% 100%;
          animation: shimmer 2.5s infinite ease-in-out;
        }
      }

      /* Staggered list entrance */
      .stagger-item { animation: cardEnter 400ms var(--ox-ease) both; }
      .stagger-item:nth-child(1) { animation-delay: 0ms; }
      .stagger-item:nth-child(2) { animation-delay: 60ms; }
      .stagger-item:nth-child(3) { animation-delay: 120ms; }
      .stagger-item:nth-child(4) { animation-delay: 180ms; }
      .stagger-item:nth-child(5) { animation-delay: 240ms; }

      .breathe-dot { animation: breathe 3.6s ease-in-out infinite; }

      /* Hover lift */
      .hover-lift { transition: transform var(--ox-duration) var(--ox-ease), box-shadow var(--ox-duration) var(--ox-ease), border-color var(--ox-duration) var(--ox-ease); }
      @media (prefers-color-scheme: dark) {
        .hover-lift:hover { transform: translateY(-2px); border-color: var(--ox-glass-border-hover); box-shadow: var(--ox-shadow-card-hover); }
      }

      @media (prefers-reduced-motion: reduce) {
        .skeleton-line, .breathe-dot, .stagger-item { animation: none; }
        .hover-lift { transition: none; }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ox-font);
        font-size: 1rem;
        line-height: 1.5;
        letter-spacing: var(--ox-tracking-tight);
        background: var(--app-color-bg);
        color: var(--app-color-text);
        padding: 16px;
        -webkit-font-smoothing: antialiased;
      }

      @media (prefers-color-scheme: dark) {
        body { background: #02040a; }
      }

      .container {
        max-width: 480px;
        margin: 0 auto;
      }

      /* Eyebrow summary text */
      .summary {
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: var(--ox-tracking-eyebrow);
        color: var(--app-color-text-secondary);
        margin-bottom: 12px;
      }

      .agent-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .agent-item {
        background: var(--app-color-surface);
        border-radius: var(--ox-radius-md);
        padding: 12px 16px;
        box-shadow: var(--app-shadow-sm);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      @media (prefers-color-scheme: dark) {
        .agent-item {
          background: var(--ox-glass-bg);
          backdrop-filter: var(--ox-glass-blur);
          -webkit-backdrop-filter: var(--ox-glass-blur);
          border: 1px solid var(--ox-glass-border);
          box-shadow: var(--ox-shadow-card);
        }
      }

      .agent-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--app-color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.75rem;
        font-weight: 600;
        color: white;
        flex-shrink: 0;
      }

      @media (prefers-color-scheme: dark) {
        .agent-avatar {
          background: linear-gradient(135deg, rgba(var(--ox-teal), 1), rgba(var(--ox-iris), 1));
          box-shadow: 0 0 12px rgba(var(--ox-teal), 0.2);
        }
      }

      .agent-info {
        flex: 1;
        min-width: 0;
      }

      .agent-name {
        font-weight: 600;
        font-size: 0.875rem;
      }

      .agent-task {
        font-size: 0.75rem;
        color: var(--app-color-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .status-badge {
        padding: 4px 8px;
        border-radius: var(--app-radius-full);
        font-size: 0.75rem;
        font-weight: 500;
        flex-shrink: 0;
      }

      .status-running {
        background: var(--app-color-info-bg);
        color: var(--app-color-info-text);
      }
      .status-idle {
        background: var(--app-color-neutral-bg);
        color: var(--app-color-neutral-text);
      }
      .status-blocked {
        background: var(--app-color-danger-bg);
        color: var(--app-color-danger-text);
      }
      .status-queued {
        background: var(--app-color-warning-bg);
        color: var(--app-color-warning-text);
      }

      @media (prefers-color-scheme: dark) {
        .status-running {
          background: rgba(var(--ox-iris), 0.12);
          color: rgba(var(--ox-iris), 1);
          border: 1px solid rgba(var(--ox-iris), 0.3);
        }
        .status-blocked {
          background: var(--ox-danger-bg);
          color: var(--ox-danger);
          border: 1px solid var(--ox-danger-border);
        }
        .status-queued {
          background: var(--ox-warning-bg);
          color: var(--ox-warning);
          border: 1px solid var(--ox-warning-border);
        }
        .status-idle {
          background: rgba(255,255,255,0.04);
          color: var(--app-color-text-secondary);
          border: 1px solid rgba(255,255,255,0.06);
        }
      }

      .exec-target-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.6875rem;
        font-weight: 500;
        font-family: var(--ox-mono);
        flex-shrink: 0;
      }
      .exec-target-local {
        background: rgba(var(--ox-iris), 0.08);
        border: 1px solid rgba(var(--ox-iris), 0.2);
        color: rgba(var(--ox-iris), 1);
      }
      .exec-target-cloud {
        background: rgba(var(--ox-teal), 0.08);
        border: 1px solid rgba(var(--ox-teal), 0.2);
        color: rgba(var(--ox-teal), 1);
      }

      /* Alert */
      .alert {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 8px 12px;
        border-radius: var(--ox-radius-md);
        font-size: 0.75rem;
      }

      .alert-soft-danger {
        background: var(--app-color-danger-bg);
        color: var(--app-color-danger-text);
      }

      @media (prefers-color-scheme: dark) {
        .alert-soft-danger {
          background: var(--ox-danger-bg);
          color: var(--ox-danger);
        }
      }

      .alert-icon {
        flex-shrink: 0;
        width: 14px;
        height: 14px;
      }

      .alert-content {
        flex: 1;
        min-width: 0;
      }

      .blocker-alert {
        margin-top: 8px;
      }

      /* EmptyMessage */
      .empty-message {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px 16px;
        min-height: 120px;
      }

      .empty-message-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 9999px;
        background: var(--app-color-surface-elevated);
        color: var(--app-color-text-secondary);
        margin-bottom: 12px;
      }

      @media (prefers-color-scheme: dark) {
        .empty-message-icon {
          background: rgba(var(--ox-teal), 0.08);
          border: 1px solid rgba(var(--ox-teal), 0.15);
          color: rgba(var(--ox-teal), 0.6);
          box-shadow: 0 0 20px rgba(var(--ox-teal), 0.06);
        }
      }

      .empty-message-icon svg {
        width: 24px;
        height: 24px;
      }

      .empty-message-title {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--app-color-text);
        margin-bottom: 4px;
      }

      .empty-message-description {
        font-size: 0.875rem;
        color: var(--app-color-text-secondary);
        line-height: 1.5;
        max-width: 280px;
      }

      /* Skeleton Loading */
      .skeleton-item {
        background: var(--app-color-surface);
        border-radius: var(--ox-radius-md);
        padding: 12px 16px;
        box-shadow: var(--app-shadow-sm);
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .skeleton-line {
        background: linear-gradient(
          90deg,
          var(--app-color-surface-elevated) 0%,
          var(--app-color-bg) 50%,
          var(--app-color-surface-elevated) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 2.5s infinite ease-in-out;
        border-radius: 4px;
      }

      .skeleton-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .skeleton-text {
        height: 14px;
      }
      .skeleton-text-sm {
        height: 12px;
      }
      .skeleton-badge {
        height: 24px;
        width: 60px;
        border-radius: var(--app-radius-full);
      }

      /* Accessibility */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>

      <div class="summary" id="summary" aria-live="polite"></div>
      <div id="content" role="list" aria-label="Agents"></div>
    </div>

      };

      // ── Inline MCP Apps Bridge ──
      // Self-contained postMessage bridge — no external scripts needed.
      // Handles ChatGPT (window.openai) and MCP Apps (JSON-RPC postMessage) protocols.
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      // ── Size reporting (MCP Apps spec) ──
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      function initWidget(opts){
        var render=opts.render,getData=opts.getData||_extractData;
        var protocol=_detectProtocol();
        if(protocol==='chatgpt'){
          var d=getData(window.openai&&window.openai.toolOutput);render(d);
          window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});
        }else if(protocol==='mcp-apps'){
          render(null);
          var initId=1;
          window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'OrgX Widget',version:'1.0.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');
          window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');
          window.addEventListener('message',function(event){
            var msg=event.data;if(!msg||typeof msg!=='object')return;
            if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}
            if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}
          });
        }else{render(null);}
      }

      var contentEl = document.getElementById('content');
      var summaryEl = document.getElementById('summary');

      // Demo Mode
      var isDemo =
        new URLSearchParams(window.location.search).get('demo') === 'true';
      var demoData = {
        agents: [
          {
            agent_name: 'Pace',
            status: 'running',
            current_task: 'Drafting API specification for v2 endpoints',
            execution_target: 'cloud',
          },
          {
            agent_name: 'Eli',
            status: 'running',
            current_task: 'Implementing usage tracking hooks',
            execution_target: 'local',
          },
          {
            agent_name: 'Dana',
            status: 'blocked',
            current_task: 'Waiting for design review',
            blockers: ['Needs approval from Design Lead'],
            execution_target: 'cloud',
          },
          {
            agent_name: 'Mark',
            status: 'queued',
            current_task: 'Generate weekly performance report',
            execution_target: 'cloud',
          },
          { agent_name: 'Orion', status: 'idle', current_task: null },
        ],
        summary: { running: 2, blocked: 1, queued: 1, idle: 1 },
      };

      // Demo mode is enabled via ?demo=true for local testing only.

      // State — initWidget handles data from any host protocol
      var agents = isDemo ? demoData.agents : null;
      var summary = isDemo ? demoData.summary : {};
      var isLoading = !isDemo;

      // XSS Prevention - CRITICAL
      var escapeHtml = function(str) {
        if (str === null || str === undefined) return '';
        var div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
      };

      var getInitials = function(name) {
        if (!name) return '?';
        return String(name)
          .split(/[\s-]+/)
          .map((w) => w[0])
          .join('')
          .slice(0, 2)
          .toUpperCase();
      };

      // Skeleton loading template
      var renderSkeleton = function(count) {
        count = count || 3;
        return `
        <div class="agent-list">
          ${Array(count)
            .fill(
              `
            <div class="skeleton-item">
              <div class="skeleton-line skeleton-avatar"></div>
              <div style="flex: 1;">
                <div class="skeleton-line skeleton-text" style="width: 100px; margin-bottom: 4px;"></div>
                <div class="skeleton-line skeleton-text-sm" style="width: 150px;"></div>
              </div>
              <div class="skeleton-line skeleton-badge"></div>
            </div>
          `
            )
            .join('')}
        </div>
      `;
      };

      var renderSummary = function() {
        if (isLoading) {
          summaryEl.innerHTML =
            '<span class="skeleton-line skeleton-text" style="display: inline-block; width: 120px;"></span>';
          return;
        }

        if (!summary || Object.keys(summary).length === 0) {
          summaryEl.innerHTML = '';
          return;
        }

        var running = summary.running ?? 0;
        var queued = summary.queued ?? 0;
        var blocked = summary.blocked ?? 0;

        var parts = [];
        if (running > 0) parts.push(`${running} RUNNING`);
        if (queued > 0) parts.push(`${queued} QUEUED`);
        if (blocked > 0) parts.push(`${blocked} BLOCKED`);

        summaryEl.textContent =
          parts.length > 0 ? parts.join(' / ') : 'ALL AGENTS IDLE';
      };

      var render = function() {
        renderSummary();

        // Show skeleton while loading
        if (isLoading) {
          contentEl.innerHTML = renderSkeleton(3);
          return;
        }

        if (!agents || agents.length === 0) {
          contentEl.innerHTML = `
          <div class="empty-message" role="status">
            <div class="empty-message-icon" aria-hidden="true">
              ${icons.agent(24)}
            </div>
            <div class="empty-message-title">No agents active</div>
            <div class="empty-message-description">All agents are currently idle. Ask me to start a task!</div>
          </div>
        `;
          return;
        }

        contentEl.innerHTML = `<div class="agent-list">${agents
          .map(
            (a) => `
        <div class="agent-item stagger-item hover-lift" role="listitem" aria-label="${escapeHtml(
          a.agent_name
        )} - ${escapeHtml(a.status)}">
          <div class="agent-avatar" aria-hidden="true">${escapeHtml(
            getInitials(a.agent_name)
          )}</div>
          <div class="agent-info">
            <div class="agent-name">${escapeHtml(a.agent_name)}</div>
            <div class="agent-task">${
              escapeHtml(a.current_task) || 'Idle'
            }</div>
          </div>
          ${(a.execution_target === 'local' || a.execution_target === 'local_preferred')
            ? '<span class="exec-target-pill exec-target-local">' + icons.laptop(10) + ' Local</span>'
            : (a.execution_target === 'cloud')
            ? '<span class="exec-target-pill exec-target-cloud">' + icons.cloud(10) + ' Cloud</span>'
            : ''
          }
          <span class="status-badge status-${escapeHtml(
            a.status
          )}" role="status">
            ${escapeHtml(a.status)}
          </span>
        </div>
        ${
          a.blockers && a.blockers.length > 0
            ? `
          <div class="blocker-alert alert alert-soft-danger" role="alert">
            <span class="alert-icon" style="display:flex">${icons.warning(
              14
            )}</span>
            <div class="alert-content">${a.blockers
              .map((b) => escapeHtml(b))
              .join(', ')}</div>
          </div>
        `
            : ''
        }
      `
          )
          .join('')}</div>`;
      };

      // Wire up data reception for all host protocols
      if (isDemo) {
        isLoading = false;
        render();
      } else {
        initWidget({
          render: function(d) {
            if (d) {
              isLoading = false;
              if (d.agents !== undefined) agents = d.agents;
              if (d.summary) summary = d.summary;
            }
            render();
          },
          getData: _extractData,
        });
      }
    </script>
  </body>
</html>
