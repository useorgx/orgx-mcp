<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agent Status - OrgX</title>
  <link rel="stylesheet" href="shared/interaction-kit.css" />
  <link rel="stylesheet" href="shared/widget-foundation.css" />
  <script src="shared/interaction-kit.js"></script>
  <style>
    @import url('./shared/tokens.css');
    
    :root, :root[data-theme="light"] {
      --ox-bg: #f8fafc;
      --ox-panel: #ffffff;
      --ox-border: rgba(0, 0, 0, 0.08);
      --ox-border-strong: rgba(0, 0, 0, 0.15);
      --ox-text: #0f172a;
      --ox-text-muted: #64748b;
      --ox-text-dim: #94a3b8;
      --ox-well-bg: #f1f5f9;
      --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      --ox-primary: #00c9a7;
      --ox-primary-rgb: 0, 201, 167;
      --ox-primary-rgb: 0, 201, 167;
      --ox-grid: rgba(0, 0, 0, 0.03);
    }
    
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --ox-bg: #02040a;
        --ox-panel: rgba(10, 15, 22, 0.95);
        --ox-border: rgba(255, 255, 255, 0.08);
        --ox-border-strong: rgba(255, 255, 255, 0.15);
        --ox-text: #f8fafc;
        --ox-text-muted: rgba(255, 255, 255, 0.5);
        --ox-text-dim: rgba(255, 255, 255, 0.32);
        --ox-well-bg: rgba(0,0,0,0.3);
        --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        --ox-primary: #00c9a7;
      --ox-primary-rgb: 0, 201, 167;
      --ox-primary-rgb: 0, 201, 167;
        --ox-grid: rgba(255, 255, 255, 0.02);
      }
    }
    
    :root[data-theme="dark"] {
        --ox-bg: #02040a;
        --ox-panel: rgba(10, 15, 22, 0.95);
        --ox-border: rgba(255, 255, 255, 0.08);
        --ox-border-strong: rgba(255, 255, 255, 0.15);
        --ox-text: #f8fafc;
        --ox-text-muted: rgba(255, 255, 255, 0.5);
        --ox-text-dim: rgba(255, 255, 255, 0.32);
        --ox-well-bg: rgba(0,0,0,0.3);
        --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        --ox-primary: #00c9a7;
      --ox-primary-rgb: 0, 201, 167;
      --ox-primary-rgb: 0, 201, 167;
        --ox-grid: rgba(255, 255, 255, 0.02);
    }
    
    :root {
      --ox-lime: #d4ed31;
      --ox-warning: #fbbf24;
      --ox-danger: #f43f5e;
      --ox-font: -apple-system, BlinkMacSystemFont, "Inter", system-ui, sans-serif;
      --ox-mono: "JetBrains Mono", "SF Mono", ui-monospace, SFMono-Regular, monospace;
    }


    :root {
      --agent-surface-max: 720px;
      --agent-running: #10a37f;
      --agent-blocked: var(--ox-danger);
      --agent-review: var(--ox-warning);
      --agent-idle: var(--ox-text-dim);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--ox-font);
      background: var(--ox-bg);
      color: var(--ox-text);
      padding: 16px;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 50% -18%, rgba(0, 201, 167, 0.08), transparent 56%),
                    linear-gradient(var(--ox-grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        pointer-events: none;
        z-index: -1;
    }
    

    .agent-board {
      width: 100%;
      max-width: var(--agent-surface-max);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .surface-label {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--ox-text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .surface-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--ox-border);
    }
    .agent-card {
      --ox-card-color-rgb: var(--agent-accent-rgb, var(--ox-primary-rgb));
      position: relative;
      overflow: hidden;
      margin-bottom: 16px;
      background: var(--ox-panel);
      border-color: var(--ox-border);
      box-shadow: var(--ox-shadow);
      transition:
        transform var(--widget-motion-fast) var(--widget-motion-curve),
        border-color var(--widget-motion-fast) var(--widget-motion-curve),
        box-shadow var(--widget-motion-fast) var(--widget-motion-curve);
    }

    .agent-card[data-priority='running'] { --ox-card-color-rgb: 0, 201, 167; }
    .agent-card[data-priority='blocked'] { --ox-card-color-rgb: 244, 63, 94; }
    .agent-card[data-priority='review'] { --ox-card-color-rgb: 251, 191, 36; }
    .agent-card[data-priority='idle'], .agent-card[data-priority='queued'] { --ox-card-color-rgb: 100, 116, 139; }
    
    .agent-card.app-flat-card::after {
      background: linear-gradient(90deg, transparent, rgba(var(--ox-card-color-rgb), 0.6), transparent);
    }

    .agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 16px 12px;
    }

    .agent-identity {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .agent-title-group {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .agent-name-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
      flex-wrap: wrap;
    }

    .agent-name {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--ox-text);
      min-width: 0;
    }

    .agent-role {
      color: rgba(var(--agent-accent-rgb, var(--ox-card-color-rgb)), 0.9);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .agent-subline {
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      line-height: 1.35;
      min-width: 0;
    }

    .agent-subline strong {
      color: var(--ox-text);
      font-weight: 500;
    }


    [data-tone="running"], [data-tone="done"], [data-tone="approved"] {
      --ox-color: var(--ox-primary);
      --ox-color-rgb: 0, 201, 167;
    }
    [data-tone="blocked"] {
      --ox-color: var(--ox-danger);
      --ox-color-rgb: 244, 63, 94;
    }
    [data-tone="review"] {
      --ox-color: var(--ox-warning);
      --ox-color-rgb: 251, 191, 36;
    }
    [data-tone="queued"], [data-tone="idle"] {
      --ox-color: var(--ox-text-muted);
      --ox-color-rgb: 100, 116, 139;
    }
    
    .agent-chip {
      --ox-color: var(--ox-primary);
      --ox-color-rgb: 0, 201, 167;
      flex-shrink: 0;
    }

    .agent-attention {
      margin: 0 12px 12px;
      box-shadow: inset 3px 0 0 rgba(var(--agent-accent-rgb, var(--ox-card-color-rgb)), 0.58);
    }

    .attention-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .attention-title {
      color: currentColor;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .attention-body {
      color: var(--ox-text);
      font-size: 0.875rem;
      line-height: 1.4;
    }

    .attention-action {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      border: 1px solid currentColor;
      background: transparent;
      color: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .focus-strip {
      padding: 0 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .focus-task {
      color: var(--ox-text);
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.45;
    }

    .focus-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      line-height: 1.35;
    }

    .focus-meta span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .focus-meta span + span::before {
      content: '';
      width: 3px;
      height: 3px;
      border-radius: 999px;
      background: var(--ox-text-dim);
      margin-right: 8px;
    }

    .metric-row {
      border-top: 1px solid var(--ox-border);
      border-bottom: 1px solid var(--ox-border);
    }

    .metric-button {
      min-height: 72px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .metric-button[data-tone='blocked'] .metric-value {
      color: var(--agent-blocked);
    }

    .metric-button[data-tone='review'] .metric-value {
      color: var(--agent-review);
    }

    .metric-value {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1;
      color: var(--ox-text);
    }

    .metric-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ox-text-dim);
    }

    .agent-section {
      display: none;
      padding-bottom: 16px;
    }
    @keyframes sectionFadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .agent-section.is-open {
      display: block;
      animation: sectionFadeIn 240ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .agent-section-trigger {
      border-top: 1px solid var(--ox-border);
    }

    .disclosure-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .disclosure-count {
      color: var(--ox-text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .chevron {
      width: 14px;
      height: 14px;
      color: var(--ox-text-dim);
      transition: transform 160ms ease;
      flex-shrink: 0;
    }

    .agent-section.is-open .chevron {
      transform: rotate(180deg);
    }

    .section-list {
      display: flex;
      flex-direction: column;
    }

    .section-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      padding: 12px 0;
    }

    .section-row + .section-row {
      border-top: 1px solid var(--ox-border);
    }

    .section-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .section-heading {
      color: var(--ox-text);
      font-size: 0.875rem;
      font-weight: 500;
      line-height: 1.4;
    }

    .section-detail {
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      line-height: 1.45;
    }

    .section-inline-meta {
      color: var(--ox-text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .section-status {
      flex-shrink: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--ox-well-bg);
      color: var(--ox-text-muted);
      border: 1px solid var(--ox-border);
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .section-status[data-tone='running'],
    .section-status[data-tone='done'],
    .section-status[data-tone='approved'] {
      color: var(--agent-running);
      background: var(--ox-primary);
      border-color: rgba(16, 163, 127, 0.2);
    }

    .section-status[data-tone='blocked'] {
      color: var(--agent-blocked);
      background: var(--ox-danger-bg);
      border-color: rgba(220, 38, 38, 0.2);
    }

    .section-status[data-tone='review'] {
      color: var(--agent-review);
      background: var(--ox-warning-bg);
      border-color: rgba(217, 119, 6, 0.2);
    }

    .section-status[data-tone='queued'],
    .section-status[data-tone='idle'] {
      color: var(--ox-text-muted);
    }

    .progress-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding-top: 12px;
    }

    .progress-value {
      color: var(--ox-text);
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1;
    }

    .progress-context {
      color: var(--ox-text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: right;
    }

    .progress-bar {
      margin-top: 12px;
      width: 100%;
      height: 5px;
      border-radius: 999px;
      background: var(--ox-well-bg);
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--agent-running), #34d399);
    }

    .progress-note {
      margin-top: 12px;
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      line-height: 1.45;
    }

    .empty-slot {
      padding-top: 12px;
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px 16px;
      border-top: 1px solid var(--ox-border);
    }

    .sync-copy {
      color: var(--ox-text-dim);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
    }

    .footer-link svg {
      width: 14px;
      height: 14px;
    }

    .empty-state {
      padding: 32px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }

    .empty-state strong {
      color: var(--ox-text);
      font-size: 1rem;
      font-weight: 600;
    }

    .empty-state p {
      color: var(--ox-text-muted);
      font-size: 0.875rem;
      line-height: 1.5;
      max-width: 28ch;
    }

    .skeleton-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skeleton-card {
      border-radius: 16px;
      border: 1px solid var(--ox-border);
      background: var(--ox-panel);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .skeleton-line {
      border-radius: 8px;
      background:
        linear-gradient(
          90deg,
          var(--ox-well-bg) 0%,
          rgba(16, 163, 127, 0.12) 50%,
          var(--ox-well-bg) 100%
        );
      background-size: 200% 100%;
      animation: shimmer 1.8s linear infinite;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to { background-position: -200% 0; }
    }

    @media (max-width: 420px) {
      body {
        padding: 16px 8px 24px;
      }

      .agent-head {
        align-items: flex-start;
      }

      .metric-button {
        min-height: 66px;
        padding-inline: 6px;
      }

      .metric-value {
        font-size: 0.95rem;
      }

      .metric-label {
        letter-spacing: 0.05em;
      }
    }
    .ox-metric-rail {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid var(--ox-border);
      border-bottom: 1px solid var(--ox-border);
    }
    
    .ox-metric-button {
      appearance: none;
      background: transparent;
      border: 0;
      color: inherit;
      cursor: pointer;
      font: inherit;
      margin: 0;
      min-height: 72px;
      padding: 12px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }
    
    .ox-metric-button + .ox-metric-button::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 1px;
      background: var(--ox-border);
    }
    
    .agent-card .ox-metric-button:hover,
    .agent-card .ox-metric-button[aria-pressed='true'] {
      background: rgba(var(--agent-accent-rgb, var(--ox-card-color-rgb)), 0.08);
    }
    
    .ox-metric-button[data-tone='blocked'] .metric-value {
      color: var(--ox-danger);
    }
    .ox-metric-button[data-tone='review'] .metric-value {
      color: var(--ox-warning);
    }

    .agent-section {
      border-top: 1px solid var(--ox-border);
      overflow: hidden;
    }
    .agent-section:first-child {
      border-top: none;
    }

    .ox-disclosure-trigger {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      padding: 14px 24px;
      background: transparent;
      border: none;
      color: var(--ox-text);
      cursor: pointer;
      transition: background 0.15s cubic-bezier(0.16, 1, 0.3, 1);
      text-align: left;
    }

    .agent-card .ox-disclosure-trigger:hover {
      background: rgba(var(--agent-accent-rgb, var(--ox-card-color-rgb)), 0.08);
    }

    .section-badge {
      font-size: 0.65rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(var(--ox-primary-rgb), 0.12);
      color: var(--ox-primary);
      margin-left: 8px;
    }
    .section-badge.needs-review {
      background: rgba(251, 191, 36, 0.12);
      color: var(--ox-warning);
    }
    .section-badge.blocked {
      background: rgba(244, 63, 94, 0.12);
      color: var(--ox-danger);
    }

    .disclosure-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--ox-font);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .chevron {
      width: 16px; height: 16px;
      color: var(--ox-text-dim);
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      flex-shrink: 0;
    }

    .agent-section.is-open .chevron {
      transform: rotate(180deg);
    }

    .ox-disclosure-body {
      max-height: 0;
      opacity: 0;
      transition: max-height 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), padding 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 0 24px;
    }

    .agent-section.is-open .ox-disclosure-body {
      max-height: 800px;
      opacity: 1;
      padding: 0 24px 16px;
    }
    
    .section-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 0;
      border-top: 1px solid var(--ox-border);
    }
    .section-row:first-child {
      border-top: none;
    }
    
    .section-heading {
      font-size: 0.85rem;
      color: var(--ox-text);
      line-height: 1.4;
    }
    
    .section-status {
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 5px;
      white-space: nowrap;
      flex-shrink: 0;
      border: none;
      background: rgba(255,255,255,0.04);
      color: var(--ox-text-muted);
    }
    .section-status[data-tone="running"], .section-status[data-tone="done"], .section-status[data-tone="approved"] {
      color: var(--ox-primary); background: rgba(var(--ox-primary-rgb), 0.12);
    }
    .section-status[data-tone="blocked"] {
      color: var(--ox-danger); background: rgba(244, 63, 94, 0.12);
    }
    .section-status[data-tone="review"] {
      color: var(--ox-warning); background: rgba(251, 191, 36, 0.12);
      border: 1px solid rgba(251, 191, 36, 0.16);
      transition: background 0.15s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .section-status[data-tone="review"]:hover {
      background: rgba(251, 191, 36, 0.18);
    }
    
    .attention-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
      padding: 10px 14px;
      border-radius: 10px;
      transition: background 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      text-decoration: none;
    }
      50% { opacity: 0.35; }
    }

    
    @media (max-width: 420px) {
      .ox-metric-button {
        min-height: 66px;
        padding-inline: 6px;
      }
    }

    .ox-metric-rail {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 1px solid var(--ox-border);
      border-bottom: 1px solid var(--ox-border);
    }
    
    .ox-metric-button {
      appearance: none;

  <script>
    (function syncThemeFromUrl() {
      var theme = new URLSearchParams(window.location.search).get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();

    var hasLoadedOnce = false;
    function injectHtml(html) {
      var content = document.getElementById('content');
      var skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton && !hasLoadedOnce) {
        skeleton.style.opacity = '0';
        setTimeout(function() {
          content.innerHTML = html;
          hasLoadedOnce = true;
          requestAnimationFrame(_sendSize);
        }, 300);
      } else {
        content.innerHTML = html;
        hasLoadedOnce = true;
        requestAnimationFrame(_sendSize);
      }
    }

    function _detectProtocol() {
      if (typeof window.openai !== 'undefined') return 'chatgpt';
      if (window.parent && window.parent !== window) return 'mcp-apps';
      return 'standalone';
    }

    function _extractData(out) {
      if (out == null) return null;
      if (typeof out === 'object' && out.structuredContent) return out.structuredContent;
      if (typeof out === 'object' && Array.isArray(out.content)) {
        for (var i = 0; i < out.content.length; i += 1) {
          var item = out.content[i];
          if (item && item.type === 'text' && item.text) {
            try {
              return JSON.parse(item.text);
            } catch (error) {
              continue;
            }
          }
        }
      }
      if (typeof out === 'string') {
        try {
          return JSON.parse(out);
        } catch (error) {
          return { text: out };
        }
      }
      return out;
    }

    var _lastW = 0;
    var _lastH = 0;
    function _sendSize() {
      var width = Math.ceil(
        document.documentElement.getBoundingClientRect().width +
          (window.innerWidth - document.documentElement.clientWidth)
      );
      var height = Math.ceil(document.documentElement.getBoundingClientRect().height);
      if (width === _lastW && height === _lastH) return;
      _lastW = width;
      _lastH = height;
      try {
        window.parent.postMessage(
          {
            jsonrpc: '2.0',
            method: 'ui/notifications/size-changed',
            params: { width: width, height: height },
          },
          '*'
        );
      } catch (error) {}
    }

    function _observeSize() {
      _sendSize();
      if (typeof ResizeObserver !== 'undefined') {
        var frame = 0;
        var observer = new ResizeObserver(function () {
          if (frame) cancelAnimationFrame(frame);
          frame = requestAnimationFrame(_sendSize);

    var _mcpPending = {};
    var _mcpNextId = 100;

    function initWidget(opts) {

      var getData = opts.getData || _extractData;

        window.addEventListener(
          'openai:set_globals',
          function (event) {
            var globals = event.detail && event.detail.globals;

          },
          { passive: true }
        );
        return;
      }

      if (protocol === 'mcp-apps') {
        render(null);
        var initId = 1;
        window.parent.postMessage(
          {
            jsonrpc: '2.0',
            id: initId,
            method: 'ui/initialize',
            params: {
              appInfo: { name: 'Agent Status Widget', version: '1.0' },
              appCapabilities: { tools: { listChanged: false } },
              protocolVersion: '2026-01-26',
            },
          },
          '*'
        );
        window.parent.postMessage({ jsonrpc: '2.0', method: 'notifications/initialized' }, '*');
        window.addEventListener('message', function (event) {
          var msg = event.data;
          if (!msg || typeof msg !== 'object') return;
          if (msg.id === initId && msg.result) {
            window.parent.postMessage(
              { jsonrpc: '2.0', method: 'ui/notifications/initialized' },
              '*'
            );
            _observeSize();
            return;
          }
          if (msg.id != null && _mcpPending[msg.id]) {
            var pending = _mcpPending[msg.id];
            delete _mcpPending[msg.id];
            if (msg.error) pending.reject(new Error(msg.error.message || 'Tool call failed'));
            else pending.resolve(msg.result);
            return;
          }
          if (
            (msg.method === 'ui/notifications/tool-result' || msg.method === 'notifications/message') &&
            msg.params
          ) {
            var next = getData(msg.params);
            if (next) render(next);
          }
        });
        return;
      }

      render(null);
    }

    function escapeHtml(value) {
      if (value == null) return '';
      var div = document.createElement('div');
      div.textContent = String(value);
      return div.innerHTML;
    }

    function firstString(values) {
      for (var i = 0; i < values.length; i += 1) {
        var value = values[i];
        if (typeof value === 'string' && value.trim()) return value.trim();
      }
      return '';
    }

    function asNumber(value) {
      if (typeof value === 'number' && !Number.isNaN(value)) return value;
      if (typeof value === 'string' && value.trim() !== '' && !Number.isNaN(Number(value))) {
        return Number(value);
      }
      return null;
    }

    function asArray(value) {
      return Array.isArray(value) ? value : [];
    }

    function titleCase(value) {
      return String(value || '')
        .replace(/[-_]+/g, ' ')
        .replace(/\b\w/g, function (char) { return char.toUpperCase(); })
        .trim();
    }

    function normalizeStatus(value) {
      var normalized = String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '_');
      if (!normalized) return 'idle';
      if (['running', 'active', 'executing', 'in_progress', 'working'].indexOf(normalized) !== -1) return 'running';
      if (['blocked', 'paused', 'waiting', 'at_risk'].indexOf(normalized) !== -1) return 'blocked';
      if (['needs_review', 'review', 'in_review'].indexOf(normalized) !== -1) return 'review';
      if (['queued', 'pending', 'not_started', 'todo', 'draft', 'backlog'].indexOf(normalized) !== -1) return 'queued';
      if (['done', 'complete', 'completed', 'approved', 'shipped'].indexOf(normalized) !== -1) return 'done';
      return normalized;
    }

    function getStatusTone(status) {
      if (status === 'blocked') return 'blocked';
      if (status === 'review') return 'review';
      if (status === 'queued' || status === 'idle') return 'idle';
      return 'running';
    }

    function getStatusLabel(status) {
      if (status === 'blocked') return 'Needs you';
      if (status === 'review') return 'Needs review';
      if (status === 'approved') return 'Approved';
      if (status === 'done') return 'Done';
      if (status === 'queued') return 'Queued';
      if (status === 'idle') return 'Idle';
      return 'Running';
    }

    function collectionKey(item) {
      if (typeof item === 'string') return item.trim();
      if (!item || typeof item !== 'object') return '';
      return firstString([
        item.id,
        item.task_id,
        item.taskId,
        item.entity_id,
        item.entityId,
        item.title,
        item.summary,
        item.name,
        item.description
      ]) || JSON.stringify(item);
    }

    function mergeUniqueItems(left, right) {
      var seen = {};
      return ([]).concat(asArray(left), asArray(right)).filter(function (item) {
        var key = collectionKey(item);
        if (!key || seen[key]) return false;
        seen[key] = true;
        return true;
      });
    }

    var REMOTE_WIDGET_ASSET_BASE = 'https://mcp.useorgx.com/widgets/shared/';
    function resolveWidgetAsset(path){
      return REMOTE_WIDGET_ASSET_BASE + path;
    }

    var ORGX_BASE_URL = 'https://useorgx.com';
    var AGENT_DIRECTORY = {
      pace: { name: 'Pace', role: 'Product', avatarPath: 'product_orchestrator.png', accentRgb: '22, 163, 74' },
      product: { name: 'Pace', role: 'Product', avatarPath: 'product_orchestrator.png', accentRgb: '22, 163, 74' },

      mark: { name: 'Mark', role: 'Marketing', avatarPath: 'launch_captain.png', accentRgb: '249, 115, 22' },
      marketing: { name: 'Mark', role: 'Marketing', avatarPath: 'launch_captain.png', accentRgb: '249, 115, 22' },
      sage: { name: 'Sage', role: 'Sales', avatarPath: 'pipeline_intelligence.png', accentRgb: '168, 85, 247' },
      sales: { name: 'Sage', role: 'Sales', avatarPath: 'pipeline_intelligence.png', accentRgb: '168, 85, 247' },
      orion: { name: 'Orion', role: 'Operations', avatarPath: 'control_tower.png', accentRgb: '245, 158, 11' },
      operations: { name: 'Orion', role: 'Operations', avatarPath: 'control_tower.png', accentRgb: '245, 158, 11' },
      dana: { name: 'Dana', role: 'Design', avatarPath: 'design_codex.png', accentRgb: '236, 72, 153' },
      design: { name: 'Dana', role: 'Design', avatarPath: 'design_codex.png', accentRgb: '236, 72, 153' },
      xandy: { name: 'Xandy', role: 'Orchestrator', avatarPath: 'xandy_orchestrator.png', accentRgb: '20, 184, 166' },
      orchestrator: { name: 'Xandy', role: 'Orchestrator', avatarPath: 'xandy_orchestrator.png', accentRgb: '20, 184, 166' }
    };

    function resolveAgentProfile(agent) {
      var directName = firstString([agent.agent_name, agent.name, agent.title]);
      var directRole = firstString([agent.role, agent.persona, agent.domain, agent.agent_domain]);
      var agentType = firstString([agent.agent_type, agent.type, agent.domain, agent.agent_domain]).toLowerCase();
      var nameKey = directName.toLowerCase();
      var roleKey = directRole.toLowerCase();
      var profile = AGENT_DIRECTORY[nameKey] || AGENT_DIRECTORY[agentType] || AGENT_DIRECTORY[roleKey] || null;
      return {
        name: directName || (profile && profile.name) || 'OrgX Agent',
        role: directRole || (profile && profile.role) || titleCase(agentType) || 'Agent',
        avatarPath: (profile && profile.avatarPath) || null,
        accentRgb: (profile && profile.accentRgb) || '20, 184, 166'
      };
    }
    function renderAvatar(agent) {
      var profile = resolveAgentProfile(agent);
      var fallback = escapeHtml(profile.name.charAt(0).toUpperCase() || '?');
      
      if (profile.avatarPath) {
        var remoteUrl = resolveWidgetAsset(profile.avatarPath);
        
        return '<span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-family:var(--ox-mono);font-size:0.9rem;font-weight:600;">' + fallback + '</span>' +

    }

      return agentId
        ? ORGX_BASE_URL + '/settings/agents?agent=' + encodeURIComponent(agentId)
        : ORGX_BASE_URL + '/settings/agents';
    }

    function normalizeTask(task, index) {
      if (!task) return null;
      if (typeof task === 'string') {
        return { id: 'task-' + index, title: task, detail: '', status: 'queued' };
      }
      if (typeof task !== 'object') return null;
      return {
        id: firstString([task.id, task.task_id, task.taskId, task.entity_id, task.entityId]) || 'task-' + index,
        title: firstString([task.title, task.summary, task.name, task.description]) || 'Task ' + (index + 1),
        detail: firstString([task.detail, task.description]),
        status: normalizeStatus(firstString([task.status, task.state, task.phase]))

    }

    function normalizeArtifact(artifact, index) {
      if (!artifact || typeof artifact !== 'object') return null;
      return {
        id: firstString([artifact.id, artifact.ref]) || 'artifact-' + index,
        title: firstString([artifact.title, artifact.name, artifact.summary]) || 'Artifact ' + (index + 1),

      if (!stream || typeof stream !== 'object') return null;

        id: firstString([stream.id, stream.ref]) || 'stream-' + index,
        name: firstString([stream.name, stream.title]) || 'Stream ' + (index + 1),

      };
    }

    function normalizeAgent(raw, index) {
      if (!raw || typeof raw !== 'object') return null;
      var profile = resolveAgentProfile(raw);
      var tasks = mergeUniqueItems(
        asArray(raw.current_tasks),
        mergeUniqueItems(asArray(raw.active_tasks), asArray(raw.tasks))
      ).map(normalizeTask).filter(Boolean);
      var artifacts = mergeUniqueItems(asArray(raw.artifacts), asArray(raw.outputs || raw.session_output))
        .map(normalizeArtifact)
        .filter(Boolean);
      var blockers = asArray(raw.blockers).filter(Boolean);
      var streams = mergeUniqueItems(asArray(raw.streams), asArray(raw.workstreams))
        .map(normalizeStream)
        .filter(Boolean);
      var currentTask = firstString([
        raw.current_task,
        raw.current_focus,
        raw.currentTask,
        tasks[0] && tasks[0].title
      ]);
      var status = normalizeStatus(raw.status);
      if (blockers.length > 0) status = 'blocked';
      else if (artifacts.some(function (artifact) { return artifact.status === 'review'; })) status = 'review';

      var progress = asNumber(raw.progress || raw.progress_pct || raw.percent_complete);
      if (progress == null && tasks.length > 0) {
        var doneTasks = tasks.filter(function (task) { return task.status === 'done'; }).length;
        progress = Math.round((doneTasks / tasks.length) * 100);
      }

      return {
        id: firstString([raw.agent_id, raw.id, raw.agent_name]) || 'agent-' + index,
        name: profile.name,
        role: firstString([raw.role, profile.role]) || 'Agent',
        accentRgb: profile.accentRgb,
        status: status,
        tone: getStatusTone(status),
        statusLabel: getStatusLabel(status),
        currentTask: currentTask || (status === 'idle' ? 'No active task right now' : 'Tracking background execution'),
        currentMeta: firstString([raw.eta, raw.time_remaining]) || '',
        progress: progress,
        blockers: blockers,
        tasks: tasks,
        artifacts: artifacts,
        streams: streams,
        taskCount: tasks.length || (currentTask ? 1 : 0),
        blockedCount: blockers.length || tasks.filter(function (task) { return task.status === 'blocked'; }).length,
        reviewCount: artifacts.filter(function (artifact) { return artifact.status === 'review'; }).length,
        openUrl: firstString([raw.url, raw.agent_url]) || buildAgentUrl(firstString([raw.agent_id, raw.id])),
      };
    }

    function mergeAgentAliases(agents) {
      var statusWeight = { idle: 1, queued: 2, running: 3, review: 4, blocked: 5 };
      var merged = {};
      agents.forEach(function (agent) {
        var key = (agent.name + '|' + agent.role).toLowerCase();
        var existing = merged[key];
        if (!existing) {
          merged[key] = agent;
          return;
        }
        var keepIncoming = (statusWeight[agent.status] || 0) > (statusWeight[existing.status] || 0);
        merged[key] = {
          id: existing.id || agent.id,
          name: existing.name || agent.name,
          role: existing.role || agent.role,
          status: keepIncoming ? agent.status : existing.status,
          tone: keepIncoming ? agent.tone : existing.tone,
          statusLabel: keepIncoming ? agent.statusLabel : existing.statusLabel,
          currentTask: keepIncoming ? (agent.currentTask || existing.currentTask) : (existing.currentTask || agent.currentTask),
        currentMeta: existing.currentMeta || agent.currentMeta,
        accentRgb: existing.accentRgb || agent.accentRgb,
        progress: Math.max(existing.progress || 0, agent.progress || 0),
        blockers: mergeUniqueItems(existing.blockers, agent.blockers),
        tasks: mergeUniqueItems(existing.tasks, agent.tasks),
        artifacts: mergeUniqueItems(existing.artifacts, agent.artifacts),
        streams: mergeUniqueItems(existing.streams, agent.streams),
          taskCount: Math.max(existing.taskCount || 0, agent.taskCount || 0),
          blockedCount: Math.max(existing.blockedCount || 0, agent.blockedCount || 0),
          reviewCount: Math.max(existing.reviewCount || 0, agent.reviewCount || 0),
          openUrl: existing.openUrl || agent.openUrl
        };
      });
      return Object.keys(merged).map(function (key) { return merged[key]; });
    }

    function normalizePayload(payload) {
      if (!payload) return { agents: [] };
      var agents = Array.isArray(payload.agents) ? payload.agents : [payload];
      return { agents: mergeAgentAliases(agents.map(normalizeAgent).filter(Boolean)) };
    }

    function getPriority(agent) {
      if (agent.status === 'blocked') return 0;
      if (agent.status === 'review') return 1;
      if (agent.status === 'running') return 2;
      if (agent.status === 'queued') return 3;
      return 4;
    }

    function statusToneForRow(status) {
      if (status === 'blocked') return 'blocked';
      if (status === 'review') return 'review';
      if (status === 'done' || status === 'approved' || status === 'running') return 'running';
      if (status === 'queued') return 'queued';
      return 'idle';
    }

    function summarizeOverview(agent) {
      var parts = [];
      if (agent.blockedCount) parts.push(agent.blockedCount + ' blocked');
      if (agent.reviewCount) parts.push(agent.reviewCount + ' review');
      if (agent.taskCount) parts.push(agent.taskCount + ' tasks in flight');
      if (!parts.length) parts.push('No agents need you right now');
      return parts.join(' · ');
    }

    var widgetState = {};
    var currentAgents = [];
    var currentAgentsById = {};

    function setCardSection(cardId, section) {
      if (section === 'overview') {
        widgetState[cardId] = 'overview';
        syncAgentCard(cardId);
        return;
      }
      widgetState[cardId] = widgetState[cardId] === section ? null : section;
      syncAgentCard(cardId);
    }
    function renderAttention(agent) {
      if (agent.status !== 'blocked' && agent.status !== 'review') return '';
      var tone = agent.status === 'blocked' ? 'blocked' : 'review';
      
      var isBlocked = agent.status === 'blocked';
      var body = isBlocked
        ? 'Blocked: ' + String(agent.blockers[0] || 'A founder-level decision is blocking progress.')
        : 'Review: ' + String((agent.artifacts.find(function (artifact) { return artifact.status === 'review'; }) || {}).title || 'An artifact is ready for review.');
      
      var action = isBlocked ? 'Resolve' : 'Review';
      
      var icon = isBlocked 
        ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>'
        : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>';
        
      var bgTone = isBlocked ? 'rgba(244, 63, 94, 0.1)' : 'rgba(251, 191, 36, 0.1)';
      var borderTone = isBlocked ? 'rgba(244, 63, 94, 0.14)' : 'rgba(251, 191, 36, 0.14)';
      var textTone = isBlocked ? 'var(--ox-danger)' : 'var(--ox-warning)';
      
      return (
        '<div class="agent-attention app-attention-banner" data-tone="' + tone + '" style="background: ' + bgTone + '; border-color: ' + borderTone + '; color: ' + textTone + ';">' +
          '<div style="display: flex; align-items: center; gap: 10px; min-width: 0;">' +
            '<div style="width: 18px; height: 18px; flex-shrink: 0; color: currentColor; opacity: 0.85; display: flex; align-items: center; justify-content: center;">' + icon + '</div>' +
            '<div class="attention-copy">' +
              '<span class="attention-title">' + (isBlocked ? 'Blocked' : 'Needs review') + '</span>' +
              '<span class="attention-body">' + escapeHtml(body) + '</span>' +
            '</div>' +
          '</div>' +
          '<a class="attention-action" href="' + escapeHtml(agent.openUrl) + '" target="_blank" rel="noreferrer" style="border-color: ' + borderTone + ';">' + action + '</a>' +
        '</div>'
      );
    }

    function renderTasksSection(agent, isOpen) {
      var rows = agent.tasks.map(function (task) {
        return (
          '<div class="section-row">' +
            '<div class="section-copy">' +
              '<div class="section-heading">' + escapeHtml(task.title) + '</div>' +
            '</div>' +
            '<div class="section-status" data-tone="' + statusToneForRow(task.status) + '">' + escapeHtml(getStatusLabel(task.status)) + '</div>' +
          '</div>'
        );
      });
      var blockedCount = agent.blockedCount;
      var badge = blockedCount > 0 ? '<span class="section-badge blocked">' + blockedCount + ' Blocked</span>' : '';
      return (
        '<div class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="tasks">' +
          '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="tasks" data-agent="' + escapeHtml(agent.id) + '" aria-expanded="' + String(isOpen) + '">' +
            '<span class="disclosure-title">Tasks' + badge + '</span>' +
            '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          '</button>' +
          '<div class="app-disclosure-body ox-disclosure-body">' +
            (rows.length ? rows.join('') : '<div style="padding: 12px 0; color: var(--ox-text-muted); font-size: 0.85rem;">No tasks.</div>') +
          '</div>' +
        '</div>'
      );
    }

    function renderBlockedSection(agent, isOpen) {
      var blockerRows = agent.blockers.map(function (blocker, index) {
        return (
          '<div class="section-row">' +
            '<div class="section-copy">' +
              '<div class="section-heading">' + escapeHtml(String(blocker)) + '</div>' +
              '<div class="ox-eyebrow" style="margin-top: 4px; color: var(--ox-text-dim);">Blocker ' + escapeHtml(String(index + 1)) + '</div>' +
            '</div>' +
            '<div class="section-status" data-tone="blocked">Blocked</div>' +
          '</div>'
        );
      });

      if (!blockerRows.length) {
        blockerRows = agent.tasks
          .filter(function (task) { return task.status === 'blocked'; })
          .map(function (task) {
            return (
              '<div class="section-row">' +
                '<div class="section-copy">' +
                  '<div class="section-heading">' + escapeHtml(task.title) + '</div>' +
                  '<div class="ox-eyebrow" style="margin-top: 4px; color: var(--ox-text-dim);">Blocked task</div>' +
                '</div>' +
                '<div class="section-status" data-tone="blocked">Blocked</div>' +
              '</div>'
            );
          });
      }

      return (
        '<div class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="blocked">' +
          '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="blocked" data-agent="' + escapeHtml(agent.id) + '" aria-expanded="' + String(isOpen) + '">' +
            '<span class="disclosure-title">Blocked<span class="section-badge blocked">' + escapeHtml(String(agent.blockedCount)) + ' Active</span></span>' +
            '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          '</button>' +
          '<div class="app-disclosure-body ox-disclosure-body">' +
            (blockerRows.length ? blockerRows.join('') : '<div style="padding: 12px 0; color: var(--ox-text-muted); font-size: 0.85rem;">No blockers.</div>') +
          '</div>' +
        '</div>'
      );
    }


    function renderArtifactsSection(agent, isOpen) {
      var rows = agent.artifacts.map(function (artifact) {
        var status = getStatusLabel(artifact.status);
        if (artifact.status === 'review') status = 'Review &rarr;';
        
        var isReview = artifact.status === 'review';
        var statusHtml = isReview 
          ? '<a class="section-status" data-tone="review" href="' + escapeHtml(agent.openUrl) + '" target="_blank" style="text-decoration:none;">' + status + '</a>'
          : '<div class="section-status" data-tone="' + statusToneForRow(artifact.status) + '">' + escapeHtml(status) + '</div>';

        return (
          '<div class="section-row">' +
            '<div class="section-copy">' +
              '<div class="section-heading">' + escapeHtml(artifact.title) + '</div>' +
              '<div class="ox-eyebrow" style="margin-top: 4px; color: var(--ox-text-dim);">' + escapeHtml(titleCase(artifact.type)) + '</div>' +
            '</div>' +
            statusHtml +
          '</div>'
        );
      });
      var reviewCount = agent.reviewCount;
      var badge = reviewCount > 0 ? '<span class="section-badge needs-review">' + reviewCount + ' Review</span>' : '';
      return (
        '<div class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="artifacts">' +
          '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="artifacts" data-agent="' + escapeHtml(agent.id) + '" aria-expanded="' + String(isOpen) + '">' +
            '<span class="disclosure-title">Artifacts' + badge + '</span>' +
            '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          '</button>' +
          '<div class="app-disclosure-body ox-disclosure-body">' +
            (rows.length ? rows.join('') : '<div style="padding: 12px 0; color: var(--ox-text-muted); font-size: 0.85rem;">No artifacts.</div>') +
          '</div>' +
        '</div>'
      );
    }


    function renderProgressSection(agent, isOpen) {
      var progressHtml = agent.progress == null ? '<div style="padding: 12px 0; color: var(--ox-text-muted); font-size: 0.85rem;">No progress data available.</div>' : (
        '<div style="padding: 4px 0 8px;">' +
          '<div style="display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 12px;">' +
            '<span style="font-size: 1.6rem; font-weight: 600; color: var(--ox-text); line-height: 1;">' + agent.progress + '%</span>' +
            '<span class="ox-eyebrow" style="color: var(--ox-text-dim);">' + escapeHtml(agent.eta || '~2 days remaining') + '</span>' +
          '</div>' +
          '<div style="height: 4px; border-radius: 4px; background: rgba(255,255,255,0.06); overflow: hidden; margin-bottom: 16px;">' +
            '<div style="height: 100%; width: ' + agent.progress + '%; background: rgb(var(--agent-accent-rgb, var(--ox-card-color-rgb))); border-radius: 4px; position: relative;">' +
              '<div style="position: absolute; right: 0; top: -2px; bottom: -2px; width: 8px; background: rgb(var(--agent-accent-rgb, var(--ox-card-color-rgb))); border-radius: 4px; box-shadow: 0 0 10px rgba(var(--agent-accent-rgb, var(--ox-card-color-rgb)), 0.5);"></div>' +
            '</div>' +
          '</div>' +
          '<div style="display: flex; flex-direction: column; gap: 8px;">' +
            (agent.streams || []).map(function(s) {
              return '<div style="display: flex; align-items: center; gap: 10px; font-size: 0.75rem;">' +
                '<div style="width: 6px; height: 6px; border-radius: 50%; background: rgb(var(--agent-accent-rgb, var(--ox-card-color-rgb))); flex-shrink: 0;"></div>' +
                '<span style="color: var(--ox-text-muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">' + escapeHtml(s.name) + '</span>' +
                '<span style="color: var(--ox-text-dim); flex-shrink: 0;">' + escapeHtml(String(s.progress)) + '%</span>' +
              '</div>';
            }).join('') +
          '</div>' +
        '</div>'
      );
      
      return (
        '<div class="agent-section' + (isOpen ? ' is-open' : '') + '" data-section="progress">' +
          '<button class="app-disclosure-trigger focusable" data-action="toggle-section" data-section="progress" data-agent="' + escapeHtml(agent.id) + '" aria-expanded="' + String(isOpen) + '">' +
            '<span class="disclosure-title">Progress</span>' +
            '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>' +
          '</button>' +
          '<div class="app-disclosure-body ox-disclosure-body">' +
            progressHtml +
          '</div>' +
        '</div>'
      );
    }

    function renderAgentSections(agent, openSection) {
      return (
        renderTasksSection(agent, openSection === 'tasks') +
        renderBlockedSection(agent, openSection === 'blocked') +
        renderArtifactsSection(agent, openSection === 'artifacts') +
        renderProgressSection(agent, openSection === 'progress')
      );
    }

    function syncAgentCard(cardId) {
      var card = document.querySelector('[data-agent-card="' + cardId + '"]');
      var agent = currentAgentsById[cardId];
      if (!card || !agent) {
        renderBoard({ agents: currentAgents });
        return;
      }

      var openSection = Object.prototype.hasOwnProperty.call(widgetState, cardId)
        ? widgetState[cardId]
        : 'tasks';
      Array.prototype.forEach.call(
        card.querySelectorAll('[data-action="toggle-section"]'),
        function (button) {
          var section = button.getAttribute('data-section');
          if (button.classList.contains('ox-metric-button')) {
            button.setAttribute('aria-pressed', String(openSection === section));
            return;
          }
          button.setAttribute('aria-expanded', String(openSection === section));
        }
      );

      Array.prototype.forEach.call(
        card.querySelectorAll('.agent-section[data-section]'),
        function (sectionEl) {
          sectionEl.classList.toggle(
            'is-open',
            openSection === sectionEl.getAttribute('data-section')
          );
        }
      );
    }

    function renderCard(agent) {
      var openSection = Object.prototype.hasOwnProperty.call(widgetState, agent.id)
        ? widgetState[agent.id]
        : 'tasks';
      var chipTone = agent.tone === 'running' ? '' : ' data-tone="' + agent.tone + '"';
      
      return (
        '<article class="agent-card app-flat-card" data-agent-card="' + escapeHtml(agent.id) + '" data-priority="' + escapeHtml(agent.status) + '" style="--agent-accent-rgb:' + escapeHtml(agent.accentRgb || '20, 184, 166') + ';">' +
          '<div class="ox-card-inner" style="padding-bottom: 16px;">' +
            '<div style="display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 16px;">' +
              '<div style="display: flex; align-items: center; gap: 12px; min-width: 0;">' +
                '<div class="agent-avatar">' +
                  renderAvatar(agent) +
                '</div>' +
                '<div style="display: flex; flex-direction: column; gap: 2px; min-width: 0;">' +
                  '<div style="display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;">' +
                    '<div class="ox-title" style="margin-bottom:0; font-size: 1.1rem;">' + escapeHtml(agent.name) + '</div>' +
                    '<div class="ox-eyebrow">' + escapeHtml(agent.role) + '</div>' +
                  '</div>' +
                '</div>' +
              '</div>' +
              '<a class="ox-badge"' + chipTone + ' href="' + escapeHtml(agent.openUrl) + '" target="_blank" rel="noreferrer" style="flex-shrink: 0; text-decoration: none;"><span class="chip-dot" style="width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor;"></span>' + escapeHtml(agent.statusLabel) + '</a>' +
            '</div>' +
            
            renderAttention(agent) +
            
            '<div style="display: flex; flex-direction: column; gap: 6px;">' +
              '<div class="ox-eyebrow">Current Focus</div>' +
              '<div class="ox-text" style="color: var(--ox-text); font-weight: 500;">' + escapeHtml(agent.currentTask) + '</div>' +
              '<div class="ox-text" style="font-size: 0.85rem;">' + 
                '<span>' + escapeHtml(agent.currentMeta || 'Tracking background execution') + '</span>' +
                '<span style="margin: 0 6px; color: var(--ox-text-dim);">·</span>' +
                '<span>' + escapeHtml(summarizeOverview(agent)) + '</span>' +
              '</div>' +
            '</div>' +
          '</div>' +
          '<div class="metric-row app-metric-rail">' +
            '<button class="ox-metric-button focusable" data-action="toggle-section" data-section="tasks" data-agent="' + escapeHtml(agent.id) + '" aria-pressed="' + String(openSection === 'tasks') + '">' +
              '<div class="metric-value" style="font-size: 1.15rem; font-weight: 600; font-family: var(--ox-mono);">' + escapeHtml(String(agent.taskCount)) + '</div>' +
              '<div class="ox-eyebrow" style="margin-top: 4px;">Tasks</div>' +
            '</button>' +
            '<button class="ox-metric-button focusable" data-action="toggle-section" data-section="blocked" data-agent="' + escapeHtml(agent.id) + '" data-tone="blocked" aria-pressed="' + String(openSection === 'blocked') + '">' +
              '<div class="metric-value" style="font-size: 1.15rem; font-weight: 600; font-family: var(--ox-mono);">' + escapeHtml(String(agent.blockedCount)) + '</div>' +
              '<div class="ox-eyebrow" style="margin-top: 4px;">Blocked</div>' +
            '</button>' +
            '<button class="ox-metric-button focusable" data-action="toggle-section" data-section="artifacts" data-agent="' + escapeHtml(agent.id) + '" data-tone="review" aria-pressed="' + String(openSection === 'artifacts') + '">' +
              '<div class="metric-value" style="font-size: 1.15rem; font-weight: 600; font-family: var(--ox-mono);">' + escapeHtml(String(agent.artifacts.length)) + '</div>' +
              '<div class="ox-eyebrow" style="margin-top: 4px;">Artifacts</div>' +
            '</button>' +
            '<button class="ox-metric-button focusable" data-action="toggle-section" data-section="progress" data-agent="' + escapeHtml(agent.id) + '" aria-pressed="' + String(openSection === 'progress') + '">' +
              '<div class="metric-value" style="font-size: 1.15rem; font-weight: 600; font-family: var(--ox-mono);">' + escapeHtml(String(agent.progress == null ? 'n/a' : agent.progress + '%')) + '</div>' +
              '<div class="ox-eyebrow" style="margin-top: 4px;">Progress</div>' +
            '</button>' +
          '</div>' +

          '<div style="padding: 0 24px;" data-agent-sections>' +
            renderAgentSections(agent, openSection) +
          '</div>' +
          
          '<div style="display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 16px 24px; border-top: 1px solid var(--ox-border);">' +
            '<div class="ox-eyebrow">Synced just now</div>' +
            '<a class="ox-text" style="display: inline-flex; align-items: center; gap: 6px; font-size: 0.85rem; font-weight: 500; text-decoration: none;" href="' + escapeHtml(agent.openUrl) + '" target="_blank" rel="noreferrer">Open live view<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17L17 7"></path><path d="M8 7h9v9"></path></svg></a>' +
          '</div>' +
        '</article>'
      );
    }

    function renderBoard(payload) {
      var normalized = normalizePayload(payload);
      var agents = normalized.agents.sort(function (left, right) {
        return getPriority(left) - getPriority(right) || left.name.localeCompare(right.name);
      });
      currentAgents = agents.slice();
      currentAgentsById = {};
      agents.forEach(function (agent) {
        currentAgentsById[agent.id] = agent;
      });

      if (!agents.length) {
        injectHtml(
          '<div class="surface-label">Agent Status</div>' +
          '<div class="empty-state ox-card">' +
            '<strong>No agents need you right now</strong>' +
            '<p>Everything is moving in the background. Expand a metric only when you need to act, then return to the quiet state.</p>' +
          '</div>'
        );
        return;
      }

      var html = '<div class="surface-label">Agent Status</div>';
      agents.forEach(function(a, i) {
        var animStr = hasLoadedOnce ? '' : ' animate-in" style="animation-delay: ' + (i * 0.05) + 's"';
        html += renderCard(a).replace('<article class="agent-card"', '<article class="agent-card' + animStr + '"');
      });
      injectHtml(html);
    }

    document.addEventListener('click', function (event) {
      var trigger = event.target && event.target.closest('[data-action="toggle-section"]');
      if (!trigger) return;
      setCardSection(trigger.getAttribute('data-agent'), trigger.getAttribute('data-section'));
    });

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var demoPayload = isDemo
      ? {
          agents: [
            {
              agent_name: 'Pace',
