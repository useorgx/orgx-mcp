<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Initiative Scaffolded - OrgX</title>
  <link rel="stylesheet" href="shared/interaction-kit.css" />
  <script src="shared/interaction-kit.js"></script>
  <style>
      :root, :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(0, 0, 0, 0.08);
        --ox-border-strong: rgba(0, 0, 0, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-well-bg: #f1f5f9;
        --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
      }
      
      :root {
        --ox-lime: #a3e635; /* Will be overwritten by specific widgets */
        --ox-teal: #0d9488;
        --ox-danger: #e11d48;
        --ox-warning: #d97706;
        --ox-iris: #4f46e5;
        --ox-grid: rgba(0, 0, 0, 0.03);
        --ox-shadow: 0 12px 32px -12px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
        --ox-font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--ox-font); background: var(--ox-bg); color: var(--ox-text); padding: 24px 16px; -webkit-font-smoothing: antialiased; min-height: 100vh; }
    body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 50% 0%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%), linear-gradient(var(--ox-grid) 1px, transparent 1px), linear-gradient(90deg, var(--ox-grid) 1px, transparent 1px); background-size: 100% 100%, 20px 20px, 20px 20px; z-index: -1; pointer-events: none; }
    .container { max-width: 540px; margin: 0 auto; position: relative; }
    
    .ox-card { background: var(--ox-panel); border: 1px solid var(--ox-border); border-radius: 16px; box-shadow: var(--ox-shadow); position: relative; overflow: hidden; margin-bottom: 16px; }
    .ox-card-inner { padding: 24px; }
    .ox-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent); opacity: 0.8; }
    .ox-eyebrow { font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ox-text-muted); font-weight: 600; }
    .ox-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ox-text); line-height: 1.3; }
    

    :root { --ox-primary: #6366f1; --ox-primary-rgb: 99, 102, 241; }

    /* Hierarchy Specifics */
    .h-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; padding-bottom: 24px; border-bottom: 1px solid var(--ox-border); }
    .h-icon { width: 48px; height: 48px; border-radius: 12px; background: rgba(var(--ox-primary-rgb), 0.1); border: 1px solid rgba(var(--ox-primary-rgb), 0.2); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
    
    .node-list { display: flex; flex-direction: column; gap: 4px; }
    .node-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.9rem;
      position: relative;
      overflow: hidden;
      max-height: 72px;
      transition:
        opacity 0.2s ease,
        transform 0.2s ease,
        max-height 0.24s cubic-bezier(0.16, 1, 0.3, 1),
        padding 0.24s cubic-bezier(0.16, 1, 0.3, 1),
        margin 0.24s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .node-item.collapsed {
      opacity: 0;
      transform: translateY(-6px);
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      margin-top: 0;
      margin-bottom: 0;
      pointer-events: none;
    }
    
    
    .node-item.ws { background: rgba(255,255,255,0.02); font-weight: 600; color: var(--ox-text); margin-top: 12px; }
    .node-item.ws .node-icon { color: var(--ox-teal); }
    @media (prefers-color-scheme: light) { .node-item.ws { background: rgba(0,0,0,0.03); } }

    .node-item.ws {
      align-items: flex-start;
      padding: 14px 14px 14px 12px;
      border: 1px solid rgba(var(--ox-primary-rgb), 0.08);
    }

    .ws-shell {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .ws-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .ws-title-wrap {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .ws-title {
      font-size: 0.96rem;
      line-height: 1.35;
      color: var(--ox-text);
      letter-spacing: -0.01em;
    }

    .ws-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .ws-execution {
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(var(--ox-primary-rgb), 0.06);
      border: 1px solid rgba(var(--ox-primary-rgb), 0.1);
    }

    .agent-chip {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      max-width: 100%;
    }

    .agent-avatar {
      width: 32px;
      height: 32px;
      min-width: 32px;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(var(--ox-primary-rgb), 0.12);
      border: 1px solid rgba(var(--ox-primary-rgb), 0.18);
      color: var(--ox-primary);
      font-family: var(--ox-mono);
      font-size: 0.82rem;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
    }

    .agent-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .agent-copy {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .agent-name {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ox-text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .agent-domain {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ox-text-muted);
      font-family: var(--ox-mono);
    }

    .progress-cluster {
      min-width: min(100%, 180px);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.72rem;
      font-family: var(--ox-mono);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ox-text-muted);
    }

    .progress-value {
      color: var(--ox-text);
      font-weight: 700;
    }

    .progress-track {
      width: 100%;
      height: 8px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(148, 163, 184, 0.18);
      border: 1px solid rgba(148, 163, 184, 0.14);
    }

    .progress-fill {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(var(--ox-primary-rgb), 0.7), var(--ox-primary));
      box-shadow: 0 0 18px rgba(var(--ox-primary-rgb), 0.26);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: var(--ox-mono);
      border: 1px solid currentColor;
      white-space: nowrap;
    }

    .status-badge svg {
      flex: none;
    }

    .status-badge.active {
      color: var(--ox-teal);
      background: rgba(13, 148, 136, 0.12);
      border-color: rgba(13, 148, 136, 0.24);
    }

    .status-badge.pending,
    .status-badge.ready,
    .status-badge.not-started {
      color: var(--ox-warning);
      background: rgba(217, 119, 6, 0.12);
      border-color: rgba(217, 119, 6, 0.22);
    }

    .status-badge.complete {
      color: var(--ox-lime);
      background: rgba(163, 230, 53, 0.14);
      border-color: rgba(163, 230, 53, 0.24);
    }

    .status-badge.blocked,
    .status-badge.failed {
      color: var(--ox-danger);
      background: rgba(225, 29, 72, 0.12);
      border-color: rgba(225, 29, 72, 0.24);
    }

    .status-badge.paused {
      color: var(--ox-text-muted);
      background: rgba(100, 116, 139, 0.12);
      border-color: rgba(100, 116, 139, 0.22);
    }
    
    .node-item.ms { padding-left: 24px; color: var(--ox-text); font-weight: 500; }
    .node-item.ms .node-icon { color: var(--ox-warning); }
    .node-item.ms::before { content: ''; position: absolute; left: 12px; top: 0; bottom: 0; width: 1px; background: var(--ox-border); }
    .node-item.ms::after { content: ''; position: absolute; left: 12px; top: 20px; width: 8px; height: 1px; background: var(--ox-border); }
    
    .node-item.tk { padding-left: 48px; color: var(--ox-text-muted); font-size: 0.85rem; }
    .node-item.tk .node-icon { color: var(--ox-lime); }
    .node-item.tk::before { content: ''; position: absolute; left: 12px; top: 0; bottom: 0; width: 1px; background: var(--ox-border); }
    .node-item.tk::after { content: ''; position: absolute; left: 36px; top: 20px; width: 8px; height: 1px; background: var(--ox-border); }

    
    .badge-id { font-family: var(--ox-mono); font-size: 0.55rem; padding: 2px 6px; border-radius: 4px; border: 1px solid var(--ox-border); color: var(--ox-text-muted); margin-left: auto; letter-spacing: 0.05em; }
    .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 6px; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); font-family: var(--ox-mono); font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; border: 1px solid rgba(var(--ox-primary-rgb), 0.2); }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; box-shadow: 0 0 8px currentColor; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  
    .node-toggle {
      width: 34px;
      min-width: 34px;
      height: 34px;
      margin-right: 2px;
      color: var(--ox-text-muted);
    }

    .node-toggle[aria-expanded="true"] {
      color: var(--ox-primary);
      background: rgba(var(--ox-primary-rgb), 0.08);
      border-color: rgba(var(--ox-primary-rgb), 0.18);
    }

    .widget-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ox-border); gap: 12px; }
    .deep-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 40px;
      padding-inline: 14px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--ox-primary);
    }
    .deep-link svg { width: 14px; height: 14px; }

    @media (max-width: 560px) {
      .widget-footer {
        flex-direction: column;
        align-items: stretch;
      }

      .deep-link {
        width: 100%;
      }

      .ws-header {
        flex-direction: column;
        align-items: stretch;
      }

      .ws-execution {
        align-items: stretch;
      }

      .progress-cluster {
        min-width: 100%;
      }
    }

    .skeleton-line {
      background: linear-gradient(90deg, var(--ox-border) 25%, rgba(var(--ox-primary-rgb), 0.1) 50%, var(--ox-border) 75%);
      background-size: 200% 100%;
      animation: shimmer 2s infinite linear;
      border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body>
  <div class="container" id="content">
    <!-- Skeleton shown during loading -->
    <div class="skeleton-wrapper" style="display:flex; flex-direction:column; gap:16px; padding:24px;">
      <div class="skeleton-line" style="width:50%; height:20px; margin-bottom:8px;"></div>
      <div class="skeleton-line" style="width:90%; height:14px; margin-bottom:4px;"></div>
      <div class="skeleton-line" style="width:85%; height:14px;"></div>
      <div style="margin-top:12px; display:flex; flex-direction:column; gap:10px;">
        <div style="display:flex; align-items:center; gap:12px; background:var(--ox-well-bg); border-radius:8px; padding:12px;">
          <div class="skeleton-line" style="width:20px; height:20px; border-radius:4px;"></div>
          <div class="skeleton-line" style="flex:1; height:14px;"></div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; background:var(--ox-well-bg); border-radius:8px; padding:12px;">
          <div class="skeleton-line" style="width:20px; height:20px; border-radius:4px;"></div>
          <div class="skeleton-line" style="flex:1; height:14px;"></div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; background:var(--ox-well-bg); border-radius:8px; padding:12px;">
          <div class="skeleton-line" style="width:20px; height:20px; border-radius:4px;"></div>
          <div class="skeleton-line" style="flex:1; height:14px;"></div>
        </div>
      </div>
    </div>
  </div>
  <script>

    // Sync theme from URL to override prefers-color-scheme
    (function() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();


    var injectHtml = (html) => {
      const content = document.getElementById('content');
      const skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton) {
        skeleton.style.opacity = '0';
        setTimeout(() => {
          content.innerHTML = html;
        }, 300);
      } else {
        content.innerHTML = html;
      }
    };

    function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
    function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
    function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
    function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var ro=new ResizeObserver(() => requestAnimationFrame(_sendSize));ro.observe(document.documentElement);ro.observe(document.body);}}
    function initWidget(opts){var render=opts.render,getData=opts.getData||_extractData;var protocol=_detectProtocol();if(protocol==='chatgpt'){var d=getData(window.openai&&window.openai.toolOutput);render(d);window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});}else if(protocol==='mcp-apps'){render(null);var initId=1;window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'Widget',version:'1.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');window.addEventListener('message',function(event){var msg=event.data;if(!msg||typeof msg!=='object')return;if(msg.id===initId){_observeSize();return;}if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}});}else{render(null);}}
    var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+c+'</svg>';};
    var icons = {

      chevronDown: function(s){return _svg('<polyline points="6 9 12 15 18 9"></polyline>',s);},
      chevronRight: function(s){return _svg('<polyline points="9 18 15 12 9 6"></polyline>',s);},

      folder: function(s){return _svg('<path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>',s);},
      flag: function(s){return _svg('<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line>',s);},
      check: function(s){return _svg('<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>',s);},
      layout: function(s){return _svg('<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line>',s);},
      initiative: function(s){return _svg('<circle cx="12" cy="12" r="9" fill="currentColor" fill-opacity="0.1"></circle><circle cx="12" cy="12" r="5"></circle><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>',s);},
      workstream: function(s){return _svg('<rect x="2" y="2" width="20" height="20" rx="6" fill="currentColor" fill-opacity="0.1" stroke="none"></rect><path d="M6 6c3 0 5 6 8 6"></path><path d="M6 18c3 0 5-6 8-6"></path><path d="M6 12h12"></path><path d="m14 8 4 4-4 4"></path><circle cx="6" cy="6" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="6" cy="12" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="6" cy="18" r="1.5" fill="currentColor" stroke="none"></circle>',s);},
      milestone: function(s){return _svg('<path d="M5 3v18"></path><path d="m5 4 12 1-2 4 2 4-12-1z" fill="currentColor" fill-opacity="0.1"></path>',s);},
      task: function(s){return _svg('<rect x="4" y="4" width="16" height="16" rx="4" fill="currentColor" fill-opacity="0.12"></rect><path d="M9 12.2 11 14.2 15.2 10"></path>',s);}
      ,play: function(s){return _svg('<polygon points="10 8 17 12 10 16 10 8" fill="currentColor" stroke="none"></polygon>',s);}
      ,clock: function(s){return _svg('<circle cx="12" cy="12" r="8"></circle><path d="M12 8v4l3 2"></path>',s);}
      ,pause: function(s){return _svg('<rect x="8" y="7" width="3" height="10" rx="1" fill="currentColor" stroke="none"></rect><rect x="13" y="7" width="3" height="10" rx="1" fill="currentColor" stroke="none"></rect>',s);}
      ,alert: function(s){return _svg('<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>',s);}
      ,checkCircle: function(s){return _svg('<circle cx="12" cy="12" r="9"></circle><path d="m8.5 12.5 2.2 2.2 4.8-5"></path>',s);}
    };
    var escapeHtml = (str) => { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };
    var readLabel = (item, fallback) => {
      if (!item || typeof item !== 'object') return fallback || '';
      if (typeof item.title === 'string' && item.title.trim()) return item.title.trim();
      if (typeof item.name === 'string' && item.name.trim()) return item.name.trim();
      return fallback || '';
    };
    var flattenHierarchy = (hierarchy) => {
      if (Array.isArray(hierarchy)) return hierarchy;
      if (!hierarchy || typeof hierarchy !== 'object') return [];
      var flattened = [];
      var workstreams = Array.isArray(hierarchy.workstreams) ? hierarchy.workstreams : [];
      workstreams.forEach((workstream) => {
        flattened.push({
          type: 'workstream',
          title: readLabel(workstream, 'Untitled workstream'),
          id: workstream && typeof workstream.id === 'string' ? workstream.id : workstream && typeof workstream.ref === 'string' ? workstream.ref : '',
        });
        var milestones = workstream && Array.isArray(workstream.milestones) ? workstream.milestones : [];
        milestones.forEach((milestone) => {
          flattened.push({
            type: 'milestone',
            title: readLabel(milestone, 'Untitled milestone'),
            id: milestone && typeof milestone.id === 'string' ? milestone.id : milestone && typeof milestone.ref === 'string' ? milestone.ref : '',
          });
          var tasks = milestone && Array.isArray(milestone.tasks) ? milestone.tasks : [];
          tasks.forEach((task) => {
            flattened.push({
              type: 'task',
              title: readLabel(task, 'Untitled task'),
              id: task && typeof task.id === 'string' ? task.id : task && typeof task.ref === 'string' ? task.ref : '',
            });
          });
        });
      });
      return flattened;
    };
    var normalizeTextKey = (value) => {
      return typeof value === 'string' ? value.trim().toLowerCase() : '';
    };
    var titleCase = (value) => {
      if (typeof value !== 'string') return '';
      return value
        .replace(/[-_]+/g, ' ')
        .split(' ')
        .filter(Boolean)
        .map((part) => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
    };
    var getAvatarUrl = (name, domain) => {
      var n = normalizeTextKey(name);
      var d = normalizeTextKey(domain);
      if (n.includes('pace') || n.includes('product') || d === 'product') return 'https://useorgx.com/product_orchestrator.png';
      if (n.includes('eli') || n.includes('engineer') || d === 'engineering') return 'https://useorgx.com/engineering_autopilot.png';
      if (n.includes('mark') || n.includes('market') || d === 'marketing') return 'https://useorgx.com/launch_captain.png';
      if (n.includes('sage') || n.includes('sale') || d === 'sales') return 'https://useorgx.com/pipeline_intelligence.png';
      if (n.includes('orion') || n.includes('op') || d === 'operations') return 'https://useorgx.com/control_tower.png';
      if (n.includes('dana') || n.includes('design') || d === 'design') return 'https://useorgx.com/design_codex.png';
      if (n.includes('xandy') || n.includes('orchestrator') || d === 'orchestrator') return 'https://useorgx.com/xandy_orchestrator.png';
      return null;
    };
    var renderAvatar = (name, domain) => {
      var url = getAvatarUrl(name, domain);
      if (url) return '<img src="' + url + '" alt="' + escapeHtml(name || domain || 'Agent') + '" loading="lazy" />';
      var label = typeof name === 'string' && name.trim() ? name.trim() : titleCase(domain || 'Agent');
      return escapeHtml(label.charAt(0).toUpperCase() || '?');
    };
    var classifyStatus = (status) => {
      var normalized = normalizeTextKey(status);
      if (!normalized || normalized === 'not_started' || normalized === 'not started') return { tone: 'not-started', label: 'Not started', icon: icons.clock(12) };
      if (['ready', 'queued', 'pending'].includes(normalized)) return { tone: normalized === 'ready' ? 'ready' : 'pending', label: titleCase(normalized), icon: icons.clock(12) };
      if (['active', 'in_progress', 'in progress', 'running', 'executing'].includes(normalized)) return { tone: 'active', label: normalized === 'in_progress' || normalized === 'in progress' ? 'In progress' : titleCase(normalized), icon: icons.play(12) };
      if (['complete', 'completed', 'done', 'success', 'succeeded'].includes(normalized)) return { tone: 'complete', label: normalized === 'complete' ? 'Completed' : titleCase(normalized), icon: icons.checkCircle(12) };
      if (['blocked', 'error', 'failed'].includes(normalized)) return { tone: normalized === 'failed' ? 'failed' : 'blocked', label: titleCase(normalized), icon: icons.alert(12) };
      if (['paused', 'cancelled', 'canceled'].includes(normalized)) return { tone: 'paused', label: normalized === 'canceled' ? 'Cancelled' : titleCase(normalized), icon: icons.pause(12) };
      return { tone: 'pending', label: titleCase(normalized), icon: icons.clock(12) };
    };
    var readProgress = (stream) => {
      var raw = stream && typeof stream.progress_pct === 'number' ? stream.progress_pct : null;
      if (raw == null) {
        var statusKey = normalizeTextKey(stream && stream.status);
        return statusKey === 'complete' || statusKey === 'completed' || statusKey === 'done' ? 100 : 0;
      }
      return Math.max(0, Math.min(100, Math.round(raw)));
    };
    var enrichHierarchy = (hierarchy, raw) => {
      var assignments = raw && raw.agent_assignment && Array.isArray(raw.agent_assignment.assignments)
        ? raw.agent_assignment.assignments
        : [];
      var streams = raw && raw.streams && Array.isArray(raw.streams.items)
        ? raw.streams.items
        : [];
      var assignmentsByWorkstream = new Map();
      assignments.forEach((assignment) => {
        if (!assignment || typeof assignment !== 'object' || typeof assignment.workstream_id !== 'string') return;
        assignmentsByWorkstream.set(assignment.workstream_id, assignment);
      });
      var streamsByWorkstream = new Map();
      streams.forEach((stream) => {
        if (!stream || typeof stream !== 'object' || typeof stream.workstream_id !== 'string') return;
        streamsByWorkstream.set(stream.workstream_id, stream);
      });

      return flattenHierarchy(hierarchy).map((item) => {
        if (!item || item.type !== 'workstream') return item;
        var assignment = item.id ? assignmentsByWorkstream.get(item.id) : null;
        var stream = item.id ? streamsByWorkstream.get(item.id) : null;
        var domain = assignment && typeof assignment.domain === 'string' && assignment.domain.trim()
          ? assignment.domain.trim()
          : stream && typeof stream.agent_domain === 'string' && stream.agent_domain.trim()
          ? stream.agent_domain.trim()
          : item && typeof item.domain === 'string' && item.domain.trim()
          ? item.domain.trim()
          : item && typeof item.persona === 'string' && item.persona.trim()
          ? item.persona.trim()
          : null;
        var agentName = assignment && typeof assignment.agent_name === 'string' && assignment.agent_name.trim()
          ? assignment.agent_name.trim()
          : domain
          ? titleCase(domain)
          : 'Unassigned';
        var status = classifyStatus(stream && typeof stream.status === 'string' ? stream.status : 'not_started');
        return Object.assign({}, item, {
          execution: {
            domain: domain,
            agent_id: assignment && typeof assignment.agent_id === 'string' ? assignment.agent_id : null,
            agent_name: agentName,
            progress_pct: readProgress(stream),
            status: status,
          },
        });
      });
    };
    var normalizeScaffoldData = (raw) => {
      if (!raw || typeof raw !== 'object') return null;
      var initiative = raw.initiative || (raw.hierarchy && raw.hierarchy.initiative) || null;
      if (!initiative || typeof initiative !== 'object') return null;
      return {
        initiative: {
          id: typeof initiative.id === 'string' ? initiative.id : typeof initiative.ref === 'string' ? initiative.ref : '',
          title: readLabel(initiative, 'Untitled initiative'),
          status: typeof initiative.status === 'string' && initiative.status.trim() ? initiative.status.trim() : 'scaffolded',
        },
        hierarchy: enrichHierarchy(raw.hierarchy, raw),
      };
    };

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var data = isDemo ? {
      initiative: { id: "INI-402", title: "AI Query Discovery Engine", status: "Active" },
      hierarchy: [
        { type: "workstream", title: "Infrastructure Scaffolding", id: "WS-1" },
        { type: "milestone", title: "Data Pipeline Validated", id: "MS-1" },
        { type: "task", title: "Configure ingest scripts", id: "TSK-1" },
        { type: "task", title: "Run dry-run tests", id: "TSK-2" },
        { type: "workstream", title: "Search UX Implementation", id: "WS-2" },
        { type: "milestone", title: "Search Input Animated", id: "MS-2" },
        { type: "task", title: "Implement Lenis scrolling", id: "TSK-3" }
      ],
      agent_assignment: {
        assignments: [
          { workstream_id: "WS-1", domain: "engineering", agent_id: "engineering-agent", agent_name: "Eli" },
          { workstream_id: "WS-2", domain: "design", agent_id: "design-agent", agent_name: "Dana" }
        ]
      },
      streams: {
        items: [
          { workstream_id: "WS-1", status: "active", agent_domain: "engineering", progress_pct: 42 },
          { workstream_id: "WS-2", status: "ready", agent_domain: "design", progress_pct: 12 }
        ]
      }
    } : null;
    var isLoading = !isDemo;

    var isLoadingOverride = new URLSearchParams(window.location.search).get('loading') === 'true';
    if (isLoadingOverride) {
      isLoading = true;
      isDemo = false;
      // Overwrite initWidget to do nothing so it hangs on loading
      initWidget = () => { render(); };
    }
    var bootStartedAt = Date.now();
    var MIN_LOADING_MS = 220;
    var loadingSettled = false;
    var applyBootPayload = function(assign) {
      var commit = function() {
        if (typeof assign === 'function') assign();
        isLoading = false;
        render();
      };
      if (loadingSettled) {
        commit();
        return;
      }
      loadingSettled = true;
      var delay = Math.max(0, MIN_LOADING_MS - (Date.now() - bootStartedAt));
      window.setTimeout(commit, delay);
    };


    
    window.toggleNode = (btn) => {
       const parent = btn.closest('.node-item');
       const isExpanded = btn.getAttribute('data-expanded') === 'true';
       btn.setAttribute('data-expanded', !isExpanded);
       btn.setAttribute('aria-expanded', String(!isExpanded));
       btn.innerHTML = !isExpanded ? icons.chevronDown(12) : icons.chevronRight(12);
       
       let next = parent.nextElementSibling;
       while (next && !next.classList.contains('ws')) {
           if (isExpanded) {
               next.classList.add('collapsed');
           } else {
               next.classList.remove('collapsed');
           }
           next = next.nextElementSibling;
       }
    };

    var render = () => {
      if(isLoading) return;
      var scaffold = normalizeScaffoldData(data);
      if(!scaffold || !scaffold.initiative) { injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.layout(24)}</div><div class="empty-title">Awaiting scaffold</div><div class="empty-desc">The structural hierarchy has not been generated yet.</div></div>`); return; }

      const listHtml = (scaffold.hierarchy || []).map(h => {
        let icn = '';
        let cls = '';
        let toggle = '';
        if(h.type === 'workstream') { 
            icn = icons.workstream(14); 
            cls = 'ws'; 
            toggle = `<button type="button" class="node-toggle ox-icon-btn ox-icon-btn--sm" onclick="toggleNode(this)" data-expanded="true" aria-expanded="true" aria-label="Collapse workstream">${icons.chevronDown(12)}</button>`;
        }
        if(h.type === 'milestone') { icn = icons.milestone(14); cls = 'ms'; }
        if(h.type === 'task') { icn = icons.task(14); cls = 'tk'; }
        if(h.type === 'workstream') {
          var execution = h.execution || {};
          var status = execution.status || classifyStatus('not_started');
          var progress = typeof execution.progress_pct === 'number' ? execution.progress_pct : 0;
          var domainLabel = execution.domain ? titleCase(execution.domain) : 'Agent pending';
          return `<div class="node-item ${cls}">
            ${toggle}
            <span class="node-icon" style="display:flex; align-items:center; margin-right:8px; margin-top:6px;">${icn}</span>
            <div class="ws-shell">
              <div class="ws-header">
                <div class="ws-title-wrap">
                  <span class="ws-title">${escapeHtml(readLabel(h, 'Untitled'))}</span>
                  <div class="ws-meta">
                    ${h.id ? `<span class="badge-id">${escapeHtml(h.id)}</span>` : ''}
                  </div>
                </div>
                <span class="status-badge ${escapeHtml(status.tone)}">${status.icon}<span>${escapeHtml(status.label)}</span></span>
              </div>
              <div class="ws-execution">
                <div class="agent-chip">
                  <span class="agent-avatar">${renderAvatar(execution.agent_name, execution.domain)}</span>
                  <span class="agent-copy">
                    <span class="agent-name">${escapeHtml(execution.agent_name || 'Unassigned')}</span>
                    <span class="agent-domain">${escapeHtml(domainLabel)}</span>
                  </span>
                </div>
                <div class="progress-cluster">
                  <div class="progress-copy">
                    <span>Completion</span>
                    <span class="progress-value">${escapeHtml(String(progress))}%</span>
                  </div>
                  <span class="progress-track"><span class="progress-fill" style="width:${escapeHtml(String(progress))}%"></span></span>
                </div>
              </div>
            </div>
          </div>`;
        }
        return `<div class="node-item ${cls}">
          ${toggle}
          <span class="node-icon" style="display:flex; align-items:center; margin-right:8px;">${icn}</span>
          <span style="flex:1;">${escapeHtml(readLabel(h, 'Untitled'))}</span>
          ${h.id ? `<span class="badge-id">${escapeHtml(h.id)}</span>` : ''}
        </div>`;
      }).join('');

      const initiativeUrl = data.live_url || (data.initiative.id ? `https://useorgx.com/live/${encodeURIComponent(data.initiative.id)}` : 'https://useorgx.com/live?view=mission-control');

      injectHtml(`
        <div class="ox-card animate-in">
          <div class="ox-card-inner">
            <div class="h-header">
              <div class="h-icon">${icons.initiative(24)}</div>
              <div style="flex:1;">
                <div class="ox-eyebrow" style="margin-bottom:4px;">Initiative Scaffolded</div>
                <h2 class="ox-title" style="font-size:1.3rem; margin-bottom:8px;">${escapeHtml(scaffold.initiative.title)}</h2>
                <div class="status-pill">
                  <div class="status-dot"></div> ${escapeHtml(scaffold.initiative.status)}
                </div>
              </div>
            </div>
            
            <div class="ox-eyebrow" style="margin-bottom:8px; margin-left:12px;">Work Breakdown Structure</div>
            <div class="node-list">
              ${listHtml}
            </div>
          
            <div class="widget-footer">
              <span style="font-size:0.7rem; font-family:var(--ox-mono); color:var(--ox-text-muted); text-transform:uppercase; letter-spacing:0.05em;">Synced</span>
              <a href="${initiativeUrl}" target="_blank" rel="noreferrer" class="deep-link ox-link-btn ox-link-btn--quiet">
                Open Initiative
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
              </a>
            </div>
</div>
        </div>
      `);
    };

    if(isDemo) applyBootPayload();
    else initWidget({ render: d => { applyBootPayload(function(){ if(d) data = d; }); } });
  </script>
</body>
</html>
