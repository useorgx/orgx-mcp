        letter-spacing: -0.01em;
        min-height: 44px;
        padding: 0 16px;
        border-radius: 12px;

        color: var(--ox-text);

      }

    :root { --ox-primary-rgb: 251, 191, 36; }
    
    .queue-subtitle { font-size: 0.92rem; line-height: 1.6; color: var(--ox-text-muted); max-width: 56ch; }
    
    .decision-shell {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .decision-shell[data-page-direction="forward"] .decision-card {
      animation-name: decisionSlideForward;
    }

    .decision-shell[data-page-direction="backward"] .decision-card {
      animation-name: decisionSlideBackward;
    }

    .decision-card {
      margin-bottom: 8px;
      transition:
        opacity 180ms ease,
        transform 220ms cubic-bezier(0.16, 1, 0.3, 1),
        filter 220ms ease;
    }

    .decision-card.is-resolving {
      opacity: 0;
      transform: translateY(-8px) scale(0.985);
      filter: blur(6px);
    }

    @keyframes decisionSlideForward {
      from {
        opacity: 0;
        transform: translateX(12px) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0) translateY(0);
      }
    }

    @keyframes decisionSlideBackward {
      from {
        opacity: 0;
        transform: translateX(-12px) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0) translateY(0);
      }
    }

    .decision-card.urgency-critical { --ox-card-color-rgb: 225, 29, 72; --ox-card-color: var(--ox-danger); }
    .decision-card.urgency-high { --ox-card-color-rgb: 217, 119, 6; --ox-card-color: var(--ox-warning); }
    .decision-card.urgency-medium { --ox-card-color-rgb: 132, 204, 22; --ox-card-color: var(--ox-lime); }
    .decision-card.urgency-low { --ox-card-color-rgb: 100, 116, 139; --ox-card-color: var(--ox-text-muted); }

      if (textarea) textarea.disabled = !!disabled;
    };


    
      var WIDGET_ASSET_BASE = 'https://mcp.useorgx.com/widgets/shared/';
      var getAvatarUrl = (name) => {
        const n = (name || '').toLowerCase();
        if (n.includes('pace') || n.includes('product')) return WIDGET_ASSET_BASE + 'product_orchestrator.png';
        if (n.includes('eli') || n.includes('engineer')) return WIDGET_ASSET_BASE + 'engineering_autopilot.png';
        if (n.includes('mark') || n.includes('market')) return WIDGET_ASSET_BASE + 'launch_captain.png';
        if (n.includes('sage') || n.includes('sale')) return WIDGET_ASSET_BASE + 'pipeline_intelligence.png';
        if (n.includes('orion') || n.includes('op')) return WIDGET_ASSET_BASE + 'control_tower.png';
        if (n.includes('dana') || n.includes('design')) return WIDGET_ASSET_BASE + 'design_codex.png';
        if (n.includes('xandy') || n.includes('orchestrator')) return WIDGET_ASSET_BASE + 'xandy_orchestrator.png';
        return null;
      };
      var getDecisionOwner = (decision) => {
        const label = firstString(
          decision.agent_name,
          decision.owner_agent,
          decision.assigned_agent,
          decision.domain
        );
        const isSystem = Boolean(decision.is_system) || !label || ['system', 'orgx', 'orgx system'].includes(label.toLowerCase());
        return {
          label: isSystem ? 'OrgX System' : label,
          isSystem,
        };
      };
      var renderAvatar = (name, sizePx, isSystem) => {
        if (isSystem) {
          const localUrl = resolveWidgetAsset('orgx-logo.png');
          const remoteUrl = WIDGET_ASSET_BASE + 'orgx-logo.png';
          return `<span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-family:var(--ox-mono);font-size:0.7rem;">OX</span><img src="${localUrl}" alt="OrgX System" loading="eager" decoding="sync" draggable="false" onerror="if(!this.dataset.retried){this.dataset.retried='1';this.src='${remoteUrl}';return;}this.style.display='none'; if (this.previousElementSibling) this.previousElementSibling.style.display='flex';" />`;
        }
        const url = getAvatarUrl(name);
        const fallback = escapeHtml(name ? name[0].toUpperCase() : '?');
        if (url) return `<span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-family:var(--ox-mono);font-size:0.7rem;">${fallback}</span><img src="${url}" alt="${escapeHtml(name)}" loading="eager" decoding="sync" draggable="false" onerror="this.style.display='none'; if (this.previousElementSibling) this.previousElementSibling.style.display='flex';" />`;
        return fallback;
      };

    var formatUsd = v => Number.isFinite(Number(v)) ? '$'+Number(v).toFixed(2) : null;
    var timeAgo = d => { const m = Math.floor((new Date() - new Date(d))/60000); return m<1?'Just now':m<60?m+'m ago':Math.floor(m/60)+'h ago'; };

    window.toggleRejectComposer = (id) => {
      if (pendingDecisionId) return;
      rejectComposerId = rejectComposerId === id ? null : id;
      render();
    };

    window.syncRejectDraft = (id, textarea) => {
      rejectDrafts[id] = textarea.value;
      const submitButton = textarea.closest('.reject-composer')?.querySelector('.reject-submit');
      if (submitButton) submitButton.disabled = !textarea.value.trim();
    };

    window.approveDecision = async (id, btn) => {
      if (btn.disabled || pendingDecisionId) return;
      const card = btn.closest('.decision-card');
      const decision = getDecisionById(id);
      pendingDecisionId = id;
      setPageButtonsDisabled(true);
      setCardControlsDisabled(card, true);
      if (ux) ux.setLoading(btn, { loadingLabel: 'Approving…' });

      try {
        await callTool('approve_decision', { decision_id: id });
        lastResolution = {
          action: 'approved',
          summary: decision && decision.summary ? decision.summary : 'This decision',
          agent_name: decision && decision.agent_name ? decision.agent_name : 'the assigned agent'
        };
        notify('success', 'Decision approved', 'Recorded and sent to ' + lastResolution.agent_name + ' so execution can continue.');
        if (card) card.classList.add('is-resolving');
        window.setTimeout(() => {
          removeDecisionFromState(id);
          if (rejectComposerId === id) rejectComposerId = null;
          delete rejectDrafts[id];
          pendingDecisionId = null;
          render();
        }, 180);
      } catch (error) {
        pendingDecisionId = null;
        setPageButtonsDisabled(false);
        setCardControlsDisabled(card, false);
        if (ux) ux.clearLoading(btn);
        notify('error', 'Approval failed', error?.message || 'Try again in a moment.');
      }
    };

    window.submitReject = async (id, btn) => {
      const reason = (rejectDrafts[id] || '').trim();
      if (!reason || pendingDecisionId) return;
      const card = btn.closest('.decision-card');
      const decision = getDecisionById(id);
      pendingDecisionId = id;
      setPageButtonsDisabled(true);
      setCardControlsDisabled(card, true);
      if (ux) ux.setLoading(btn, { loadingLabel: 'Sending note…' });

      try {
        await callTool('reject_decision', { decision_id: id, reason });
        lastResolution = {
          action: 'rejected',
          summary: decision && decision.summary ? decision.summary : 'This decision',
          agent_name: decision && decision.agent_name ? decision.agent_name : 'the assigned agent',
          note: reason
        };
        notify(
          'success',
          'Decision rejected',
          'Guidance sent to ' + lastResolution.agent_name + ' so the next pass can address the issue directly.'
        );
        if (card) card.classList.add('is-resolving');
        window.setTimeout(() => {
          removeDecisionFromState(id);
          if (rejectComposerId === id) rejectComposerId = null;
          delete rejectDrafts[id];
          pendingDecisionId = null;
          render();
        }, 180);
      } catch (error) {
        pendingDecisionId = null;
        setPageButtonsDisabled(false);
        setCardControlsDisabled(card, false);
        if (ux) ux.clearLoading(btn);
        notify('error', 'Rejection failed', error?.message || 'Try again in a moment.');
      }
    };

    window.changePage = (delta) => {
      const totalPages = Math.max(1, Math.ceil((data?.decisions?.length || 0) / itemsPerPage));
      const nextPage = Math.min(totalPages, Math.max(1, currentPage + delta));
      if (nextPage === currentPage) return;
      pageDirection = delta > 0 ? 'forward' : 'backward';
      currentPage = nextPage;
      render();
    };

    var render = () => {
      if(isLoading) return;
      data = normalizeDecisionQueue(data);
      var queueSubtitle = document.getElementById('queueSubtitle');
      var decisionsUrl = buildDecisionsUrl();
      var agentStatusUrl = buildAgentStatusUrl();
      if(!data || !data.decisions || data.decisions.length === 0) {
        var resolvedHtml = lastResolution
          ? `<div class="empty-title">${lastResolution.action === 'approved' ? 'Decision approved' : 'Decision sent back'}</div><div class="empty-desc">${escapeHtml(lastResolution.summary)} ${lastResolution.action === 'approved' ? 'is now unblocked and ' + lastResolution.agent_name + ' can keep moving.' : 'was returned to ' + lastResolution.agent_name + ' with your note so the next revision addresses the right constraint.'}</div><div class="resolution-actions"><a href="${decisionsUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(decisionsUrl)}, event)' class="resolution-link">${icons.link(14)} View all decisions in OrgX</a><a href="${agentStatusUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(agentStatusUrl)}, event)' class="resolution-link resolution-link--secondary">${icons.agent(14)} Open agent status</a></div>`
          : `<div class="empty-title">All caught up</div><div class="empty-desc">No decisions require your attention right now. New approvals will appear here as soon as work needs operator input.</div><div class="resolution-actions"><a href="${decisionsUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(decisionsUrl)}, event)' class="resolution-link">${icons.link(14)} View all decisions in OrgX</a></div>`;
        injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.check(24)}</div>${resolvedHtml}</div>`);
        document.getElementById('summary').innerHTML='';
        if (queueSubtitle) {
          queueSubtitle.textContent = lastResolution
            ? 'The queue is clear. You can monitor follow-through in Agent Status.'
            : 'No operator approvals are waiting right now.';
        }
        return;
      }

      if (queueSubtitle) {
        var pendingCount = data.decisions.length;
        queueSubtitle.textContent = pendingCount + ' pending decision' + (pendingCount === 1 ? '' : 's') + ' need operator input. Approve to unblock execution, or reject with clear guidance so the next attempt stays on-rail.';
      }

      const totalPages = Math.ceil(data.decisions.length / itemsPerPage);
      const startIdx = (currentPage - 1) * itemsPerPage;
      const paginated = data.decisions.slice(startIdx, startIdx + itemsPerPage);

      const activeDirection = pageDirection;
      pageDirection = 'forward';

      let html = paginated.map((d, i) => {
        const isRejecting = rejectComposerId === d.id;
        const rejectValue = rejectDrafts[d.id] || '';
        const rejectEnabled = rejectValue.trim().length > 0;
        const rejectActionLabel = isRejecting ? 'Hide note' : 'Reject';
        const approveTitle = isOgDecisionEmbed ? 'Approve' : 'Approve decision';
        const approveDetail = isOgDecisionEmbed ? 'Continue path.' : 'Continue this path.';
        const rejectTitle = isOgDecisionEmbed
          ? (rejectActionLabel === 'Hide note' ? 'Hide note' : 'Request revision')
          : (rejectActionLabel === 'Hide note' ? 'Hide feedback panel' : 'Request revision');
        const rejectDetail = isOgDecisionEmbed
          ? (isRejecting ? 'Back to actions.' : 'Send guidance.')
          : (isRejecting ? 'Return to actions.' : 'Send revision guidance.');
        const decisionUrl = buildDecisionSurfaceUrl(d);
        const owner = getDecisionOwner(d);
        return `
        <div class="decision-card urgency-${escapeHtml(d.urgency)} animate-in" style="animation-delay: ${0.1 * i}s">
          <div class="ox-card">
            <div class="ox-card-inner">
              <div class="decision-header">
                <div class="decision-header-copy">
                  <div class="agent-tag">
                    <div class="agent-avatar ${owner.isSystem ? 'agent-avatar--system' : ''}">${renderAvatar(owner.label, 24, owner.isSystem)}</div>
                    <span>${escapeHtml(owner.label)}</span>
                  </div>
                  <h3 class="ox-title" style="margin-bottom:0;">
                    <a href="${escapeHtml(decisionUrl)}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(decisionUrl || ''))}, event)' class="decision-title-link">
                      ${escapeHtml(d.summary)}
                    </a>
                  </h3>
                </div>
                <div class="decision-header-meta">
                  <div class="ox-eyebrow" style="color: var(--ox-card-color); display:flex; align-items:center; gap:6px;">
                    <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;"></span>
                    ${escapeHtml(d.urgency)}
                  </div>
                  <a href="${escapeHtml(decisionUrl)}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(decisionUrl || ''))}, event)' class="decision-open-link">
                    ${icons.link(14)}
                    <span>Open in OrgX</span>
                  </a>
                </div>
              </div>

              ${isOgDecisionEmbed ? '' : `<div class="ox-text" style="margin-bottom: 4px;">${escapeHtml(d.urgency === 'critical' ? 'Needs a fast operator call to keep critical-path work moving.' : d.urgency === 'high' ? 'High-signal operator decision with downstream execution impact.' : 'Review and confirm the preferred execution path.')}</div>`}
              
              ${!isOgDecisionEmbed && (d.context || d.recommendation || d.impact) ? `
              <div style="margin: 20px 0; display: flex; flex-direction: column; gap: 16px; border-left: 2px solid rgba(var(--ox-card-color-rgb), 0.4); padding-left: 14px;">
                ${d.context ? `<div><div class="ox-eyebrow" style="margin-bottom:4px;">Why it matters</div><div class="ox-text" style="color:var(--ox-text);">${escapeHtml(d.context)}</div></div>` : ''}
                ${d.recommendation ? `<div><div class="ox-eyebrow" style="margin-bottom:4px; color:var(--ox-teal);">Recommendation</div><div class="ox-text" style="color:var(--ox-text); font-weight:500;">${escapeHtml(d.recommendation)}</div></div>` : ''}
                ${d.impact ? `<div><div class="ox-eyebrow" style="margin-bottom:4px; color:var(--ox-warning);">Impact if ignored</div><div class="ox-text">${escapeHtml(d.impact)}</div></div>` : ''}
              </div>
              ` : ''}

              ${!isOgDecisionEmbed && d.tradeoffs && d.tradeoffs.length > 0 ? `
              <div style="margin-bottom: 20px;">
                <div class="ox-eyebrow" style="margin-bottom: 8px;">Tradeoffs</div>
                <div style="display:flex; flex-direction:column; gap:8px;">
                  ${d.tradeoffs.map(t => `
                    <div style="background:var(--ox-well-bg); padding:10px 12px; border-radius:8px; border:1px solid var(--ox-border); font-size:0.85rem;">
                      <strong style="color:var(--ox-text); display:block; margin-bottom:2px;">${escapeHtml(t.option)}</strong>
                      <span style="color:var(--ox-text-muted);">${escapeHtml(t.detail)}</span>
                    </div>
                  `).join('')}
                </div>
              </div>
              ` : ''}

              ${isOgDecisionEmbed ? '' : `<div class="params-well">
                <div class="param-chip">Type <strong>${escapeHtml(d.type)}</strong></div>
                <div class="param-chip">Age <strong>${timeAgo(d.created_at)}</strong></div>
                ${d.expected_cost_usd !== undefined ? `<div class="param-chip">Cost <strong>${formatUsd(d.expected_cost_usd)}</strong></div>` : ''}
                ${d.required_trust_level ? `<div class="param-chip">Rule <strong>${escapeHtml(d.required_trust_level)}</strong></div>` : ''}
              </div>`}

              <div class="actions-grid">
                <button
                  type="button"
                  class="ox-btn ox-action-btn ox-action-btn--primary ox-btn-primary is-card-tone decision-action-btn"
                  style="--ox-button-accent-rgb: var(--ox-card-color-rgb); --ox-primary-contrast: ${d.urgency === 'high' || d.urgency === 'critical' ? '#fff' : '#02040a'};"
                  data-loading-label="Approving…"
                  onclick="approveDecision('${escapeHtml(d.id)}', this)"
                >
                  <span class="decision-action-copy">
                    <span class="decision-action-icon">${icons.check(18)}</span>
                    <span class="decision-action-text">
                      <span class="decision-action-title">${approveTitle}</span>
                      <span class="decision-action-detail">${approveDetail}</span>
                    </span>
                  </span>
                </button>
                <button
                  type="button"
                  class="ox-btn ox-action-btn ox-action-btn--ghost ox-btn-ghost decision-action-btn"
                  onclick="toggleRejectComposer('${escapeHtml(d.id)}')"
                  aria-expanded="${isRejecting ? 'true' : 'false'}"
                >
                  <span class="decision-action-copy">
                    <span class="decision-action-icon">${isRejecting ? icons.check(18) : icons.error(18)}</span>
                    <span class="decision-action-text">
                      <span class="decision-action-title">${rejectTitle}</span>
                      <span class="decision-action-detail">${rejectDetail}</span>
                    </span>
                  </span>
                </button>
              </div>

              ${isRejecting ? `
                <div class="reject-composer">
                  <div class="reject-heading">
                    <h4>Send a rejection note</h4>
                    <span class="reject-meta">Visible to ${escapeHtml(owner.label)}</span>
                  </div>
                  <textarea
                    class="reject-textarea"
                    placeholder="Tell the agent what changed, what constraint was missed, or what decision path you want instead."
                    oninput="syncRejectDraft('${escapeHtml(d.id)}', this)"
                  >${escapeHtml(rejectValue)}</textarea>
                  <div class="reject-toolbar">
                    <div class="reject-toolbar-copy"><strong>Required.</strong> A clear reason prevents back-and-forth and keeps the next attempt on-rail.</div>
                    <button
                      type="button"
                      class="ox-action-btn ox-action-btn--danger reject-submit"
                      data-loading-label="Sending note…"
                      onclick="submitReject('${escapeHtml(d.id)}', this)"
                      ${rejectEnabled ? '' : 'disabled'}
                    >
                      Reject decision
                    </button>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
      }).join('');

      if (lastResolution) {
        const remainingCount = data.decisions.length;
        const actionVerb = lastResolution.action === 'approved' ? 'approved' : 'sent back';
        const followThrough =
          lastResolution.action === 'approved'
            ? `${escapeHtml(lastResolution.agent_name)} can keep moving on the next step without waiting on another manual handoff.`
            : `${escapeHtml(lastResolution.agent_name)} now has your note and can revise against a concrete instruction instead of guessing.`;
        html = `
          <div class="resolution-banner animate-in">
            <div class="resolution-banner-copy">
              <div class="resolution-banner-title">${escapeHtml(lastResolution.summary)} ${actionVerb}.</div>
              <div class="resolution-banner-detail">${followThrough}</div>
            </div>
            <div class="resolution-banner-meta">${remainingCount} decision${remainingCount === 1 ? '' : 's'} remaining</div>
            <div class="resolution-banner-actions">
              <a href="${decisionsUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(decisionsUrl)}, event)' class="resolution-link">${icons.link(14)} View all decisions in OrgX</a>
            </div>
          </div>
        ` + html;
      }

      if (totalPages > 1) {
        const start = startIdx + 1;
        const end = Math.min(startIdx + paginated.length, data.decisions.length);
        const progress = Math.max(14, Math.round((currentPage / totalPages) * 100));
        html += `
          <div class="pagination">
            <div class="page-info">
              <div class="page-kicker">
                <span class="page-label">Decision queue</span>
                <span class="page-count">${currentPage}<span>/</span>${totalPages}</span>
              </div>
              <div class="page-summary">
                <span class="page-range">Showing ${start}-${end}</span>
                <span class="page-total">${data.decisions.length} decisions total</span>
              </div>
              <div class="page-progress" aria-hidden="true">
                <span class="page-progress-bar" style="width:${progress}%"></span>
              </div>
            </div>
            <div class="page-controls">
              <button type="button" class="page-btn page-btn--prev ox-action-btn ox-action-btn--ghost" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}><span class="ox-action-btn__label">Previous</span></button>
              <button type="button" class="page-btn page-btn--next ox-action-btn ox-action-btn--ghost" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}><span class="ox-action-btn__label">Next</span></button>
            </div>
          </div>
        `;
      }

      injectHtml(`<div class="decision-shell animate-in" data-page-direction="${activeDirection}">${html}</div>`);
    };


    if(isDemo) applyBootPayload();
    else initWidget({ render: d => { applyBootPayload(function(){ if(d) data = d; }); } });
  </script>
</body>
</html>
