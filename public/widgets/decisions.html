<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pending Decisions - OrgX</title>
    <style>
      :root {
        /* ChatGPT SDK fallback (light mode) */
        --app-color-bg: #ffffff;
        --app-color-surface: #ffffff;
        --app-color-surface-elevated: #f7f7f8;
        --app-color-text: #0d0d0d;
        --app-color-text-secondary: #6e6e80;
        --app-color-border: #e5e5e5;
        --app-color-primary: #10a37f;
        --app-color-success: #10a37f;
        --app-color-success-hover: #0d8a6a;
        --app-color-danger: #ef4444;
        --app-color-danger-bg: #fef2f2;
        --app-color-danger-text: #991b1b;
        --app-color-warning-bg: #fef3c7;
        --app-color-warning-text: #92400e;
        --app-color-success-bg: #d1fae5;
        --app-color-success-text: #065f46;
        --app-color-neutral-bg: #f7f7f8;
        --app-radius-md: 8px;
        --app-radius-full: 9999px;
        --app-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);

        /* OrgX brand colors (RGB triplets for rgba() use) */
        --ox-lime: 191, 255, 0;
        --ox-teal: 20, 184, 166;
        --ox-iris: 99, 102, 241;
        --ox-cyan: 10, 212, 196;

        /* OrgX semantic status */
        --ox-success: #25da8e;   --ox-success-bg: rgba(37,218,142,0.12);  --ox-success-border: rgba(37,218,142,0.3);
        --ox-warning: #f9c770;   --ox-warning-bg: rgba(249,199,112,0.12); --ox-warning-border: rgba(249,199,112,0.3);
        --ox-danger: #ff7688;    --ox-danger-bg: rgba(255,118,136,0.12);  --ox-danger-border: rgba(255,118,136,0.3);
        --ox-info: #60bdff;      --ox-info-bg: rgba(96,189,255,0.12);     --ox-info-border: rgba(96,189,255,0.3);

        /* Typography */
        --ox-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --ox-mono: ui-monospace, SFMono-Regular, 'SF Mono', monospace;
        --ox-tracking-tight: -0.01em;
        --ox-tracking-heading: -0.02em;
        --ox-tracking-eyebrow: 0.08em;

        /* Radii */
        --ox-radius-sm: 6px;  --ox-radius-md: 10px;  --ox-radius-lg: 14px;

        /* Motion */
        --ox-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --ox-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ox-duration: 220ms;
        --ox-stagger: 60ms;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --app-color-bg: #02040a;
          --app-color-surface: rgba(255,255,255,0.02);
          --app-color-surface-elevated: rgba(255,255,255,0.04);
          --app-color-text: #f2f7ff;
          --app-color-text-secondary: #b4bed2;
          --app-color-border: rgba(255,255,255,0.06);
          --app-color-primary: rgba(var(--ox-teal), 1);
          --app-color-success: rgba(var(--ox-teal), 1);
          --app-color-success-hover: rgba(var(--ox-teal), 0.85);
          --app-color-danger-bg: var(--ox-danger-bg);
          --app-color-danger-text: var(--ox-danger);
          --app-color-warning-bg: var(--ox-warning-bg);
          --app-color-warning-text: var(--ox-warning);
          --app-color-success-bg: var(--ox-success-bg);
          --app-color-success-text: var(--ox-success);
          --app-color-neutral-bg: rgba(255,255,255,0.04);
          --app-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);

          /* Glass surface system */
          --ox-glass-bg: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
          --ox-glass-border: rgba(255,255,255,0.06);
          --ox-glass-border-hover: rgba(255,255,255,0.1);
          --ox-glass-blur: blur(12px) saturate(140%);

          /* Shadows with inset highlight */
          --ox-shadow-card: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
          --ox-shadow-card-hover: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(var(--ox-teal),0.08);

          /* Glows */
          --ox-glow-teal: 0 0 20px rgba(var(--ox-teal), 0.15);
          --ox-glow-lime: 0 0 20px rgba(var(--ox-lime), 0.12);
        }
      }

      /* Shared animations */
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes breathe { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.85); } }
      @keyframes cardEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

      @media (prefers-color-scheme: dark) {
        .skeleton-line {
          background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(var(--ox-teal),0.06) 40%, rgba(var(--ox-lime),0.04) 50%, rgba(var(--ox-teal),0.06) 60%, rgba(255,255,255,0.03) 100%);
          background-size: 200% 100%;
          animation: shimmer 2.5s infinite ease-in-out;
        }
      }

      /* Staggered list entrance */
      .stagger-item { animation: cardEnter 400ms var(--ox-ease) both; }
      .stagger-item:nth-child(1) { animation-delay: 0ms; }
      .stagger-item:nth-child(2) { animation-delay: 60ms; }
      .stagger-item:nth-child(3) { animation-delay: 120ms; }
      .stagger-item:nth-child(4) { animation-delay: 180ms; }
      .stagger-item:nth-child(5) { animation-delay: 240ms; }

      /* Hover lift */
      .hover-lift { transition: transform var(--ox-duration) var(--ox-ease), box-shadow var(--ox-duration) var(--ox-ease), border-color var(--ox-duration) var(--ox-ease); }
      @media (prefers-color-scheme: dark) {
        .hover-lift:hover { transform: translateY(-2px); border-color: var(--ox-glass-border-hover); box-shadow: var(--ox-shadow-card-hover); }
      }

      @media (prefers-reduced-motion: reduce) {
        .skeleton-line, .breathe-dot, .stagger-item, .spinner { animation: none; }
        .hover-lift { transition: none; }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ox-font);
        font-size: 1rem;
        line-height: 1.5;
        letter-spacing: var(--ox-tracking-tight);
        background: var(--app-color-bg);
        color: var(--app-color-text);
        padding: 16px;
        min-height: 100%;
        -webkit-font-smoothing: antialiased;
      }

      @media (prefers-color-scheme: dark) {
        body { background: #02040a; }
      }

      .container {
        max-width: 480px;
        margin: 0 auto;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .header h2 {
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: var(--ox-tracking-heading);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 4px 8px;
        border-radius: var(--app-radius-full);
        font-size: 0.75rem;
        font-weight: 500;
      }

      .badge-critical {
        background: var(--app-color-danger-bg);
        color: var(--app-color-danger-text);
      }
      .badge-high {
        background: var(--app-color-warning-bg);
        color: var(--app-color-warning-text);
      }
      .badge-medium {
        background: var(--app-color-success-bg);
        color: var(--app-color-success-text);
      }
      .badge-low {
        background: var(--app-color-neutral-bg);
        color: var(--app-color-text-secondary);
      }

      @media (prefers-color-scheme: dark) {
        .badge-critical {
          background: var(--ox-danger-bg);
          color: var(--ox-danger);
          border: 1px solid var(--ox-danger-border);
        }
        .badge-high {
          background: var(--ox-warning-bg);
          color: var(--ox-warning);
          border: 1px solid var(--ox-warning-border);
        }
        .badge-medium {
          background: rgba(var(--ox-teal), 0.12);
          color: rgba(var(--ox-teal), 1);
          border: 1px solid rgba(var(--ox-teal), 0.3);
        }
        .badge-low {
          background: rgba(255,255,255,0.04);
          color: var(--app-color-text-secondary);
          border: 1px solid rgba(255,255,255,0.06);
        }
      }

      .summary {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      /* EmptyMessage */
      .empty-message {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 32px 16px;
        min-height: 120px;
      }

      .empty-message-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 48px;
        height: 48px;
        border-radius: 9999px;
        background: var(--app-color-success-bg);
        color: var(--app-color-success);
        margin-bottom: 12px;
      }

      @media (prefers-color-scheme: dark) {
        .empty-message-icon {
          background: rgba(var(--ox-teal), 0.08);
          border: 1px solid rgba(var(--ox-teal), 0.15);
          color: rgba(var(--ox-teal), 0.6);
          box-shadow: 0 0 20px rgba(var(--ox-teal), 0.06);
        }
      }

      .empty-message-icon svg {
        width: 24px;
        height: 24px;
      }

      .empty-message-title {
        font-size: 0.9375rem;
        font-weight: 600;
        color: var(--app-color-text);
        margin-bottom: 4px;
      }

      .empty-message-description {
        font-size: 0.875rem;
        color: var(--app-color-text-secondary);
        line-height: 1.5;
        max-width: 280px;
      }

      .decision-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .decision-card {
        background: var(--app-color-surface);
        border-radius: var(--ox-radius-md);
        padding: 12px 16px;
        box-shadow: var(--app-shadow-sm);
        border-left: 4px solid var(--app-color-border);
      }

      @media (prefers-color-scheme: dark) {
        .decision-card {
          background: var(--ox-glass-bg);
          backdrop-filter: var(--ox-glass-blur);
          -webkit-backdrop-filter: var(--ox-glass-blur);
          border: 1px solid var(--ox-glass-border);
          box-shadow: var(--ox-shadow-card);
        }
      }

      .decision-card.urgency-critical {
        border-left-color: var(--ox-danger);
      }
      .decision-card.urgency-high {
        border-left-color: var(--ox-warning);
      }
      .decision-card.urgency-medium {
        border-left-color: rgba(var(--ox-teal), 1);
      }
      .decision-card.urgency-low {
        border-left-color: var(--app-color-border);
      }

      @media (prefers-color-scheme: dark) {
        .decision-card.urgency-critical {
          border-left: 4px solid var(--ox-danger);
        }
        .decision-card.urgency-high {
          border-left: 4px solid var(--ox-warning);
        }
        .decision-card.urgency-medium {
          border-left: 4px solid rgba(var(--ox-teal), 1);
        }
        .decision-card.urgency-low {
          border-left: 4px solid rgba(255,255,255,0.06);
        }
      }

      .decision-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .agent-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: var(--app-color-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.625rem;
        font-weight: 600;
        color: white;
        flex-shrink: 0;
      }

      @media (prefers-color-scheme: dark) {
        .agent-avatar {
          background: linear-gradient(135deg, rgba(var(--ox-teal), 1), rgba(var(--ox-iris), 1));
          box-shadow: 0 0 10px rgba(var(--ox-teal), 0.2);
        }
      }

      .agent-name {
        font-weight: 600;
        font-size: 0.875rem;
      }

      /* Eyebrow decision type */
      .decision-type {
        margin-left: auto;
        font-size: 0.6875rem;
        font-weight: 600;
        color: var(--app-color-text-secondary);
        text-transform: uppercase;
        letter-spacing: var(--ox-tracking-eyebrow);
      }

      .decision-summary {
        font-size: 0.875rem;
        line-height: 1.5;
        margin-bottom: 8px;
      }

      .decision-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: var(--app-color-text-secondary);
        margin-bottom: 12px;
      }

      .flywheel-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .flywheel-chip {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.6875rem;
        border: 1px solid var(--app-color-border);
        color: var(--app-color-text-secondary);
        background: var(--app-color-surface-elevated);
        font-family: var(--ox-mono);
      }

      .actions {
        display: flex;
        gap: 8px;
      }

      button {
        flex: 1;
        padding: 8px 12px;
        border-radius: var(--ox-radius-md);
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--ox-duration) var(--ox-ease);
        border: none;
        font-family: var(--ox-font);
      }

      button:focus-visible {
        outline: 2px solid var(--app-color-primary);
        outline-offset: 2px;
      }

      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-approve {
        background: rgba(var(--ox-teal), 1);
        color: #02040a;
      }

      .btn-approve:hover:not(:disabled) {
        background: rgba(var(--ox-teal), 0.85);
      }

      @media (prefers-color-scheme: dark) {
        .btn-approve {
          box-shadow: 0 0 16px rgba(var(--ox-teal), 0.15);
        }
        .btn-approve:hover:not(:disabled) {
          box-shadow: 0 0 24px rgba(var(--ox-teal), 0.25);
        }
      }

      .btn-reject {
        background: transparent;
        color: var(--app-color-text);
        border: 1px solid var(--app-color-border);
      }

      .btn-reject:hover:not(:disabled) {
        background: var(--app-color-surface-elevated);
      }

      @media (prefers-color-scheme: dark) {
        .btn-reject {
          background: transparent;
          border: 1px solid var(--ox-glass-border);
          color: var(--app-color-text);
        }
        .btn-reject:hover:not(:disabled) {
          background: rgba(255,255,255,0.04);
          border-color: var(--ox-glass-border-hover);
        }
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        padding: 12px;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid var(--app-color-border);
        border-top-color: var(--app-color-primary);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes toastSlideIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes toastSlideOut {
        from {
          opacity: 1;
          transform: translateY(0);
        }
        to {
          opacity: 0;
          transform: translateY(20px);
        }
      }

      /* Skeleton Loading */
      .skeleton-card {
        background: var(--app-color-surface);
        border-radius: var(--ox-radius-md);
        padding: 12px 16px;
        box-shadow: var(--app-shadow-sm);
        border-left: 4px solid var(--app-color-border);
      }

      .skeleton-line {
        background: linear-gradient(
          90deg,
          var(--app-color-surface-elevated) 0%,
          var(--app-color-bg) 50%,
          var(--app-color-surface-elevated) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 2.5s infinite ease-in-out;
        border-radius: 4px;
      }

      .skeleton-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
      }

      .skeleton-text {
        height: 14px;
      }
      .skeleton-text-sm {
        height: 12px;
      }
      .skeleton-button {
        height: 36px;
        border-radius: var(--ox-radius-md);
      }

      /* Toast Container */
      #toast-container {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
        max-width: calc(100% - 32px);
      }

      .toast {
        padding: 10px 16px;
        border-radius: var(--ox-radius-md);
        font-size: 0.875rem;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 8px;
        pointer-events: auto;
        animation: toastSlideIn 0.2s ease-out;
        max-width: 320px;
      }

      .toast-success {
        background: var(--app-color-success-bg);
        color: var(--app-color-success-text);
      }
      .toast-error {
        background: var(--app-color-danger-bg);
        color: var(--app-color-danger-text);
      }

      @media (prefers-color-scheme: dark) {
        .toast {
          background: var(--ox-glass-bg);
          backdrop-filter: var(--ox-glass-blur);
          -webkit-backdrop-filter: var(--ox-glass-blur);
          box-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }
        .toast-success {
          background: rgba(37,218,142,0.1);
          color: var(--ox-success);
          border: 1px solid var(--ox-success-border);
        }
        .toast-error {
          background: rgba(255,118,136,0.1);
          color: var(--ox-danger);
          border: 1px solid var(--ox-danger-border);
        }
      }

      /* Accessibility */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h2>Pending Decisions</h2>
      </div>
      <div class="summary" id="summary"></div>
      <div id="content"></div>
      <div id="toast-container" role="region" aria-label="Notifications"></div>
    </div>

    <script>
      // ── Inline MCP Apps Bridge ──
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      // ── Size reporting (MCP Apps spec) ──
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      var _mcpPending = {};
      var _mcpNextId = 100;
      function initWidget(opts){
        var render=opts.render,getData=opts.getData||_extractData;
        var protocol=_detectProtocol();
        if(protocol==='chatgpt'){
          var d=getData(window.openai&&window.openai.toolOutput);render(d);
          window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});
        }else if(protocol==='mcp-apps'){
          render(null);
          var initId=1;
          window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'OrgX Widget',version:'1.0.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');
          window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');
          window.addEventListener('message',function(event){
            var msg=event.data;if(!msg||typeof msg!=='object')return;
            if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}
            // Handle tool call responses
            if(msg.id!=null&&_mcpPending[msg.id]){var p=_mcpPending[msg.id];delete _mcpPending[msg.id];if(msg.error)p.reject(new Error(msg.error.message||'Tool call failed'));else p.resolve(msg.result);return;}
            if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}
          });
        }else{render(null);}
      }
      function callTool(name, args){
        var protocol=_detectProtocol();
        if(protocol==='chatgpt')return window.openai&&window.openai.callTool?window.openai.callTool(name,args):Promise.resolve(null);
        if(protocol==='mcp-apps'){
          return new Promise(function(resolve,reject){
            var id=_mcpNextId++;
            _mcpPending[id]={resolve:resolve,reject:reject};
            window.parent.postMessage({jsonrpc:'2.0',id:id,method:'tools/call',params:{name:name,arguments:args}},'*');
            setTimeout(function(){if(_mcpPending[id]){delete _mcpPending[id];reject(new Error('Tool call '+name+' timed out'));}},30000);
          });
        }
        return Promise.resolve(null);
      }

      var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="currentColor" class="icon" aria-hidden="true">'+c+'</svg>';};
      var icons = {
        check: function(s){return _svg('<path fillRule="evenodd" d="M18.063 5.674a1 1 0 0 1 .263 1.39l-7.5 11a1 1 0 0 1-1.533.143l-4.5-4.5a1 1 0 1 1 1.414-1.414l3.647 3.647 6.82-10.003a1 1 0 0 1 1.39-.263Z" clipRule="evenodd"/>',s);},
        warning: function(s){return _svg('<path d="M10.42 2.006a4 4 0 0 1 3.159 0c.674.29 1.188.822 1.667 1.456.474.627 1 1.473 1.653 2.523l3.542 5.696c.72 1.16 1.3 2.09 1.682 2.854.384.766.654 1.517.59 2.292a4 4 0 0 1-1.604 2.886c-.625.463-1.405.63-2.258.709-.85.078-1.945.078-3.311.078H8.46c-1.366 0-2.46 0-3.31-.078-.854-.078-1.634-.246-2.26-.71a4 4 0 0 1-1.603-2.885c-.064-.775.206-1.526.59-2.292.383-.764.961-1.694 1.682-2.854l3.542-5.696c.653-1.05 1.18-1.896 1.653-2.523.48-.634.993-1.166 1.667-1.456Z"/><path d="M12 7.5a1 1 0 0 1 1 1v3a1 1 0 1 1-2 0v-3a1 1 0 0 1 1-1M10.851 15a1.15 1.15 0 1 1 2.3 0 1.15 1.15 0 0 1-2.3 0"/>',s);},
        error: function(s){return _svg('<path d="M14 19C14 20.105 13.105 21 12 21C10.895 21 10 20.105 10 19C10 17.895 10.895 17 12 17C13.105 17 14 17.895 14 19Z"/><path d="M13.164 14.014L14.507 5.959C14.765 4.41 13.57 3 12 3C10.43 3 9.235 4.41 9.493 5.959L10.836 14.014C10.931 14.583 11.423 15 12 15C12.577 15 13.07 14.583 13.164 14.014Z"/>',s);},
        clock: function(s){return _svg('<path d="M12 4C7.582 4 4 7.582 4 12C4 16.418 7.582 20 12 20C16.418 20 20 16.418 20 12C20 7.582 16.418 4 12 4ZM2 12C2 6.477 6.477 2 12 2C17.523 2 22 6.477 22 12C22 17.523 17.523 22 12 22C6.477 22 2 17.523 2 12ZM12 6C12.552 6 13 6.448 13 7V12C13 12.265 12.895 12.52 12.707 12.707L10.207 15.207C9.817 15.598 9.183 15.598 8.793 15.207C8.402 14.817 8.402 14.183 8.793 13.793L11 11.586V7C11 6.448 11.448 6 12 6Z"/>',s);},
        trash: function(s){return _svg('<path fillRule="evenodd" clipRule="evenodd" d="M10.556 4C10.099 4 9.701 4.309 9.587 4.751L9.294 5.892H14.715L14.422 4.751C14.308 4.309 13.91 4 13.453 4H10.556ZM16.78 5.892L16.359 4.253C16.018 2.927 14.823 2 13.453 2H10.556C9.186 2 7.991 2.927 7.65 4.253L7.229 5.892H4C3.448 5.892 3 6.34 3 6.892C3 7.444 3.448 7.892 4 7.892H4.101L5.315 19.317C5.478 20.843 6.765 22 8.299 22H15.701C17.235 22 18.522 20.843 18.685 19.317L19.899 7.892H20C20.552 7.892 21 7.444 21 6.892C21 6.34 20.552 5.892 20 5.892H16.78ZM17.888 7.892H6.112L7.304 19.106C7.358 19.614 7.787 20 8.299 20H15.701C16.213 20 16.642 19.614 16.696 19.106L17.888 7.892ZM10 10C10.552 10 11 10.448 11 11V16C11 16.552 10.552 17 10 17C9.448 17 9 16.552 9 16V11C9 10.448 9.448 10 10 10ZM14 10C14.552 10 15 10.448 15 11V16C15 16.552 14.552 17 14 17C13.448 17 13 16.552 13 16V11C13 10.448 13.448 10 14 10Z"/>',s);},
        agent: function(s){return _svg('<path d="M11 7.5C11 8.328 10.328 9 9.5 9C8.672 9 8 8.328 8 7.5C8 6.672 8.672 6 9.5 6C10.328 6 11 6.672 11 7.5Z"/><path d="M14.5 9C15.328 9 16 8.328 16 7.5C16 6.672 15.328 6 14.5 6C13.672 6 13 6.672 13 7.5C13 8.328 13.672 9 14.5 9Z"/><path d="M12 1C12.552 1 13 1.448 13 2V2.5H15.871C16.383 2.5 16.825 2.5 17.19 2.529C17.574 2.559 17.957 2.627 18.327 2.809C18.919 3.101 19.399 3.581 19.691 4.173C19.873 4.543 19.941 4.926 19.971 5.31C20 5.675 20 6.117 20 6.629V6.708C20 7.762 20 8.611 19.945 9.3C19.889 10.009 19.77 10.632 19.484 11.211C18.998 12.199 18.199 12.998 17.211 13.484C16.632 13.77 16.009 13.889 15.3 13.945C14.611 14 13.762 14 12.708 14H11.292C10.238 14 9.389 14 8.7 13.945C7.991 13.889 7.368 13.77 6.789 13.484C5.801 12.998 5.002 12.199 4.516 11.211C4.23 10.632 4.111 10.009 4.055 9.3C4 8.611 4 7.762 4 6.708V6.629C4 6.117 4 5.675 4.029 5.31C4.059 4.926 4.127 4.543 4.309 4.173C4.601 3.581 5.081 3.101 5.673 2.809C6.043 2.627 6.426 2.559 6.81 2.529C7.175 2.5 7.617 2.5 8.129 2.5H11V2C11 1.448 11.448 1 12 1Z"/><path d="M6 21C6 20.026 6.551 19.05 7.632 18.278C8.71 17.508 10.252 17 12 17C13.749 17 15.29 17.508 16.369 18.278C17.449 19.05 18 20.026 18 21C18 21.552 18.448 22 19 22C19.552 22 20 21.552 20 21C20 19.213 18.984 17.689 17.531 16.651C16.076 15.612 14.117 15 12 15C9.883 15 7.924 15.612 6.469 16.651C5.016 17.689 4 19.213 4 21C4 21.552 4.448 22 5 22C5.552 22 6 21.552 6 21Z"/>',s);},
        dot: function(s){return _svg('<circle cx="12" cy="12" r="4"/>',s);}
      };

      var contentEl = document.getElementById('content');
      var summaryEl = document.getElementById('summary');
      var toastContainer = document.getElementById('toast-container');

      // Demo Mode
      var isDemo =
        new URLSearchParams(window.location.search).get('demo') === 'true';
      var demoData = {
        decisions: [
          {
            id: 'dec-001',
            agent_name: 'Pace',
            type: 'approval',
            summary:
              'Approve the updated API authentication flow that uses JWT tokens with 15-minute expiry instead of session cookies.',
            urgency: 'critical',
            created_at: new Date(Date.now() - 1000 * 60 * 15).toISOString(),
            required_trust_level: 'act_with_approval',
            trust_level: 'draft',
            expected_cost_usd: 0.14,
            expected_value_usd: 2.2,
          },
          {
            id: 'dec-002',
            agent_name: 'Eli',
            type: 'decision',
            summary:
              'Select the recommended database indexing strategy for the user search feature. Options: B-tree vs Hash index.',
            urgency: 'high',
            created_at: new Date(Date.now() - 1000 * 60 * 60 * 2).toISOString(),
          },
          {
            id: 'dec-003',
            agent_name: 'Mark',
            type: 'approval',
            summary:
              'Approve the new onboarding email sequence (5 emails over 14 days) drafted by the marketing team.',
            urgency: 'medium',
            created_at: new Date(
              Date.now() - 1000 * 60 * 60 * 24
            ).toISOString(),
          },
          {
            id: 'dec-004',
            agent_name: 'Orion',
            type: 'decision',
            summary:
              'Choose between Stripe and Paddle for the new subscription billing system integration.',
            urgency: 'low',
            created_at: new Date(
              Date.now() - 1000 * 60 * 60 * 24 * 3
            ).toISOString(),
          },
        ],
        summary: { critical: 1, high: 1, medium: 1, low: 1 },
      };

      // Demo toggle
      window.toggleDemo = () => {
        const url = new URL(window.location.href);
        if (isDemo) url.searchParams.delete('demo');
        else url.searchParams.set('demo', 'true');
        window.location.href = url.toString();
      };

      // Add demo toggle button
      document.body.insertAdjacentHTML(
        'beforeend',
        `
      <button onclick="toggleDemo()" style="position:fixed;top:8px;right:8px;padding:6px 12px;font-size:0.75rem;font-weight:500;border-radius:9999px;border:1px solid ${
        isDemo ? '#10a37f' : 'var(--app-color-border)'
      };background:${isDemo ? '#d1fae5' : 'var(--app-color-surface)'};color:${
          isDemo ? '#065f46' : 'var(--app-color-text-secondary)'
        };cursor:pointer;z-index:9999;font-family:inherit;display:flex;align-items:center;gap:4px;">
        ${isDemo ? icons.check(12) + ' Demo Mode' : 'Demo Mode'}
      </button>
    `
      );

      // State — initWidget handles data from any host protocol
      var decisions = isDemo ? demoData.decisions : null;
      var summary = isDemo ? demoData.summary : {};
      var isLoading = !isDemo;

      // XSS prevention utility
      var escapeHtml = (str) => {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      };

      var getInitials = (name) => {
        if (!name) return '?';
        return name
          .split(' ')
          .map((w) => w[0])
          .join('')
          .slice(0, 2)
          .toUpperCase();
      };

      var formatDate = (dateStr) => {
        const date = new Date(dateStr);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);

        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays < 7) return `${diffDays}d ago`;
        return date.toLocaleDateString();
      };

      var formatUsd = (value) => {
        const num = Number(value);
        if (!Number.isFinite(num)) return null;
        return '$' + num.toFixed(2);
      };

      var renderFlywheelMeta = (decision) => {
        const chips = [];
        if (decision.required_trust_level) {
          chips.push(
            `<span class="flywheel-chip">Needs ${escapeHtml(decision.required_trust_level)}</span>`
          );
        }
        if (decision.trust_level) {
          chips.push(
            `<span class="flywheel-chip">Current ${escapeHtml(decision.trust_level)}</span>`
          );
        }
        const expectedCost = formatUsd(decision.expected_cost_usd);
        if (expectedCost) {
          chips.push(`<span class="flywheel-chip">Cost ${expectedCost}</span>`);
        }
        const expectedValue = formatUsd(decision.expected_value_usd);
        if (expectedValue) {
          chips.push(`<span class="flywheel-chip">Value ${expectedValue}</span>`);
        }
        return chips.length ? `<div class="flywheel-meta">${chips.join('')}</div>` : '';
      };

      // Toast notification system - uses SDK icons
      var showToast = (message, type = 'success', duration = 3000) => {
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.setAttribute('role', 'status');
        toast.setAttribute('aria-live', 'polite');
        const icon = type === 'success' ? icons.check(16) : icons.error(16);
        toast.innerHTML = `
        <span style="display:flex;align-items:center">${icon}</span>
        <span>${escapeHtml(message)}</span>
      `;
        toastContainer.appendChild(toast);

        setTimeout(() => {
          toast.style.animation = 'toastSlideOut 0.2s ease-in forwards';
          setTimeout(() => toast.remove(), 200);
        }, duration);
      };

      // Skeleton loading template
      var renderSkeleton = (count = 3) => {
        return `
        <div class="decision-list">
          ${Array(count)
            .fill(
              `
            <div class="skeleton-card">
              <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 8px;">
                <div class="skeleton-line skeleton-avatar"></div>
                <div class="skeleton-line skeleton-text" style="width: 100px;"></div>
                <div class="skeleton-line skeleton-text-sm" style="width: 60px; margin-left: auto;"></div>
              </div>
              <div class="skeleton-line skeleton-text" style="width: 100%; margin-bottom: 6px;"></div>
              <div class="skeleton-line skeleton-text" style="width: 80%; margin-bottom: 12px;"></div>
              <div style="display: flex; gap: 8px; margin-top: 12px;">
                <div class="skeleton-line skeleton-button" style="flex: 1;"></div>
                <div class="skeleton-line skeleton-button" style="flex: 1;"></div>
              </div>
            </div>
          `
            )
            .join('')}
        </div>
      `;
      };

      var renderSummary = () => {
        if (!summary || Object.keys(summary).length === 0) {
          summaryEl.innerHTML = '';
          return;
        }

        const badges = [];
        if (summary.critical > 0) {
          badges.push(
            `<span class="badge badge-critical">${summary.critical} Critical</span>`
          );
        }
        if (summary.high > 0) {
          badges.push(
            `<span class="badge badge-high">${summary.high} High</span>`
          );
        }
        if (summary.medium > 0) {
          badges.push(
            `<span class="badge badge-medium">${summary.medium} Medium</span>`
          );
        }
        if (summary.low > 0) {
          badges.push(
            `<span class="badge badge-low">${summary.low} Low</span>`
          );
        }
        summaryEl.innerHTML = badges.join('');
      };

      var render = () => {
        renderSummary();

        // Show skeleton while loading
        if (isLoading) {
          contentEl.innerHTML = renderSkeleton(3);
          return;
        }

        if (!decisions || decisions.length === 0) {
          contentEl.innerHTML = `
          <div class="empty-message" role="status">
            <div class="empty-message-icon" aria-hidden="true">
              ${icons.complete(24)}
            </div>
            <div class="empty-message-title">All clear!</div>
            <div class="empty-message-description">No decisions need your attention right now.</div>
          </div>
        `;
          return;
        }

        contentEl.innerHTML = `
        <div class="decision-list">
          ${decisions
            .map(
              (d) => `
            <div class="decision-card stagger-item hover-lift urgency-${escapeHtml(
              d.urgency
            )}" data-id="${escapeHtml(
                d.id
              )}" role="article" aria-label="Decision from ${escapeHtml(
                d.agent_name
              )}">
              <div class="decision-header">
                <div class="agent-avatar" aria-hidden="true">${escapeHtml(
                  getInitials(d.agent_name)
                )}</div>
                <span class="agent-name">${
                  escapeHtml(d.agent_name) || 'Agent'
                }</span>
                <span class="decision-type">${
                  d.type === 'approval' ? 'Approval' : 'Decision'
                }</span>
              </div>
              <p class="decision-summary">${escapeHtml(d.summary)}</p>
              ${renderFlywheelMeta(d)}
              <div class="decision-meta">
                <span class="urgency">${escapeHtml(
                  d.urgency?.charAt(0).toUpperCase() + d.urgency?.slice(1)
                )} priority</span>
                <span aria-hidden="true">•</span>
                <span>${formatDate(d.created_at)}</span>
              </div>
              <div class="actions" role="group" aria-label="Decision actions">
                <button class="btn-approve" onclick="handleApprove('${escapeHtml(
                  d.id
                )}', this)" aria-label="Approve this decision">
                  Approve
                </button>
                <button class="btn-reject" onclick="handleReject('${escapeHtml(
                  d.id
                )}', this)" aria-label="Reject this decision">
                  Reject
                </button>
              </div>
            </div>
          `
            )
            .join('')}
        </div>
      `;
      };

      // Action handlers with toast notifications
      window.handleApprove = async (id, btn) => {
        if (btn.disabled) return;
        const card = btn.closest('.decision-card');
        const buttons = card.querySelectorAll('button');
        buttons.forEach((b) => (b.disabled = true));
        btn.innerHTML = '<div class="spinner" style="margin:0 auto"></div>';

        try {
          await callTool('approve_decision', { decision_id: id });
          showToast('Decision approved', 'success');
          // Remove card with animation
          card.style.transition = 'opacity 0.2s, transform 0.2s';
          card.style.opacity = '0';
          card.style.transform = 'translateX(20px)';
          setTimeout(() => card.remove(), 200);
        } catch (err) {
          console.error('Failed to approve:', err);
          showToast('Failed to approve decision', 'error');
          buttons.forEach((b) => (b.disabled = false));
          btn.textContent = 'Approve';
        }
      };

      window.handleReject = async (id, btn) => {
        if (btn.disabled) return;
        const reason = prompt('Why are you rejecting this decision?');
        if (!reason) return;

        const card = btn.closest('.decision-card');
        const buttons = card.querySelectorAll('button');
        buttons.forEach((b) => (b.disabled = true));
        btn.innerHTML = '<div class="spinner" style="margin:0 auto"></div>';

        try {
          await callTool('reject_decision', { decision_id: id, reason });
          showToast('Decision rejected', 'success');
          // Remove card with animation
          card.style.transition = 'opacity 0.2s, transform 0.2s';
          card.style.opacity = '0';
          card.style.transform = 'translateX(-20px)';
          setTimeout(() => card.remove(), 200);
        } catch (err) {
          console.error('Failed to reject:', err);
          showToast('Failed to reject decision', 'error');
          buttons.forEach((b) => (b.disabled = false));
          btn.textContent = 'Reject';
        }
      };

      // Wire up data reception for all host protocols
      if (isDemo) {
        isLoading = false;
        render();
      } else {
        initWidget({
          render: (d) => {
            if (d) {
              isLoading = false;
              if (d.decisions !== undefined) decisions = d.decisions;
              if (d.summary) summary = d.summary;
            }
            render();
          },
          getData: _extractData,
        });
      }
    </script>
  </body>
</html>
