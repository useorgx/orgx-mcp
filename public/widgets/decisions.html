<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pending Decisions - OrgX</title>
  <link rel="stylesheet" href="shared/interaction-kit.css" />
  <script src="shared/interaction-kit.js"></script>
  <style>
      :root, :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(0, 0, 0, 0.08);
        --ox-border-strong: rgba(0, 0, 0, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-well-bg: #f1f5f9;
        --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
      }
      
      :root {
        --ox-lime: #a3e635; /* Will be overwritten by specific widgets */
        --ox-teal: #0d9488;
        --ox-danger: #e11d48;
        --ox-warning: #d97706;
        --ox-iris: #4f46e5;
        --ox-grid: rgba(0, 0, 0, 0.03);
        --ox-shadow: 0 12px 32px -12px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
        --ox-font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 24px 16px;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      body::before {
        content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% 0%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%),
                    linear-gradient(var(--ox-grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        z-index: -1; pointer-events: none;
      }

      .container { max-width: 540px; margin: 0 auto; position: relative; }

      /* 100x Structural Components */
      .ox-card {
        background: var(--ox-panel);
        border: 1px solid var(--ox-border);
        border-radius: 16px;
        box-shadow: var(--ox-shadow);
        position: relative;
        overflow: hidden;
        margin-bottom: 16px;
      }
      
      .ox-card-inner { padding: 24px; }

      .ox-card::after {
        content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent);
        opacity: 0.8;
      }

      .ox-well {
        background: var(--ox-well-bg);
        border: 1px solid var(--ox-border);
        border-radius: 10px;
        padding: 12px 16px;
        box-shadow: var(--ox-well-shadow);
      }

      .ox-eyebrow {
        font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase;
        letter-spacing: 0.1em; color: var(--ox-text-muted); font-weight: 600;
      }
      
      .ox-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ox-text); line-height: 1.3; }
      .ox-value { font-size: 1.5rem; font-weight: 500; font-family: var(--ox-mono); letter-spacing: -0.03em; color: var(--ox-text); }
      .ox-text { font-size: 0.9rem; line-height: 1.5; color: var(--ox-text-muted); }

      .ox-badge {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 10px; border-radius: 6px; font-family: var(--ox-mono); font-size: 0.65rem;
        text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;
        background: rgba(var(--ox-color-rgb), 0.1); color: var(--ox-color);
        border: 1px solid rgba(var(--ox-color-rgb), 0.2);
      }

      .ox-btn {
        width: 100%;
        font-size: 0.85rem;
        letter-spacing: -0.01em;
      }

      .ox-btn-primary {
        --ox-primary-contrast: #02040a;
      }

      .ox-btn-primary.is-card-tone {
        background: linear-gradient(
          180deg,
          rgba(var(--ox-button-accent-rgb), 1) 0%,
          rgba(var(--ox-button-accent-rgb), 0.86) 100%
        );
        border-color: rgba(var(--ox-button-accent-rgb), 0.28);
        color: var(--ox-primary-contrast);
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.18) inset,
          0 18px 34px -24px rgba(var(--ox-button-accent-rgb), 0.82);
      }

      .ox-btn-ghost {
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.03) 0%,
            rgba(255, 255, 255, 0.01) 100%
          ),
          var(--ox-well-bg);
        color: var(--ox-text);
      }

      .skeleton-line {
        background: linear-gradient(90deg, var(--ox-border) 25%, rgba(var(--ox-primary-rgb),0.1) 50%, var(--ox-border) 75%);
        background-size: 200% 100%; animation: shimmer 2s infinite linear; border-radius: 4px;
      }
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      

    :root { --ox-primary-rgb: 251, 191, 36; }
    
    .summary-grid { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; margin-bottom: 24px; }
    
    .decision-shell {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .decision-shell[data-page-direction="forward"] .decision-card {
      animation-name: decisionSlideForward;
    }

    .decision-shell[data-page-direction="backward"] .decision-card {
      animation-name: decisionSlideBackward;
    }

    .decision-card {
      margin-bottom: 8px;
      transition:
        opacity 180ms ease,
        transform 220ms cubic-bezier(0.16, 1, 0.3, 1),
        filter 220ms ease;
    }

    .decision-card.is-resolving {
      opacity: 0;
      transform: translateY(-8px) scale(0.985);
      filter: blur(6px);
    }

    @keyframes decisionSlideForward {
      from {
        opacity: 0;
        transform: translateX(12px) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0) translateY(0);
      }
    }

    @keyframes decisionSlideBackward {
      from {
        opacity: 0;
        transform: translateX(-12px) translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0) translateY(0);
      }
    }

    .decision-card.urgency-critical { --ox-card-color-rgb: 225, 29, 72; --ox-card-color: var(--ox-danger); }
    .decision-card.urgency-high { --ox-card-color-rgb: 217, 119, 6; --ox-card-color: var(--ox-warning); }
    .decision-card.urgency-medium { --ox-card-color-rgb: 132, 204, 22; --ox-card-color: var(--ox-lime); }
    .decision-card.urgency-low { --ox-card-color-rgb: 100, 116, 139; --ox-card-color: var(--ox-text-muted); }
    
    .decision-card .ox-card::after { background: linear-gradient(90deg, transparent, rgba(var(--ox-card-color-rgb), 0.6), transparent); }
    
    .decision-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    
    .agent-tag { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 0.9rem; }
    .agent-avatar { width: 24px; height: 24px; border-radius: 6px; background: rgba(var(--ox-card-color-rgb), 0.15); color: var(--ox-card-color); display: flex; align-items: center; justify-content: center; font-family: var(--ox-mono); font-size: 0.7rem; }
    
    .actions-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.4fr) minmax(0, 1fr);
      gap: 12px;
      margin-top: 24px;
    }

    .actions-grid .ox-action-btn,
    .actions-grid .ox-link-btn {
      width: 100%;
    }

    .reject-composer {
      margin-top: 14px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(var(--ox-card-color-rgb), 0.2);
      background:
        radial-gradient(circle at top left, rgba(var(--ox-card-color-rgb), 0.12), transparent 50%),
        var(--ox-well-bg);
      box-shadow: var(--ox-well-shadow);
      animation: rejectComposerIn 220ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes rejectComposerIn {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .reject-heading {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .reject-heading h4 {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--ox-text);
    }

    .reject-meta {
      font-family: var(--ox-mono);
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ox-text-muted);
    }

    .reject-textarea {
      width: 100%;
      min-height: 92px;
      resize: vertical;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(2, 6, 14, 0.24);
      color: var(--ox-text);
      padding: 12px 14px;
      font: inherit;
      font-size: 0.9rem;
      line-height: 1.45;
      transition:
        border-color 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .reject-textarea::placeholder {
      color: rgba(248, 250, 252, 0.38);
    }

    @media (prefers-color-scheme: light) {
      .reject-textarea {
        background: rgba(255, 255, 255, 0.86);
      }

      .reject-textarea::placeholder {
        color: rgba(15, 23, 42, 0.32);
      }
    }

    .reject-textarea:focus {
      outline: none;
      border-color: rgba(var(--ox-card-color-rgb), 0.45);
      box-shadow: 0 0 0 3px rgba(var(--ox-card-color-rgb), 0.12);
    }

    .reject-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-top: 12px;
    }

    .reject-toolbar-copy {
      font-size: 0.78rem;
      line-height: 1.45;
      color: var(--ox-text-muted);
    }

    .reject-toolbar-copy strong {
      color: var(--ox-text);
      font-weight: 600;
    }

    .reject-submit {
      min-width: 152px;
    }
    
    .params-well { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 8px; }
    .param-chip { background: var(--ox-well-bg); border: 1px solid var(--ox-border); padding: 4px 8px; border-radius: 4px; font-family: var(--ox-mono); font-size: 0.65rem; color: var(--ox-text-muted); text-transform: uppercase; }
    .param-chip strong { color: var(--ox-text); margin-left: 4px; }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 4px 4px 0;
      margin-top: -4px;
    }

    .page-info {
      flex: 1;
      text-align: center;
      font-family: var(--ox-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--ox-text-muted);
      font-weight: 600;
    }

    .page-btn {
      min-width: 132px;
      padding-inline: 18px;
      font-size: 0.82rem;
      letter-spacing: -0.01em;
    }

    .page-btn .ox-action-btn__label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    @media (max-width: 560px) {
      .summary-grid {
        justify-content: flex-start;
      }

      .pagination {
        flex-direction: column;
        align-items: stretch;
      }

      .page-info {
        order: -1;
      }

      .page-btn {
        width: 100%;
        min-width: 0;
      }

      .actions-grid {
        grid-template-columns: 1fr;
      }

      .reject-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .reject-submit {
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px;">
      <h1 class="ox-title" style="font-size:1.75rem;">Action Required</h1>
      <div id="summary" class="summary-grid"></div>
    </div>
    <div id="content">
      <!-- Skeleton shown during loading -->
      <div class="skeleton-wrapper" style="display:flex; flex-direction:column; gap:16px;">
        <div style="background:var(--ox-well-bg); border-radius:16px; padding:20px;">
          <div class="skeleton-line" style="width:60%; height:18px; margin-bottom:12px;"></div>
          <div class="skeleton-line" style="width:90%; height:14px; margin-bottom:8px;"></div>
          <div class="skeleton-line" style="width:75%; height:14px;"></div>
        </div>
        <div style="background:var(--ox-well-bg); border-radius:16px; padding:20px;">
          <div class="skeleton-line" style="width:50%; height:18px; margin-bottom:12px;"></div>
          <div class="skeleton-line" style="width:85%; height:14px; margin-bottom:8px;"></div>
          <div class="skeleton-line" style="width:70%; height:14px;"></div>
        </div>
      </div>
    </div>
  </div>
  <script>

    // Sync theme from URL to override prefers-color-scheme
    (function() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();


    var injectHtml = (html) => {
      const content = document.getElementById('content');
      const skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton) {
        skeleton.style.opacity = '0';
        setTimeout(() => {
          content.innerHTML = html;
        }, 300);
      } else {
        content.innerHTML = html;
      }
    };

    
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      var _mcpPending = {};
      var _mcpNextId = 100;
      function initWidget(opts){
        var render=opts.render,getData=opts.getData||_extractData;
        var protocol=_detectProtocol();
        if(protocol==='chatgpt'){
          var d=getData(window.openai&&window.openai.toolOutput);render(d);
          window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});
        }else if(protocol==='mcp-apps'){
          render(null);
          var initId=1;
          window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'OrgX Widget',version:'1.0.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');
          window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');
          window.addEventListener('message',function(event){
            var msg=event.data;if(!msg||typeof msg!=='object')return;
            if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}
            if(msg.id!=null&&_mcpPending[msg.id]){var p=_mcpPending[msg.id];delete _mcpPending[msg.id];if(msg.error)p.reject(new Error(msg.error.message||'Tool call failed'));else p.resolve(msg.result);return;}
            if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}
          });
        }else{render(null);}
      }
      function callTool(name, args){
        var protocol=_detectProtocol();
        if(protocol==='chatgpt')return window.openai&&window.openai.callTool?window.openai.callTool(name,args):Promise.resolve(null);
        if(protocol==='mcp-apps'){
          return new Promise(function(resolve,reject){
            var id=_mcpNextId++;
            _mcpPending[id]={resolve:resolve,reject:reject};
            window.parent.postMessage({jsonrpc:'2.0',id:id,method:'tools/call',params:{name:name,arguments:args}},'*');
            setTimeout(function(){if(_mcpPending[id]){delete _mcpPending[id];reject(new Error('Tool call '+name+' timed out'));}},30000);
          });
        }
        return Promise.resolve(null);
      }

      var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" aria-hidden="true">'+c+'</svg>';};
      var icons = {
        check: function(s){return _svg('<polyline points="20 6 9 17 4 12"></polyline>',s);},
        warning: function(s){return _svg('<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line>',s);},
        error: function(s){return _svg('<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',s);},
        clock: function(s){return _svg('<circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline>',s);},
        agent: function(s){return _svg('<rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line>',s);},
        search: function(s){return _svg('<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',s);},
        file: function(s){return _svg('<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline>',s);},
        link: function(s){return _svg('<path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path>',s);},
      };

      var escapeHtml = (str) => {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      };

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var data = isDemo ? {
      summary: { critical: 1, high: 1 },
      decisions: [
        { id: 'd1', urgency: 'critical', agent_name: 'Pace', type: 'Approval', summary: 'Approve JWT token expiry reduction to 15m to patch CVE-2026-1402.', created_at: new Date().toISOString(), expected_cost_usd: 0, required_trust_level: 'act_with_approval' },
        { id: 'd2', urgency: 'high', agent_name: 'Eli', type: 'Decision', summary: 'Select database indexing strategy for search. Options: B-Tree vs Hash.', created_at: new Date(Date.now() - 3600000).toISOString() }
      ]
    } : null;
    var isLoading = !isDemo;

    var isLoadingOverride = new URLSearchParams(window.location.search).get('loading') === 'true';
    if (isLoadingOverride) {
      isLoading = true;
      isDemo = false;
      // Overwrite initWidget to do nothing so it hangs on loading
      initWidget = () => { render(); };
    }

    var ux = window.OrgXWidgetUX || null;
    var rejectComposerId = null;
    var rejectDrafts = {};
    var pendingDecisionId = null;
    var currentPage = 1;
    var itemsPerPage = 3;
    var pageDirection = 'forward';

    var notify = (tone, title, message, duration) => {
      if (ux && ux.toast && typeof ux.toast.show === 'function') {
        return ux.toast.show({ tone, title, message, duration });
      }
      return null;
    };

    var updateSummaryFromDecisions = () => {
      if (!data || !Array.isArray(data.decisions)) return;
      const nextSummary = {};
      data.decisions.forEach((decision) => {
        const urgency = (decision.urgency || 'low').toLowerCase();
        nextSummary[urgency] = (nextSummary[urgency] || 0) + 1;
      });
      data.summary = nextSummary;
    };

    var removeDecisionFromState = (id) => {
      if (!data || !Array.isArray(data.decisions)) return;
      data.decisions = data.decisions.filter((decision) => decision.id !== id);
      updateSummaryFromDecisions();
      const totalPages = Math.max(1, Math.ceil(data.decisions.length / itemsPerPage));
      currentPage = Math.min(currentPage, totalPages);
    };

    var setPageButtonsDisabled = (disabled) => {
      document.querySelectorAll('.page-btn').forEach((button) => {
        button.disabled = !!disabled;
      });
    };

    var setCardControlsDisabled = (card, disabled) => {
      if (!card) return;
      card.querySelectorAll('button').forEach((button) => {
        if (button.classList.contains('is-loading')) return;
        button.disabled = !!disabled;
      });
      const textarea = card.querySelector('textarea');
      if (textarea) textarea.disabled = !!disabled;
    };


    
      var getAvatarUrl = (name) => {
        const n = (name || '').toLowerCase();
        if (n.includes('pace') || n.includes('product')) return 'https://useorgx.com/product_orchestrator.png';
        if (n.includes('eli') || n.includes('engineer')) return 'https://useorgx.com/engineering_autopilot.png';
        if (n.includes('mark') || n.includes('market')) return 'https://useorgx.com/launch_captain.png';
        if (n.includes('sage') || n.includes('sale')) return 'https://useorgx.com/pipeline_intelligence.png';
        if (n.includes('orion') || n.includes('op')) return 'https://useorgx.com/control_tower.png';
        if (n.includes('dana') || n.includes('design')) return 'https://useorgx.com/design_codex.png';
        if (n.includes('xandy') || n.includes('orchestrator')) return 'https://useorgx.com/xandy_orchestrator.png';
        return null;
      };
      var renderAvatar = (name, sizePx) => {
        const url = getAvatarUrl(name);
        if (url) return `<img src="${url}" alt="${escapeHtml(name)}" style="width:100%;height:100%;object-fit:cover;border-radius:inherit;" />`;
        return escapeHtml(name ? name[0].toUpperCase() : '?');
      };

    var formatUsd = v => Number.isFinite(Number(v)) ? '$'+Number(v).toFixed(2) : null;
    var timeAgo = d => { const m = Math.floor((new Date() - new Date(d))/60000); return m<1?'Just now':m<60?m+'m ago':Math.floor(m/60)+'h ago'; };

    window.toggleRejectComposer = (id) => {
      if (pendingDecisionId) return;
      rejectComposerId = rejectComposerId === id ? null : id;
      render();
    };

    window.syncRejectDraft = (id, textarea) => {
      rejectDrafts[id] = textarea.value;
      const submitButton = textarea.closest('.reject-composer')?.querySelector('.reject-submit');
      if (submitButton) submitButton.disabled = !textarea.value.trim();
    };

    window.approveDecision = async (id, btn) => {
      if (btn.disabled || pendingDecisionId) return;
      const card = btn.closest('.decision-card');
      pendingDecisionId = id;
      setPageButtonsDisabled(true);
      setCardControlsDisabled(card, true);
      if (ux) ux.setLoading(btn, { loadingLabel: 'Approving…' });

      try {
        await callTool('approve_decision', { decision_id: id });
        notify('success', 'Decision approved', 'The agent can continue with the approved path.');
        if (card) card.classList.add('is-resolving');
        window.setTimeout(() => {
          removeDecisionFromState(id);
          if (rejectComposerId === id) rejectComposerId = null;
          delete rejectDrafts[id];
          pendingDecisionId = null;
          render();
        }, 180);
      } catch (error) {
        pendingDecisionId = null;
        setPageButtonsDisabled(false);
        setCardControlsDisabled(card, false);
        if (ux) ux.clearLoading(btn);
        notify('error', 'Approval failed', error?.message || 'Try again in a moment.');
      }
    };

    window.submitReject = async (id, btn) => {
      const reason = (rejectDrafts[id] || '').trim();
      if (!reason || pendingDecisionId) return;
      const card = btn.closest('.decision-card');
      pendingDecisionId = id;
      setPageButtonsDisabled(true);
      setCardControlsDisabled(card, true);
      if (ux) ux.setLoading(btn, { loadingLabel: 'Sending note…' });

      try {
        await callTool('reject_decision', { decision_id: id, reason });
        notify(
          'success',
          'Decision rejected',
          'Your note was attached so the agent can revise course.'
        );
        if (card) card.classList.add('is-resolving');
        window.setTimeout(() => {
          removeDecisionFromState(id);
          if (rejectComposerId === id) rejectComposerId = null;
          delete rejectDrafts[id];
          pendingDecisionId = null;
          render();
        }, 180);
      } catch (error) {
        pendingDecisionId = null;
        setPageButtonsDisabled(false);
        setCardControlsDisabled(card, false);
        if (ux) ux.clearLoading(btn);
        notify('error', 'Rejection failed', error?.message || 'Try again in a moment.');
      }
    };

    window.changePage = (delta) => {
      const totalPages = Math.max(1, Math.ceil((data?.decisions?.length || 0) / itemsPerPage));
      const nextPage = Math.min(totalPages, Math.max(1, currentPage + delta));
      if (nextPage === currentPage) return;
      pageDirection = delta > 0 ? 'forward' : 'backward';
      currentPage = nextPage;
      render();
    };

    var render = () => {
      if(isLoading) return;
      if(!data || !data.decisions || data.decisions.length === 0) { injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.check(24)}</div><div class="empty-title">All caught up</div><div class="empty-desc">No decisions require your attention right now.</div></div>`); document.getElementById('summary').innerHTML=''; return; }

      if(data.summary) {
        document.getElementById('summary').innerHTML = Object.entries(data.summary).filter(([k,v])=>v>0).map(([k,v]) => `<span class="ox-badge" style="--ox-color:var(--ox-${k==='critical'?'danger':k==='high'?'warning':k==='medium'?'lime':'text-muted'}); --ox-color-rgb:var(--ox-${k==='critical'?'danger':k==='high'?'warning':k==='medium'?'lime':'text-muted'}-rgb, 100,100,100);">${v} ${k}</span>`).join('');
      }

      const totalPages = Math.ceil(data.decisions.length / itemsPerPage);
      const startIdx = (currentPage - 1) * itemsPerPage;
      const paginated = data.decisions.slice(startIdx, startIdx + itemsPerPage);

      const activeDirection = pageDirection;
      pageDirection = 'forward';

      let html = paginated.map((d, i) => {
        const isRejecting = rejectComposerId === d.id;
        const rejectValue = rejectDrafts[d.id] || '';
        const rejectEnabled = rejectValue.trim().length > 0;
        const rejectActionLabel = isRejecting ? 'Hide note' : 'Reject';
        return `
        <div class="decision-card urgency-${escapeHtml(d.urgency)} animate-in" style="animation-delay: ${0.1 * i}s">
          <div class="ox-card">
            <div class="ox-card-inner">
              <div class="decision-header">
                <div class="agent-tag">
                  <div class="agent-avatar">${renderAvatar(d.agent_name, 24)}</div>
                  <span>${escapeHtml(d.agent_name)}</span>
                </div>
                <div class="ox-eyebrow" style="color: var(--ox-card-color); display:flex; align-items:center; gap:6px;">
                  <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;"></span>
                  ${escapeHtml(d.urgency)}
                </div>
              </div>
              
              <h3 class="ox-title" style="margin-bottom:8px;">${escapeHtml(d.summary)}</h3>
              
              <div class="params-well">
                <div class="param-chip">Type <strong>${escapeHtml(d.type)}</strong></div>
                <div class="param-chip">Age <strong>${timeAgo(d.created_at)}</strong></div>
                ${d.expected_cost_usd !== undefined ? `<div class="param-chip">Cost <strong>${formatUsd(d.expected_cost_usd)}</strong></div>` : ''}
                ${d.required_trust_level ? `<div class="param-chip">Rule <strong>${escapeHtml(d.required_trust_level)}</strong></div>` : ''}
              </div>

              <div class="actions-grid">
                <button
                  type="button"
                  class="ox-btn ox-action-btn ox-action-btn--primary ox-btn-primary is-card-tone"
                  style="--ox-button-accent-rgb: var(--ox-card-color-rgb); --ox-primary-contrast: ${d.urgency === 'high' || d.urgency === 'critical' ? '#fff' : '#02040a'};"
                  data-loading-label="Approving…"
                  onclick="approveDecision('${escapeHtml(d.id)}', this)"
                >
                  Approve
                </button>
                <button
                  type="button"
                  class="ox-btn ox-action-btn ox-action-btn--ghost ox-btn-ghost"
                  onclick="toggleRejectComposer('${escapeHtml(d.id)}')"
                  aria-expanded="${isRejecting ? 'true' : 'false'}"
                >
                  ${rejectActionLabel}
                </button>
              </div>

              ${isRejecting ? `
                <div class="reject-composer">
                  <div class="reject-heading">
                    <h4>Send a rejection note</h4>
                    <span class="reject-meta">Visible to ${escapeHtml(d.agent_name)}</span>
                  </div>
                  <textarea
                    class="reject-textarea"
                    placeholder="Tell the agent what changed, what constraint was missed, or what decision path you want instead."
                    oninput="syncRejectDraft('${escapeHtml(d.id)}', this)"
                  >${escapeHtml(rejectValue)}</textarea>
                  <div class="reject-toolbar">
                    <div class="reject-toolbar-copy"><strong>Required.</strong> A clear reason prevents back-and-forth and keeps the next attempt on-rail.</div>
                    <button
                      type="button"
                      class="ox-action-btn ox-action-btn--danger reject-submit"
                      data-loading-label="Sending note…"
                      onclick="submitReject('${escapeHtml(d.id)}', this)"
                      ${rejectEnabled ? '' : 'disabled'}
                    >
                      Reject decision
                    </button>
                  </div>
                </div>
              ` : ''}
            </div>
          </div>
        </div>
      `;
      }).join('');

      if (totalPages > 1) {
        html += `
          <div class="pagination">
            <button type="button" class="page-btn ox-action-btn ox-action-btn--ghost" onclick="changePage(-1)" ${currentPage === 1 ? 'disabled' : ''}>← Previous</button>
            <span class="page-info">Page ${currentPage} of ${totalPages}</span>
            <button type="button" class="page-btn ox-action-btn ox-action-btn--ghost" onclick="changePage(1)" ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
          </div>
        `;
      }

      injectHtml(`<div class="decision-shell animate-in" data-page-direction="${activeDirection}">${html}</div>`);
    };


    if(isDemo) render();
    else initWidget({ render: d => { if(d) data = d; isLoading = false; render(); } });
  </script>
</body>
</html>
