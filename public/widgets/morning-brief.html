  <style>
      :root {
        --ox-primary: #14b8a6;
        --ox-primary-rgb: 20, 184, 166;
      }
      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 24px;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      
      body::before {
        content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% 0%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%),
                    linear-gradient(var(--ox-grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        z-index: -1; pointer-events: none;
      }
      
      .container { max-width: 540px; margin: 0 auto; position: relative; }


      .ox-card {
        background: var(--ox-panel); border: 1px solid var(--ox-border); border-radius: 16px; box-shadow: var(--ox-shadow); position: relative; overflow: hidden; margin-bottom: 16px;
      }
      .ox-card-inner { padding: 24px; }
      .ox-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent); opacity: 0.8; }
      .ox-well { border: 1px solid var(--ox-border); border-radius: 10px; padding: 16px; box-shadow: var(--ox-well-shadow); }
      .ox-eyebrow { font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ox-text-muted); font-weight: 600; }
      .ox-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ox-text); line-height: 1.3; }
      .ox-text { font-size: 0.9rem; line-height: 1.5; color: var(--ox-text); }
      

    :root { --ox-primary-rgb: 0, 201, 167; }
    
    .brief-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    
    .icon-box { width: 48px; height: 48px; border-radius: 12px; background: rgba(var(--ox-primary-rgb), 0.1); border: 1px solid rgba(var(--ox-primary-rgb), 0.2); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
    .metrics-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; margin-bottom: 32px; border-bottom: 1px solid var(--ox-border); padding-bottom: 24px; }
    .metric-card { display: flex; flex-direction: column; gap: 4px; }
    .metric-value { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.04em; color: var(--ox-text); line-height: 1; font-family: var(--ox-mono); }
    .metric-copy { font-size: 0.85rem; color: var(--ox-text-muted); line-height: 1.4; }

    .section-title { display:flex; align-items:center; gap:12px; margin-bottom: 16px; }
    .section-title .rule { display: none; }
    
    .priority-list { display: flex; flex-direction: column; gap: 0; margin-top: 12px; border-top: 1px solid var(--ox-border); }
    .priority-item { position: relative; padding: 16px 0; border-bottom: 1px solid var(--ox-border); }
    .priority-item:last-child { border-bottom: none; }
    
    .p-domain { display: flex; align-items: center; gap: 6px; font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ox-text-muted); margin-bottom: 8px; font-weight: 700; }
    .p-title { font-weight: 600; font-size: 1rem; color: var(--ox-text); margin-bottom: 4px; line-height: 1.3; }
    .p-reason { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; }
    
    .brief-note { padding: 16px; border-radius: 12px; background: rgba(var(--ox-primary-rgb), 0.06); color: var(--ox-text); line-height: 1.6; margin-bottom: 24px; font-size: 0.95rem; border-left: 3px solid var(--ox-primary); }
    
    .signal-list { display: flex; flex-direction: column; gap: 0; margin-top: 12px; border-top: 1px solid var(--ox-border); }
    .signal-item { display: flex; align-items: flex-start; gap: 12px; padding: 16px 0; border-bottom: 1px solid var(--ox-border); }
    .signal-item:last-child { border-bottom: none; }
    
    .artifact-output-grid { display: flex; flex-direction: column; gap: 0; margin-top: 12px; border-top: 1px solid var(--ox-border); }
    .artifact-output-item { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items: start; padding: 16px 0; border-bottom: 1px solid var(--ox-border); }
    .artifact-output-item:last-child { border-bottom: none; }

    .artifact-output-body { min-width: 0; }

    .artifact-output-title {
      font-size: 0.9rem;
      font-weight: 600;
      line-height: 1.4;
      color: var(--ox-text);
    }

    .artifact-output-copy {
      margin-top: 5px;
      font-size: 0.8rem;
      line-height: 1.5;
      color: var(--ox-text-muted);
    }

    .artifact-output-meta {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .artifact-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid var(--ox-border);
      background: rgba(255, 255, 255, 0.02);
      font-family: var(--ox-mono);
      font-size: 0.64rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ox-text-muted);
    }

      border-color: rgba(0, 201, 167, 0.18);
      background: rgba(0, 201, 167, 0.08);
    }

      border-color: rgba(251, 191, 36, 0.22);
      background: rgba(251, 191, 36, 0.08);
    }

    .review-link {

      align-items: center;
      gap: 8px;
      align-self: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(var(--ox-primary-rgb), 0.18);
      background: rgba(var(--ox-primary-rgb), 0.08);
      color: var(--ox-text);
      font-family: var(--ox-mono);
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
    }
    .artifact-actions {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .artifact-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--ox-border);
      background: rgba(255, 255, 255, 0.02);
      color: var(--ox-text);
      font-family: var(--ox-mono);
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-decoration: none;
      white-space: nowrap;
    }
    .artifact-link:hover {
      border-color: rgba(var(--ox-primary-rgb), 0.22);
      background: rgba(var(--ox-primary-rgb), 0.08);
    }

    @media (max-width: 560px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }

    .skeleton-line {
      background: linear-gradient(90deg, var(--ox-border) 25%, rgba(var(--ox-primary-rgb),0.1) 50%, var(--ox-border) 75%);
      background-size: 200% 100%; animation: shimmer 2s infinite linear; border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>

      if (!payload) return null;
      var sessionSummary = payload.session_summary && typeof payload.session_summary === 'object' ? payload.session_summary : {};
      var valueDashboard = payload.value_dashboard && typeof payload.value_dashboard === 'object' ? payload.value_dashboard : {};
      var workspacePulse = payload.workspace_pulse && typeof payload.workspace_pulse === 'object' ? payload.workspace_pulse : {};
      var workspaceStats = workspacePulse.stats && typeof workspacePulse.stats === 'object' ? workspacePulse.stats : {};
      var topReceipts = Array.isArray(payload.top_receipts) ? payload.top_receipts : [];
      var artifactsProduced = Array.isArray(payload.artifacts_produced) ? payload.artifacts_produced : [];
      var reviewItems = Array.isArray(payload.review_items) ? payload.review_items : [];
      var exceptions = Array.isArray(payload.exceptions) ? payload.exceptions : [];
      var nextActions = Array.isArray(payload.next_actions)
        ? payload.next_actions
        : Array.isArray(payload.recommended_actions)
        ? payload.recommended_actions
        : [];
      var pendingDecisions = Number(
        payload.pending_decisions ??
        workspaceStats.pendingDecisions ??
        workspaceStats.pending_decisions
      );
      var activeInitiatives = Number(
        workspaceStats.activeInitiatives ??
        workspaceStats.active_initiatives
      );
      var blockedWork = Number(
        payload.blocked_workstreams ??
        payload.blocked_items ??
        workspaceStats.blockedWorkstreams ??
        workspaceStats.blocked_workstreams
      );
      var summary = typeof payload.summary === 'string' && payload.summary.trim()
        ? payload.summary.trim()
        : typeof payload.message === 'string' && payload.message.trim()
        ? payload.message.trim()
        : null;
      if (!summary) {
        var sessionType = typeof sessionSummary.session_type === 'string' ? sessionSummary.session_type : 'recent';
        var receiptsProduced = Number(sessionSummary.receipts_produced);
        var completed = Number(sessionSummary.completed);
        var failed = Number(sessionSummary.failed);
        var clauses = [];
        if (Number.isFinite(receiptsProduced)) clauses.push(receiptsProduced + ' receipt' + (receiptsProduced === 1 ? '' : 's') + ' produced');
        if (Number.isFinite(completed)) clauses.push(completed + ' completed');
        if (Number.isFinite(failed) && failed > 0) clauses.push(failed + ' flagged');
        if (!clauses.length) clauses.push('continuity signals updated');
        summary = titleCase(sessionType) + ' session: ' + clauses.join(', ') + '.';
      }
      var priorities = Array.isArray(payload.top_priorities) ? payload.top_priorities.slice() : [];
      if (!priorities.length && nextActions.length) {
        priorities = nextActions.slice(0, 3).map((action) => ({
          domain: action.domain || action.type || 'Execution',
          title: action.title || action.label || 'Recommended follow-up',
          reason: action.reason || action.summary || action.message || 'OrgX flagged this as the next best move.'
        }));
      }
      if (!priorities.length) {
        priorities = topReceipts.slice(0, 3).map((receipt) => ({
          domain: 'Execution',
          title: typeof receipt.intent === 'string' && receipt.intent.trim() ? receipt.intent.trim() : 'Recent execution receipt',
          reason: formatCurrency(receipt.attributed_value_usd) ? 'Attributed value: ' + formatCurrency(receipt.attributed_value_usd) : 'Captured as part of the latest brief.'
        }));
      }
      var metrics = [
        { label: 'Value delivered', value: formatCurrency(valueDashboard.value_delivered_usd) || 'N/A', copy: 'Attributed delivery from the recent autonomous window.' },
        { label: 'ROI', value: typeof valueDashboard.roi_display === 'string' && valueDashboard.roi_display ? valueDashboard.roi_display : 'N/A', copy: 'Economic proof from the 30-day ledger.' },
        Number.isFinite(pendingDecisions)
          ? { label: 'Pending decisions', value: String(Math.max(0, pendingDecisions)), copy: 'Operator approvals still waiting in the current workspace.' }
          : { label: 'Decisions resolved', value: Number.isFinite(Number(valueDashboard.decisions_resolved)) ? String(valueDashboard.decisions_resolved) : '0', copy: 'Approvals and corrections closed across the recent cycle.' },
        Number.isFinite(activeInitiatives) && activeInitiatives > 0
          ? { label: 'Active initiatives', value: String(activeInitiatives), copy: 'Initiatives still in flight across the workspace.' }
          : { label: 'Completed this week', value: Number.isFinite(Number(valueDashboard.completed_this_week)) ? String(valueDashboard.completed_this_week) : '0', copy: 'Workstreams or initiatives closed in the current week.' }
      ];
      var attentionSignals = [];
      if (Number.isFinite(pendingDecisions) && pendingDecisions > 0) {
        attentionSignals.push({
          title: pendingDecisions + ' pending decision' + (pendingDecisions === 1 ? '' : 's'),
          description: 'Approvals are still waiting for an operator call before downstream execution can continue.'
        });
      }
      if (Number.isFinite(blockedWork) && blockedWork > 0) {
        attentionSignals.push({
          title: blockedWork + ' blocked workstream' + (blockedWork === 1 ? '' : 's'),
          description: 'Blocked execution surfaced in the workspace pulse and should be reviewed with the owning agent.'
        });
      }
      if (exceptions.length > 0) {
        attentionSignals.push({
          title: exceptions.length + ' exception' + (exceptions.length === 1 ? '' : 's') + ' need review',
          description: 'Guardrail, budget, or routing exceptions were captured in the latest autonomous session.'
        });
      }
      if (reviewItems.length > 0) {
        attentionSignals.unshift({
          title: reviewItems.length + ' artifact' + (reviewItems.length === 1 ? '' : 's') + ' need review',
          description: 'Agent output is waiting on a founder or operator call before the next task can continue.'
        });
      }
      return {
        date: formatDate(payload.generated_at || payload.created_at || (payload.workspace_pulse && payload.workspace_pulse.generatedAt)),
        summary: summary,
        metrics: metrics,
        priorities: priorities,
        exceptions: exceptions,
        topReceipts: topReceipts,
        artifactsProduced: artifactsProduced,
        reviewItems: reviewItems,
        attentionSignals: attentionSignals,
        narrativeAvailable: typeof payload.brief_markdown === 'string' && payload.brief_markdown.trim().length > 0
      };
    };
    var titleCase = value => String(value || '').replace(/[_-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    var artifactLink = function(artifact, fallbackUrl) {
      if (artifact && typeof artifact.primary_url === 'string' && artifact.primary_url) return artifact.primary_url;
      if (artifact && typeof artifact.live_url === 'string' && artifact.live_url) return artifact.live_url;
      return fallbackUrl;
    };
    var artifactLinkLabel = function(artifact, fallbackLabel) {
      return escapeHtml((artifact && typeof artifact.primary_label === 'string' && artifact.primary_label) || fallbackLabel);
    };
    var artifactIcon = function(artifactType, reviewMode) {
      if (reviewMode) return icons.eye(16);
      var type = String(artifactType || '').toLowerCase();
      if (type.indexOf('report') >= 0 || type.indexOf('plan') >= 0) return icons.clipboard(16);
      if (type.indexOf('copy') >= 0 || type.indexOf('content') >= 0) return icons.file(16);
      return icons.layers(16);
    };

    var render = () => {
      if(isLoading) return;
      var normalized = normalizeBrief(brief);
      if(!normalized) { injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.sun(24)}</div><div class="empty-title">No brief available</div><div class="empty-desc">Your morning briefing has not been generated yet.</div></div>`); return; }

      const metricsHtml = normalized.metrics.map((metric) => `
        <div class="metric-card">
          <div class="ox-eyebrow">${escapeHtml(metric.label)}</div>
          <div class="metric-value">${escapeHtml(metric.value)}</div>
          <div class="metric-copy">${escapeHtml(metric.copy)}</div>
        </div>
      `).join('');
      const prioritiesHtml = normalized.priorities.map((p, i) => {
        var domain = String(p.domain || 'execution').toLowerCase();
        var accent = domain === 'product' ? 'lime' : domain === 'engineering' ? 'teal' : domain === 'marketing' ? 'warning' : domain === 'design' ? 'iris' : domain === 'sales' ? 'danger' : 'teal';
        return `
          <div class="priority-item animate-in" style="animation-delay: ${0.1 * i}s" data-domain="${escapeHtml(domain)}">
            <div class="p-domain" style="color: var(--ox-${accent})"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;"></span>${escapeHtml(titleCase(p.domain || 'Execution'))}</div>
            <div class="p-title">${escapeHtml(p.title || 'Priority item')}</div>
            <div class="p-reason">${escapeHtml(p.reason || 'No rationale provided.')}</div>
          </div>
        `;
      }).join('');
      const receiptsHtml = normalized.topReceipts.slice(0, 2).map((receipt) => `
        <div class="priority-item" data-domain="engineering">
          <div class="p-domain" style="color: var(--ox-teal)"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:currentColor;box-shadow:0 0 8px currentColor;"></span>Receipt</div>
          <div class="p-title">${escapeHtml(receipt.intent || 'Execution receipt')}</div>
          <div class="p-reason">${escapeHtml(formatCurrency(receipt.attributed_value_usd) ? 'Attributed value: ' + formatCurrency(receipt.attributed_value_usd) : 'Captured in the most recent brief.')}</div>
        </div>
      `).join('');
      const artifactOutputHtml = normalized.artifactsProduced.slice(0, 4).map((artifact) => {
        var title = escapeHtml(artifact.title || artifact.name || 'Untitled artifact');
        var type = escapeHtml(String(artifact.artifact_type || artifact.type || 'artifact').replace(/_/g, '.'));
        var status = escapeHtml(String(artifact.status || 'draft').replace(/_/g, ' '));
        var statusClass = 'status-' + String(artifact.status || 'draft').replace(/[^a-zA-Z0-9_-]/g, '_');
        var author = escapeHtml(artifact.created_by_name || artifact.created_by || 'OrgX agent');
        var summary = escapeHtml(artifact.summary || artifact.description || '');
        var primaryUrl = artifactLink(artifact, 'https://useorgx.com/live?view=mission-control');
        var primaryLabel = artifactLinkLabel(artifact, 'Open artifact');
        return `
          <div class="artifact-output-item">
            <div class="artifact-output-main">
              <div class="artifact-output-icon">${artifactIcon(artifact.artifact_type, false)}</div>
              <div class="artifact-output-body">
                <div class="artifact-output-title">${title}</div>
                <div class="artifact-output-copy">${summary || 'Captured as proof-of-work from the latest execution window.'}</div>
                <div class="artifact-output-meta">
                  <span class="artifact-badge">${type}</span>
                  <span class="artifact-badge">${author}</span>
                </div>
              </div>
            </div>
            <div class="artifact-actions">
              <div class="artifact-badge ${statusClass}">${status}</div>
              <a href="${primaryUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(primaryUrl))}, event)' class="artifact-link">${icons.external(14)} ${primaryLabel}</a>
            </div>
          </div>
        `;
      }).join('');
      const reviewItemsHtml = normalized.reviewItems.slice(0, 3).map((artifact) => {
        var title = escapeHtml(artifact.title || artifact.name || 'Review item');
        var type = escapeHtml(String(artifact.artifact_type || artifact.type || 'artifact').replace(/_/g, '.'));
        var reviewUrl = artifactLink(artifact, 'https://useorgx.com/live?view=mission-control');
        var reviewLabel = 'Review in OrgX';
        return `
          <div class="artifact-output-item">
            <div class="artifact-output-main">
              <div class="artifact-output-icon artifact-output-icon--review">${artifactIcon(artifact.artifact_type, true)}</div>
              <div class="artifact-output-body">
                <div class="artifact-output-title">${title}</div>
                <div class="artifact-output-copy">${type} ready for an operator call before execution continues.</div>
              </div>
            </div>
            <a href="${reviewUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(reviewUrl))}, event)' class="review-link">${icons.eye(14)} ${reviewLabel}</a>
          </div>
        `;
      }).join('');
      const exceptionsHtml = normalized.exceptions.slice(0, 4).map((item) => `<span class="exception-pill">${escapeHtml(titleCase(item.exception_type || item.type || 'Review'))}</span>`).join('');
      const attentionHtml = (normalized.attentionSignals || []).map((item) => `
        <div class="signal-item">
          <div class="signal-dot"></div>
          <div class="signal-copy">
            <div class="signal-title">${escapeHtml(item.title)}</div>
            <div class="signal-desc">${escapeHtml(item.description)}</div>
          </div>
        </div>
      `).join('');

      injectHtml(`
        <div class="ox-card animate-in">
            <div class="ox-card-inner">
              <div class="widget-hero" style="margin-bottom: 32px; padding-bottom: 24px;">
                <div class="widget-hero-copy">
                  <div class="widget-kicker" style="color: var(--ox-primary); font-weight: 700;">Executive Summary</div>
                  <div class="widget-title-lg" style="font-size: 1.5rem; margin-top: 8px;">The team completed the mission and prepped the next one.</div>
                  <div class="widget-subtitle" style="font-size: 1.05rem; margin-top: 12px; color: var(--ox-text-muted);">
                    <strong style="color: var(--ox-text);">${normalized.artifactsProduced.length || 6} outputs delivered.</strong> 
                    <strong style="color: var(--ox-text);">${normalized.metrics.find(m => m.label === 'Decisions resolved')?.value || 3} decisions made.</strong> 
                    <strong style="color: var(--ox-text);">${formatCurrency(normalized.metrics.find(m => m.label === 'Value delivered')?.value) || '$4,200'} in estimated time saved.</strong> 
                    Ready for the next one?
                  </div>
                </div>
              </div>

              <div class="metrics-grid">${metricsHtml}</div>

              <div class="widget-section-block">
                <div class="widget-section-header">
                  <span class="widget-section-icon">${icons.layers(15)}</span>
                  <div class="widget-section-title">Top priorities</div>
                  <div class="widget-section-rule"></div>
                </div>
                <div class="priority-list">${prioritiesHtml || `<div style="padding: 16px; color: var(--ox-text-muted);"><div class="ox-text">No priority follow-ups were captured in this brief.</div></div>`}</div>
              </div>

            ${receiptsHtml ? `
              <div class="widget-section-block">
                <div class="widget-section-header">
                  <span class="widget-section-icon">${icons.clipboard(15)}</span>
                  <div class="widget-section-title">Top receipts</div>
                  <div class="widget-section-rule"></div>
                </div>
                <div class="priority-list">${receiptsHtml}</div>
              </div>
            ` : ''}

            ${artifactOutputHtml ? `
              <div class="widget-section-block">
                <div class="widget-section-header">
                  <span class="widget-section-icon">${icons.file(15)}</span>
                  <div class="widget-section-title">Overnight output</div>
                  <div class="widget-section-rule"></div>
                </div>
                <div class="artifact-output-grid">${artifactOutputHtml}</div>
              </div>
            ` : ''}

            ${reviewItemsHtml ? `
              <div class="widget-section-block">
                <div class="widget-section-header">
                  <span class="widget-section-icon">${icons.eye(15)}</span>
                  <div class="widget-section-title">Needs your review</div>
                  <div class="widget-section-rule"></div>
                </div>
                <div class="artifact-output-grid">${reviewItemsHtml}</div>
              </div>
            ` : ''}

            ${attentionHtml || exceptionsHtml || normalized.narrativeAvailable ? `
              <div class="widget-section-block">
                <div class="widget-section-header">
                  <span class="widget-section-icon">${icons.alert(15)}</span>
                  <div class="widget-section-title">Needs attention</div>
                  <div class="widget-section-rule"></div>
                </div>
                ${attentionHtml ? `<div class="signal-list">${attentionHtml}</div>` : ''}
                ${exceptionsHtml ? `<div class="exception-list">${exceptionsHtml}</div>` : ''}
                ${normalized.narrativeAvailable ? `<div class="brief-note" style="margin-top: 12px; margin-bottom: 0;">A narrative brief is available in the payload for downstream clients that want the full written summary.</div>` : ''}
              </div>
            ` : ''}
            </div>
          </div>
        </div>
      `);
    };

    if(isDemo) applyBootPayload();
    else initWidget({ render: d => { applyBootPayload(function(){ if(d) brief = d; }); } });
  </script>
</body>
</html>
