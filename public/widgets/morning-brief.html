<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Morning Brief - OrgX</title>
  <style>
      :root, :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(0, 0, 0, 0.08);
        --ox-border-strong: rgba(0, 0, 0, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-well-bg: #f1f5f9;
        --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
      }
      
      :root {
        --ox-lime: #a3e635; /* Will be overwritten by specific widgets */
        --ox-teal: #0d9488;
        --ox-danger: #e11d48;
        --ox-warning: #d97706;
        --ox-iris: #4f46e5;
        --ox-grid: rgba(0, 0, 0, 0.03);
        --ox-shadow: 0 12px 32px -12px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
        --ox-font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 24px 16px;
        -webkit-font-smoothing: antialiased;
        min-height: 100vh;
      }

      body::before {
        content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% 0%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%),
                    linear-gradient(var(--ox-grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        z-index: -1; pointer-events: none;
      }

      .container { max-width: 540px; margin: 0 auto; position: relative; }

      .ox-card {
        background: var(--ox-panel); border: 1px solid var(--ox-border); border-radius: 16px; box-shadow: var(--ox-shadow); position: relative; overflow: hidden; margin-bottom: 16px;
      }
      .ox-card-inner { padding: 24px; }
      .ox-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent); opacity: 0.8; }
      .ox-well { background: var(--ox-well-bg); border: 1px solid var(--ox-border); border-radius: 10px; padding: 16px; box-shadow: var(--ox-well-shadow); }
      .ox-eyebrow { font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ox-text-muted); font-weight: 600; }
      .ox-title { font-size: 1.15rem; font-weight: 600; letter-spacing: -0.02em; color: var(--ox-text); line-height: 1.3; }
      .ox-text { font-size: 0.9rem; line-height: 1.5; color: var(--ox-text); }
      

    :root { --ox-primary-rgb: 0, 201, 167; }
    
    .brief-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    
    .icon-box { width: 48px; height: 48px; border-radius: 12px; background: rgba(var(--ox-primary-rgb), 0.1); border: 1px solid rgba(var(--ox-primary-rgb), 0.2); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
    
    .metrics-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 28px; }
    .metric-card { padding: 14px 16px; border-radius: 12px; border: 1px solid var(--ox-border); background: var(--ox-well-bg); box-shadow: var(--ox-well-shadow); }
    .metric-value { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.03em; color: var(--ox-text); margin-top: 6px; }
    .metric-copy { font-size: 0.8rem; color: var(--ox-text-muted); line-height: 1.45; margin-top: 4px; }

    .section-title { display:flex; align-items:center; gap:12px; margin-bottom: 12px; }
    .section-title .rule { flex:1; height:1px; background:var(--ox-border); }

    .priority-list { display: flex; flex-direction: column; gap: 12px; margin-top: 12px; }
    
    .priority-item { position: relative; padding: 16px; padding-left: 20px; background: var(--ox-well-bg); border: 1px solid var(--ox-border); border-radius: 12px; box-shadow: var(--ox-well-shadow); }
    .priority-item::before { content: ''; position: absolute; left: -1px; top: -1px; bottom: -1px; width: 4px; border-radius: 4px 0 0 4px; }
    
    .priority-item[data-domain="product"]::before { background: var(--ox-lime); box-shadow: 0 0 10px var(--ox-lime); }
    .priority-item[data-domain="engineering"]::before { background: var(--ox-teal); box-shadow: 0 0 10px var(--ox-teal); }
    .priority-item[data-domain="marketing"]::before { background: var(--ox-warning); box-shadow: 0 0 10px var(--ox-warning); }
    .priority-item[data-domain="design"]::before { background: var(--ox-iris); box-shadow: 0 0 10px var(--ox-iris); }
    .priority-item[data-domain="sales"]::before { background: var(--ox-danger); box-shadow: 0 0 10px var(--ox-danger); }
    
    .p-domain { font-family: var(--ox-mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ox-text-muted); margin-bottom: 4px; font-weight: 600; }
    .p-title { font-weight: 600; font-size: 0.95rem; color: var(--ox-text); margin-bottom: 4px; }
    .p-reason { font-size: 0.85rem; color: var(--ox-text-muted); line-height: 1.4; }
    .brief-note { padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(var(--ox-primary-rgb), 0.18); background: rgba(var(--ox-primary-rgb), 0.08); color: var(--ox-text); line-height: 1.55; margin-bottom: 20px; }
    .exception-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .exception-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 999px; border: 1px solid rgba(var(--ox-primary-rgb), 0.18); background: rgba(var(--ox-primary-rgb), 0.08); color: var(--ox-text); font-family: var(--ox-mono); font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.06em; }
    .signal-list { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
    .signal-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--ox-border);
      background: var(--ox-well-bg);
      box-shadow: var(--ox-well-shadow);
    }
    .signal-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--ox-primary);
      box-shadow: 0 0 12px rgba(var(--ox-primary-rgb), 0.4);
      margin-top: 6px;
      flex-shrink: 0;
    }
    .signal-copy { display: flex; flex-direction: column; gap: 4px; }
    .signal-title { font-size: 0.84rem; font-weight: 600; color: var(--ox-text); }
    .signal-desc { font-size: 0.8rem; line-height: 1.5; color: var(--ox-text-muted); }

    @media (max-width: 560px) {
      .metrics-grid {
        grid-template-columns: 1fr;
      }
    }

    .skeleton-line {
      background: linear-gradient(90deg, var(--ox-border) 25%, rgba(var(--ox-primary-rgb),0.1) 50%, var(--ox-border) 75%);
      background-size: 200% 100%; animation: shimmer 2s infinite linear; border-radius: 4px;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  </style>
</head>
<body>
  <div class="container" id="content">
    <!-- Skeleton shown during loading -->
    <div class="skeleton-wrapper" style="display:flex; flex-direction:column; gap:20px; padding:24px;">
      <div>
        <div class="skeleton-line" style="width:140px; height:12px; margin-bottom:16px;"></div>
        <div class="skeleton-line" style="width:80%; height:24px; margin-bottom:8px;"></div>
        <div class="skeleton-line" style="width:100%; height:14px; margin-bottom:4px;"></div>
        <div class="skeleton-line" style="width:90%; height:14px;"></div>
      </div>
      <div style="border-top:1px solid var(--ox-border); padding-top:20px;">
        <div class="skeleton-line" style="width:100px; height:10px; margin-bottom:12px;"></div>
        <div style="display:flex; flex-direction:column; gap:12px;">
          <div style="background:var(--ox-well-bg); border-radius:10px; padding:14px;">
            <div class="skeleton-line" style="width:60px; height:10px; margin-bottom:6px;"></div>
            <div class="skeleton-line" style="width:70%; height:14px; margin-bottom:4px;"></div>
            <div class="skeleton-line" style="width:90%; height:12px;"></div>
          </div>
          <div style="background:var(--ox-well-bg); border-radius:10px; padding:14px;">
            <div class="skeleton-line" style="width:80px; height:10px; margin-bottom:6px;"></div>
            <div class="skeleton-line" style="width:65%; height:14px; margin-bottom:4px;"></div>
            <div class="skeleton-line" style="width:85%; height:12px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>

    // Sync theme from URL to override prefers-color-scheme
    (function() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();


    var injectHtml = (html) => {
      const content = document.getElementById('content');
      const skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton) {
        skeleton.style.opacity = '0';
        setTimeout(() => {
          content.innerHTML = html;
        }, 300);
      } else {
        content.innerHTML = html;
      }
    };

    
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      var _mcpPending = {};
      var _mcpNextId = 100;
      function initWidget(opts){var render=opts.render,getData=opts.getData||_extractData;var protocol=_detectProtocol();if(protocol==='chatgpt'){var d=getData(window.openai&&window.openai.toolOutput);render(d);window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});}else if(protocol==='mcp-apps'){render(null);var initId=1;window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'Widget',version:'1.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');window.addEventListener('message',function(event){var msg=event.data;if(!msg||typeof msg!=='object')return;if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}if(msg.id!=null&&_mcpPending[msg.id]){var p=_mcpPending[msg.id];delete _mcpPending[msg.id];if(msg.error)p.reject(new Error(msg.error.message||'Tool call failed'));else p.resolve(msg.result);return;}if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}});}else{render(null);}}
      function callTool(name, args){var protocol=_detectProtocol();if(protocol==='chatgpt')return window.openai&&window.openai.callTool?window.openai.callTool(name,args):Promise.resolve(null);if(protocol==='mcp-apps'){return new Promise(function(resolve,reject){var id=_mcpNextId++;_mcpPending[id]={resolve:resolve,reject:reject};window.parent.postMessage({jsonrpc:'2.0',id:id,method:'tools/call',params:{name:name,arguments:args}},'*');setTimeout(function(){if(_mcpPending[id]){delete _mcpPending[id];reject(new Error('Tool call '+name+' timed out'));}},30000);});}return Promise.resolve(null);}
      var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" aria-hidden="true">'+c+'</svg>';};
      var icons = {
        agent: function(s){return _svg('<rect x="3" y="11" width="18" height="10" rx="2"></rect><circle cx="12" cy="5" r="2"></circle><path d="M12 7v4"></path><line x1="8" y1="16" x2="8" y2="16"></line><line x1="16" y1="16" x2="16" y2="16"></line>',s);},
        search: function(s){return _svg('<circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>',s);},
        file: function(s){return _svg('<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline>',s);},
        external: function(s){return _svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>',s);},
        sun: function(s){return _svg('<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>',s);}
      };
      var escapeHtml = (str) => { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var brief = isDemo ? {
      generated_at: new Date().toISOString(),
      session_summary: { session_type: 'overnight', receipts_produced: 6, completed: 4, failed: 1 },
      value_dashboard: { value_delivered_usd: 1840, roi_display: '610%', decisions_resolved: 3, completed_this_week: 5 },
      summary: 'You have 2 pending approvals blocking the Q4 launch. Engineering is on track, but Marketing still needs your sign-off on the email sequence.',
      top_priorities: [
        { domain: 'Engineering', title: 'Review Database Strategy', reason: 'Blocks sprint 3 deliverables.' },
        { domain: 'Marketing', title: 'Approve Email Sequence', reason: 'Launch is in 4 days. Needs scheduling today.' },
        { domain: 'Product', title: 'Scope V2 Features', reason: 'Draft PRD generated overnight by Pace.' }
      ],
      top_receipts: [
        { intent: 'Closed launch QA loop', attributed_value_usd: 420 },
        { intent: 'Resolved routing regression', attributed_value_usd: 310 }
      ],
      exceptions: [{ exception_type: 'budget_guardrail' }],
      brief_markdown: '# Morning Brief'
    } : null;
    var isLoading = !isDemo;

    var isLoadingOverride = new URLSearchParams(window.location.search).get('loading') === 'true';
    if (isLoadingOverride) {
      isLoading = true;
      isDemo = false;
      // Overwrite initWidget to do nothing so it hangs on loading
      initWidget = () => { render(); };
    }
    var formatCurrency = (value) => {
      var num = Number(value);
      if (!Number.isFinite(num)) return null;
      return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: num >= 100 ? 0 : 2 }).format(num);
    };
    var formatDate = (value) => {
      var date = value ? new Date(value) : new Date();
      if (isNaN(date.getTime())) date = new Date();
      return date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
    };
    var normalizeBrief = (payload) => {
      if (!payload) return null;
      var sessionSummary = payload.session_summary && typeof payload.session_summary === 'object' ? payload.session_summary : {};
      var valueDashboard = payload.value_dashboard && typeof payload.value_dashboard === 'object' ? payload.value_dashboard : {};
      var workspacePulse = payload.workspace_pulse && typeof payload.workspace_pulse === 'object' ? payload.workspace_pulse : {};
      var workspaceStats = workspacePulse.stats && typeof workspacePulse.stats === 'object' ? workspacePulse.stats : {};
      var topReceipts = Array.isArray(payload.top_receipts) ? payload.top_receipts : [];
      var exceptions = Array.isArray(payload.exceptions) ? payload.exceptions : [];
      var nextActions = Array.isArray(payload.next_actions)
        ? payload.next_actions
        : Array.isArray(payload.recommended_actions)
        ? payload.recommended_actions
        : [];
      var pendingDecisions = Number(
        payload.pending_decisions ??
        workspaceStats.pendingDecisions ??
        workspaceStats.pending_decisions
      );
      var activeInitiatives = Number(
        workspaceStats.activeInitiatives ??
        workspaceStats.active_initiatives
      );
      var blockedWork = Number(
        payload.blocked_workstreams ??
        payload.blocked_items ??
        workspaceStats.blockedWorkstreams ??
        workspaceStats.blocked_workstreams
      );
      var summary = typeof payload.summary === 'string' && payload.summary.trim()
        ? payload.summary.trim()
        : typeof payload.message === 'string' && payload.message.trim()
        ? payload.message.trim()
        : null;
      if (!summary) {
        var sessionType = typeof sessionSummary.session_type === 'string' ? sessionSummary.session_type : 'recent';
        var receiptsProduced = Number(sessionSummary.receipts_produced);
        var completed = Number(sessionSummary.completed);
        var failed = Number(sessionSummary.failed);
        var clauses = [];
        if (Number.isFinite(receiptsProduced)) clauses.push(receiptsProduced + ' receipt' + (receiptsProduced === 1 ? '' : 's') + ' produced');
        if (Number.isFinite(completed)) clauses.push(completed + ' completed');
        if (Number.isFinite(failed) && failed > 0) clauses.push(failed + ' flagged');
        if (!clauses.length) clauses.push('continuity signals updated');
        summary = titleCase(sessionType) + ' session: ' + clauses.join(', ') + '.';
      }
      var priorities = Array.isArray(payload.top_priorities) ? payload.top_priorities.slice() : [];
      if (!priorities.length && nextActions.length) {
        priorities = nextActions.slice(0, 3).map((action) => ({
          domain: action.domain || action.type || 'Execution',
          title: action.title || action.label || 'Recommended follow-up',
          reason: action.reason || action.summary || action.message || 'OrgX flagged this as the next best move.'
        }));
      }
      if (!priorities.length) {
        priorities = topReceipts.slice(0, 3).map((receipt) => ({
          domain: 'Execution',
          title: typeof receipt.intent === 'string' && receipt.intent.trim() ? receipt.intent.trim() : 'Recent execution receipt',
          reason: formatCurrency(receipt.attributed_value_usd) ? 'Attributed value: ' + formatCurrency(receipt.attributed_value_usd) : 'Captured as part of the latest brief.'
        }));
      }
      var metrics = [
        { label: 'Value delivered', value: formatCurrency(valueDashboard.value_delivered_usd) || 'N/A', copy: 'Attributed delivery from the recent autonomous window.' },
        { label: 'ROI', value: typeof valueDashboard.roi_display === 'string' && valueDashboard.roi_display ? valueDashboard.roi_display : 'N/A', copy: 'Economic proof from the 30-day ledger.' },
        Number.isFinite(pendingDecisions)
          ? { label: 'Pending decisions', value: String(Math.max(0, pendingDecisions)), copy: 'Operator approvals still waiting in the current workspace.' }
          : { label: 'Decisions resolved', value: Number.isFinite(Number(valueDashboard.decisions_resolved)) ? String(valueDashboard.decisions_resolved) : '0', copy: 'Approvals and corrections closed across the recent cycle.' },
        Number.isFinite(activeInitiatives) && activeInitiatives > 0
          ? { label: 'Active initiatives', value: String(activeInitiatives), copy: 'Initiatives still in flight across the workspace.' }
          : { label: 'Completed this week', value: Number.isFinite(Number(valueDashboard.completed_this_week)) ? String(valueDashboard.completed_this_week) : '0', copy: 'Workstreams or initiatives closed in the current week.' }
      ];
      var attentionSignals = [];
      if (Number.isFinite(pendingDecisions) && pendingDecisions > 0) {
        attentionSignals.push({
          title: pendingDecisions + ' pending decision' + (pendingDecisions === 1 ? '' : 's'),
          description: 'Approvals are still waiting for an operator call before downstream execution can continue.'
        });
      }
      if (Number.isFinite(blockedWork) && blockedWork > 0) {
        attentionSignals.push({
          title: blockedWork + ' blocked workstream' + (blockedWork === 1 ? '' : 's'),
          description: 'Blocked execution surfaced in the workspace pulse and should be reviewed with the owning agent.'
        });
      }
      if (exceptions.length > 0) {
        attentionSignals.push({
          title: exceptions.length + ' exception' + (exceptions.length === 1 ? '' : 's') + ' need review',
          description: 'Guardrail, budget, or routing exceptions were captured in the latest autonomous session.'
        });
      }
      return {
        date: formatDate(payload.generated_at || payload.created_at || (payload.workspace_pulse && payload.workspace_pulse.generatedAt)),
        summary: summary,
        metrics: metrics,
        priorities: priorities,
        exceptions: exceptions,
        topReceipts: topReceipts,
        attentionSignals: attentionSignals,
        narrativeAvailable: typeof payload.brief_markdown === 'string' && payload.brief_markdown.trim().length > 0
      };
    };
    var titleCase = value => String(value || '').replace(/[_-]+/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    var render = () => {
      if(isLoading) return;
      var normalized = normalizeBrief(brief);
      if(!normalized) { injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.sun(24)}</div><div class="empty-title">No brief available</div><div class="empty-desc">Your morning briefing has not been generated yet.</div></div>`); return; }

      const metricsHtml = normalized.metrics.map((metric) => `
        <div class="metric-card">
          <div class="ox-eyebrow">${escapeHtml(metric.label)}</div>
          <div class="metric-value">${escapeHtml(metric.value)}</div>
          <div class="metric-copy">${escapeHtml(metric.copy)}</div>
        </div>
      `).join('');
      const prioritiesHtml = normalized.priorities.map((p, i) => {
        var domain = String(p.domain || 'execution').toLowerCase();
        var accent = domain === 'product' ? 'lime' : domain === 'engineering' ? 'teal' : domain === 'marketing' ? 'warning' : domain === 'design' ? 'iris' : domain === 'sales' ? 'danger' : 'teal';
        return `
          <div class="priority-item animate-in" style="animation-delay: ${0.1 * i}s" data-domain="${escapeHtml(domain)}">
            <div class="p-domain" style="color: var(--ox-${accent})">${escapeHtml(titleCase(p.domain || 'Execution'))}</div>
            <div class="p-title">${escapeHtml(p.title || 'Priority item')}</div>
            <div class="p-reason">${escapeHtml(p.reason || 'No rationale provided.')}</div>
          </div>
        `;
      }).join('');
      const receiptsHtml = normalized.topReceipts.slice(0, 2).map((receipt) => `
        <div class="priority-item" data-domain="engineering">
          <div class="p-domain" style="color: var(--ox-teal)">Receipt</div>
          <div class="p-title">${escapeHtml(receipt.intent || 'Execution receipt')}</div>
          <div class="p-reason">${escapeHtml(formatCurrency(receipt.attributed_value_usd) ? 'Attributed value: ' + formatCurrency(receipt.attributed_value_usd) : 'Captured in the most recent brief.')}</div>
        </div>
      `).join('');
      const exceptionsHtml = normalized.exceptions.slice(0, 4).map((item) => `<span class="exception-pill">${escapeHtml(titleCase(item.exception_type || item.type || 'Review'))}</span>`).join('');
      const attentionHtml = (normalized.attentionSignals || []).map((item) => `
        <div class="signal-item">
          <div class="signal-dot"></div>
          <div class="signal-copy">
            <div class="signal-title">${escapeHtml(item.title)}</div>
            <div class="signal-desc">${escapeHtml(item.description)}</div>
          </div>
        </div>
      `).join('');

      injectHtml(`
        <div class="ox-card animate-in">
          <div class="ox-card-inner">
            <div class="brief-header">
              <div>
                <h1 class="ox-title" style="font-size:1.5rem; margin-bottom:4px;">Morning Brief</h1>
                <div class="ox-eyebrow">${escapeHtml(normalized.date)}</div>
              </div>
              <div class="icon-box">${icons.sun(24)}</div>
            </div>
            
            <div class="brief-note">
              <div class="ox-eyebrow" style="margin-bottom:8px; color:var(--ox-primary);">TL;DR</div>
              <div class="ox-text">${escapeHtml(normalized.summary)}</div>
            </div>

            <div class="metrics-grid">${metricsHtml}</div>

            <div style="margin-bottom: 24px;">
              <div class="section-title">
                <div class="ox-eyebrow">Top priorities</div>
                <div class="rule"></div>
              </div>
              <div class="priority-list">${prioritiesHtml || `<div class="ox-well"><div class="ox-text">No priority follow-ups were captured in this brief.</div></div>`}</div>
            </div>

            ${receiptsHtml ? `
              <div style="margin-bottom: 24px;">
                <div class="section-title">
                  <div class="ox-eyebrow">Top receipts</div>
                  <div class="rule"></div>
                </div>
                <div class="priority-list">${receiptsHtml}</div>
              </div>
            ` : ''}

            ${attentionHtml || exceptionsHtml || normalized.narrativeAvailable ? `
              <div>
                <div class="section-title">
                  <div class="ox-eyebrow">Needs attention</div>
                  <div class="rule"></div>
                </div>
                ${attentionHtml ? `<div class="signal-list">${attentionHtml}</div>` : ''}
                ${exceptionsHtml ? `<div class="exception-list">${exceptionsHtml}</div>` : ''}
                ${normalized.narrativeAvailable ? `<div class="brief-note" style="margin-top: 12px; margin-bottom: 0;">A narrative brief is available in the payload for downstream clients that want the full written summary.</div>` : ''}
              </div>
            ` : ''}
          </div>
        </div>
      `);
    };

    if(isDemo) render();
    else initWidget({ render: d => { if(d) brief = d; isLoading = false; render(); } });
  </script>
</body>
</html>
