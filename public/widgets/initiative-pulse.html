<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Initiative Pulse - OrgX</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2302040a'/%3E%3Ccircle cx='32' cy='32' r='15' fill='none' stroke='%2300C9A7' stroke-width='6'/%3E%3Cpath d='M20 34l7-7 6 6 12-12' stroke='%2300C9A7' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="shared/widget-foundation.css" />
    <style>
      :root, :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(0, 0, 0, 0.08);
        --ox-border-strong: rgba(0, 0, 0, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-well-bg: #f1f5f9;
        --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
      }
      
      :root {
        --ox-lime: #a3e635; /* Will be overwritten by specific widgets */
        --ox-teal: #0d9488;
        --ox-danger: #e11d48;
        --ox-warning: #d97706;
        --ox-iris: #4f46e5;
        --ox-primary: #00C9A7;
        --ox-primary-rgb: 0, 201, 167;
        --ox-grid: rgba(0, 0, 0, 0.03);
        --ox-grid-color: rgba(0, 0, 0, 0.03);
        --ox-shadow: 0 12px 32px -12px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
        --ox-font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-grid-color: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-grid-color: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }
      .error-state { border-style: solid; border-color: rgba(225,29,72,0.2); background: rgba(225,29,72,0.04); }
      .error-state .empty-icon { color: var(--ox-danger); background: rgba(225,29,72,0.08); box-shadow: none; }
      .error-state .empty-desc { max-width: 360px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 16px;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Cinematic Background Grid & Glows */
      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% -20%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%),
                    linear-gradient(var(--ox-grid-color) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid-color) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        z-index: -1;
        pointer-events: none;
      }

      .container { max-width: 520px; margin: 0 auto; position: relative; }

      .ox-card { background: var(--ox-panel); border: 1px solid var(--ox-border); border-radius: 16px; box-shadow: var(--ox-shadow); position: relative; overflow: hidden; margin-bottom: 16px; }
      .ox-card-inner { padding: 24px; }
      .ox-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent); opacity: 0.8; }
      .widget-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid var(--ox-border);
      }
      .deep-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        min-height: 48px;
        max-width: 100%;
        padding: 12px 16px;
        border-radius: 14px;
        border: 1px solid rgba(var(--ox-primary-rgb), 0.28);
        background: rgba(var(--ox-primary-rgb), 0.08);
        font-size: 0.84rem;
        font-weight: 700;
        color: var(--ox-text);
        text-decoration: none;
        text-align: center;
        line-height: 1.15;
        transition:
          transform 0.18s ease,
          border-color 0.18s ease,
          background 0.18s ease;
      }
      .deep-link:hover {
        transform: translateY(-1px);
        border-color: rgba(var(--ox-primary-rgb), 0.38);
        background: rgba(var(--ox-primary-rgb), 0.12);
      }
      .deep-link svg { width: 16px; height: 16px; flex-shrink: 0; }


      

      

      .pulse-header, .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      
      .header-padded {
         padding-bottom: 16px;
         border-bottom: 1px solid var(--ox-border);
      }

      .pulse-name, .title {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ox-text);
        line-height: 1.2;
      }

      .status-badge, .badge {
        padding: 4px 10px;
        border-radius: 4px;
        font-family: var(--ox-mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: 1px solid var(--ox-border);
        font-weight: 600;
      }

      .status-active { background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); border-color: rgba(var(--ox-primary-rgb), 0.2); }
      .status-completed { background: rgba(0,201,167,0.1); color: var(--ox-teal); border-color: rgba(0,201,167,0.2); }
      .status-blocked { background: rgba(225,29,72,0.1); color: var(--ox-danger); border-color: rgba(225,29,72,0.2); }

      @media (prefers-color-scheme: dark) {
         .status-blocked { background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.2); }
      }

      .detail-label {
        font-family: var(--ox-mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ox-text-muted);
        font-weight: 600;
      }

      .roi-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }

      .roi-item {
        background: rgba(128,128,128,0.03);
        border: 1px solid var(--ox-border);
        border-radius: 8px;
        padding: 12px;
        position: relative;
        overflow: hidden;
      }

      @media (prefers-color-scheme: dark) {
         .roi-item { background: rgba(255,255,255,0.02); }
      }

      .roi-item::before {
        content: '';
        position: absolute;
        top: 0; right: 0; width: 50%; height: 100%;
        background: radial-gradient(circle at top right, rgba(var(--ox-primary-rgb),0.05), transparent);
        pointer-events: none;
      }

      .roi-label {
        font-family: var(--ox-mono);
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ox-text-muted);
        font-weight: 600;
      }

      .roi-value {
        margin-top: 6px;
        font-size: 1.125rem;
        font-family: var(--ox-mono);
        color: var(--ox-text);
        font-weight: 600;
      }

      .roi-value.positive { color: var(--ox-teal); }
      .roi-value.negative { color: var(--ox-danger); }

      .pulse-message {
        margin-top: 18px;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid rgba(var(--ox-primary-rgb), 0.14);
        background: linear-gradient(180deg, rgba(var(--ox-primary-rgb), 0.08), rgba(var(--ox-primary-rgb), 0.03));
        color: var(--ox-text);
        line-height: 1.55;
      }

      .insight-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        margin-top: 20px;
      }

      .insight-card {
        min-width: 0;
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--ox-border);
        background: rgba(255, 255, 255, 0.02);
      }

      .insight-list {
        list-style: none;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 10px;
      }

      .insight-list li {
        position: relative;
        padding-left: 12px;
        color: var(--ox-text);
        line-height: 1.45;
      }

      .insight-list li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.6em;
        width: 4px;
        height: 4px;
        border-radius: 999px;
        background: var(--ox-primary);
        opacity: 0.8;
      }

      .insight-empty {
        margin-top: 10px;
        font-size: 0.84rem;
        color: var(--ox-text-muted);
        line-height: 1.45;
      }

      .pulse-cta-row {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: nowrap;
        margin-left: auto;
        min-width: 0;
      }

      .cta-button {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        min-width: 196px;
        max-width: 100%;
        padding: 0 18px;
        border-radius: 12px;
        border: 1px solid rgba(var(--ox-primary-rgb), 0.22);
        background: rgba(var(--ox-primary-rgb), 0.12);
        color: var(--ox-text);
        text-decoration: none;
        font-size: 0.84rem;
        font-weight: 700;
        line-height: 1;
        white-space: nowrap;
        flex-shrink: 0;
        transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      }

      .cta-button__label {
        display: inline-flex;
        align-items: center;
        white-space: nowrap;
      }

      .cta-button svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }

      .cta-button:hover {
        transform: translateY(-1px);
        border-color: rgba(var(--ox-primary-rgb), 0.35);
        background: rgba(var(--ox-primary-rgb), 0.16);
      }

      .milestone-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 24px;
      }

      .artifact-panel {
        margin-top: 24px;
        padding: 16px;
        border-radius: 14px;
        border: 1px solid var(--ox-border);
        background: rgba(255, 255, 255, 0.02);
      }

      .artifact-panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }
      .artifact-panel-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }
      .artifact-panel-icon {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(var(--ox-primary-rgb), 0.1);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.18);
        color: var(--ox-primary);
        flex-shrink: 0;
      }
      .artifact-panel-icon svg { width: 16px; height: 16px; }

      .artifact-count {
        font-family: var(--ox-mono);
        font-size: 0.68rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ox-text-muted);
      }

      .artifact-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .artifact-row {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid var(--ox-border);
        background: var(--ox-well-bg);
        box-shadow: var(--ox-well-shadow);
      }
      .artifact-row-main {
        display: flex;
        gap: 12px;
        min-width: 0;
      }
      .artifact-row-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(var(--ox-primary-rgb), 0.08);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.16);
        color: var(--ox-primary);
        flex-shrink: 0;
      }
      .artifact-row-icon svg { width: 16px; height: 16px; }
      .artifact-row-body { min-width: 0; flex: 1; }

      .artifact-row-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .artifact-title {
        font-size: 0.92rem;
        font-weight: 600;
        line-height: 1.35;
        color: var(--ox-text);
      }

      .artifact-meta {
        margin-top: 6px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .artifact-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 8px;
        border-radius: 999px;
        border: 1px solid var(--ox-border);
        background: rgba(255, 255, 255, 0.02);
        font-family: var(--ox-mono);
        font-size: 0.64rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--ox-text-muted);
      }

      .artifact-pill.status-approved {
        color: var(--ox-teal);
        border-color: rgba(0, 201, 167, 0.18);
        background: rgba(0, 201, 167, 0.08);
      }

      .artifact-pill.status-in_review,
      .artifact-pill.status-draft {
        color: var(--ox-warning);
        border-color: rgba(251, 191, 36, 0.22);
        background: rgba(251, 191, 36, 0.08);
      }

      .artifact-copy {
        margin-top: 10px;
        font-size: 0.82rem;
        line-height: 1.5;
        color: var(--ox-text-muted);
      }

      .artifact-panel-footer {
        margin-top: 14px;
        display: flex;
        justify-content: flex-end;
      }
      .detail-header {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .detail-icon {
        width: 24px;
        height: 24px;
        border-radius: 8px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(var(--ox-primary-rgb), 0.08);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.16);
        color: var(--ox-primary);
        flex-shrink: 0;
      }
      .detail-icon svg { width: 13px; height: 13px; }
      .milestone-section-title {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 24px;
        margin-bottom: 12px;
      }

      .artifact-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.8rem;
        font-weight: 600;
        color: var(--ox-text);
        text-decoration: none;
      }
      .artifact-row-actions {
        margin-top: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .artifact-chip-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border-radius: 999px;
        border: 1px solid var(--ox-border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--ox-text);
        text-decoration: none;
        font-family: var(--ox-mono);
        font-size: 0.66rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .artifact-chip-link:hover {
        border-color: rgba(var(--ox-primary-rgb), 0.22);
        background: rgba(var(--ox-primary-rgb), 0.08);
      }

      .milestone-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid var(--ox-border);
        background: rgba(128,128,128,0.03);
      }

      .milestone-title {
        font-size: 0.92rem;
        color: var(--ox-text);
        font-weight: 600;
        line-height: 1.35;
      }

      .milestone-meta {
        margin-top: 4px;
        font-family: var(--ox-mono);
        font-size: 0.62rem;
        color: var(--ox-text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      @media (prefers-color-scheme: dark) {
         .roi-value.positive { color: var(--ox-lime); text-shadow: 0 0 10px rgba(191,255,0,0.3); }
      }

      .health-indicator {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--ox-mono);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
      }

      .health-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        box-shadow: 0 0 8px currentColor;
      }
      
      .health-on-track { color: var(--ox-teal); }
      .health-attention { color: var(--ox-warning); }
      .health-at-risk { color: var(--ox-danger); }

      @media (prefers-color-scheme: dark) {
          .health-on-track { color: var(--ox-lime); }
      }

      .blockers-alert {
        margin-top: 24px;
        padding: 16px;
        background: rgba(225,29,72,0.05);
        border: 1px solid rgba(225,29,72,0.2);
        border-radius: 8px;
        position: relative;
      }

      @media (prefers-color-scheme: dark) {
         .blockers-alert { background: rgba(244,63,94,0.05); border-color: rgba(244,63,94,0.2); }
      }

      .blockers-alert::before {
        content: '';
        position: absolute;
        top: 0; left: 0; bottom: 0; width: 3px;
        background: var(--ox-danger);
        box-shadow: 0 0 8px var(--ox-danger);
      }

      .blockers-title {
        font-family: var(--ox-mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ox-danger);
        margin-bottom: 8px;
        font-weight: 700;
      }

      .blockers-list {
        list-style: none;
        font-size: 0.875rem;
        color: var(--ox-text);
        line-height: 1.6;
      }
      .blockers-list li { margin-bottom: 4px; padding-left: 14px; position: relative; font-weight: 500; }
      .blockers-list li::before {
        content: '›';
        position: absolute; left: 0; color: var(--ox-danger); opacity: 0.8; font-weight: bold;
      }

      @media (max-width: 560px) {
        .pulse-header,
        .widget-footer {
          flex-direction: column;
          align-items: flex-start;
          gap: 12px;
        }

        .roi-strip,
        .insight-grid {
          grid-template-columns: 1fr;
          flex-direction: column;
        }

        .pulse-cta-row {
          flex-direction: column;
          width: 100%;
          margin-left: 0;
          align-items: stretch;
        }

        .cta-button,
        .deep-link {
          width: 100%;
          min-width: 0;
        }
      }

      /* Shared Widget Specifics */
      .icon-container {

        <div class="milestone-section-title"><span class="detail-icon">${icons.layers(13)}</span><div class="detail-label">Milestone progress</div></div>
        <div class="milestone-list">
          ${(pulse.milestones || []).slice(0, 4).map(milestone => `
            <div class="milestone-row">
              <div>
                <div class="milestone-title">${escapeHtml(milestone.name || milestone.title || 'Untitled milestone')}</div>
                <div class="milestone-meta">${escapeHtml((milestone.status || 'planned').replace(/_/g, ' '))}</div>
              </div>
              <div class="status-indicator">
                <span class="status-dot"></span>
                ${escapeHtml(String(typeof milestone.progress === 'number' ? milestone.progress : 0))}%
              </div>
            </div>
          `).join('')}
        </div>
      ` : '';
      var dashboardUrl = pulse.live_url || (pulse.id ? `https://useorgx.com/live/${encodeURIComponent(pulse.id)}` : 'https://useorgx.com/live?view=mission-control');
      const recentArtifactsHtml = (pulse.recent_artifacts || []).length ? `
        <div class="artifact-panel">
          <div class="artifact-panel-header">
            <div class="artifact-panel-title"><span class="artifact-panel-icon">${icons.layers(16)}</span><div class="detail-label">Recent artifacts</div></div>
            <div class="artifact-count">${escapeHtml(String((pulse.artifact_summary && pulse.artifact_summary.total) || pulse.recent_artifacts.length))} total</div>
          </div>
          <div class="artifact-list">
            ${(pulse.recent_artifacts || []).slice(0, 3).map(function(artifact) {
              var title = escapeHtml(artifact.title || artifact.name || 'Untitled artifact');
              var type = escapeHtml(String(artifact.artifact_type || artifact.type || 'artifact').replace(/_/g, '.'));
              var status = escapeHtml(String(artifact.status || 'draft').replace(/_/g, ' '));
              var statusClass = 'status-' + String(artifact.status || 'draft').replace(/[^a-zA-Z0-9_-]/g, '_');
              var author = escapeHtml(artifact.created_by_name || artifact.created_by || 'OrgX agent');
              var age = formatRelative(artifact.created_at || artifact.updated_at);
              var summary = escapeHtml(artifact.summary || artifact.description || '');
              var primaryUrl = artifactUrl(artifact, dashboardUrl);
              var primaryLabel = artifactLabel(artifact);
              return `
                <div class="artifact-row">
                  <div class="artifact-row-main">
                    <div class="artifact-row-icon">${artifactIcon(artifact.artifact_type)}</div>
                    <div class="artifact-row-body">
                      <div class="artifact-row-header">
                        <div class="artifact-title">${title}</div>
                        <span class="artifact-pill ${statusClass}">${status}</span>
                      </div>
                      <div class="artifact-meta">
                        <span class="artifact-pill">${type}</span>
                        <span class="artifact-pill">${author}</span>
                        ${age ? `<span class="artifact-pill">${escapeHtml(age)}</span>` : ''}
                      </div>
                      ${summary ? `<div class="artifact-copy">${summary}</div>` : ''}
                      <div class="artifact-row-actions">
                        <a href="${primaryUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(primaryUrl))}, event)' class="artifact-chip-link">${icons.external(14)} ${primaryLabel}</a>
                      </div>
                    </div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
          <div class="artifact-panel-footer">
            <a href="${dashboardUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(dashboardUrl || ''))}, event)' class="artifact-link">
              Review artifacts in live view
              ${icons.external(14)}
            </a>
          </div>
        </div>
      ` : '';

      injectHtml(`
        <div class="widget-shell-card animate-in">
          <div class="ox-card">
            <div class="ox-card-inner">
              <div class="widget-hero">
                <div class="widget-hero-copy">
                  <div class="widget-kicker">Initiative Pulse</div>
                  <div class="widget-title-lg">${safeName}</div>
                  <div class="widget-subtitle">${safeMessage || 'Health, momentum, blockers, and recent output for the current initiative.'}</div>
                </div>
                <div class="widget-stack" style="align-items:flex-end; gap:10px;">
                  <div class="widget-icon-frame">${icons.layers(20)}</div>
                  <span class="status-badge status-${normalizedStatus}">${safeStatus}</span>
                </div>
              </div>

            ${roiSummary ? `
              <div class="roi-strip">
                <div class="roi-item"><div class="roi-label">Cost</div><div class="roi-value">${formatUsd(roiSummary.total_cost)}</div></div>
                <div class="roi-item"><div class="roi-label">Value</div><div class="roi-value positive">${formatUsd(roiSummary.total_value)}</div></div>
                <div class="roi-item"><div class="roi-label">ROI (${escapeHtml(roiSummary.period || '30d')})</div><div class="roi-value ${roiValue !== null && roiValue >= 0 ? 'positive' : 'negative'}">${formatRoi(roiValue)}</div></div>
              </div>
            ` : ''}

            <div class="health-indicator ${getHealthClass(healthScore)}">
              <span class="health-dot bg-current"></span>
              <span>${getHealthLabel(healthScore)} (${healthScore})</span>
            </div>

            <div class="insight-grid">
              <div class="insight-card">
                <div class="detail-header"><span class="detail-icon">${icons.clipboard(13)}</span><div class="detail-label">Immediate next steps</div></div>
                ${nextStepsHtml}
              </div>
              <div class="insight-card">
                <div class="detail-header"><span class="detail-icon">${icons.layers(13)}</span><div class="detail-label">Workstream state</div></div>
                <ul class="insight-list">
                  <li>${activeWorkstreams} active workstream${activeWorkstreams === 1 ? '' : 's'}</li>
                  <li>${pulse.blocked_workstreams || 0} blocked workstream${(pulse.blocked_workstreams || 0) === 1 ? '' : 's'}</li>
                  <li>${pendingDecisions} pending decision${pendingDecisions === 1 ? '' : 's'}</li>
                </ul>
              </div>
            </div>

            ${recentArtifactsHtml}
            ${milestonesHtml}
            ${blockerPanelHtml}

              <div class="widget-footer">
                <span class="widget-footer-meta">Synced</span>
                <div class="pulse-cta-row">
                  <a href="${dashboardUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(dashboardUrl || ''))}, event)' class="cta-button">
                    <span class="cta-button__label">${pulse.live_url ? 'Open Live View' : 'Open Dashboard'}</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                  </a>
                </div>
              </div>
            </div>
          </div>
        </div>
      `);
    };

    if(isDemo) applyBootPayload();
    else initWidget({ render: d => { applyBootPayload(function(){ if(d) pulse = d; }); } });
  </script>
  </body>
</html>
