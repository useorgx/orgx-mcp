<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Initiative Pulse - OrgX</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%2302040a'/%3E%3Ccircle cx='32' cy='32' r='15' fill='none' stroke='%2300C9A7' stroke-width='6'/%3E%3Cpath d='M20 34l7-7 6 6 12-12' stroke='%2300C9A7' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="shared/widget-foundation.css" />
    <style>
      :root,
      :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(15, 23, 42, 0.09);
        --ox-border-strong: rgba(15, 23, 42, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-text-dim: #94a3b8;
        --ox-well-bg: #f3f6f9;
        --ox-well-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
        --ox-grid-color: rgba(15, 23, 42, 0.04);
        --ox-shadow: 0 20px 44px -22px rgba(15, 23, 42, 0.18),
          0 6px 14px rgba(15, 23, 42, 0.05);
      }

      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.96);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.16);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.56);
          --ox-text-dim: rgba(255, 255, 255, 0.32);
          --ox-well-bg: rgba(255, 255, 255, 0.02);
          --ox-well-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
          --ox-grid-color: rgba(255, 255, 255, 0.025);
          --ox-shadow: 0 24px 50px -18px rgba(0, 0, 0, 0.62),
            inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
      }

      :root[data-theme="dark"] {
        --ox-bg: #02040a;
        --ox-panel: rgba(10, 15, 22, 0.96);
        --ox-border: rgba(255, 255, 255, 0.08);
        --ox-border-strong: rgba(255, 255, 255, 0.16);
        --ox-text: #f8fafc;
        --ox-text-muted: rgba(255, 255, 255, 0.56);
        --ox-text-dim: rgba(255, 255, 255, 0.32);
        --ox-well-bg: rgba(255, 255, 255, 0.02);
        --ox-well-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
        --ox-grid-color: rgba(255, 255, 255, 0.025);
        --ox-shadow: 0 24px 50px -18px rgba(0, 0, 0, 0.62),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
      }

      :root {
        --ox-primary: #00c9a7;
        --ox-primary-rgb: 0, 201, 167;
        --ox-lime: #d4ed31;
        --ox-warning: #fbbf24;
        --ox-danger: #f43f5e;
        --ox-font: -apple-system, BlinkMacSystemFont, "Inter", system-ui,
          sans-serif;
        --ox-mono: "JetBrains Mono", "SF Mono", ui-monospace, SFMono-Regular,
          monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 16px;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: radial-gradient(
            circle at 50% -18%,
            rgba(var(--ox-primary-rgb), 0.1),
            transparent 56%
          ),
          linear-gradient(var(--ox-grid-color) 1px, transparent 1px),
          linear-gradient(90deg, var(--ox-grid-color) 1px, transparent 1px);
        background-size: 100% 100%, 22px 22px, 22px 22px;
        pointer-events: none;
        z-index: -1;
      }

      .container {
        max-width: 520px;
        margin: 0 auto;
      }

      .ox-card {
        background: var(--ox-panel);
        border: 1px solid var(--ox-border);
        border-radius: 18px;
        box-shadow: var(--ox-shadow);
        position: relative;
        overflow: hidden;
      }

      .ox-card::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(var(--ox-primary-rgb), 0.52),
          transparent
        );
        opacity: 0.85;
      }

      .ox-card-inner {
        padding: 24px;
      }

      .widget-shell-card {
        margin-bottom: 18px;
      }

      .widget-shell-card .deep-link {
        min-height: 46px;
      }

      .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 26px;
        padding: 0 10px;
        border-radius: 999px;
        font-family: var(--ox-mono);
        font-size: 0.62rem;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        border: 1px solid currentColor;
        white-space: nowrap;
      }

      .status-badge.status-active,
      .status-badge.status-in_progress,
      .status-badge.status-running {
        color: var(--ox-primary);
        background: rgba(var(--ox-primary-rgb), 0.11);
        border-color: rgba(var(--ox-primary-rgb), 0.24);
      }

      .status-badge.status-completed,
      .status-badge.status-approved {
        color: var(--ox-lime);
        background: rgba(212, 237, 49, 0.1);
        border-color: rgba(212, 237, 49, 0.18);
      }

      .status-badge.status-blocked,
      .status-badge.status-failed,
      .status-badge.status-at_risk {
        color: var(--ox-danger);
        background: rgba(244, 63, 94, 0.1);
        border-color: rgba(244, 63, 94, 0.2);
      }

      .status-badge.status-ready,
      .status-badge.status-pending,
      .status-badge.status-in_review,
      .status-badge.status-ramping_up {
        color: var(--ox-warning);
        background: rgba(251, 191, 36, 0.1);
        border-color: rgba(251, 191, 36, 0.22);
      }

      .status-badge.status-paused,
      .status-badge.status-draft,
      .status-badge.status-idle {
        color: var(--ox-text-muted);
        background: rgba(148, 163, 184, 0.12);
        border-color: rgba(148, 163, 184, 0.18);
      }

      .pulse-shell {
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .pulse-hero {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 22px;
        align-items: center;
      }

      .pulse-health {
        position: relative;
        width: 116px;
        height: 116px;
        flex: none;
      }

      .pulse-health::before {
        content: "";
        position: absolute;
        inset: 12px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(var(--ox-primary-rgb), 0.16),
          transparent 70%
        );
        opacity: 0.85;
        pointer-events: none;
      }

      .pulse-health svg {
        width: 100%;
        height: 100%;
        display: block;
        transform: rotate(-90deg);
        filter: drop-shadow(0 0 24px rgba(var(--ox-primary-rgb), 0.18));
      }

      .pulse-health__track {
        fill: none;
        stroke: rgba(148, 163, 184, 0.2);
        stroke-width: 5;
      }

      .pulse-health__bar {
        fill: none;
        stroke: var(--ox-primary);
        stroke-width: 5;
        stroke-linecap: round;
        transition: stroke-dashoffset 360ms ease, stroke 180ms ease;
      }

      .pulse-health.tone-warning .pulse-health__bar {
        stroke: var(--ox-warning);
      }

      .pulse-health.tone-danger .pulse-health__bar {
        stroke: var(--ox-danger);
      }

      .pulse-health__value {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: none;
      }

      .pulse-health__number {
        font-size: 2rem;
        line-height: 0.95;
        letter-spacing: -0.06em;
        font-weight: 700;
        color: var(--ox-text);
      }

      .pulse-health__label {
        margin-top: 6px;
        font-family: var(--ox-mono);
        font-size: 0.56rem;
        line-height: 1;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--ox-text-muted);
        font-weight: 700;
      }

      .pulse-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .pulse-headline {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .pulse-kicker {
        font-family: var(--ox-mono);
        font-size: 0.64rem;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--ox-text-muted);
        font-weight: 700;
      }

      .pulse-title-wrap {
        min-width: 0;
      }

      .pulse-title {
        margin-top: 10px;
        font-size: clamp(1.4rem, 3.2vw, 1.92rem);
        line-height: 1.02;
        letter-spacing: -0.05em;
        font-weight: 700;
        color: var(--ox-text);
      }

      .pulse-message {
        font-size: 0.86rem;
        line-height: 1.5;
        color: var(--ox-text-muted);
      }

      .pulse-economics {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        font-size: 0.92rem;
        line-height: 1.3;
        color: var(--ox-text-muted);
      }

      .pulse-economics strong {
        color: var(--ox-text);
        font-weight: 700;
        letter-spacing: -0.03em;
      }

      .pulse-economics .is-emphasis strong {
        color: var(--ox-primary);
      }

      .pulse-dot-divider {
        color: var(--ox-text-dim);
      }

      .pulse-meta-line {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        font-family: var(--ox-mono);
        font-size: 0.62rem;
        line-height: 1;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ox-text-muted);
        font-weight: 700;
      }

      .pulse-meta-line .pulse-meta-divider {
        color: var(--ox-text-dim);
      }

      .pulse-attention {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 100%;
        padding: 13px 14px;
        border-radius: 14px;
        border: 1px solid rgba(244, 63, 94, 0.22);
        background: linear-gradient(
            135deg,
            rgba(244, 63, 94, 0.12),
            rgba(244, 63, 94, 0.03)
          ),
          rgba(255, 255, 255, 0.01);
        color: inherit;
        text-align: left;
        cursor: pointer;
        transition: border-color 160ms ease, transform 160ms ease,
          background 160ms ease;
      }

      .pulse-attention:hover {
        transform: translateY(-1px);
        border-color: rgba(244, 63, 94, 0.34);
      }

      .pulse-attention__icon {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: none;
        color: var(--ox-danger);
        background: rgba(244, 63, 94, 0.12);
      }

      .pulse-attention__body {
        min-width: 0;
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .pulse-attention__eyebrow {
        font-family: var(--ox-mono);
        font-size: 0.58rem;
        line-height: 1;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: rgba(244, 63, 94, 0.88);
        font-weight: 700;
      }

      .pulse-attention__headline {
        font-size: 0.9rem;
        line-height: 1.35;
        color: var(--ox-text);
        font-weight: 600;
      }

      .pulse-attention__chevron {
        color: var(--ox-text-dim);
        transition: transform 180ms ease;
      }

      .pulse-attention.is-open .pulse-attention__chevron {
        transform: rotate(180deg);
      }

      .pulse-rail {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }

      .pulse-rail-button {
        position: relative;
        border: none;
        border-radius: 12px;
        background: transparent;
        color: inherit;
        padding: 8px 4px 12px;
        min-height: 64px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        cursor: pointer;
        transition: background 160ms ease, transform 160ms ease;
      }

      .pulse-rail-button::after {
        content: "";
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 0;
        height: 3px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
        transform: scaleX(0.62);
        transform-origin: center;
        transition: background 160ms ease, transform 160ms ease,
          opacity 160ms ease;
        opacity: 0.95;
      }

      .pulse-rail-button:hover {
        transform: translateY(-1px);
        background: rgba(var(--ox-primary-rgb), 0.03);
      }

      .pulse-rail-button:hover::after {
        transform: scaleX(1);
      }

      .pulse-rail-button.is-active {
        background: rgba(var(--ox-primary-rgb), 0.05);
      }

      .pulse-rail-button.is-active::after {
        background: rgba(var(--ox-primary-rgb), 0.94);
        transform: scaleX(1);
      }

      .pulse-rail-button.is-alert.is-active {
        background: rgba(244, 63, 94, 0.05);
      }

      .pulse-rail-button.is-alert::after {
        background: rgba(244, 63, 94, 0.5);
      }

      .pulse-rail-button.is-alert.is-active::after {
        background: var(--ox-danger);
      }

      .pulse-rail-icon {
        color: var(--ox-text-muted);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .pulse-rail-button.is-active .pulse-rail-icon {
        color: var(--ox-primary);
      }

      .pulse-rail-button.is-alert .pulse-rail-icon,
      .pulse-rail-button.is-alert .pulse-rail-value {
        color: var(--ox-danger);
      }

      .pulse-rail-value {
        font-size: 1.14rem;
        line-height: 1;
        font-weight: 700;
        letter-spacing: -0.05em;
        color: var(--ox-text);
      }

      .pulse-rail-label {
        font-family: var(--ox-mono);
        font-size: 0.58rem;
        line-height: 1;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--ox-text-muted);
        font-weight: 700;
        text-align: center;
      }

      .pulse-signal-strip {
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .pulse-signal {
        flex: 1 1 0;
        height: 7px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.14);
        overflow: hidden;
        cursor: pointer;
        border: none;
      }

      .pulse-signal__fill {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--ox-primary);
        transition: width 220ms ease, background 180ms ease;
      }

      .pulse-signal__fill.tone-warning {
        background: var(--ox-warning);
      }

      .pulse-signal__fill.tone-danger {
        background: var(--ox-danger);
      }

      .pulse-panel {
        border-top: 1px solid var(--ox-border);
        padding-top: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .pulse-panel-header {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .pulse-panel-icon {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ox-primary);
        background: rgba(var(--ox-primary-rgb), 0.08);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.16);
      }

      .pulse-panel-title {
        font-family: var(--ox-mono);
        font-size: 0.62rem;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--ox-text-muted);
        font-weight: 700;
      }

      .pulse-list {
        display: flex;
        flex-direction: column;
      }

      .pulse-list-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--ox-border);
        text-decoration: none;
        color: inherit;
        transition: color 160ms ease;
      }

      .pulse-list-row:last-child {
        border-bottom: none;
      }

      .pulse-list-row:hover .pulse-list-title {
        color: var(--ox-primary);
      }

      .pulse-list-leading {
        flex: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--ox-text-muted);
      }

      .pulse-list-copy {
        min-width: 0;
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .pulse-list-title {
        font-size: 0.92rem;
        line-height: 1.32;
        font-weight: 600;
        color: var(--ox-text);
        transition: color 160ms ease;
      }

      .pulse-list-meta {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 7px;
        font-family: var(--ox-mono);
        font-size: 0.56rem;
        line-height: 1;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ox-text-muted);
        font-weight: 700;
      }

      .pulse-list-meta .pulse-meta-separator {
        color: var(--ox-text-dim);
      }

      .pulse-list-trailing {
        flex: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .pulse-mini-ring {
        position: relative;
        width: 34px;
        height: 34px;
        flex: none;
      }

      .pulse-mini-ring svg {
        width: 100%;
        height: 100%;
        display: block;
        transform: rotate(-90deg);
      }

      .pulse-mini-ring__track {
        fill: none;
        stroke: rgba(148, 163, 184, 0.2);
        stroke-width: 2.5;
      }

      .pulse-mini-ring__bar {
        fill: none;
        stroke: var(--ox-primary);
        stroke-width: 2.5;
        stroke-linecap: round;
      }

      .pulse-mini-ring.tone-warning .pulse-mini-ring__bar {
        stroke: var(--ox-warning);
      }

      .pulse-mini-ring.tone-danger .pulse-mini-ring__bar {
        stroke: var(--ox-danger);
      }

      .pulse-mini-ring__value {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--ox-mono);
        font-size: 0.5rem;
        font-weight: 700;
        color: var(--ox-text);
      }

      .pulse-avatar {
        width: 28px;
        height: 28px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(var(--ox-primary-rgb), 0.1);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.18);
        color: var(--ox-primary);
        font-family: var(--ox-mono);
        font-size: 0.64rem;
        font-weight: 700;
        flex: none;
      }

      .pulse-status-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 24px;
        padding: 0 9px;
        border-radius: 999px;
        font-family: var(--ox-mono);
        font-size: 0.55rem;
        line-height: 1;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        font-weight: 700;
        border: 1px solid currentColor;
        white-space: nowrap;
      }

      .pulse-status-pill.tone-good {
        color: var(--ox-primary);
        background: rgba(var(--ox-primary-rgb), 0.08);
        border-color: rgba(var(--ox-primary-rgb), 0.18);
      }

      .pulse-status-pill.tone-warning {
        color: var(--ox-warning);
        background: rgba(251, 191, 36, 0.08);
        border-color: rgba(251, 191, 36, 0.18);
      }

      .pulse-status-pill.tone-danger {
        color: var(--ox-danger);
        background: rgba(244, 63, 94, 0.08);
        border-color: rgba(244, 63, 94, 0.2);
      }

      .pulse-status-pill.tone-muted {
        color: var(--ox-text-muted);
        background: rgba(148, 163, 184, 0.1);
        border-color: rgba(148, 163, 184, 0.18);
      }

      .pulse-artifact-row .pulse-list-leading {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        background: rgba(var(--ox-primary-rgb), 0.08);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.14);
        color: var(--ox-primary);
      }

      .pulse-artifact-row.is-review .pulse-list-leading {
        color: var(--ox-warning);
        border-color: rgba(251, 191, 36, 0.18);
        background: rgba(251, 191, 36, 0.08);
      }

      .pulse-action-row.is-danger .pulse-list-leading {
        color: var(--ox-danger);
      }

      .pulse-subsection {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .pulse-subsection-label {
        font-family: var(--ox-mono);
        font-size: 0.56rem;
        line-height: 1;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--ox-text-dim);
        font-weight: 700;
      }

      .pulse-milestone-meter {
        width: 92px;
        height: 5px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.18);
        overflow: hidden;
      }

      .pulse-milestone-meter > span {
        display: block;
        height: 100%;
        border-radius: inherit;
        background: var(--ox-primary);
      }

      .pulse-empty {
        font-size: 0.84rem;
        line-height: 1.55;
        color: var(--ox-text-muted);
      }

      .widget-footer {
        margin-top: 6px;
      }

      .pulse-sync {
        font-family: var(--ox-mono);
        font-size: 0.56rem;
        line-height: 1;
        letter-spacing: 0.1em;

          '<svg viewBox="0 0 120 120">' +
          '<circle class="pulse-health__track" cx="60" cy="60" r="' +
          radius +
          '"></circle>' +
          '<circle class="pulse-health__bar" cx="60" cy="60" r="' +
          radius +
          '" style="stroke-dasharray:' +
          circumference.toFixed(2) +
          ";stroke-dashoffset:" +
          offset.toFixed(2) +
          '"></circle>' +
          "</svg>" +
          '<div class="pulse-health__value">' +
          '<span class="pulse-health__number">' +
          escapeHtml(String(safeScore)) +
          "</span>" +
          '<span class="pulse-health__label">Health</span>' +
          "</div>" +
          "</div>"
        );
      };

      var renderMiniRing = function (progress, tone) {
        var safeProgress = Math.max(0, Math.min(100, Math.round(Number(progress) || 0)));
        var radius = 15;
        var circumference = 2 * Math.PI * radius;
        var offset = circumference - (safeProgress / 100) * circumference;
        return (
          '<span class="pulse-mini-ring tone-' +
          escapeHtml(tone) +
          '">' +
          '<svg viewBox="0 0 34 34">' +
          '<circle class="pulse-mini-ring__track" cx="17" cy="17" r="' +
          radius +
          '"></circle>' +
          '<circle class="pulse-mini-ring__bar" cx="17" cy="17" r="' +
          radius +
          '" style="stroke-dasharray:' +
          circumference.toFixed(2) +
          ";stroke-dashoffset:" +
          offset.toFixed(2) +
          '"></circle>' +
          "</svg>" +
          '<span class="pulse-mini-ring__value">' +
          escapeHtml(String(safeProgress)) +
          "%</span>" +
          "</span>"
        );
      };

      var normalizeWorkstreams = function (payload) {
        var raw = Array.isArray(payload && payload.workstreams)
          ? payload.workstreams
          : Array.isArray(payload && payload.streams)
          ? payload.streams
          : [];
        return raw
          .map(function (item, index) {
            var stream = asObject(item) || {};
            var blockers = Array.isArray(stream.blockers) ? stream.blockers : [];
            return {
              id:
                readString(stream, ["id", "workstream_id", "workstreamId", "ref"]) ||
                "stream-" + index,
              title:
                readString(stream, ["title", "name", "label"]) || "Untitled stream",
              progress_pct:
                typeof stream.progress_pct === "number"
                  ? stream.progress_pct
                  : typeof stream.progress === "number"
                  ? stream.progress
                  : 0,
              status:
                readString(stream, ["status", "state"]) ||
                (blockers.length ? "blocked" : "active"),
              agent_name: readString(stream, ["agent_name", "agentName", "owner_name", "ownerName"]),
              agent_domain: readString(stream, ["agent_domain", "agentDomain", "domain"]),
              blocker_count:
                typeof stream.blocked_count === "number"
                  ? stream.blocked_count
                  : blockers.length,
              summary: readString(stream, ["summary", "reason", "description"]),
            };
          })
          .filter(function (stream) {
            return typeof stream.title === "string" && stream.title.trim().length > 0;
          });
      };

      var normalizeMilestones = function (payload) {
        var raw = Array.isArray(payload && payload.milestones) ? payload.milestones : [];
        return raw
          .map(function (item, index) {
            var milestone = asObject(item) || {};
            return {
              id: readString(milestone, ["id", "ref"]) || "milestone-" + index,
              title:
                readString(milestone, ["title", "name", "label"]) ||
                "Untitled milestone",
              progress:
                typeof milestone.progress === "number"
                  ? milestone.progress
                  : typeof milestone.progress_pct === "number"
                  ? milestone.progress_pct
                  : 0,
              status: readString(milestone, ["status", "state"]) || "planned",
            };
          })
          .filter(function (milestone) {
            return milestone.title;
          });
      };

      var normalizeArtifacts = function (payload) {
        var raw = Array.isArray(payload && payload.recent_artifacts)
          ? payload.recent_artifacts
          : [];
        return raw
          .map(function (item, index) {
            var artifact = asObject(item) || {};
            return {
              id: readString(artifact, ["id", "artifact_id", "artifactId"]) || "artifact-" + index,
              title:
                readString(artifact, ["title", "name", "label"]) ||
                "Untitled artifact",
              status: readString(artifact, ["status", "state"]) || "draft",
              artifact_type: readString(artifact, ["artifact_type", "artifactType", "type"]),
              created_at:
                readString(artifact, ["created_at", "createdAt", "updated_at", "updatedAt"]) || null,
              created_by_name: readString(artifact, ["created_by_name", "createdByName", "created_by"]),
              primary_url: artifactUrl(artifact, null),
              primary_label: artifactLabel(artifact),
              live_url: readString(artifact, ["live_url", "liveUrl"]),
            };
          })
          .filter(function (artifact) {
            return artifact.title;
          });
      };

      var normalizePulse = function (payload) {
        if (!payload) return null;
        var record = asObject(payload) || {};
        var workstreamSummary =
          asObject(record.workstream_summary) || asObject(record.workstreamSummary) || {};
        var artifacts = normalizeArtifacts(record);
        var milestones = normalizeMilestones(record);
        return {
          id: readString(record, ["id", "initiative_id", "initiativeId"]),
          name: readString(record, ["name", "title"]) || "Initiative",
          status: readString(record, ["status", "state"]) || "active",
          message: readString(record, ["message", "summary"]),
          progress_pct: typeof record.progress_pct === "number" ? record.progress_pct : 0,
          pending_decisions:
            typeof record.pending_decisions === "number" ? record.pending_decisions : 0,
          active_workstreams:
            typeof record.active_workstreams === "number"
              ? record.active_workstreams
              : typeof workstreamSummary.active === "number"
              ? workstreamSummary.active
              : 0,
          total_workstreams:
            typeof record.total_workstreams === "number"
              ? record.total_workstreams
              : typeof workstreamSummary.total === "number"
              ? workstreamSummary.total
              : 0,
          blocked_workstreams:
            typeof record.blocked_workstreams === "number"
              ? record.blocked_workstreams
              : typeof workstreamSummary.blocked === "number"
              ? workstreamSummary.blocked
              : 0,
          health_score:
            typeof record.health_score === "number" ? record.health_score : 100,
          blockers: Array.isArray(record.blockers) ? record.blockers : [],
          next_steps: Array.isArray(record.next_steps) ? record.next_steps : [],
          roi_summary: asObject(record.roi_summary),
          current_cost:
            typeof record.current_cost === "number" ? record.current_cost : null,
          eta_seconds:
            typeof record.eta_seconds === "number" ? record.eta_seconds : null,
          live_url: readString(record, ["live_url", "liveUrl"]),
          updated_at:
            readString(record, ["updated_at", "updatedAt", "refreshed_at", "refreshedAt"]) ||
            null,
          workstreams: normalizeWorkstreams(record),
          milestones: milestones,
          recent_artifacts: artifacts,
          artifact_summary: asObject(record.artifact_summary),
        };
      };

      var buildAttentionItems = function (pulseData, dashboardUrl) {
        var items = [];
        (pulseData.blockers || []).forEach(function (text, index) {
          items.push({
            id: "blocker-" + index,
            kind: "blocker",
            label: text,
            meta: "Blocked work",
            url: dashboardUrl,
          });
        });

        (pulseData.next_steps || []).forEach(function (text, index) {
          items.push({
            id: "step-" + index,
            kind: "decision",
            label: text,
            meta: "Next step",
            url: dashboardUrl,
          });
        });

        var reviewArtifacts = (pulseData.recent_artifacts || []).filter(function (artifact) {
          return ["in_review", "draft", "changes_requested"].indexOf(toStatusKey(artifact.status)) >= 0;
        });

        reviewArtifacts.forEach(function (artifact, index) {
          items.push({
            id: "artifact-review-" + index,
            kind: "review",
            label: artifact.title + " is waiting for review.",
            meta: "Artifact review",
            url: artifact.primary_url || artifact.live_url || dashboardUrl,
          });
        });

        if (items.length === 0 && pulseData.pending_decisions > 0) {
          items.push({
            id: "decision-summary",
            kind: "decision",
            label:
              pulseData.pending_decisions +
              " decision" +
              (pulseData.pending_decisions === 1 ? " is" : "s are") +
              " waiting in live view.",
            meta: "Pending decision",
            url: dashboardUrl,
          });
        }

        return items.slice(0, 5);
      };

      var buildAttentionBanner = function (pulseData, items) {
        if (!items.length) return null;
        var reviewCount = (pulseData.recent_artifacts || []).filter(function (artifact) {
          return ["in_review", "draft", "changes_requested"].indexOf(toStatusKey(artifact.status)) >= 0;
        }).length;
        if ((pulseData.blockers || []).length) {
          return {
            eyebrow:
              (pulseData.blockers || []).length +
              " blocker" +
              ((pulseData.blockers || []).length === 1 ? "" : "s") +
              " slowing momentum",
            headline: items[0].label,
          };
        }
        if (pulseData.pending_decisions > 0) {
          return {
            eyebrow:
              pulseData.pending_decisions +
              " decision" +
              (pulseData.pending_decisions === 1 ? "" : "s") +
              " waiting on you",
            headline: items[0].label,
          };
        }
        return {
          eyebrow:
            reviewCount +
            " output item" +
            (reviewCount === 1 ? "" : "s") +
            " waiting for review",
          headline: items[0].label,
        };
      };

      var renderSignalStrip = function (pulseData) {
        var source = pulseData.workstreams.length
          ? pulseData.workstreams
          : pulseData.milestones;
        if (!source.length) return "";
        return (
          '<div class="pulse-signal-strip">' +
          source
            .slice(0, 4)
            .map(function (item) {
              var progress =
                typeof item.progress_pct === "number" ? item.progress_pct : item.progress;
              var tone = toneForStatus(item.status, progress, item.blocker_count || 0);
              return (
                '<button class="pulse-signal" type="button" title="' +
                escapeHtml(item.title + ": " + Math.round(progress || 0) + "%") +
                '" onclick="togglePulsePanel(\'streams\')">' +
                '<span class="pulse-signal__fill tone-' +
                escapeHtml(tone) +
                '" style="width:' +
                Math.max(8, Math.min(100, Math.round(Number(progress) || 0))) +
                '%"></span>' +
                "</button>"
              );
            })
            .join("") +
          "</div>"
        );
      };

      var renderMetrics = function (sections, activePanel) {
        if (!sections.length) return "";
        return (
          '<div class="pulse-rail">' +
          sections
            .map(function (section) {
              return (
                '<button type="button" class="pulse-rail-button' +
                (activePanel === section.key ? " is-active" : "") +
                (section.alert ? " is-alert" : "") +
                '" onclick="togglePulsePanel(\'' +
                escapeHtml(section.key) +
                '\')" aria-expanded="' +
                escapeHtml(String(activePanel === section.key)) +
                '">' +
                '<span class="pulse-rail-icon">' +
                section.icon +
                "</span>" +
                '<span class="pulse-rail-value">' +
                escapeHtml(String(section.value)) +
                "</span>" +
                '<span class="pulse-rail-label">' +
                escapeHtml(section.label) +
                "</span>" +
                "</button>"
              );
            })
            .join("") +
          "</div>"
        );
      };

      var renderActionsPanel = function (items) {
        if (!items.length) return '<div class="pulse-empty">No decisions, blockers, or reviews are waiting on you right now.</div>';
        return (
          '<div class="pulse-list">' +
          items
            .map(function (item) {
              var icon = item.kind === "review" ? icons.document(15) : icons.warning(15);
              var url = item.url || "";
              var urlAttr = JSON.stringify(String(url));
              return (
                '<a href="' +
                escapeHtml(url) +
                '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                urlAttr +
                ', event)" class="pulse-list-row pulse-action-row' +
                (item.kind === "blocker" ? " is-danger" : "") +
                '">' +
                '<span class="pulse-list-leading">' +
                icon +
                "</span>" +
                '<span class="pulse-list-copy">' +
                '<span class="pulse-list-title">' +
                escapeHtml(item.label) +
                "</span>" +
                '<span class="pulse-list-meta">' +
                escapeHtml(item.meta) +
                "</span>" +
                "</span>" +
                '<span class="pulse-list-trailing">' +
                icons.external(14) +
                "</span>" +
                "</a>"
              );
            })
            .join("") +
          "</div>"
        );
      };

      var renderWorkstreamFallback = function (pulseData, dashboardUrl) {
        var rows = [];
        if (pulseData.total_workstreams || pulseData.active_workstreams) {
          rows.push({
            title:
              (pulseData.active_workstreams || pulseData.total_workstreams || 0) +
              " streams are currently in motion.",
            meta:
              (pulseData.total_workstreams || pulseData.active_workstreams || 0) +
              " total streams",
            tone: "good",
          });
        }
        if (pulseData.blocked_workstreams) {
          rows.push({
            title:
              pulseData.blocked_workstreams +
              " stream" +
              (pulseData.blocked_workstreams === 1 ? " is" : "s are") +
              " blocked.",
            meta: "Needs intervention",
            tone: "danger",
          });
        }
        if (pulseData.pending_decisions) {
          rows.push({
            title:
              pulseData.pending_decisions +
              " decision" +
              (pulseData.pending_decisions === 1 ? " is" : "s are") +
              " waiting.",
            meta: "Pending decisions",
            tone: "warning",
          });
        }
        if (!rows.length) {
          return '<div class="pulse-empty">Stream detail will appear here when the pulse payload includes live stream rows.</div>';
        }
        var urlAttr = JSON.stringify(String(dashboardUrl || ""));
        return (
          '<div class="pulse-list">' +
          rows
            .map(function (row) {
              return (
                '<a href="' +
                escapeHtml(dashboardUrl || "") +
                '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                urlAttr +
                ', event)" class="pulse-list-row">' +
                '<span class="pulse-list-leading">' +
                renderMiniRing(
                  row.tone === "danger"
                    ? 28
                    : row.tone === "warning"
                    ? 54
                    : 78,
                  row.tone
                ) +
                "</span>" +
                '<span class="pulse-list-copy">' +
                '<span class="pulse-list-title">' +
                escapeHtml(row.title) +
                "</span>" +
                '<span class="pulse-list-meta">' +
                escapeHtml(row.meta) +
                "</span>" +
                "</span>" +
                '<span class="pulse-list-trailing">' +
                renderStatusPill(row.tone === "danger" ? "blocked" : row.tone === "warning" ? "pending" : "active", row.tone) +
                "</span>" +
                "</a>"
              );
            })
            .join("") +
          "</div>"
        );
      };

      var renderStreamsPanel = function (pulseData, dashboardUrl) {
        if (!pulseData.workstreams.length) return renderWorkstreamFallback(pulseData, dashboardUrl);
        var urlAttr = JSON.stringify(String(dashboardUrl || ""));
        return (
          '<div class="pulse-list">' +
          pulseData.workstreams
            .slice(0, 4)
            .map(function (stream) {
              var tone = toneForStatus(stream.status, stream.progress_pct, stream.blocker_count);
              var metaParts = [];
              if (stream.agent_name) metaParts.push(stream.agent_name);
              if (stream.agent_domain) metaParts.push(titleCase(stream.agent_domain));
              if (stream.summary) metaParts.push(stream.summary);
              if (stream.blocker_count) {
                metaParts.push(
                  stream.blocker_count +
                    " blocker" +
                    (stream.blocker_count === 1 ? "" : "s")
                );
              }
              return (
                '<a href="' +
                escapeHtml(dashboardUrl || "") +
                '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                urlAttr +
                ', event)" class="pulse-list-row">' +
                '<span class="pulse-list-leading">' +
                renderMiniRing(stream.progress_pct, tone) +
                "</span>" +
                (stream.agent_name || stream.agent_domain
                  ? '<span class="pulse-avatar">' +
                    avatarInitial(stream.agent_name, stream.agent_domain) +
                    "</span>"
                  : "") +
                '<span class="pulse-list-copy">' +
                '<span class="pulse-list-title">' +
                escapeHtml(stream.title) +
                "</span>" +
                '<span class="pulse-list-meta">' +
                metaParts
                  .map(function (part, index) {
                    return (
                      (index ? '<span class="pulse-meta-separator">·</span>' : "") +
                      escapeHtml(part)
                    );
                  })
                  .join("") +
                "</span>" +
                "</span>" +
                '<span class="pulse-list-trailing">' +
                renderStatusPill(stream.status, tone) +
                "</span>" +
                "</a>"
              );
            })
            .join("") +
          "</div>"
        );
      };

      var renderFocusPanel = function (pulseData, dashboardUrl) {
        var parts = [];
        var urlAttr = JSON.stringify(String(dashboardUrl || ""));

        if ((pulseData.next_steps || []).length) {
          parts.push(
            '<div class="pulse-subsection">' +
              '<div class="pulse-subsection-label">Next moves</div>' +
              '<div class="pulse-list">' +
                pulseData.next_steps
                  .slice(0, 4)
                  .map(function (step) {
                    return (
                      '<a href="' +
                      escapeHtml(dashboardUrl || "") +
                      '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                      urlAttr +
                      ', event)" class="pulse-list-row">' +
                        '<span class="pulse-list-leading">' +
                        icons.check(15) +
                        "</span>" +
                        '<span class="pulse-list-copy">' +
                          '<span class="pulse-list-title">' +
                          escapeHtml(step) +
                          "</span>" +
                          '<span class="pulse-list-meta">Use the live view to resolve or delegate</span>' +
                        "</span>" +
                        '<span class="pulse-list-trailing">' +
                        icons.external(14) +
                        "</span>" +
                      "</a>"
                    );
                  })
                  .join("") +
              "</div>" +
            "</div>"
          );
        }

        if ((pulseData.milestones || []).length) {
          parts.push(
            '<div class="pulse-subsection">' +
              '<div class="pulse-subsection-label">Milestones</div>' +
              '<div class="pulse-list">' +
                pulseData.milestones
                  .slice(0, 4)
                  .map(function (milestone) {
                    var tone = toneForStatus(milestone.status, milestone.progress, 0);
                    return (
                      '<a href="' +
                      escapeHtml(dashboardUrl || "") +
                      '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                      urlAttr +
                      ', event)" class="pulse-list-row">' +
                        '<span class="pulse-list-leading">' +
                        icons.flag(15) +
                        "</span>" +
                        '<span class="pulse-list-copy">' +
                          '<span class="pulse-list-title">' +
                          escapeHtml(milestone.title) +
                          "</span>" +
                          '<span class="pulse-list-meta">' +
                            escapeHtml(titleCase(milestone.status || "planned")) +
                          "</span>" +
                        "</span>" +
                        '<span class="pulse-list-trailing">' +
                          '<span class="pulse-milestone-meter"><span style="width:' +
                          Math.max(4, Math.min(100, Math.round(Number(milestone.progress) || 0))) +
                          '%; background:' +
                          (tone === "danger"
                            ? "var(--ox-danger)"
                            : tone === "warning"
                            ? "var(--ox-warning)"
                            : "var(--ox-primary)") +
                          '"></span></span>' +
                          '<span class="pulse-list-meta">' +
                          escapeHtml(String(Math.round(Number(milestone.progress) || 0))) +
                          "%</span>" +
                        "</span>" +
                      "</a>"
                    );
                  })
                  .join("") +
              "</div>" +
            "</div>"
          );
        }

        if (!parts.length) {
          return '<div class="pulse-empty">No prescribed next steps are visible in this pulse yet.</div>';
        }

        return parts.join("");
      };

      var renderArtifactsPanel = function (pulseData, dashboardUrl) {
        if (!pulseData.recent_artifacts.length) {
          return '<div class="pulse-empty">No recent output was attached to this initiative pulse.</div>';
        }

        return (
          '<div class="pulse-list">' +
          pulseData.recent_artifacts
            .slice(0, 4)
            .map(function (artifact) {
              var key = toStatusKey(artifact.status);
              var tone = toneForStatus(artifact.status, 0, 0);
              var age = formatRelative(artifact.created_at);
              var url = artifact.primary_url || artifact.live_url || dashboardUrl || "";
              var urlAttr = JSON.stringify(String(url));
              return (
                '<a href="' +
                escapeHtml(url) +
                '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                urlAttr +
                ', event)" class="pulse-list-row pulse-artifact-row' +
                (key === "in_review" || key === "draft" ? " is-review" : "") +
                '">' +
                '<span class="pulse-list-leading">' +
                icons.document(15) +
                "</span>" +
                '<span class="pulse-list-copy">' +
                '<span class="pulse-list-title">' +
                escapeHtml(artifact.title) +
                "</span>" +
                '<span class="pulse-list-meta">' +
                escapeHtml(titleCase(artifact.status)) +
                (age
                  ? '<span class="pulse-meta-separator">·</span>' + escapeHtml(age)
                  : "") +
                "</span>" +
                "</span>" +
                '<span class="pulse-list-trailing">' +
                renderStatusPill(artifact.status, tone) +
                "</span>" +
                "</a>"
              );
            })
            .join("") +
          "</div>"
        );
      };

      var renderPanel = function (panel, pulseData, dashboardUrl, attentionItems) {
        var icon = icons.layers(15);
        var title = "Streams";
        var body = renderStreamsPanel(pulseData, dashboardUrl);

        if (panel === "actions") {
          icon = icons.warning(15);
          title = "Needs you";
          body = renderActionsPanel(attentionItems);
        } else if (panel === "focus") {
          icon = icons.flag(15);
          title = "Focus";
          body = renderFocusPanel(pulseData, dashboardUrl);
        } else if (panel === "artifacts") {
          icon = icons.document(15);
          title = "Output";
          body = renderArtifactsPanel(pulseData, dashboardUrl);
        }

        return (
          '<div class="pulse-panel animate-in">' +
          '<div class="pulse-panel-header">' +
          '<span class="pulse-panel-icon">' +
          icon +
          "</span>" +
          '<span class="pulse-panel-title">' +
          escapeHtml(title) +
          "</span>" +
          "</div>" +
          body +
          "</div>"
        );
      };

      window.togglePulsePanel = function (panel) {
        uiState.panel = uiState.panel === panel ? null : panel;
        render();
      };

      var render = function () {
        if (isLoading) {
          injectHtml(
            '<div class="widget-shell-card"><div class="ox-card"><div class="ox-card-inner pulse-skeleton">' +
              '<span class="skeleton-line" style="width: 88px; height: 10px"></span>' +
              '<span class="skeleton-line" style="width: 72%; height: 28px"></span>' +
              '<span class="skeleton-line" style="width: 58%; height: 14px"></span>' +
              '<span class="skeleton-line" style="width: 100%; height: 58px; border-radius: 18px"></span>' +
              '<div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px">' +
                '<span class="skeleton-line" style="height: 72px; border-radius: 14px"></span>' +
                '<span class="skeleton-line" style="height: 72px; border-radius: 14px"></span>' +
                '<span class="skeleton-line" style="height: 72px; border-radius: 14px"></span>' +
                '<span class="skeleton-line" style="height: 72px; border-radius: 14px"></span>' +
              '</div>' +
              '<span class="skeleton-line" style="width: 100%; height: 8px; border-radius: 999px"></span>' +
            "</div></div></div>"
          );
          return;
        }

        if (pulse && pulse.error) {
          var errorTitle = /multiple initiatives match/i.test(pulse.error)
            ? "Multiple initiatives matched"
            : /not found/i.test(pulse.error)
            ? "Initiative not found"
            : "Initiative pulse unavailable";
          var errorDesc = /multiple initiatives match/i.test(pulse.error)
            ? pulse.error + " Retry with the specific initiative UUID to load a stable pulse view."
            : pulse.error;
          injectHtml(
            '<div class="empty-state error-state animate-in">' +
              '<div class="empty-icon">' +
              icons.warning(24) +
              "</div>" +
              '<div class="empty-title">' +
              escapeHtml(errorTitle) +
              "</div>" +
              '<div class="empty-desc">' +
              escapeHtml(errorDesc) +
              "</div>" +
            "</div>"
          );
          return;
        }

        if (!pulse) {
          injectHtml(
            '<div class="empty-state animate-in">' +
              '<div class="empty-icon">' +
              icons.pulse(24) +
              "</div>" +
              '<div class="empty-title">Awaiting telemetry</div>' +
              '<div class="empty-desc">No recent pulse data was found for this initiative.</div>' +
            "</div>"
          );
          return;
        }

        var normalized = normalizePulse(pulse);
        if (!normalized) {
          injectHtml(
            '<div class="empty-state animate-in">' +
              '<div class="empty-icon">' +
              icons.pulse(24) +
              "</div>" +
              '<div class="empty-title">Awaiting telemetry</div>' +
              '<div class="empty-desc">No recent pulse data was found for this initiative.</div>' +
            "</div>"
          );
          return;
        }

        pulse = normalized;

        var dashboardUrl =
          pulse.live_url ||
          (pulse.id
            ? "https://useorgx.com/live/" + encodeURIComponent(pulse.id)
            : "https://useorgx.com/live?view=mission-control");
        var dashboardUrlAttr = JSON.stringify(String(dashboardUrl));

        var reviewCount = (pulse.recent_artifacts || []).filter(function (artifact) {
          return ["in_review", "draft", "changes_requested"].indexOf(toStatusKey(artifact.status)) >= 0;
        }).length;

        var attentionItems = buildAttentionItems(pulse, dashboardUrl);
        var attentionBanner = buildAttentionBanner(pulse, attentionItems);
        var economics = "";

        if (pulse.roi_summary) {
          var roiValue =
            pulse.roi_summary.total_cost > 0
              ? (pulse.roi_summary.total_value - pulse.roi_summary.total_cost) /
                pulse.roi_summary.total_cost
              : pulse.roi_summary.total_value > 0
              ? 1
              : null;
          economics =
            '<div class="pulse-economics">' +
            '<span><strong>' +
            escapeHtml(formatUsdRounded(pulse.roi_summary.total_cost) || "N/A") +
            "</strong> cost</span>" +
            '<span class="pulse-dot-divider">·</span>' +
            '<span class="is-emphasis"><strong>' +
            escapeHtml(formatUsdRounded(pulse.roi_summary.total_value) || "N/A") +
            "</strong> value</span>" +
            '<span class="pulse-dot-divider">·</span>' +
            '<span class="is-emphasis"><strong>' +
            escapeHtml(formatRoi(roiValue) || "N/A") +
            "</strong> ROI</span>" +
            "</div>";
        } else {
          var fallbackParts = [];
          if (formatEta(pulse.eta_seconds)) {
            fallbackParts.push(
              "<span><strong>" + escapeHtml(formatEta(pulse.eta_seconds)) + "</strong> ETA</span>"
            );
          }
          if (formatUsdRounded(pulse.current_cost)) {
            fallbackParts.push(
              "<span><strong>" +
                escapeHtml(formatUsdRounded(pulse.current_cost)) +
                "</strong> cost so far</span>"
            );
          }
          if (fallbackParts.length) {
            economics =
              '<div class="pulse-economics">' +
              fallbackParts.join('<span class="pulse-dot-divider">·</span>') +
              "</div>";
          }
        }

        var metaTokens = [];
        var streamCount = pulse.total_workstreams || pulse.active_workstreams || pulse.workstreams.length;
        if (streamCount) {
          metaTokens.push(
            escapeHtml(String(streamCount)) +
              " streams"
          );
        }
        if (pulse.blocked_workstreams || (pulse.blockers || []).length) {
          metaTokens.push(
            escapeHtml(
              String(pulse.blocked_workstreams || (pulse.blockers || []).length) + " blocked"
            )
          );
        }
        if (pulse.pending_decisions) {
          metaTokens.push(
            escapeHtml(String(pulse.pending_decisions) + " decisions pending")
          );
        }
        if (pulse.recent_artifacts.length) {
          metaTokens.push(
            escapeHtml(
              String(
                (pulse.artifact_summary && pulse.artifact_summary.total) ||
                  pulse.recent_artifacts.length
              ) + " output items"
            )
          );
        }

        var sections = [];
        if (streamCount || pulse.workstreams.length || pulse.milestones.length) {
          sections.push({
            key: "streams",
            icon: icons.layers(15),
            value: streamCount || pulse.workstreams.length || pulse.milestones.length,
            label: "Streams",
            alert: Boolean(pulse.blocked_workstreams),
          });
        }
        if (attentionItems.length) {
          sections.push({
            key: "actions",
            icon: icons.warning(15),
            value: attentionItems.length,
            label: "Needs you",
            alert: true,
          });
        }
        if ((pulse.next_steps || []).length || pulse.milestones.length) {
          sections.push({
            key: "focus",
            icon: icons.flag(15),
            value: (pulse.next_steps || []).length || pulse.milestones.length,
            label: (pulse.next_steps || []).length ? "Next" : "Milestones",
            alert: false,
          });
        }
        if (pulse.recent_artifacts.length) {
          sections.push({
            key: "artifacts",
            icon: icons.document(15),
            value:
              (pulse.artifact_summary && pulse.artifact_summary.total) ||
              pulse.recent_artifacts.length,
            label: "Output",
            alert: reviewCount > 0,
          });
        }

        var availableKeys = sections.map(function (section) {
          return section.key;
        });
        if (availableKeys.indexOf(uiState.panel) === -1) uiState.panel = null;

        var syncLabel =
          formatRelative(pulse.updated_at) ||
          formatRelative(
            pulse.recent_artifacts.length ? pulse.recent_artifacts[0].created_at : null
          ) ||
          "now";

        injectHtml(
          '<div class="widget-shell-card animate-in">' +
            '<div class="ox-card">' +
              '<div class="ox-card-inner">' +
                '<div class="pulse-shell">' +
                  '<div class="pulse-hero">' +
                    renderHealthRing(pulse.health_score) +
                    '<div class="pulse-copy">' +
                      '<div class="pulse-headline">' +
                        '<div class="pulse-title-wrap">' +
                          '<div class="pulse-kicker">Initiative pulse</div>' +
                          '<div class="pulse-title">' +
                            escapeHtml(pulse.name) +
                          "</div>" +
                        "</div>" +
                        '<span class="status-badge status-' +
                          escapeHtml(toStatusKey(pulse.status) || "active") +
                          '">' +
                          icons.pulse(12) +
                          escapeHtml(titleCase(pulse.status || "active")) +
                        "</span>" +
                      "</div>" +
                      (pulse.message
                        ? '<div class="pulse-message">' + escapeHtml(pulse.message) + "</div>"
                        : "") +
                      economics +
                      (metaTokens.length
                        ? '<div class="pulse-meta-line">' +
                          metaTokens
                            .map(function (token, index) {
                              return (
                                (index
                                  ? '<span class="pulse-meta-divider">·</span>'
                                  : "") + token
                              );
                            })
                            .join("") +
                          "</div>"
                        : "") +
                    "</div>" +
                  "</div>" +
                  (attentionBanner
                    ? '<button type="button" class="pulse-attention' +
                      (uiState.panel === "actions" ? " is-open" : "") +
                      '" onclick="togglePulsePanel(\'actions\')">' +
                        '<span class="pulse-attention__icon">' +
                          icons.warning(16) +
                        "</span>" +
                        '<span class="pulse-attention__body">' +
                          '<span class="pulse-attention__eyebrow">' +
                            escapeHtml(attentionBanner.eyebrow) +
                          "</span>" +
                          '<span class="pulse-attention__headline">' +
                            escapeHtml(attentionBanner.headline) +
                          "</span>" +
                        "</span>" +
                        '<span class="pulse-attention__chevron">' +
                          icons.chevronDown(15) +
                        "</span>" +
                      "</button>"
                    : "") +
                  renderMetrics(sections, uiState.panel) +
                  renderSignalStrip(pulse) +
                  (uiState.panel
                    ? renderPanel(uiState.panel, pulse, dashboardUrl, attentionItems)
                    : "") +
                  '<div class="widget-footer">' +
                    '<span class="pulse-sync">Synced ' +
                      escapeHtml(syncLabel) +
                    "</span>" +
                    '<a href="' +
                      escapeHtml(dashboardUrl) +
                      '" target="_blank" rel="noreferrer" onclick="return openWidgetLink(' +
                      dashboardUrlAttr +
                      ', event)" class="deep-link">' +
                      escapeHtml(attentionItems.length ? "Resolve in live view" : "Open live view") +
                      icons.external(14) +
                    "</a>" +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>"
        );
      };

      if (isDemo) {
        applyBootPayload();
      } else {
        initWidget({
          render: function (data) {
            applyBootPayload(function () {
              if (data) pulse = data;
            });
          },
        });
      }
    </script>
  </body>
</html>
