<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Initiative Pulse - OrgX</title>
    <style>
      :root, :root[data-theme="light"] {
        --ox-bg: #f8fafc;
        --ox-panel: #ffffff;
        --ox-border: rgba(0, 0, 0, 0.08);
        --ox-border-strong: rgba(0, 0, 0, 0.15);
        --ox-text: #0f172a;
        --ox-text-muted: #64748b;
        --ox-well-bg: #f1f5f9;
        --ox-well-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-bg: #02040a;
          --ox-panel: rgba(10, 15, 22, 0.95);
          --ox-border: rgba(255, 255, 255, 0.08);
          --ox-border-strong: rgba(255, 255, 255, 0.15);
          --ox-text: #f8fafc;
          --ox-text-muted: rgba(255, 255, 255, 0.5);
          --ox-well-bg: rgba(0,0,0,0.3);
          --ox-well-shadow: inset 0 2px 10px rgba(0,0,0,0.4);
      }
      
      :root {
        --ox-lime: #a3e635; /* Will be overwritten by specific widgets */
        --ox-teal: #0d9488;
        --ox-danger: #e11d48;
        --ox-warning: #d97706;
        --ox-iris: #4f46e5;
        --ox-grid: rgba(0, 0, 0, 0.03);
        --ox-shadow: 0 12px 32px -12px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.04);
        --ox-font: -apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif;
        --ox-mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, monospace;
      }
      
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }
      }
      
      :root[data-theme="dark"] {
          --ox-lime: #D4ED31;
          --ox-teal: #00C9A7;
          --ox-danger: #F43F5E;
          --ox-warning: #FBBF24;
          --ox-iris: #6366f1;
          --ox-grid: rgba(255, 255, 255, 0.02);
          --ox-shadow: 0 16px 40px -10px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
      }

      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }
      .error-state { border-style: solid; border-color: rgba(225,29,72,0.2); background: rgba(225,29,72,0.04); }
      .error-state .empty-icon { color: var(--ox-danger); background: rgba(225,29,72,0.08); box-shadow: none; }
      .error-state .empty-desc { max-width: 360px; }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--ox-font);
        background: var(--ox-bg);
        color: var(--ox-text);
        padding: 16px;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Cinematic Background Grid & Glows */
      body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: radial-gradient(circle at 50% -20%, rgba(var(--ox-primary-rgb), 0.08), transparent 60%),
                    linear-gradient(var(--ox-grid-color) 1px, transparent 1px),
                    linear-gradient(90deg, var(--ox-grid-color) 1px, transparent 1px);
        background-size: 100% 100%, 20px 20px, 20px 20px;
        z-index: -1;
        pointer-events: none;
      }

      .container { max-width: 520px; margin: 0 auto; position: relative; }

      .ox-card { background: var(--ox-panel); border: 1px solid var(--ox-border); border-radius: 16px; box-shadow: var(--ox-shadow); position: relative; overflow: hidden; margin-bottom: 16px; }
      .ox-card-inner { padding: 24px; }
      .ox-card::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, rgba(var(--ox-primary-rgb), 0.5), transparent); opacity: 0.8; }
      .widget-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ox-border); }
      .deep-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: var(--ox-primary); text-decoration: none; transition: opacity 0.2s; }
      .deep-link:hover { opacity: 0.8; }
      .deep-link svg { width: 14px; height: 14px; }


      

      

      .pulse-header, .header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      
      .header-padded {
         padding-bottom: 16px;
         border-bottom: 1px solid var(--ox-border);
      }

      .pulse-name, .title {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--ox-text);
        line-height: 1.2;
      }

      .status-badge, .badge {
        padding: 4px 10px;
        border-radius: 4px;
        font-family: var(--ox-mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        border: 1px solid var(--ox-border);
        font-weight: 600;
      }

      .status-active { background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); border-color: rgba(var(--ox-primary-rgb), 0.2); }
      .status-completed { background: rgba(0,201,167,0.1); color: var(--ox-teal); border-color: rgba(0,201,167,0.2); }
      .status-blocked { background: rgba(225,29,72,0.1); color: var(--ox-danger); border-color: rgba(225,29,72,0.2); }

      @media (prefers-color-scheme: dark) {
         .status-blocked { background: rgba(244,63,94,0.1); border-color: rgba(244,63,94,0.2); }
      }

      .pulse-metrics {
        display: flex;
        gap: 16px;
        margin-bottom: 24px;
        padding-bottom: 24px;
        border-bottom: 1px solid var(--ox-border);
      }

      .metric {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .metric-label, .detail-label {
        font-family: var(--ox-mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ox-text-muted);
        font-weight: 600;
      }

      .metric-value {
        font-size: 1.5rem;
        font-weight: 500;
        color: var(--ox-text);
        font-family: var(--ox-mono);
        letter-spacing: -0.03em;
      }

      .roi-strip {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 24px;
      }

      .roi-item {
        background: rgba(128,128,128,0.03);
        border: 1px solid var(--ox-border);
        border-radius: 8px;
        padding: 12px;
        position: relative;
        overflow: hidden;
      }

      @media (prefers-color-scheme: dark) {
         .roi-item { background: rgba(255,255,255,0.02); }
      }

      .roi-item::before {
        content: '';
        position: absolute;
        top: 0; right: 0; width: 50%; height: 100%;
        background: radial-gradient(circle at top right, rgba(var(--ox-primary-rgb),0.05), transparent);
        pointer-events: none;
      }

      .roi-label {
        font-family: var(--ox-mono);
        font-size: 0.6rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ox-text-muted);
        font-weight: 600;
      }

      .roi-value {
        margin-top: 6px;
        font-size: 1.125rem;
        font-family: var(--ox-mono);
        color: var(--ox-text);
        font-weight: 600;
      }

      .roi-value.positive { color: var(--ox-teal); }
      .roi-value.negative { color: var(--ox-danger); }

      @media (prefers-color-scheme: dark) {
         .roi-value.positive { color: var(--ox-lime); text-shadow: 0 0 10px rgba(191,255,0,0.3); }
      }

      .health-indicator {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-family: var(--ox-mono);
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
      }

      .health-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        box-shadow: 0 0 8px currentColor;
      }
      
      .health-on-track { color: var(--ox-teal); }
      .health-attention { color: var(--ox-warning); }
      .health-at-risk { color: var(--ox-danger); }

      @media (prefers-color-scheme: dark) {
          .health-on-track { color: var(--ox-lime); }
      }

      .blockers-alert {
        margin-top: 24px;
        padding: 16px;
        background: rgba(225,29,72,0.05);
        border: 1px solid rgba(225,29,72,0.2);
        border-radius: 8px;
        position: relative;
      }

      @media (prefers-color-scheme: dark) {
         .blockers-alert { background: rgba(244,63,94,0.05); border-color: rgba(244,63,94,0.2); }
      }

      .blockers-alert::before {
        content: '';
        position: absolute;
        top: 0; left: 0; bottom: 0; width: 3px;
        background: var(--ox-danger);
        box-shadow: 0 0 8px var(--ox-danger);
      }

      .blockers-title {
        font-family: var(--ox-mono);
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--ox-danger);
        margin-bottom: 8px;
        font-weight: 700;
      }

      .blockers-list {
        list-style: none;
        font-size: 0.875rem;
        color: var(--ox-text);
        line-height: 1.6;
      }
      .blockers-list li { margin-bottom: 4px; padding-left: 14px; position: relative; font-weight: 500; }
      .blockers-list li::before {
        content: '›';
        position: absolute; left: 0; color: var(--ox-danger); opacity: 0.8; font-weight: bold;
      }

      /* Shared Widget Specifics */
      .icon-container {
        width: 40px; height: 40px;
        border-radius: 10px;
        background: rgba(var(--ox-primary-rgb), 0.1);
        border: 1px solid rgba(var(--ox-primary-rgb), 0.2);
        color: var(--ox-primary);
        display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      }
      @media (prefers-color-scheme: dark) {
         .icon-container { box-shadow: 0 0 15px rgba(var(--ox-primary-rgb), 0.2); }
      }
      .icon-container svg { width: 20px; height: 20px; }

      .agent-avatar {
        width: 48px; height: 48px;
        border-radius: 12px;
        background: rgba(128,128,128,0.05);
        border: 1px solid var(--ox-border);
        display: flex; align-items: center; justify-content: center;
        font-family: var(--ox-mono); font-weight: bold; font-size: 1.1rem;
        color: var(--ox-primary);
      }
      @media (prefers-color-scheme: dark) {
         .agent-avatar { box-shadow: 0 0 20px rgba(var(--ox-primary-rgb),0.1); text-shadow: 0 0 10px rgba(var(--ox-primary-rgb),0.5); }
      }

      .agent-info { flex: 1; min-width: 0; }
      .agent-role, .eyebrow {
        font-family: var(--ox-mono); font-size: 0.65rem; text-transform: uppercase;
        letter-spacing: 0.1em; color: var(--ox-primary); margin-bottom: 4px; font-weight: 600;
      }
      
      .status-indicator {
        display: inline-flex; align-items: center; gap: 8px; padding: 6px 12px;
        border-radius: 6px; background: rgba(var(--ox-primary-rgb),0.1); border: 1px solid rgba(var(--ox-primary-rgb),0.2);
        color: var(--ox-primary); font-family: var(--ox-mono); font-size: 0.7rem; text-transform: uppercase;
        letter-spacing: 0.1em; font-weight: 600;
      }

      .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 2s infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
      @media (prefers-color-scheme: dark) { .status-dot { box-shadow: 0 0 8px currentColor; } }

      .activity-item { display: flex; gap: 16px; position: relative; padding-bottom: 24px; }
      .activity-item:last-child { padding-bottom: 0; }
      .activity-item::before { content: ''; position: absolute; left: 5px; top: 12px; bottom: 0; width: 1px; background: var(--ox-border); }
      .activity-item:last-child::before { display: none; }
      .activity-dot {
        width: 11px; height: 11px; border-radius: 50%; background: var(--ox-bg);
        border: 2px solid var(--ox-primary); position: relative; z-index: 1; margin-top: 4px;
      }
      @media (prefers-color-scheme: dark) { .activity-dot { box-shadow: 0 0 10px rgba(var(--ox-primary-rgb),0.4); } }
      .activity-time { font-family: var(--ox-mono); font-size: 0.6rem; color: var(--ox-text-muted); margin-bottom: 4px; font-weight: 600; }
      .activity-text { font-size: 0.9rem; color: var(--ox-text); line-height: 1.5; font-weight: 500; }

      .priority-item, .decision-item {
        display: flex; flex-direction: column; gap: 12px; padding: 16px; background: rgba(128,128,128,0.03);
        border: 1px solid var(--ox-border); border-radius: 12px; margin-bottom: 12px; position: relative; overflow: hidden;
      }
      @media (prefers-color-scheme: dark) { .priority-item, .decision-item { background: rgba(255,255,255,0.02); } }
      
      .priority-item::before, .decision-item::before {
        content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--ox-primary);
      }
      @media (prefers-color-scheme: dark) { .priority-item::before, .decision-item::before { box-shadow: 0 0 10px var(--ox-primary); } }

      .priority-domain, .decision-meta {
        font-family: var(--ox-mono); font-size: 0.6rem; text-transform: uppercase;
        letter-spacing: 0.1em; color: var(--ox-primary); margin-bottom: 6px; font-weight: 700;
        display: flex; justify-content: space-between;
      }
      .priority-title, .decision-title { font-size: 0.95rem; color: var(--ox-text); font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
      .priority-reason, .decision-context { font-size: 0.85rem; color: var(--ox-text-muted); line-height: 1.5; }
      
      .decision-actions { display: flex; gap: 8px; margin-top: 16px; }
      .btn { flex: 1; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; text-align: center; cursor: pointer; font-family: var(--ox-font); transition: all 0.2s; border: none; }
      
      .btn-primary { background: var(--ox-primary); color: #fff; }
      .btn-secondary { background: rgba(128,128,128,0.1); color: var(--ox-text); border: 1px solid var(--ox-border); }
      @media (prefers-color-scheme: dark) {
        .btn-primary { color: #000; box-shadow: 0 0 15px rgba(var(--ox-primary-rgb),0.2); }
        .btn-primary:hover { box-shadow: 0 0 20px rgba(var(--ox-primary-rgb),0.4); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; }
      }

      
      /* Smooth UX Transitions */
      .skeleton-wrapper { transition: opacity 0.3s ease; }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px) scale(0.98); filter: blur(4px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }
      .animate-in { opacity: 0; animation: fadeSlideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .delay-1 { animation-delay: 0.1s; }
      .delay-2 { animation-delay: 0.2s; }
      .delay-3 { animation-delay: 0.3s; }
      
      .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 64px 24px; text-align: center; background: var(--ox-well-bg); border: 1px dashed var(--ox-border-strong); border-radius: 16px; margin: 16px 0; }
      .empty-icon { width: 48px; height: 48px; border-radius: 50%; background: rgba(var(--ox-primary-rgb), 0.1); color: var(--ox-primary); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 20px rgba(var(--ox-primary-rgb), 0.2); }
      .empty-icon svg { width: 24px; height: 24px; }
      .empty-title { font-size: 1.1rem; font-weight: 600; color: var(--ox-text); margin-bottom: 8px; }
      .empty-desc { font-size: 0.9rem; color: var(--ox-text-muted); line-height: 1.5; max-width: 280px; }
    
      /* Skeleton Animations */
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      .skeleton-line {
        background: linear-gradient(90deg, rgba(128,128,128,0.1) 25%, rgba(var(--ox-primary-rgb),0.1) 50%, rgba(128,128,128,0.1) 75%);
        background-size: 200% 100%;
        animation: shimmer 2s infinite linear;
        border-radius: 4px;
      }
      @media (prefers-color-scheme: dark) {
         .skeleton-line { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(var(--ox-primary-rgb),0.05) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; }
      }

      
    
    .widget-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--ox-border); }
    .deep-link { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 600; color: var(--ox-primary); text-decoration: none; transition: opacity 0.2s; }
    .deep-link:hover { opacity: 0.8; }
    .deep-link svg { width: 14px; height: 14px; }
  </style>
  </head>
  <body>
    <div class="container" role="region" aria-label="Initiative Status">
      <div id="content" aria-live="polite">
        <!-- Render a skeleton immediately to avoid a "Loading..." flash before JS boots -->
        <div
          class="skeleton-card"
          role="status"
          aria-label="Loading initiative"
        >
          <div
            style="
              display: flex;
              justify-content: space-between;
              margin-bottom: 12px;
            "
          >
            <div class="skeleton-line skeleton-title"></div>
            <div class="skeleton-line skeleton-badge"></div>
          </div>
          <div style="display: flex; gap: 8px; margin-bottom: 12px">
            <div class="skeleton-line skeleton-text" style="width: 80px"></div>
            <div class="skeleton-line skeleton-text" style="width: 70px"></div>
            <div class="skeleton-line skeleton-text" style="width: 60px"></div>
          </div>
          <div class="skeleton-line skeleton-health"></div>
        </div>
      </div>
    </div>

    <script>
    // Sync theme from URL to override prefers-color-scheme
    (function() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();

    var injectHtml = (html) => {
      const content = document.getElementById('content');
      if (!content) return;
      const skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton) {
        skeleton.style.opacity = '0';
        setTimeout(() => { content.innerHTML = html; }, 300);
      } else {
        content.innerHTML = html;
      }
    };

    function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
    function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
    function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
    function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var ro=new ResizeObserver(() => requestAnimationFrame(_sendSize));ro.observe(document.documentElement);ro.observe(document.body);}}
    function initWidget(opts){var render=opts.render,getData=opts.getData||_extractData;var protocol=_detectProtocol();if(protocol==='chatgpt'){var d=getData(window.openai&&window.openai.toolOutput);render(d);window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});}else if(protocol==='mcp-apps'){render(null);var initId=1;window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'Widget',version:'1.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');window.addEventListener('message',function(event){var msg=event.data;if(!msg||typeof msg!=='object')return;if(msg.id===initId){_observeSize();return;}if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}});}else{render(null);}}
    
    var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'+c+'</svg>';};
    var icons = {
      external: function(s){return _svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>',s);},
      check: function(s){return _svg('<polyline points="20 6 9 17 4 12"></polyline>',s);},
      error: function(s){return _svg('<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>',s);},
    };
    var escapeHtml = (str) => { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };

    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var isLoadingOverride = new URLSearchParams(window.location.search).get('loading') === 'true';
    
    var pulse = isDemo ? {
        id: "INI-402",
        name: "Q4 Product Launch",
        status: "active",
        progress_pct: 64,
        pending_decisions: 3,
        active_workstreams: 4,
        roi_summary: { total_cost: 412.25, total_value: 2190.40, period: "30d" },
        health_score: 78,
        blockers: ["Waiting for final design assets from marketing", "Need security audit completion before launch"]
    } : null;
    
    var isLoading = !isDemo;
    if (isLoadingOverride) { isLoading = true; isDemo = false; initWidget = () => { render(); }; }

    var formatUsd = (value) => { const num = Number(value); if (!Number.isFinite(num)) return null; return '$' + num.toFixed(2); };
    var formatRoi = (value) => { if (value === null) return 'N/A'; const pct = Math.round(value * 100); return (pct > 0 ? '+' : '') + pct + '%'; };

    var render = () => {
      if (isLoading) {
        injectHtml(`<div class="skeleton-wrapper"><div class="ox-card"><div class="ox-card-inner"><div style="display:flex; justify-content:space-between; margin-bottom:24px;"><div class="skeleton-line" style="width:150px; height:24px;"></div><div class="skeleton-line" style="width:80px; height:24px; border-radius:4px;"></div></div><div style="display:flex; gap:16px; margin-bottom:24px;"><div class="skeleton-line" style="width:60px; height:40px;"></div><div class="skeleton-line" style="width:60px; height:40px;"></div></div><div class="skeleton-line" style="width:100%; height:60px;"></div></div></div></div>`);
        return;
      }
      if (pulse && pulse.error) {
        var errorTitle = /multiple initiatives match/i.test(pulse.error)
          ? 'Multiple initiatives matched'
          : /not found/i.test(pulse.error)
          ? 'Initiative not found'
          : 'Initiative pulse unavailable';
        var errorDesc = /multiple initiatives match/i.test(pulse.error)
          ? pulse.error + ' Retry with the specific initiative UUID to load a stable pulse view.'
          : pulse.error;
        injectHtml(`<div class="empty-state error-state animate-in"><div class="empty-icon">${icons.error(24)}</div><div class="empty-title">${escapeHtml(errorTitle)}</div><div class="empty-desc">${escapeHtml(errorDesc)}</div></div>`);
        return;
      }
      if (!pulse) {
        injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.external(24)}</div><div class="empty-title">Awaiting telemetry</div><div class="empty-desc">No recent pulse data was found for this initiative.</div></div>`);
        return;
      }

      const safeName = escapeHtml(pulse.name);
      const safeStatus = escapeHtml(pulse.status).toUpperCase();
      const progressPct = typeof pulse.progress_pct === 'number' ? pulse.progress_pct : 0;
      const pendingDecisions = typeof pulse.pending_decisions === 'number' ? pulse.pending_decisions : 0;
      const activeWorkstreams = typeof pulse.active_workstreams === 'number' ? pulse.active_workstreams : 0;
      const healthScore = typeof pulse.health_score === 'number' ? pulse.health_score : 100;
      const normalizedStatus = escapeHtml(pulse.status).toLowerCase();
      const roiSummary = pulse.roi_summary || null;
      let roiValue = null;
      
      if (roiSummary && roiSummary.total_cost > 0) {
        roiValue = (roiSummary.total_value - roiSummary.total_cost) / roiSummary.total_cost;
      } else if (roiSummary && roiSummary.total_value > 0) {
        roiValue = 1;
      }

      const getHealthClass = (score) => { if (score >= 90) return 'health-on-track'; if (score >= 70) return 'health-attention'; return 'health-at-risk'; };
      const getHealthLabel = (score) => { if (score >= 90) return 'On Track'; if (score >= 70) return 'Needs Attention'; return 'At Risk'; };

      const blockersHtml = (pulse.blockers || []).length > 0 ? `
        <div class="blockers-alert">
          <div class="blockers-title">${pulse.blockers.length} Blocker${pulse.blockers.length !== 1 ? 's' : ''}</div>
          <ul class="blockers-list">
            ${pulse.blockers.map(b => '<li>' + escapeHtml(b) + '</li>').join('')}
          </ul>
        </div>
      ` : '';

      injectHtml(`
        <div class="ox-card animate-in">
          <div class="ox-card-inner">
            <div class="pulse-header">
              <span class="pulse-name">${safeName}</span>
              <span class="status-badge status-${normalizedStatus}">${safeStatus}</span>
            </div>

            <div class="pulse-metrics">
              <div class="metric"><span class="metric-label">Progress</span><span class="metric-value">${progressPct}%</span></div>
              <div class="metric"><span class="metric-label">Pending</span><span class="metric-value">${pendingDecisions}</span></div>
              <div class="metric"><span class="metric-label">Active</span><span class="metric-value">${activeWorkstreams}</span></div>
            </div>

            ${roiSummary ? `
              <div class="roi-strip">
                <div class="roi-item"><div class="roi-label">Cost</div><div class="roi-value">${formatUsd(roiSummary.total_cost)}</div></div>
                <div class="roi-item"><div class="roi-label">Value</div><div class="roi-value positive">${formatUsd(roiSummary.total_value)}</div></div>
                <div class="roi-item"><div class="roi-label">ROI (${escapeHtml(roiSummary.period || '30d')})</div><div class="roi-value ${roiValue !== null && roiValue >= 0 ? 'positive' : 'negative'}">${formatRoi(roiValue)}</div></div>
              </div>
            ` : ''}

            <div class="health-indicator ${getHealthClass(healthScore)}">
              <span class="health-dot bg-current"></span>
              <span>${getHealthLabel(healthScore)} (${healthScore})</span>
            </div>

            ${blockersHtml}

            <div class="widget-footer">
              <span style="font-size:0.7rem; font-family:var(--ox-mono); color:var(--ox-text-muted); text-transform:uppercase; letter-spacing:0.05em;">Synced</span>
              <a href="${pulse.id ? `https://console.useorgx.com/initiatives/${escapeHtml(pulse.id)}` : 'https://console.useorgx.com'}" target="_blank" class="deep-link">
                View Dashboard
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
              </a>
            </div>
          </div>
        </div>
      `);
    };

    if(isDemo) render();
    else initWidget({ render: d => { if(d) pulse = d; isLoading = false; render(); } });
  </script>
  </body>
</html>
