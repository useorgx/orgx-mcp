<body>
  <div class="container" id="content">
    <!-- Skeleton shown during loading -->
    <div class="skeleton-wrapper" style="display:flex; flex-direction:column; gap:16px; padding:24px;">
      <div style="display:flex; align-items:center; gap:12px;">
        <div class="skeleton-line" style="width:40px; height:40px; border-radius:50%;"></div>
        <div style="flex:1;">
          <div class="skeleton-line" style="width:60%; height:16px; margin-bottom:6px;"></div>
          <div class="skeleton-line" style="width:40%; height:12px;"></div>
        </div>
      </div>
      <div class="skeleton-line" style="width:100%; height:20px;"></div>
      <div class="skeleton-line" style="width:85%; height:14px;"></div>
      <div class="skeleton-line" style="width:90%; height:14px;"></div>
      <div style="display:flex; gap:12px; margin-top:8px;">
        <div class="skeleton-line" style="width:100px; height:36px; border-radius:8px;"></div>
        <div class="skeleton-line" style="width:100px; height:36px; border-radius:8px;"></div>
      </div>
    </div>
  </div>
  <script>

    // Sync theme from URL to override prefers-color-scheme
    (function() {
      const params = new URLSearchParams(window.location.search);
      const theme = params.get('theme');
      if (theme) document.documentElement.setAttribute('data-theme', theme);
    })();


    var injectHtml = (html) => {
      const content = document.getElementById('content');
      const skeleton = content.querySelector('.skeleton-wrapper');
      if (skeleton) {
        skeleton.style.opacity = '0';
        setTimeout(() => {
          content.innerHTML = html;
        }, 300);
      } else {
        content.innerHTML = html;
      }
    };

    
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      var _mcpPending = {};
      var _mcpNextId = 100;
      function initWidget(opts){
        var render=opts.render,getData=opts.getData||_extractData;
        var protocol=_detectProtocol();
        if(protocol==='chatgpt'){
          var d=getData(window.openai&&window.openai.toolOutput);render(d);
          window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});
        }else if(protocol==='mcp-apps'){
          render(null);
          var initId=1;
          window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'OrgX Widget',version:'1.0.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');
          window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');
          window.addEventListener('message',function(event){
            var msg=event.data;if(!msg||typeof msg!=='object')return;
            if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}
            if(msg.id!=null&&_mcpPending[msg.id]){var p=_mcpPending[msg.id];delete _mcpPending[msg.id];if(msg.error)p.reject(new Error(msg.error.message||'Tool call failed'));else p.resolve(msg.result);return;}
            if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}
          });
        }else{render(null);}
      }
      function callTool(name, args){
        var protocol=_detectProtocol();
        if(protocol==='chatgpt')return window.openai&&window.openai.callTool?window.openai.callTool(name,args):Promise.resolve(null);
        if(protocol==='mcp-apps'){
          return new Promise(function(resolve,reject){
            var id=_mcpNextId++;
            _mcpPending[id]={resolve:resolve,reject:reject};
            window.parent.postMessage({jsonrpc:'2.0',id:id,method:'tools/call',params:{name:name,arguments:args}},'*');
            setTimeout(function(){if(_mcpPending[id]){delete _mcpPending[id];reject(new Error('Tool call '+name+' timed out'));}},30000);
          });
        }
        return Promise.resolve(null);
      }

      var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon" aria-hidden="true">'+c+'</svg>';};
      var icons = {
      external: function(s){return _svg('<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line>',s);},
      check: function(s){return _svg('<polyline points="20 6 9 17 4 12"></polyline>',s);},
      initiative: function(s){return _svg('<circle cx="12" cy="12" r="9" fill="currentColor" fill-opacity="0.1"></circle><circle cx="12" cy="12" r="5"></circle><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"></circle>',s);},
      workstream: function(s){return _svg('<rect x="2" y="2" width="20" height="20" rx="6" fill="currentColor" fill-opacity="0.1" stroke="none"></rect><path d="M6 6c3 0 5 6 8 6"></path><path d="M6 18c3 0 5-6 8-6"></path><path d="M6 12h12"></path><path d="m14 8 4 4-4 4"></path><circle cx="6" cy="6" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="6" cy="12" r="1.5" fill="currentColor" stroke="none"></circle><circle cx="6" cy="18" r="1.5" fill="currentColor" stroke="none"></circle>',s);},
      milestone: function(s){return _svg('<path d="M5 3v18"></path><path d="m5 4 12 1-2 4 2 4-12-1z" fill="currentColor" fill-opacity="0.1"></path>',s);},
      task: function(s){return _svg('<rect x="4" y="4" width="16" height="16" rx="4" fill="currentColor" fill-opacity="0.12"></rect><path d="M9 12.2 11 14.2 15.2 10"></path>',s);}
    };
    var escapeHtml = (str) => { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; };


    var isDemo = new URLSearchParams(window.location.search).get('demo') === 'true';
    var isLoadingOverride = new URLSearchParams(window.location.search).get('loading') === 'true';
    
    var entity = isDemo ? { id: 'TSK-942', type: 'task', title: 'Implement rate limiting middleware for public API', agent_name: 'Eli', status: 'In Progress', domain: 'Engineering', workspace_name: 'Core Platform', links: [{ platform: 'Linear', url: '#', label: 'ENG-142' }] } : null;
    var isLoading = !isDemo;
    if (isLoadingOverride) { isLoading = true; isDemo = false; initWidget = () => { render(); }; }
    function openWidgetLink(url,event){if(!url)return false;var protocol=_detectProtocol();if(protocol==='mcp-apps'){if(event&&typeof event.preventDefault==='function')event.preventDefault();window.parent.postMessage({jsonrpc:'2.0',id:_mcpNextId++,method:'ui/open-link',params:{url:url}},'*');return false;}return true;}

    function resolveWidgetAsset(path){
        try {
            return new URL('shared/' + path, window.location.href).toString();
        } catch (error) {
            return 'https://mcp.useorgx.com/widgets/shared/' + path;
        }
    }
    var getAvatarUrl = (name) => {
        const n = (name || '').toLowerCase();
        if (n.includes('pace') || n.includes('product')) return resolveWidgetAsset('product_orchestrator.png');
        if (n.includes('eli') || n.includes('engineer')) return resolveWidgetAsset('engineering_autopilot.png');
        if (n.includes('mark') || n.includes('market')) return resolveWidgetAsset('launch_captain.png');
        if (n.includes('sage') || n.includes('sale')) return resolveWidgetAsset('pipeline_intelligence.png');
        if (n.includes('orion') || n.includes('op')) return resolveWidgetAsset('control_tower.png');
        if (n.includes('dana') || n.includes('design')) return resolveWidgetAsset('design_codex.png');
        if (n.includes('xandy') || n.includes('orchestrator')) return resolveWidgetAsset('xandy_orchestrator.png');
        return null;
    };
    var renderAvatar = (name, sizePx) => {
        const url = getAvatarUrl(name);
        const fallback = escapeHtml(name ? name[0].toUpperCase() : '?');
        if (url) {
            return `<img src="${url}" alt="" class="avatar-image" loading="eager" decoding="sync" draggable="false" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" /><span class="avatar-fallback" style="display:none;">${fallback}</span>`;
        }
        return `<span class="avatar-fallback" style="display:flex;">${fallback}</span>`;
    };
    var ORGX_BASE_URL = 'https://useorgx.com';
    var buildEntityUrl = (type, id, initiativeId) => {
      if (!id) return ORGX_BASE_URL;
      var normalizedType = String(type || '').toLowerCase();
      if (normalizedType === 'run' || normalizedType === 'agent_run') {
        return ORGX_BASE_URL + '/agents/runs/' + encodeURIComponent(id);
      }
      if (normalizedType === 'task') {
        return initiativeId
          ? ORGX_BASE_URL + '/live/' + encodeURIComponent(initiativeId) + '?task=' + encodeURIComponent(id)
          : ORGX_BASE_URL + '/live?view=mission-control&task=' + encodeURIComponent(id);
      }
      if (normalizedType === 'initiative') {
        return ORGX_BASE_URL + '/live/' + encodeURIComponent(id);
      }
      if (normalizedType === 'workstream') {
        return initiativeId
          ? ORGX_BASE_URL + '/live/' + encodeURIComponent(initiativeId) + '?workstream=' + encodeURIComponent(id)
          : ORGX_BASE_URL + '/live?view=mission-control&workstream=' + encodeURIComponent(id);
      }
      if (normalizedType === 'milestone') {
        return initiativeId
          ? ORGX_BASE_URL + '/live/' + encodeURIComponent(initiativeId) + '?milestone=' + encodeURIComponent(id)
          : ORGX_BASE_URL + '/live?view=mission-control&milestone=' + encodeURIComponent(id);
      }
      if (normalizedType === 'agent') {
        return ORGX_BASE_URL + '/settings/agents?agent=' + encodeURIComponent(id);
      }
      return ORGX_BASE_URL;
    };
    var inferDomain = payload => {
      const source = [payload.domain, payload.agent_name, payload.agent_id].filter(Boolean).join(' ').toLowerCase();
      if (source.includes('product') || source.includes('pace')) return 'Product';
      if (source.includes('engineer') || source.includes('eli')) return 'Engineering';
      if (source.includes('market') || source.includes('mark')) return 'Marketing';
      if (source.includes('sale') || source.includes('sage')) return 'Sales';
      if (source.includes('design') || source.includes('dana')) return 'Design';
      if (source.includes('oper') || source.includes('orion')) return 'Operations';
      if (source.includes('orchestr') || source.includes('xandy')) return 'Orchestrator';
      return null;
    };
    var inferAgentName = payload => {
      const source = [payload.agent_id, payload.agent, payload.domain].filter(Boolean).join(' ').toLowerCase();
      if (source.includes('pace') || source.includes('product')) return 'Pace';
      if (source.includes('eli') || source.includes('engineer')) return 'Eli';
      if (source.includes('mark') || source.includes('market')) return 'Mark';
      if (source.includes('sage') || source.includes('sale')) return 'Sage';
      if (source.includes('dana') || source.includes('design')) return 'Dana';
      if (source.includes('orion') || source.includes('oper')) return 'Orion';
      if (source.includes('xandy') || source.includes('orchestr')) return 'Xandy';
      return null;
    };
    var normalizeEntityPayload = payload => {
      if (!payload) return null;
      if (payload.title && payload.agent_name && payload.workspace_name) {
        return { ...payload, agent_ready: true, workspace_ready: true, domain_ready: !!payload.domain, initiative_name: payload.initiative_name || null };
      }
      var inferredAgentName = payload.agent_name || inferAgentName(payload);
      var inferredDomain = payload.domain || inferDomain(payload);
      var workspaceName = payload.workspace_name || payload.command_center_name || null;
      var initiativeName = payload.initiative_name || payload.initiative_title || null;
      if (payload.entity && typeof payload.entity === 'object') {
        return {
          id: payload.entity.id || payload.id || payload.task_id || payload.run_id || null,
          type: payload.entity.type || payload.type || 'task',
          title: payload.entity.title || payload.title || payload.task_summary || payload.task_title || 'Execution dispatched',
          agent_name: inferredAgentName || payload.entity.agent_name || null,
          domain: inferredDomain,
          workspace_name: workspaceName,
          initiative_name: initiativeName,
          initiative_id: payload.initiative_id || payload.entity.initiative_id || null,
          status: payload.status || payload.entity.status || 'queued',
          links: Array.isArray(payload.links) ? payload.links : [],
          console_url: payload.live_url || payload.url || null,
          agent_ready: !!(inferredAgentName || payload.entity.agent_name),
          workspace_ready: !!workspaceName,
          domain_ready: !!inferredDomain,
          note: payload.message || null
        };
      }
      return {
        id: payload.run_id || payload.task_id || null,
        type: payload.spawned_run_id ? 'handoff' : 'task',
        title: payload.task_summary || payload.task_title || payload.task || payload.message || 'Execution dispatched',
        agent_name: inferredAgentName,
        domain: inferredDomain,
        workspace_name: workspaceName,
        initiative_name: initiativeName,
        initiative_id: payload.initiative_id || null,
        status: payload.status || 'queued',
        links: [
          payload.task_id ? { platform: 'Task', url: buildEntityUrl('task', payload.task_id, payload.initiative_id), label: payload.task_short_id || payload.task_id.slice(0, 8) } : null,
          payload.run_id ? { platform: 'Run', url: payload.live_url || buildEntityUrl('run', payload.run_id), label: payload.run_short_id || payload.run_id.slice(0, 8) } : null
        ].filter(Boolean),
        console_url: payload.live_url || (payload.run_id ? buildEntityUrl('run', payload.run_id) : payload.task_id ? buildEntityUrl('task', payload.task_id, payload.initiative_id) : null),
        agent_ready: !!inferredAgentName,
        workspace_ready: !!workspaceName,
        domain_ready: !!inferredDomain,
        note: payload.message || null
      };
    };

    var render = () => {
      if (isLoading) {
        injectHtml(`
          <div class="skeleton-wrapper"><div class="ox-card"><div class="ox-card-inner">
            <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
              <div><div class="skeleton-line" style="width:100px; height:12px; margin-bottom:8px;"></div><div class="skeleton-line" style="width:140px; height:16px;"></div></div>
              <div class="skeleton-line" style="width:32px; height:32px; border-radius:50%;"></div>
            </div>
            <div class="skeleton-line" style="width:100%; height:28px; margin-bottom:24px;"></div>
            <div class="skeleton-line" style="width:100%; height:64px; border-radius:12px; margin-bottom:16px;"></div>
            <div style="display:flex; gap:12px;"><div class="skeleton-line" style="width:100px; height:32px; border-radius:6px;"></div></div>
          </div></div></div>`);
        return;
      }
      entity = normalizeEntityPayload(entity);
      if (!entity) { injectHtml(`<div class="empty-state animate-in"><div class="empty-icon">${icons.check(24)}</div><div class="empty-title">Entity unverified</div><div class="empty-desc">The dispatched entity payload is empty.</div></div>`); return; }

      const linksHtml = (entity.links || []).map(l => `
        <a href="${escapeHtml(l.url)}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(l.url || ''))}, event)' class="platform-link ox-link-btn ox-link-btn--ghost">
          <span style="display:flex; align-items:center; gap:6px;">
            ${icons.external(12)} Open ${escapeHtml(l.platform)}
          </span>
          <span class="platform-link__meta">${escapeHtml(l.label)} · new tab</span>
        </a>
      `).join('');
      
      const typeRaw = (entity.type || 'task').toLowerCase();
      let typeIcon = icons.task(16);
      if (typeRaw === 'initiative') typeIcon = icons.initiative(16);
      if (typeRaw === 'workstream') typeIcon = icons.workstream(16);
      if (typeRaw === 'milestone') typeIcon = icons.milestone(16);

      const typeDisplay = escapeHtml(entity.type || 'Entity').toUpperCase();
      const consoleUrl = entity.console_url || (entity.id ? buildEntityUrl(entity.type, entity.id, entity.initiative_id) : ORGX_BASE_URL);

      injectHtml(`
        <div class="ox-card animate-in">
          <div class="ox-card-inner">
            
            <div class="dispatch-header" style="margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--ox-border); display: flex; align-items: center; justify-content: space-between;">
              <div>
                <div class="ox-eyebrow" style="color: var(--ox-primary); margin-bottom:6px;">Agent Dispatched</div>
                <div style="display:flex; align-items:center; gap:8px; font-family:var(--ox-mono); font-size:0.75rem; color:var(--ox-text-muted); font-weight:600;">
                  <span style="color:var(--ox-text); display:flex; align-items:center;">${typeIcon}</span>
                  ${typeDisplay} <span style="color:var(--ox-text);">${escapeHtml(entity.id)}</span>
                </div>
              </div>
              <div class="radar-container" aria-label="Agent Active" title="Agent is executing">
                <div class="radar-ring"></div>
                <div class="radar-dot"></div>
              </div>
            </div>
            
            <h2 class="ox-title" style="font-size:1.3rem; margin-bottom:24px; line-height:1.4;">${escapeHtml(entity.title)}</h2>
            ${entity.note ? `<div class="dispatch-note">${escapeHtml(entity.note)}</div>` : ''}
            ${!entity.agent_ready || !entity.workspace_ready ? `<div class="dispatch-note">OrgX accepted the dispatch, but the canonical handoff context is still syncing. The card will update once the server returns the assigned agent and workspace.</div>` : ''}
            
            <div class="agent-row" style="display:flex; align-items:center; gap:16px; padding:16px; background:var(--ox-well-bg); border:1px solid var(--ox-border); border-radius:12px; margin-bottom:24px; box-shadow:var(--ox-well-shadow);">
              <div style="position:relative;width:48px; height:48px; border-radius:12px; overflow:hidden; border:1px solid var(--ox-border); box-shadow:0 0 15px rgba(var(--ox-primary-rgb),0.15); flex-shrink:0;">
                ${renderAvatar(entity.agent_name || 'Pending', 48)}
              </div>
              <div class="agent-meta" style="flex:1;">
                <div style="font-family:var(--ox-mono); font-size:0.65rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--ox-text-muted); margin-bottom:4px; font-weight:600;">Assigned Agent</div>
                <div class="dispatch-value ${entity.agent_ready ? '' : 'dispatch-value--pending'}">${escapeHtml(entity.agent_name || 'Awaiting agent confirmation')}</div>
              </div>
            </div>
            
            <div class="meta-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;">
              <div>
                <div class="ox-eyebrow" style="margin-bottom:6px;">Domain</div>
                <div class="dispatch-value ${entity.domain_ready ? '' : 'dispatch-value--pending'}">${escapeHtml(entity.domain || 'Pending routing')}</div>
              </div>
              <div>
                <div class="ox-eyebrow" style="margin-bottom:6px;">Workspace</div>
                <div class="dispatch-value ${entity.workspace_ready ? '' : 'dispatch-value--pending'}">${escapeHtml(entity.workspace_name || 'Pending context sync')}</div>
              </div>
            </div>
            ${entity.initiative_name ? `<div style="margin-top:-8px; margin-bottom:24px;"><div class="ox-eyebrow" style="margin-bottom:6px;">Initiative</div><div class="dispatch-value">${escapeHtml(entity.initiative_name)}</div></div>` : ''}

            ${linksHtml ? `<div class="platform-links" style="display:flex; gap:8px; margin-bottom: 24px;">${linksHtml}</div>` : ''}

            <div class="widget-footer" style="display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid var(--ox-border);">
              <span style="font-size:0.7rem; font-family:var(--ox-mono); color:var(--ox-text-muted); text-transform:uppercase; letter-spacing:0.05em;">Live Sync Active</span>
              <a href="${consoleUrl}" target="_blank" rel="noreferrer" onclick='return openWidgetLink(${JSON.stringify(String(consoleUrl || ''))}, event)' class="deep-link ox-link-btn ox-link-btn--quiet" style="display: inline-flex; align-items: center; gap: 6px;">
                Open execution view
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
              </a>
            </div>

          </div>
        </div>
      `);
    };


    if (isDemo) render();
    else initWidget({ render: d => { if(d) entity = d; isLoading = false; render(); } });

  </script>
</body>
</html>
