<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Task Assigned - OrgX</title>
    <style>
      :root {
        /* ChatGPT SDK fallback (light mode) */
        --app-color-bg: #ffffff;
        --app-color-surface: #ffffff;
        --app-color-surface-elevated: #f7f7f8;
        --app-color-text: #0d0d0d;
        --app-color-text-secondary: #6e6e80;
        --app-color-border: #e5e5e5;
        --app-color-primary: #10a37f;
        --app-color-success: #10a37f;
        --app-color-warning-bg: #fef3c7;
        --app-color-warning-text: #92400e;
        --app-radius-md: 8px;
        --app-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);

        /* OrgX brand colors (RGB triplets for rgba() use) */
        --ox-lime: 191, 255, 0;
        --ox-teal: 20, 184, 166;
        --ox-iris: 99, 102, 241;
        --ox-cyan: 10, 212, 196;

        /* OrgX semantic status */
        --ox-success: #25da8e;   --ox-success-bg: rgba(37,218,142,0.12);  --ox-success-border: rgba(37,218,142,0.3);
        --ox-warning: #f9c770;   --ox-warning-bg: rgba(249,199,112,0.12); --ox-warning-border: rgba(249,199,112,0.3);
        --ox-danger: #ff7688;    --ox-danger-bg: rgba(255,118,136,0.12);  --ox-danger-border: rgba(255,118,136,0.3);
        --ox-info: #60bdff;      --ox-info-bg: rgba(96,189,255,0.12);     --ox-info-border: rgba(96,189,255,0.3);

        /* Typography */
        --ox-font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
        --ox-mono: ui-monospace, SFMono-Regular, 'SF Mono', monospace;
        --ox-tracking-tight: -0.01em;
        --ox-tracking-heading: -0.02em;
        --ox-tracking-eyebrow: 0.08em;

        /* Radii */
        --ox-radius-sm: 6px;  --ox-radius-md: 10px;  --ox-radius-lg: 14px;

        /* Motion */
        --ox-ease: cubic-bezier(0.22, 1, 0.36, 1);
        --ox-ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --ox-duration: 220ms;
        --ox-stagger: 60ms;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --app-color-bg: #02040a;
          --app-color-surface: rgba(255,255,255,0.02);
          --app-color-surface-elevated: rgba(255,255,255,0.04);
          --app-color-text: #f2f7ff;
          --app-color-text-secondary: #b4bed2;
          --app-color-border: rgba(255,255,255,0.06);
          --app-color-primary: rgba(var(--ox-teal), 1);
          --app-color-success: rgba(var(--ox-teal), 1);
          --app-color-warning-bg: #78350f;
          --app-color-warning-text: #fcd34d;
          --app-shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);

          /* Glass surface system */
          --ox-glass-bg: linear-gradient(135deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
          --ox-glass-border: rgba(255,255,255,0.06);
          --ox-glass-border-hover: rgba(255,255,255,0.1);
          --ox-glass-blur: blur(12px) saturate(140%);

          /* Shadows with inset highlight */
          --ox-shadow-card: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.03);
          --ox-shadow-card-hover: 0 8px 32px rgba(0,0,0,0.35), 0 0 0 1px rgba(var(--ox-teal),0.08);

          /* Glows */
          --ox-glow-teal: 0 0 20px rgba(var(--ox-teal), 0.15);
          --ox-glow-lime: 0 0 20px rgba(var(--ox-lime), 0.12);
        }
      }

      /* Shared animations */
      @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
      @keyframes breathe { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.6; transform:scale(0.85); } }
      @keyframes cardEnter { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }

      @media (prefers-color-scheme: dark) {
        .skeleton-line {
          background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(var(--ox-teal),0.06) 40%, rgba(var(--ox-lime),0.04) 50%, rgba(var(--ox-teal),0.06) 60%, rgba(255,255,255,0.03) 100%);
          background-size: 200% 100%;
          animation: shimmer 2.5s infinite ease-in-out;
        }
      }

      .breathe-dot { animation: breathe 3.6s ease-in-out infinite; }

      @media (prefers-reduced-motion: reduce) {
        .skeleton-line, .breathe-dot, .stagger-item, .status-indicator { animation: none; }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--ox-font);
        font-size: 1rem;
        line-height: 1.5;
        letter-spacing: var(--ox-tracking-tight);
        background: var(--app-color-bg);
        color: var(--app-color-text);
        padding: 16px;
        -webkit-font-smoothing: antialiased;
      }

      @media (prefers-color-scheme: dark) {
        body { background: #02040a; }
      }

      .container {
        max-width: 400px;
        margin: 0 auto;
      }

      .task-card {
        background: var(--app-color-surface);
        border-radius: var(--ox-radius-md);
        padding: 16px;
        box-shadow: var(--app-shadow-sm);
        border-left: 4px solid rgba(var(--ox-teal), 1);
        animation: cardEnter 400ms var(--ox-ease) both;
      }

      @media (prefers-color-scheme: dark) {
        .task-card {
          background: var(--ox-glass-bg);
          backdrop-filter: var(--ox-glass-blur);
          -webkit-backdrop-filter: var(--ox-glass-blur);
          border: 1px solid var(--ox-glass-border);
          border-left: 4px solid rgba(var(--ox-teal), 1);
          box-shadow: var(--ox-shadow-card);
        }
      }

      .task-header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .status-indicator {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(var(--ox-teal), 1);
        animation: breathe 3.6s ease-in-out infinite;
      }

      @media (prefers-color-scheme: dark) {
        .status-indicator {
          box-shadow: 0 0 12px rgba(var(--ox-teal), 0.4);
        }
      }

      .task-title {
        font-size: 0.875rem;
        font-weight: 600;
        color: rgba(var(--ox-teal), 1);
        letter-spacing: var(--ox-tracking-heading);
      }

      .task-message {
        font-size: 0.875rem;
        color: var(--app-color-text);
        margin-bottom: 12px;
      }

      .task-details {
        background: var(--app-color-surface-elevated);
        border-radius: var(--ox-radius-md);
        padding: 12px;
      }

      @media (prefers-color-scheme: dark) {
        .task-details {
          background: rgba(255,255,255,0.03);
        }
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 12px 0;
        border-bottom: 1px solid var(--app-color-border);
        gap: 16px;
      }

      .detail-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .detail-row:first-child {
        padding-top: 0;
      }

      .detail-label {
        font-size: 0.6875rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: var(--ox-tracking-eyebrow);
        color: var(--app-color-text-secondary);
        flex-shrink: 0;
        width: 60px;
        padding-top: 2px;
      }

      .detail-value {
        font-size: 0.875rem;
        font-weight: 500;
        text-align: right;
        word-break: break-word;
      }

      .agent-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .agent-avatar {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(var(--ox-teal), 1);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.625rem;
        font-weight: 600;
        color: white;
      }

      @media (prefers-color-scheme: dark) {
        .agent-avatar {
          background: linear-gradient(135deg, rgba(var(--ox-teal), 1), rgba(var(--ox-iris), 1));
          box-shadow: 0 0 10px rgba(var(--ox-teal), 0.2);
        }
      }

      .hint {
        font-size: 0.75rem;
        color: var(--app-color-text-secondary);
        margin-top: 12px;
        padding: 8px 12px;
        background: var(--app-color-surface-elevated);
        border-radius: var(--ox-radius-md);
      }

      .run-id {
        font-family: var(--ox-mono);
        font-size: 0.75rem;
      }

      .flywheel-line {
        display: inline-flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 4px;
        font-family: var(--ox-mono);
        font-size: 0.75rem;
        color: var(--app-color-text-secondary);
      }

      .flywheel-pill {
        display: inline-flex;
        align-items: center;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(var(--ox-teal), 0.08);
        border: 1px solid rgba(var(--ox-teal), 0.2);
      }

      .exec-target-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.6875rem;
        font-weight: 500;
        font-family: var(--ox-mono);
      }
      .exec-target-local {
        background: rgba(var(--ox-iris), 0.08);
        border: 1px solid rgba(var(--ox-iris), 0.2);
        color: rgba(var(--ox-iris), 1);
      }
      .exec-target-cloud {
        background: rgba(var(--ox-teal), 0.08);
        border: 1px solid rgba(var(--ox-teal), 0.2);
        color: rgba(var(--ox-teal), 1);
      }

      /* Skeleton Loading */
      .skeleton-line {
        background: linear-gradient(
          90deg,
          var(--app-color-surface-elevated) 0%,
          var(--app-color-bg) 50%,
          var(--app-color-surface-elevated) 100%
        );
        background-size: 200% 100%;
        animation: shimmer 2.5s infinite ease-in-out;
        border-radius: 4px;
      }

      .skeleton-header {
        height: 14px;
        width: 100px;
      }
      .skeleton-text {
        height: 14px;
      }
      .skeleton-row {
        height: 32px;
      }

      /* Accessibility */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div
      class="container"
      role="region"
      aria-label="Task Assignment Confirmation"
    >
      <div class="task-card" id="content" role="status" aria-live="polite">
        <div class="task-header">
          <span class="status-indicator" aria-hidden="true"></span>
          <span class="task-title">Task Assigned</span>
        </div>
        <!-- Skeleton-first to avoid a visible "Working on it..." flash -->
        <div class="task-message" id="message">
          <span
            class="skeleton-line skeleton-text"
            style="display: inline-block; width: 200px"
          ></span>
        </div>
        <div
          class="task-details"
          id="details"
          role="list"
          aria-label="Task Details"
        ></div>
        <div class="hint" role="note">
          The agent will work on this and may request your approval for key
          decisions.
        </div>
      </div>
    </div>

    <script>
      // ── Inline MCP Apps Bridge ──
      function _detectProtocol(){if(typeof window.openai!=='undefined')return'chatgpt';if(window.parent&&window.parent!==window)return'mcp-apps';return'standalone';}
      function _extractData(out){if(out==null)return null;if(typeof out==='object'&&out.structuredContent)return out.structuredContent;if(typeof out==='object'&&Array.isArray(out.content)){for(var i=0;i<out.content.length;i++){var item=out.content[i];if(item&&item.type==='text'&&item.text){try{return JSON.parse(item.text);}catch(e){continue;}}}}if(typeof out==='string'){try{return JSON.parse(out);}catch(e){return{text:out};}}return out;}
      // ── Size reporting (MCP Apps spec) ──
      var _lastW=0,_lastH=0;
      function _sendSize(){var w=Math.ceil(document.documentElement.getBoundingClientRect().width+(window.innerWidth-document.documentElement.clientWidth));var h=Math.ceil(document.documentElement.getBoundingClientRect().height);if(w===_lastW&&h===_lastH)return;_lastW=w;_lastH=h;try{window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/size-changed',params:{width:w,height:h}},'*');}catch(e){}}
      function _observeSize(){_sendSize();if(typeof ResizeObserver!=='undefined'){var _raf=0;var ro=new ResizeObserver(function(){if(_raf)cancelAnimationFrame(_raf);_raf=requestAnimationFrame(_sendSize);});ro.observe(document.documentElement);ro.observe(document.body);}}
      function initWidget(opts){
        var render=opts.render,getData=opts.getData||_extractData;
        var protocol=_detectProtocol();
        if(protocol==='chatgpt'){
          var d=getData(window.openai&&window.openai.toolOutput);render(d);
          window.addEventListener('openai:set_globals',function(e){var g=e.detail&&e.detail.globals;if(g&&g.toolOutput){render(getData(g.toolOutput));}},{passive:true});
        }else if(protocol==='mcp-apps'){
          render(null);
          var initId=1;
          window.parent.postMessage({jsonrpc:'2.0',id:initId,method:'ui/initialize',params:{appInfo:{name:'OrgX Widget',version:'1.0.0'},appCapabilities:{tools:{listChanged:false}},protocolVersion:'2026-01-26'}},'*');
          window.parent.postMessage({jsonrpc:'2.0',method:'notifications/initialized'},'*');
          window.addEventListener('message',function(event){
            var msg=event.data;if(!msg||typeof msg!=='object')return;
            if(msg.id===initId&&msg.result){window.parent.postMessage({jsonrpc:'2.0',method:'ui/notifications/initialized'},'*');_observeSize();return;}
            if((msg.method==='ui/notifications/tool-result'||msg.method==='notifications/message')&&msg.params){var data=getData(msg.params);if(data)render(data);}
          });
        }else{render(null);}
      }

      var _svg = function(c,s){var sz=typeof s==='number'?s+'px':(s||'1em');return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 24 24" fill="currentColor" class="icon" aria-hidden="true">'+c+'</svg>';};
      var icons = {
        check: function(s){return _svg('<path fillRule="evenodd" d="M18.063 5.674a1 1 0 0 1 .263 1.39l-7.5 11a1 1 0 0 1-1.533.143l-4.5-4.5a1 1 0 1 1 1.414-1.414l3.647 3.647 6.82-10.003a1 1 0 0 1 1.39-.263Z" clipRule="evenodd"/>',s);},
        agent: function(s){return _svg('<path d="M11 7.5C11 8.328 10.328 9 9.5 9C8.672 9 8 8.328 8 7.5C8 6.672 8.672 6 9.5 6C10.328 6 11 6.672 11 7.5Z"/><path d="M14.5 9C15.328 9 16 8.328 16 7.5C16 6.672 15.328 6 14.5 6C13.672 6 13 6.672 13 7.5C13 8.328 13.672 9 14.5 9Z"/><path d="M12 1C12.552 1 13 1.448 13 2V2.5L15.871 2.5C16.383 2.5 16.825 2.5 17.19 2.529C17.574 2.559 17.957 2.627 18.327 2.809C18.919 3.101 19.399 3.581 19.691 4.173C19.873 4.543 19.941 4.926 19.971 5.31C20 5.675 20 6.117 20 6.629V6.708C20 7.762 20 8.611 19.945 9.3C19.889 10.009 19.77 10.632 19.484 11.211C18.998 12.199 18.199 12.998 17.211 13.484C16.632 13.77 16.009 13.889 15.3 13.945C14.611 14 13.762 14 12.708 14H11.292C10.238 14 9.389 14 8.7 13.945C7.991 13.889 7.368 13.77 6.789 13.484C5.801 12.998 5.002 12.199 4.516 11.211C4.23 10.632 4.111 10.009 4.055 9.3C4 8.611 4 7.762 4 6.708V6.629C4 6.117 4 5.675 4.029 5.31C4.059 4.926 4.127 4.543 4.309 4.173C4.601 3.581 5.081 3.101 5.673 2.809C6.043 2.627 6.426 2.559 6.81 2.529C7.175 2.5 7.617 2.5 8.129 2.5L11 2.5V2C11 1.448 11.448 1 12 1Z"/><path d="M6 21C6 20.026 6.551 19.05 7.632 18.278C8.71 17.508 10.252 17 12 17C13.749 17 15.29 17.508 16.369 18.278C17.449 19.05 18 20.026 18 21C18 21.552 18.448 22 19 22C19.552 22 20 21.552 20 21C20 19.213 18.984 17.689 17.531 16.651C16.076 15.612 14.117 15 12 15C9.883 15 7.924 15.612 6.469 16.651C5.016 17.689 4 19.213 4 21C4 21.552 4.448 22 5 22C5.552 22 6 21.552 6 21Z"/>',s);},
        clock: function(s){return _svg('<path d="M12 4C7.582 4 4 7.582 4 12C4 16.418 7.582 20 12 20C16.418 20 20 16.418 20 12C20 7.582 16.418 4 12 4ZM2 12C2 6.477 6.477 2 12 2C17.523 2 22 6.477 22 12C22 17.523 17.523 22 12 22C6.477 22 2 17.523 2 12ZM12 6C12.552 6 13 6.448 13 7V12C13 12.265 12.895 12.52 12.707 12.707L10.207 15.207C9.817 15.598 9.183 15.598 8.793 15.207C8.402 14.817 8.402 14.183 8.793 13.793L11 11.586V7C11 6.448 11.448 6 12 6Z"/>',s);},
        play: function(s){return _svg('<path d="M9.5 9.332V14.668C9.5 15.46 10.375 15.937 11.041 15.51L15.192 12.841C15.804 12.448 15.804 11.552 15.192 11.159L11.041 8.49C10.375 8.063 9.5 8.54 9.5 9.332Z"/><path fillRule="evenodd" clipRule="evenodd" d="M12 2C6.477 2 2 6.477 2 12C2 17.523 6.477 22 12 22C17.523 22 22 17.523 22 12C22 6.477 17.523 2 12 2ZM4 12C4 7.582 7.582 4 12 4C16.418 4 20 7.582 20 12C20 16.418 16.418 20 12 20C7.582 20 4 16.418 4 12Z"/>',s);},
        dot: function(s){return _svg('<circle cx="12" cy="12" r="4"/>',s);},
        laptop: function(s){return _svg('<path d="M4 6a2 2 0 012-2h12a2 2 0 012 2v7H4V6z"/><path d="M2 17a1 1 0 011-1h18a1 1 0 011 1v0a2 2 0 01-2 2H4a2 2 0 01-2-2v0z"/>',s);},
        cloud: function(s){return _svg('<path d="M6.341 13.039C4.489 12.751 3 11.218 3 9.286 3 7.098 4.818 5 7.163 5c.434 0 .854.065 1.252.187A5.51 5.51 0 0113.5 2C16.475 2 19 4.318 19 7.2c0 .31-.027.614-.078.91C20.72 8.693 22 10.267 22 12.143 22 14.276 20.282 16 18.163 16H7.326c-.47 0-.929-.06-1.367-.175"/>',s);}
      };

      var messageEl = document.getElementById('message');
      var detailsEl = document.getElementById('details');

      // Demo Mode
      var isDemo =
        new URLSearchParams(window.location.search).get('demo') === 'true';
      var demoData = {
        message: 'Pace is now working on your request.',
        agent_name: 'Pace',
        task_summary:
          'Draft a technical specification for the new user authentication API endpoints',
        run_id: 'run_abc123def456',
        status: 'Running',
        execution_target: 'cloud',
        cost_estimate_usd: 0.42,
        value_hypothesis_usd: 3.8,
        hypothesis_confidence: 0.74,
      };

      // Demo toggle
      window.toggleDemo = function() {
        var url = new URL(window.location.href);
        if (isDemo) url.searchParams.delete('demo');
        else url.searchParams.set('demo', 'true');
        window.location.href = url.toString();
      };

      // Add demo toggle button
      document.body.insertAdjacentHTML(
        'beforeend',
        '<button onclick="toggleDemo()" style="position:fixed;top:8px;right:8px;padding:6px 12px;font-size:0.75rem;font-weight:500;border-radius:9999px;border:1px solid ' +
        (isDemo ? '#10a37f' : 'var(--app-color-border)') +
        ';background:' + (isDemo ? '#d1fae5' : 'var(--app-color-surface)') +
        ';color:' + (isDemo ? '#065f46' : 'var(--app-color-text-secondary)') +
        ';cursor:pointer;z-index:9999;font-family:inherit;display:flex;align-items:center;gap:4px;">' +
        (isDemo ? icons.check(12) + ' Demo Mode' : 'Demo Mode') +
        '</button>'
      );

      // State — initWidget handles data from any host protocol
      var task = isDemo ? demoData : null;
      var isLoading = !isDemo;

      // XSS Prevention - CRITICAL
      var escapeHtml = function(str) {
        if (str === null || str === undefined) return '';
        var div = document.createElement('div');
        div.textContent = String(str);
        return div.innerHTML;
      };

      var getInitials = function(name) {
        if (!name) return '?';
        return String(name)
          .split(/[\s-]+/)
          .map(function(w) { return w[0]; })
          .join('')
          .slice(0, 2)
          .toUpperCase();
      };

      var formatUsd = function(value) {
        var num = Number(value);
        if (!Number.isFinite(num)) return null;
        return '$' + num.toFixed(2);
      };

      // Skeleton loading template
      var renderSkeleton = function() {
        return '<div class="detail-row">' +
          '<span class="skeleton-line skeleton-text" style="width: 50px;"></span>' +
          '<span class="skeleton-line skeleton-text" style="width: 100px;"></span>' +
        '</div>' +
        '<div class="detail-row">' +
          '<span class="skeleton-line skeleton-text" style="width: 40px;"></span>' +
          '<span class="skeleton-line skeleton-text" style="width: 150px;"></span>' +
        '</div>' +
        '<div class="detail-row">' +
          '<span class="skeleton-line skeleton-text" style="width: 50px;"></span>' +
          '<span class="skeleton-line skeleton-text" style="width: 80px;"></span>' +
        '</div>';
      };

      var render = function() {
        // Show skeleton while loading
        if (isLoading) {
          messageEl.innerHTML =
            '<span class="skeleton-line skeleton-text" style="display: inline-block; width: 200px;"></span>';
          detailsEl.innerHTML = renderSkeleton();
          return;
        }

        messageEl.textContent =
          (task && task.message) || 'Task has been assigned to the agent.';

        var safeAgentName = escapeHtml(task && task.agent_name) || 'Agent';
        var safeTaskSummary = (task && task.task_summary)
          ? escapeHtml(task.task_summary)
          : '';
        var safeRunId = (task && task.run_id)
          ? escapeHtml(String(task.run_id).slice(0, 8))
          : '';
        var safeStatus = (task && task.status) ? escapeHtml(task.status) : '';
        var estimatedCost = formatUsd(task && task.cost_estimate_usd);
        var hypothesizedValue = formatUsd(task && task.value_hypothesis_usd);
        var confidenceRaw = Number(task && task.hypothesis_confidence);
        var confidencePct = Number.isFinite(confidenceRaw)
          ? Math.round(confidenceRaw * 100) + '%'
          : null;

        detailsEl.innerHTML =
        '<div class="detail-row" role="listitem">' +
          '<span class="detail-label">Agent</span>' +
          '<span class="detail-value">' +
            '<span class="agent-badge">' +
              '<span class="agent-avatar" aria-hidden="true">' + escapeHtml(
                getInitials(task && task.agent_name)
              ) + '</span>' +
              safeAgentName +
            '</span>' +
          '</span>' +
        '</div>' +
        (safeTaskSummary
            ? '<div class="detail-row" role="listitem">' +
            '<span class="detail-label">Task</span>' +
            '<span class="detail-value">' + safeTaskSummary + '</span>' +
          '</div>'
            : ''
        ) +
        (safeRunId
            ? '<div class="detail-row" role="listitem">' +
            '<span class="detail-label">Run ID</span>' +
            '<span class="detail-value run-id">' + safeRunId + '...</span>' +
          '</div>'
            : ''
        ) +
        (safeStatus
            ? '<div class="detail-row" role="listitem">' +
            '<span class="detail-label">Status</span>' +
            '<span class="detail-value">' + safeStatus + '</span>' +
          '</div>'
            : ''
        ) +
        (function(){
          var et = task && task.execution_target;
          if (et === 'local' || et === 'local_preferred') {
            return '<div class="detail-row" role="listitem">' +
              '<span class="detail-label">Runs on</span>' +
              '<span class="detail-value"><span class="exec-target-pill exec-target-local">' +
              icons.laptop(12) + ' Local</span></span></div>';
          } else if (et === 'cloud') {
            return '<div class="detail-row" role="listitem">' +
              '<span class="detail-label">Runs on</span>' +
              '<span class="detail-value"><span class="exec-target-pill exec-target-cloud">' +
              icons.cloud(12) + ' Cloud</span></span></div>';
          }
          return '';
        })() +
        ((estimatedCost || hypothesizedValue || confidencePct)
            ? '<div class="detail-row" role="listitem">' +
            '<span class="detail-label">ROI Model</span>' +
            '<span class="detail-value flywheel-line">' +
              (estimatedCost
                ? '<span class="flywheel-pill">Cost ' + estimatedCost + '</span>'
                : '') +
              (hypothesizedValue
                ? '<span class="flywheel-pill">Value ' + hypothesizedValue + '</span>'
                : '') +
              (confidencePct
                ? '<span class="flywheel-pill">Confidence ' + escapeHtml(confidencePct) + '</span>'
                : '') +
            '</span>' +
          '</div>'
            : ''
        );
      };

      // Wire up data reception for all host protocols
      if (isDemo) {
        isLoading = false;
        render();
      } else {
        initWidget({
          render: function(d) {
            if (d) {
              isLoading = false;
              task = d;
            }
            render();
          },
          getData: _extractData,
        });
      }
    </script>
  </body>
</html>
