name: Deploy MCP Server

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_registry:
        description: "Publish to MCP Registry after deploy"
        type: boolean
        default: false
      environment:
        description: "Environment to deploy to"
        type: choice
        options:
          - production
          - preview
        default: production
  pull_request:
    branches: [main]

permissions:
  contents: read
  deployments: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Validate server.json + build + type-check before deployment
  # ──────────────────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Validate server.json
        run: |
          jq empty server.json
          jq -e '.name and .version and .remotes' server.json
          echo "server.json is valid"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify wrangler build (dry-run)
        run: pnpm wrangler deploy --dry-run --outdir .wrangler/dist

  # ──────────────────────────────────────────────────────────────────────────
  # Deploy to production (push to main, release, or manual)
  # ──────────────────────────────────────────────────────────────────────────
  deploy:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: ${{ github.event_name == 'release' && 'production' || inputs.environment || 'production' }}
      url: https://mcp.useorgx.com
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="0.0.0-$(echo ${{ github.sha }} | cut -c1-7)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Update server.json version
        if: github.event_name == 'release'
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            server.json > tmp.json && mv tmp.json server.json

      - name: Sync Worker secrets
        run: |
          secrets_file="$(mktemp)"
          python3 - <<'PY' > "$secrets_file"
          import json
          import os

          payload = {
              "ORGX_SERVICE_KEY": os.environ.get("ORGX_SERVICE_KEY"),
              "OAUTH_CLIENT_ID": os.environ.get("OAUTH_CLIENT_ID"),
              "OAUTH_CLIENT_SECRET": os.environ.get("OAUTH_CLIENT_SECRET"),
              "MCP_JWT_SECRET": os.environ.get("MCP_JWT_SECRET"),
              "MCP_REGISTRY_PUBKEY": os.environ.get("MCP_REGISTRY_PUBKEY"),
              "COOKIE_ENCRYPTION_KEY": os.environ.get("COOKIE_ENCRYPTION_KEY"),
          }
          print(json.dumps({k: v for k, v in payload.items() if v}))
          PY
          pnpm wrangler secret bulk "$secrets_file" --env production
          rm -f "$secrets_file"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ORGX_SERVICE_KEY: ${{ secrets.ORGX_SERVICE_KEY }}
          OAUTH_CLIENT_ID: ${{ secrets.ORGX_OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.ORGX_OAUTH_CLIENT_SECRET }}
          MCP_JWT_SECRET: ${{ secrets.MCP_JWT_SECRET }}
          MCP_REGISTRY_PUBKEY: ${{ secrets.MCP_REGISTRY_PUBKEY }}
          COOKIE_ENCRYPTION_KEY: ${{ secrets.MCP_COOKIE_ENCRYPTION_KEY }}

      - name: Deploy to Cloudflare
        run: pnpm wrangler deploy --env production
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

      - name: Verify deployment
        run: |
          sleep 5
          curl -sf https://mcp.useorgx.com/healthz || (echo "Health check failed" && exit 1)
          echo "Health check passed"
          curl -sf https://mcp.useorgx.com/.well-known/oauth-authorization-server | jq -e '.token_endpoint' || echo "OAuth metadata check skipped"

  # ──────────────────────────────────────────────────────────────────────────
  # Preview deploy (PRs only)
  # ──────────────────────────────────────────────────────────────────────────
  preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Worker secrets (preview)
        run: |
          secrets_file="$(mktemp)"
          python3 - <<'PY' > "$secrets_file"
          import json
          import os

          payload = {
              "ORGX_SERVICE_KEY": os.environ.get("ORGX_SERVICE_KEY"),
              "OAUTH_CLIENT_ID": os.environ.get("OAUTH_CLIENT_ID"),
              "OAUTH_CLIENT_SECRET": os.environ.get("OAUTH_CLIENT_SECRET"),
              "MCP_JWT_SECRET": os.environ.get("MCP_JWT_SECRET"),
          }
          print(json.dumps({k: v for k, v in payload.items() if v}))
          PY
          pnpm wrangler secret bulk "$secrets_file" --env preview
          rm -f "$secrets_file"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          ORGX_SERVICE_KEY: ${{ secrets.ORGX_SERVICE_KEY }}
          OAUTH_CLIENT_ID: ${{ secrets.ORGX_OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.ORGX_OAUTH_CLIENT_SECRET }}
          MCP_JWT_SECRET: ${{ secrets.MCP_JWT_SECRET }}

      - name: Deploy to Cloudflare (preview)
        run: pnpm wrangler deploy --env preview
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  # Publish to MCP Registry (releases or manual trigger)
  # ──────────────────────────────────────────────────────────────────────────
  publish-registry:
    runs-on: ubuntu-latest
    needs: deploy
    if: |
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && inputs.publish_registry)
    environment:
      name: mcp-registry
    steps:
      - uses: actions/checkout@v6

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/
          mcp-publisher --version

      - name: Update server.json version
        run: |
          jq --arg v "${{ needs.deploy.outputs.version }}" '.version = $v' \
            server.json > tmp.json && mv tmp.json server.json
          cat server.json | jq '{name, version, description}'

      - name: Ensure MCP Registry DNS proof
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          MCP_REGISTRY_PUBKEY: ${{ secrets.MCP_REGISTRY_PUBKEY }}
        run: |
          proof_record="v=MCPv1; k=ed25519; p=${MCP_REGISTRY_PUBKEY}"

          zone_response="$(curl -fsS \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones?name=useorgx.com")"
          zone_id="$(printf '%s' "$zone_response" | jq -r '.result[0].id // empty')"

          if [[ -z "$zone_id" ]]; then
            echo "::error::Could not resolve Cloudflare zone for useorgx.com"
            printf '%s\n' "$zone_response"
            exit 1
          fi

          records_response="$(curl -fsS \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records?type=TXT&name=useorgx.com")"

          existing_record_id="$(
            printf '%s' "$records_response" \
              | jq -r --arg proof "$proof_record" '.result[] | select(.content == $proof) | .id' \
              | head -n 1
          )"

          if [[ -n "$existing_record_id" ]]; then
            echo "Registry DNS proof already present on useorgx.com"
            exit 0
          fi

          create_payload="$(
            jq -n \
              --arg name "useorgx.com" \
              --arg content "$proof_record" \
              '{type:"TXT", name:$name, content:$content, ttl:1}'
          )"

          curl -fsS -X POST \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$create_payload" \
            "https://api.cloudflare.com/client/v4/zones/${zone_id}/dns_records" \
            >/dev/null

          echo "Created registry DNS proof TXT record for useorgx.com"

      - name: Login to MCP Registry
        run: |
          registry_private_key="$(
            printf '%s\n' "${{ secrets.MCP_REGISTRY_PRIVATE_KEY }}" \
              | grep -v '^[[:space:]]*#' \
              | tr -d '[:space:]'
          )"

          if [[ -z "$registry_private_key" ]]; then
            echo "::error::MCP_REGISTRY_PRIVATE_KEY resolved to an empty value after stripping comments/whitespace"
            exit 1
          fi

          mcp-publisher login dns \
            --domain=useorgx.com \
            --private-key="$registry_private_key"

      - name: Validate and publish
        run: |
          mcp-publisher validate
          mcp-publisher publish
          echo "Published to MCP Registry"
